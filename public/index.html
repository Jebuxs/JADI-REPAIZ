<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I REPAIZ - Inicio de Sesión</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --input-bg: #111; }
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--dark); color: white; 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container { width: 90%; max-width: 380px; text-align: center; padding: 20px; }
        .logo { font-size: 3.5rem; font-weight: bold; color: var(--gold); margin-bottom: 5px; }
        .tagline { color: #888; font-size: 0.8rem; margin-bottom: 30px; letter-spacing: 2px; }
        
        input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; 
            background: var(--input-bg); color: white; font-size: 1rem; box-sizing: border-box; margin-bottom: 12px;
        }
        input:focus { border-color: var(--gold); outline: none; }

        .btn-main { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            background: var(--gold); color: black; font-weight: bold; font-size: 1.1rem; cursor: pointer;
        }
        
        .btn-google {
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #444; 
            background: white; color: black; font-weight: bold; margin-top: 15px;
            display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer;
        }

        .forgot-pass { display: block; margin-top: 15px; color: #888; text-decoration: none; font-size: 0.9rem; }
        .forgot-pass:hover { color: var(--gold); }

        .divider { margin: 25px 0; display: flex; align-items: center; color: #444; font-size: 0.8rem; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #222; margin: 0 10px; }

        .footer-links { margin-top: 30px; border-top: 1px solid #222; padding-top: 20px; }
        .footer-links a { color: var(--gold); text-decoration: none; font-weight: bold; }
        
        #loader { display: none; margin-top: 10px; color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">J.A.D.I</div>
    <div class="tagline">ECOSISTEMA DE CALZADO</div>

    <div id="login-section">
        <input type="text" id="user-input" placeholder="Usuario, Teléfono o Email">
        <input type="password" id="pass-input" placeholder="Contraseña">
        
        <button class="btn-main" onclick="iniciarSesion()">INICIAR SESIÓN</button>
        
        <a href="#" class="forgot-pass" onclick="recuperarClave()">¿Has olvidado tu contraseña?</a>

        <div class="divider">O ENTRA CON</div>

        <button class="btn-google" onclick="loginConGoogle()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18">
            Continuar con Google
        </button>

        <div id="loader"><i class="fas fa-spinner fa-spin"></i> Validando datos...</div>
    </div>

    <div class="footer-links">
        <p style="color:#666; font-size: 0.9rem;">¿No tienes cuenta?</p>
        <a href="registro_empleado.html">REGISTRARSE AHORA</a>
    </div>
</div>

<script>
    // Configuración Firebase (Usando tus credenciales actuales)
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
        projectId: "jadi-repaiz",
        storageBucket: "jadi-repaiz.appspot.com",
        appId: "1:847134630000:web:0b7806aeda52b991d554b5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    const paginas = { 'ADM': 'admin_panel.html', 'ZPT': 'zapatero.html', 'EMP': 'proveedor.html', 'DEL': 'motorizado.html', 'TND': 'tienda_ventas.html' };

    // FUNCIÓN: LOGIN MANUAL
    async function iniciarSesion() {
        const input = document.getElementById('user-input').value.trim();
        const pass = document.getElementById('pass-input').value.trim();
        if(!input || !pass) return alert("Por favor, llena todos los campos.");

        document.getElementById('loader').style.display = "block";

        try {
            // Buscamos en la base de datos
            const snap = await db.ref('usuarios').once('value');
            let usuarioEncontrado = null;

            snap.forEach(child => {
                const u = child.val();
                // Validamos por teléfono, email o UID
                if((u.telefono === input || u.correo === input || u.uid === input.toUpperCase()) && u.pass === pass) {
                    usuarioEncontrado = u;
                }
            });

            if(usuarioEncontrado) {
                localStorage.setItem('session_jadi', JSON.stringify(usuarioEncontrado));
                window.location.href = paginas[usuarioEncontrado.rolCodigo] || 'index.html';
            } else {
                alert("Credenciales incorrectas o usuario no registrado.");
            }
        } catch (e) {
            alert("Error de conexión con el servidor.");
        } finally {
            document.getElementById('loader').style.display = "none";
        }
    }

    // FUNCIÓN: GOOGLE LOGIN
    function loginConGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then(async (result) => {
            const email = result.user.email;
            // Verificar si ya existe en DB
            const snap = await db.ref('usuarios').orderByChild('correo').equalTo(email).once('value');
            if(snap.exists()) {
                const data = snap.val();
                const user = data[Object.keys(data)[0]];
                localStorage.setItem('session_jadi', JSON.stringify(user));
                window.location.href = paginas[user.rolCodigo];
            } else {
                alert("Email vinculado. Completa tu registro como Tienda, Taller o Empleado.");
                window.location.href = 'registro_empleado.html?email=' + email;
            }
        }).catch(() => alert("Error al conectar con Google."));
    }

    // FUNCIÓN: OLVIDÉ MI CONTRASEÑA
    function recuperarClave() {
        const userEmail = prompt("Introduce tu correo electrónico para restablecer la clave:");
        if (userEmail) {
            auth.sendPasswordResetEmail(userEmail)
                .then(() => alert("¡Listo! Te hemos enviado un enlace a tu correo para cambiar la contraseña."))
                .catch((error) => alert("Error: Asegúrate de que el correo sea el correcto."));
        }
    }
</script>

</body>
</html>
