<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Nueva Orden (Zapatero)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #fbc02d; --dark: #000; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        
        .area-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .area-btn { flex: 1; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; cursor: pointer; }
        .area-btn.active { background: var(--gold); color: black; font-weight: bold; }
        
        /* Contenedor donde se inyectará todo */
        #main-content { min-height: 300px; }
        
        /* El modal que cubre todo */
        #modal-trabajos-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; justify-content: center; 
            align-items: center; z-index: 9999;
        }
    </style>
</head>
<body>

    <header>
        <h2 style="color:var(--gold);">Panel del Zapatero: Nueva Orden</h2>
    </header>

    <div class="area-nav">
        <button id="btn-reparar" class="area-btn active" onclick="cambiarVista('reparar')">Reparar</button>
        <button id="btn-seguimiento" class="area-btn" onclick="cambiarVista('seguimiento')">Seguimiento</button>
    </div>

    <div id="main-content"></div>

    <div id="modal-trabajos-container"></div>

    <script>
        // Función de navegación que llama al motor en modal_trabajos.js
        function cambiarVista(area) {
            document.querySelectorAll('.area-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + area).classList.add('active');
            
            // Llama al motor lógico
            JADI_MODAL.renderArea(area);
        }

        // Cargar vista inicial
        window.onload = () => JADI_MODAL.renderArea('reparar');
    </script>

    <script src="../js/modal_trabajos.js"></script>
</body>
</html>
