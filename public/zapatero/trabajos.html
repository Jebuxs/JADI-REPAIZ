<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel JADI REPAIZ - Trabajos</title>

    <script src="../js/estilo_visual.js"></script>
    <script src="../js/ia/alimentar_ia.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Estilos base para que no choquen con el estilo_visual.js */
        :root { --gold: #D4AF37; }
        body { margin: 0; padding-bottom: 80px; transition: 0.3s; }
        
        .header { 
            padding: 15px; border-bottom: 1px solid #222; display: flex; 
            align-items: center; background: #050505; justify-content: space-between; 
            position: sticky; top: 0; z-index: 100; 
        }

        /* 2. SELECTOR DE ESTILO MEJORADO */
        .style-selector-container {
            padding: 10px 15px; background: #111; display: flex; align-items: center; gap: 10px;
        }
        #select-clima {
            background: #222; color: var(--gold); border: 1px solid var(--gold);
            padding: 5px 10px; border-radius: 5px; outline: none; font-weight: bold;
        }

        .order-card { 
            background: #111; border-radius: 15px; padding: 15px; margin-bottom: 15px; 
            border: 1px solid #222; display: flex; flex-direction: column; gap: 12px; 
        }
        .card-actions { display: flex; gap: 18px; justify-content: flex-end; border-top: 1px solid #222; padding-top: 10px; }
        
        /* Modal de Nueva Orden */
        #modal-orden { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 300; padding: 20px; box-sizing: border-box; overflow-y: auto; 
        }
        .fab { 
            position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; 
            background: var(--gold); border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; color: black; font-size: 24px; border: none; z-index: 200; 
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="zapatero.html" style="color: var(--gold);"><i class="fas fa-arrow-left"></i></a>
        <h2 style="margin:0; font-size: 1.1rem; color: var(--gold);">JADI REPAIZ</h2>
        <i class="fas fa-sync-alt" onclick="location.reload()" style="color: var(--gold);"></i>
    </div>

    <div class="style-selector-container">
        <span style="font-size: 12px; color: #888;">ESTILO:</span>
        <select id="select-clima" onchange="cambiarTemaJADI(this.value)">
