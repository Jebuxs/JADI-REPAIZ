<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Maestro - J.A.D.I REPAIZ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --red: #ff4d4d; --dark: #000; --card: #0d1117; --border: #30363d; }
        body { background: var(--dark); color: #e6edf3; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 40px; }

        /* HEADER */
        .header { 
            padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid var(--gold); background: #050505;
            position: sticky; top: 0; z-index: 100;
        }
        .back-link { color: var(--gold); text-decoration: none; font-size: 14px; font-weight: bold; }

        .container { max-width: 600px; margin: auto; padding: 20px; }

        /* BOTONES DE NAVEGACIÓN REQUERIDOS */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        
        .btn-nav { 
            background: var(--card); border: 1px solid var(--border); color: white; 
            padding: 20px 10px; border-radius: 15px; text-decoration: none; 
            text-align: center; transition: 0.3s; font-weight: bold; font-size: 11px;
        }
        .btn-nav i { display: block; font-size: 24px; color: var(--gold); margin-bottom: 8px; }
        .btn-nav:hover { border-color: var(--gold); background: #161b22; transform: translateY(-3px); }

        /* BOTÓN AÑADIR (GRANDE) */
        .btn-add-main { grid-column: span 2; border: 1px dashed var(--gold); background: #1a1a1a; }

        /* BUSCADOR */
        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input { 
            width: 100%; padding: 12px 45px 12px 15px; border-radius: 10px; 
            border: 1px solid var(--border); background: #111; color: white; box-sizing: border-box;
        }
        .search-box i { position: absolute; right: 15px; top: 13px; color: var(--gold); }

        /* LISTADO DE MATERIAL EN LOCAL */
        .inventory-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; overflow: hidden; }
        .card-header { 
            background: #161b22; padding: 12px 20px; font-size: 12px; font-weight: bold; 
            color: var(--gold); display: flex; justify-content: space-between;
        }
        
        .material-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; border-bottom: 1px solid #1c2128; 
        }
        .material-row:last-child { border-bottom: none; }
        
        .info-mat h4 { margin: 0; font-size: 14px; color: #fff; }
        .info-mat p { font-size: 10px; color: #666; margin: 4px 0 0; text-transform: uppercase; }

        /* INDICADORES DE STOCK */
        .stock-status { text-align: right; }
        .qty { font-size: 18px; font-weight: 900; display: block; }
        .unit { font-size: 9px; color: #888; font-weight: bold; }

        /* COLORES DE ALERTA */
        .alert-low { color: var(--red) !important; animation: blink 1.5s infinite; }
        .alert-ok { color: #4dff88; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* RESUMEN DE INVERSIÓN (Sugerencia) */
        .stats-bar { 
            background: #050505; border: 1px solid #222; border-radius: 10px; 
            padding: 10px; margin-top: 20px; display: flex; justify-content: space-around;
            font-size: 11px; color: #888;
        }
        .stats-bar strong { color: var(--gold); display: block; font-size: 14px; }

    </style>
</head>
<body>

    <div class="header">
        <a href="zapatero.html" class="back-link"><i class="fas fa-chevron-left"></i> PANEL</a>
        <div style="color:var(--gold); font-weight: 900; letter-spacing: 2px; font-size: 14px;">J.A.D.I INVENTARIO</div>
    </div>

    <div class="container">
        <div class="nav-grid">
            <a href="añadir.html" class="btn-nav btn-add-main">
                <i class="fas fa-plus-circle"></i>
                AÑADIR MATERIAL
            </a>
            <a href="material.html" class="btn-nav">
                <i class="fas fa-boxes-stacked"></i>
                MATERIAL DISPONIBLE
            </a>
            <a href="compras.html" class="btn-nav">
                <i class="fas fa-shopping-cart"></i>
                ADQUIRIR / SOLICITAR
            </a>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar en bodega..." onkeyup="filterList()">
            <i class="fas fa-search"></i>
        </div>

        <div class="inventory-card">
            <div class="card-header">
                <span><i class="fas fa-warehouse"></i> EXISTENCIAS EN LOCAL</span>
                <span id="total-items">0 Items</span>
            </div>
            <div id="inventory-container">
                <div style="padding:40px; text-align:center; color:#444;">
                    <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                    <p>Sincronizando bodega...</p>
                </div>
            </div>
        </div>

        <div class="stats-bar">
            <div style="text-align:center;">
                VALOR ESTIMADO
                <strong id="total-valor">$0.00</strong>
            </div>
            <div style="text-align:center;">
                ALERTAS CRÍTICAS
                <strong id="alert-count" style="color:var(--red);">0</strong>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = function() {
            const session = JSON.parse(localStorage.getItem('session_jadi'));
            if (session) {
                initInventory(session.uid);
            } else {
                window.location.href = "../index.html";
            }
        };

        function initInventory(uid) {
            const container = document.getElementById('inventory-container');
            
            db.ref('inventarios').orderByChild('maestroId').equalTo(uid).on('value', snap => {
                container.innerHTML = "";
                let totalVal = 0;
                let alerts = 0;
                let count = 0;

                if (!snap.exists()) {
                    container.innerHTML = "<div style='padding:30px; text-align:center; font-size:13px; color:#666;'>Bodega vacía. Usa el botón 'Añadir'.</div>";
                    return;
                }

                snap.forEach(child => {
                    const item = child.val();
                    count++;
                    
                    // Lógica de alerta de stock (Si es menor a 3 es crítico)
                    const isLow = parseInt(item.cantidad) <= 3;
                    if(isLow) alerts++;

                    // Cálculo de valor (si existe precioCosto en el objeto)
                    if(item.precioCosto) totalVal += (parseFloat(item.precioCosto) * parseInt(item.cantidad));

                    container.innerHTML += `
                        <div class="material-row">
                            <div class="info-mat">
                                <h4>${item.nombre}</h4>
                                <p>${item.categoria || 'Sin Categoría'} | Ref: ${child.key.substring(1,6)}</p>
                            </div>
                            <div class="stock-status">
                                <span class="qty ${isLow ? 'alert-low' : 'alert-ok'}">${item.cantidad}</span>
                                <span class="unit">${item.unidad || 'UDS'}</span>
                            </div>
                        </div>
                    `;
                });

                // Actualizar contadores superiores
                document.getElementById('total-items').innerText = count + " Tipos de Material";
                document.getElementById('alert-count').innerText = alerts;
                document.getElementById('total-valor').innerText = "$" + totalVal.toFixed(2);
            });
        }

        function filterList() {
            let filter = document.getElementById('searchInput').value.toLowerCase();
            let rows = document.getElementsByClassName('material-row');
            for (let i = 0; i < rows.length; i++) {
                let text = rows[i].querySelector('h4').innerText.toLowerCase();
                rows[i].style.display = text.includes(filter) ? "flex" : "none";
            }
        }
    </script>
</body>
</html>
