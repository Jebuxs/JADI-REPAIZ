<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Trabajos - J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --dark: #000; --card: #111; --blue: #0066ff; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        
        .header { padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; background: #050505; position: sticky; top: 0; z-index: 100; justify-content: space-between; }
        .btn-back { color: var(--gold); text-decoration: none; font-size: 1.2rem; }
        .search-container { padding: 15px; }
        .search-bar { background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 10px; display: flex; align-items: center; }
        .search-bar input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }

        /* SECCIÓN NUBE */
        .cloud-section { padding: 0 15px; margin-bottom: 20px; }
        .cloud-title { color: var(--gold); font-size: 0.7rem; font-weight: bold; letter-spacing: 1px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .cloud-card { background: #1a1500; border: 1px solid #443300; border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--gold); cursor: pointer; }
        .cloud-card:active { transform: scale(0.98); }
        .btn-take { background: var(--gold); color: black; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; font-size: 11px; cursor: pointer; margin-top: 10px; width: 100%; }
        
        .rebaja-alert { background: #220000; border: 1px solid #ff4444; border-left-width: 5px; }
        .rebaja-alert b { color: #ff4444; font-size: 10px; display: block; margin-bottom: 5px; }

        .orders-container { padding: 0 15px; }
        .order-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .order-header h3 { margin: 0; font-size: 16px; color: var(--gold); }
        .status-tag { font-size: 10px; padding: 4px 8px; border-radius: 5px; text-transform: uppercase; font-weight: bold; }
        .tag-recibido { background: #444; color: white; }
        .tag-proceso { background: var(--blue); color: white; }
        .tag-listo { background: #00cc66; color: black; }
        
        .order-price { font-weight: bold; color: white; display: flex; justify-content: space-between; border-top: 1px solid #222; padding-top: 10px; font-size: 12px; }
        .order-actions { display: flex; gap: 8px; margin-top: 15px; }
        .btn-status { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 11px; cursor: pointer; }

        #modal-orden { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 300; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        label { font-size: 11px; color: var(--gold); margin-bottom: 5px; display: block; }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 24px; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(255,215,0,0.4); z-index: 200; }
        
        /* Estilos para la tabla visual de items acumulados */
        .item-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 8px 0; border-bottom: 1px solid #1a1a1a; color: #ccc; }
        .item-row b { color: var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <a href="zapatero.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        <h2 style="margin:0; font-size: 1.1rem;">Panel de Órdenes</h2>
        <i class="fas fa-sync-alt" onclick="location.reload()" style="color: var(--gold); cursor: pointer;"></i>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <i class="fas fa-search" style="color: #555;"></i>
            <input type="text" id="inputBusqueda" onkeyup="filtrarTrabajos()" placeholder="Buscar cliente o calzado...">
        </div>
    </div>

    <div class="cloud-section" id="seccion-nube" style="display:none;">
        <div class="cloud-title"><i class="fas fa-cloud-download-alt"></i> SOLICITUDES Y NEGOCIACIONES</div>
        <div id="contenedor-nube"></div>
    </div>

    <div class="orders-container" id="lista-trabajos"></div>

    <button class="fab" onclick="abrirModal()"><i class="fas fa-plus"></i></button>

    <div id="modal-orden">
        <h2 id="modal-titulo" style="color: var(--gold); margin-top: 0;">Nueva Orden de Trabajo</h2>
        <label>CLIENTE (CELULAR)</label>
        <input type="tel" id="cli-celular" placeholder="Número Celular">
        <input type="text" id="cli-nombre" placeholder="Nombre completo">
        
        <div class="item-table" style="background: #080808; border-radius: 10px; padding: 10px; margin-bottom: 15px; border: 1px dashed #333;">
            <label>EDITAR TRABAJO SELECCIONADO</label>
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <input type="text" id="item-cant" value="1" style="flex:0.6;">
                <input type="text" id="item-tipo" placeholder="Tipo" style="flex:1.2;">
                <input type="text" id="item-desc" placeholder="Detalle" style="flex:2;">
                <input type="number" id="item-precio" placeholder="$" style="flex:1;">
                <button onclick="agregarItemALista()" style="background:var(--gold); border:none; border-radius:8px; width:45px; height:42px; color:black;"><i class="fas fa-plus"></i></button>
            </div>
            <div id="tabla-items-visual"></div>
        </div>

        <div style="background: #0a0a0a; padding: 12px; border-radius: 10px; border: 1px solid #222;">
            <label>TOTAL NEGOCIADO $</label>
            <input type="number" id="precio-total" onkeyup="calcularSaldo()">
            <label>ABONO INICIAL $</label>
            <input type="number" id="abono-inicial" onkeyup="calcularSaldo()">
            <label>SALDO PENDIENTE $</label>
            <input type="number" id="saldo-pendiente" readonly style="color:#ff4444; border:none; background:transparent;">
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button onclick="cerrarModal()" style="flex:1; background:transparent; color:white; border:1px solid #444; padding:15px; border-radius:10px;">CANCELAR</button>
            <button id="btn-guardar-main" onclick="guardarOrden()" style="flex:1; background:var(--gold); color:black; border:none; padding:15px; border-radius:10px; font-weight:bold;">GUARDAR ORDEN</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const session = JSON.parse(localStorage.getItem('session_jadi')) || { uid: "ZAP-TEMP", nombre: "Zapatero JADI" };

        let itemsTemporales = [];
        let solicitudActualId = null;

        function escucharSolicitudesNube() {
            db.ref('solicitudes_reparacion').on('value', snap => {
                const container = document.getElementById('contenedor-nube');
                const seccion = document.getElementById('seccion-nube');
                container.innerHTML = "";
                let count = 0;

                snap.forEach(child => {
                    const s = child.val();
                    if(s.estado === 'PENDIENTE' || (s.estado === 'REBAJA_SOLICITADA' && s.zapateroId === session.uid)) {
                        count++;
                        const esRebaja = s.estado === 'REBAJA_SOLICITADA';
                        container.innerHTML += `
                            <div class="cloud-card ${esRebaja ? 'rebaja-alert' : ''}" onclick="aceptarSolicitudNube('${child.key}')">
                                ${esRebaja ? '<b>¡SOLICITAN REBAJA!</b>' : ''}
                                <div style="display:flex; justify-content:space-between;">
                                    <b style="font-size:13px; color:var(--gold);">${s.clienteNombre}</b>
                                    <span style="font-size:9px; color:#777;">${s.items.length} ART.</span>
                                </div>
                                <p style="font-size:11px; color:#eee; margin:5px 0;">
                                    ${s.items[0].cant} | ${s.items[0].tipo} - ${s.items[0].desc}
                                </p>
                                <small style="font-size:9px; color:#555;">Clic para editar y enviar proforma</small>
                            </div>
                        `;
                    }
                });
                seccion.style.display = count > 0 ? "block" : "none";
            });
        }

        function aceptarSolicitudNube(id) {
            db.ref('solicitudes_reparacion/' + id).once('value', snap => {
                const s = snap.val();
                if(!s) return;
                solicitudActualId = id;
                abrirModal();
                
                document.getElementById('modal-titulo').innerText = "Editar Solicitud Cliente";
                document.getElementById('btn-guardar-main').innerText = "ENVIAR PROFORMA";
                document.getElementById('cli-nombre').value = s.clienteNombre;
                document.getElementById('cli-celular').value = s.clienteTelefono || "";
                
                itemsTemporales = [];
                s.items.forEach(it => {
                    itemsTemporales.push({ cant: it.cant || 1, tipo: it.tipo, desc: it.desc, precio: it.precio || 0 });
                });
                renderItems();
            });
        }

        function abrirModal() { 
            document.getElementById('modal-orden').style.display = 'block'; 
            if(!solicitudActualId) {
                document.getElementById('modal-titulo').innerText = "Nueva Orden de Trabajo";
                document.getElementById('btn-guardar-main').innerText = "GUARDAR ORDEN";
                itemsTemporales = [];
                renderItems();
            }
        }

        function cerrarModal() { 
            document.getElementById('modal-orden').style.display = 'none'; 
            solicitudActualId = null; 
            document.getElementById('cli-nombre').value = "";
            document.getElementById('cli-celular').value = "";
            document.getElementById('item-desc').value = "";
            document.getElementById('item-precio').value = "";
            itemsTemporales = [];
            renderItems();
        }

        // --- FUNCIÓN MEJORADA PARA JADI REPAIZ: ACUMULACIÓN DE DETALLES ---
        function agregarItemALista() {
            const cant = document.getElementById('item-cant').value;
            const tipo = document.getElementById('item-tipo').value.trim();
            const desc = document.getElementById('item-desc').value.trim();
            const precio = parseFloat(document.getElementById('item-precio').value) || 0;

            if(!tipo || !desc) return alert("Completa los datos");
            
            // Buscamos si ya existe ese tipo de calzado en nuestra lista actual para acumular
            let itemExistente = itemsTemporales.find(it => it.tipo.toLowerCase() === tipo.toLowerCase());

            if(itemExistente) {
                // Si existe, le sumamos el detalle y el precio
                itemExistente.desc += `, ${desc}`;
                itemExistente.precio += precio;
            } else {
                // Si no existe, lo agregamos como un ítem nuevo
                itemsTemporales.push({ cant, tipo, desc, precio });
            }

            // Limpiamos los campos de Detalle y Precio para seguir anotando en el mismo zapato
            document.getElementById('item-desc').value = "";
            document.getElementById('item-precio').value = "";
            
            renderItems();
        }

        function renderItems() {
            const container = document.getElementById('tabla-items-visual');
            container.innerHTML = "";
            let suma = 0;
            itemsTemporales.forEach((it, index) => {
                suma += it.precio;
                container.innerHTML += `
                    <div class="item-row">
                        <span><b>${it.cant}</b> | ${it.tipo} - ${it.desc}</span>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span style="color:var(--gold); font-weight:bold;">$${it.precio.toFixed(2)}</span>
                            <i class="fas fa-trash-alt" onclick="eliminarItemTemporales(${index})" style="color:#ff4444; cursor:pointer;"></i>
                        </div>
                    </div>`;
            });
            document.getElementById('precio-total').value = suma.toFixed(2);
            calcularSaldo();
        }

        function eliminarItemTemporales(index) {
            itemsTemporales.splice(index, 1);
            renderItems();
        }

        function calcularSaldo() {
            const total = parseFloat(document.getElementById('precio-total').value) || 0;
            const abono = parseFloat(document.getElementById('abono-inicial').value) || 0;
            document.getElementById('saldo-pendiente').value = (total - abono).toFixed(2);
        }

        async function guardarOrden() {
            const total = document.getElementById('precio-total').value;
            if(itemsTemporales.length === 0) return alert("Agrega al menos un ítem a la lista");

            if(solicitudActualId) {
                await db.ref('solicitudes_reparacion/' + solicitudActualId).update({
                    estado: 'NEGOCIACION',
                    zapateroId: session.uid,
                    zapateroNombre: session.nombre,
                    totalOfertado: total,
                    items: itemsTemporales
                });
                alert("Proforma enviada al cliente.");
            } else {
                const snapT = await db.ref('contadores/TRB').once('value');
                let numT = (snapT.val() || 0) + 1;
                const trbID = 'TRB-' + numT.toString().padStart(5, '0');
                await db.ref('trabajos').push({
                    ordenID: trbID, zapateroId: session.uid,
                    cliente: document.getElementById('cli-nombre').value,
                    telefono: document.getElementById('cli-celular').value,
                    items: itemsTemporales, precio: total,
                    abono: document.getElementById('abono-inicial').value,
                    saldo: document.getElementById('saldo-pendiente').value,
                    estado: 'Recibido', timestamp: Date.now()
                });
                await db.ref('contadores/TRB').set(numT);
                alert("Orden guardada localmente.");
            }
            cerrarModal();
        }

        function cargarTrabajos() {
            db.ref('trabajos').orderByChild('zapateroId').equalTo(session.uid).on('value', snap => {
                const container = document.getElementById('lista-trabajos');
                container.innerHTML = "";
                snap.forEach(child => {
                    const o = child.val();
                    container.innerHTML += `
                        <div class="order-card" data-nombre="${o.cliente.toLowerCase()}">
                            <div class="order-header">
                                <h3>${o.cliente} <small style="color:#444">#${o.ordenID}</small></h3>
                                <span class="status-tag tag-${o.estado.toLowerCase()}">${o.estado}</span>
                            </div>
                            <div class="order-price"><span>TOTAL: $${o.precio}</span><span style="color:var(--gold)">DEBE: $${o.saldo}</span></div>
                            <div class="order-actions">
                                <button class="btn-status" onclick="updateStatus('${child.key}','En Proceso')">PROCESO</button>
                                <button class="btn-status" style="background:#00cc66; color:black; font-weight:bold;" onclick="updateStatus('${child.key}','Listo')">LISTO</button>
                            </div>
                        </div>`;
                });
            });
        }

        function updateStatus(id, s) { db.ref('trabajos/'+id).update({estado: s}); }

        function filtrarTrabajos() {
            const bus = document.getElementById('inputBusqueda').value.toLowerCase();
            document.querySelectorAll('.order-card').forEach(c => {
                c.style.display = c.getAttribute('data-nombre').includes(bus) ? "block" : "none";
            });
        }

        window.onload = () => { cargarTrabajos(); escucharSolicitudesNube(); };
    </script>
</body>
</html>
