<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Panel Maestro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #111; --red: #ff5252; --green: #4caf50; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #0a0a0a; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; }
        .nav-btn { background: #1a1a1a; color: white; border: 1px solid #333; padding: 14px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; text-align: left; font-size: 14px; transition: 0.3s; }
        .nav-btn:hover { border-color: var(--gold); background: #222; }
        .active { border-left: 4px solid var(--gold); color: var(--gold); background: #1e1e1a; }
        
        /* Contenido */
        .main { flex: 1; padding: 30px; overflow-y: auto; background: linear-gradient(135deg, #000, #050505); }
        .card { background: #161616; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; gap: 15px; align-items: center; position: relative; }
        .card img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 1px solid #444; }
        
        .status-badge { position: absolute; top: 15px; right: 15px; font-size: 0.7rem; padding: 4px 8px; border-radius: 5px; text-transform: uppercase; }
        .status-recibido { background: #333; color: #aaa; }
        .status-listo { background: var(--green); color: white; }

        .btn-ready { background: var(--gold); color: black; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* BOTÓN CERRAR SESIÓN */
        .btn-salir { margin-top: auto; background: #2a1010; color: var(--red); border: 1px solid #4a1a1a; font-weight: bold; }
        .btn-salir:hover { background: var(--red); color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color:var(--gold); margin-bottom: 5px;">J.A.D.I</h2>
        <p id="user-display" style="color: #666; font-size: 12px; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 10px;"></p>
        
        <button class="nav-btn active"><i class="fas fa-tools"></i> Taller (Pedidos)</button>
        <button class="nav-btn" onclick="location.href='inventario_bultos.html'"><i class="fas fa-shopping-cart"></i> Mis Insumos</button>
        <button class="nav-btn" onclick="location.href='admin_panel.html'"><i class="fas fa-cog"></i> Configuración</button>

        <button class="nav-btn btn-salir" onclick="cerrarSesionDefinitivo()">
            <i class="fas fa-sign-out-alt"></i> CERRAR SESIÓN
        </button>
    </div>

    <div class="main">
        <h2 id="msg-status" style="color: var(--gold);">Cargando taller...</h2>
        <div id="muro-pedidos"></div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Control de Seguridad y Sesión
    const sesion = JSON.parse(localStorage.getItem('session_jadi'));
    if (!sesion) {
        window.location.replace('index.html');
    } else {
        document.getElementById('user-display').innerText = "MAESTRO: " + sesion.nombre;
    }

    const empresaID = sesion.empresaID;

    // 2. Escuchar Pedidos filtrados por EMPRESA
    // Nota: Usamos la ruta Ecosistema_JADI/Pedidos/ para mantener orden
    db.ref('Ecosistema_JADI/Pedidos/' + empresaID).on('value', snap => {
        const cont = document.getElementById('muro-pedidos');
        const msg = document.getElementById('msg-status');
        cont.innerHTML = "";

        if (!snap.exists()) {
            msg.innerText = "Taller Vacío";
            cont.innerHTML = "<div style='text-align:center; margin-top:50px; color:#444'><i class='fas fa-couch fa-3x'></i><p>No hay trabajos pendientes.</p></div>";
            return;
        }

        msg.innerText = "Trabajos en Taller:";
        snap.forEach(p => {
            const d = p.val();
            const statusClass = d.estado === 'Listo' ? 'status-listo' : 'status-recibido';
            
            cont.innerHTML += `
                <div class="card">
                    <span class="status-badge ${statusClass}">${d.estado}</span>
                    <img src="${d.foto || 'https://via.placeholder.com/80?text=Zapato'}" onerror="this.src='https://via.placeholder.com/80?text=Zapato'">
                    <div>
                        <strong style="color:var(--gold)">Orden: ${p.key}</strong><br>
                        <span><i class="fas fa-user" style="font-size:0.8rem"></i> ${d.cliente}</span><br>
                        <small style="color:#888">${d.descripcion || 'Sin descripción'}</small><br>
                        
                        ${d.estado !== 'Listo' ? 
                            `<button class="btn-ready" onclick="marcarComoListo('${p.key}', '${d.telefono}')">
                                <i class="fas fa-check"></i> Terminar Trabajo
                            </button>` : 
                            `<p style="color:var(--green); font-size:0.8rem; margin:5px 0 0 0"><i class="fas fa-check-double"></i> Esperando retiro</p>`
                        }
                    </div>
                </div>`;
        });
    });

    // 3. Función para cambiar estado y notificar
    async function marcarComoListo(idPedido, telCliente) {
        if(confirm("¿Confirmar que el trabajo está terminado?")) {
            await db.ref(`Ecosistema_JADI/Pedidos/${empresaID}/${idPedido}`).update({
                estado: 'Listo',
                fecha_terminado: new Date().toLocaleString()
            });
            
            // Opción de enviar WhatsApp
            const mensaje = encodeURIComponent(`¡Hola! Tu pedido de reparación en J.A.D.I ya está LISTO para ser retirado. 🛠️👟`);
            const urlWhasapp = `https://wa.me/${telCliente}?text=${mensaje}`;
            
            if(confirm("¿Quieres avisarle al cliente por WhatsApp?")) {
                window.open(urlWhasapp, '_blank');
            }
        }
    }

    function cerrarSesionDefinitivo() {
        if (confirm("¿Maestro, está seguro que desea cerrar el sistema?")) {
            localStorage.clear();
            window.location.replace('index.html');
        }
    }
</script>
</body>
</html>
