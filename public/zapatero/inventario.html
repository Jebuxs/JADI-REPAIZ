<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - J.A.D.I REPAIZ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --dark: #000; --card: #0d1117; --border: #30363d; }
        body { background: var(--dark); color: #e6edf3; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 30px; }

        /* HEADER */
        .header { 
            padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid var(--gold); background: #050505;
        }
        .back-link { color: var(--gold); text-decoration: none; font-size: 14px; font-weight: bold; }

        .container { max-width: 600px; margin: auto; padding: 20px; }

        /* SECCIÓN DE BOTONES DE NAVEGACIÓN (LOS 3 QUE PEDISTE) */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        
        .btn-nav { 
            background: var(--card); border: 1px solid var(--border); color: white; 
            padding: 20px 10px; border-radius: 15px; text-decoration: none; 
            text-align: center; transition: 0.3s; font-weight: bold;
        }
        .btn-nav i { display: block; font-size: 24px; color: var(--gold); margin-bottom: 10px; }
        .btn-nav:hover { border-color: var(--gold); background: #161b22; transform: translateY(-3px); }

        /* BOTÓN AÑADIR (DESTACADO) */
        .btn-full { grid-column: span 2; background: #1a1a1a; border: 1px dashed var(--gold); }

        /* BUSCADOR */
        .search-wrapper { position: relative; margin-bottom: 20px; }
        .search-wrapper input { 
            width: 100%; padding: 12px 45px 12px 15px; border-radius: 10px; 
            border: 1px solid var(--border); background: #111; color: white; box-sizing: border-box;
        }
        .search-wrapper i { position: absolute; right: 15px; top: 13px; color: var(--gold); }

        /* LISTADO DE MATERIAL EN LOCAL */
        .inventory-box { background: var(--card); border: 1px solid var(--border); border-radius: 15px; overflow: hidden; }
        .box-title { background: #161b22; padding: 12px 20px; font-size: 13px; font-weight: bold; color: var(--gold); text-transform: uppercase; }
        
        .material-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; border-bottom: 1px solid #1c2128; 
        }
        .material-item:last-child { border-bottom: none; }
        
        .mat-info h4 { margin: 0; font-size: 15px; color: #fff; }
        .mat-info span { font-size: 11px; color: #888; }

        .qty-badge { 
            background: #000; border: 1px solid var(--gold); color: var(--gold); 
            padding: 4px 10px; border-radius: 8px; font-weight: bold; min-width: 40px; text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="zapatero.html" class="back-link"><i class="fas fa-chevron-left"></i> VOLVER</a>
        <div style="color:var(--gold); font-weight: 900; letter-spacing: 1px;">GESTIÓN DE INVENTARIO</div>
    </div>

    <div class="container">
        <div class="nav-grid">
            <a href="añadir.html" class="btn-nav btn-full">
                <i class="fas fa-plus-circle"></i>
                AÑADIR MATERIAL
            </a>

            <a href="material.html" class="btn-nav">
                <i class="fas fa-layer-group"></i>
                MATERIAL DISPONIBLE
            </a>

            <a href="compras.html" class="btn-nav">
                <i class="fas fa-truck-fast"></i>
                ADQUIRIR / SOLICITAR
            </a>
        </div>

        <div class="search-wrapper">
            <input type="text" id="filterInput" placeholder="Buscar producto en bodega..." onkeyup="filterMaterials()">
            <i class="fas fa-search"></i>
        </div>

        <div class="inventory-box">
            <div class="box-title"><i class="fas fa-warehouse"></i> Material en Local</div>
            <div id="inventory-list">
                <div class="material-item">
                    <div class="mat-info">
                        <h4>Cargando materiales...</h4>
                        <span>Espere un momento</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = function() {
            const session = JSON.parse(localStorage.getItem('session_jadi'));
            if (session) {
                renderInventory(session.uid);
            } else {
                window.location.href = "../index.html";
            }
        };

        function renderInventory(uid) {
            const listContainer = document.getElementById('inventory-list');
            
            db.ref('inventarios').orderByChild('maestroId').equalTo(uid).on('value', snap => {
                listContainer.innerHTML = "";
                if (!snap.exists()) {
                    listContainer.innerHTML = "<p style='padding:20px; text-align:center; color:#555;'>No hay existencias registradas.</p>";
                    return;
                }
                
                snap.forEach(child => {
                    const data = child.val();
                    listContainer.innerHTML += `
                        <div class="material-item">
                            <div class="mat-info">
                                <h4>${data.nombre}</h4>
                                <span>Categoría: ${data.categoria || 'Varios'}</span>
                            </div>
                            <div class="qty-badge">${data.cantidad}</div>
                        </div>
                    `;
                });
            });
        }

        function filterMaterials() {
            let val = document.getElementById('filterInput').value.toLowerCase();
            let items = document.getElementsByClassName('material-item');
            for (let i = 0; i < items.length; i++) {
                let text = items[i].querySelector('h4').innerText.toLowerCase();
                items[i].style.display = text.includes(val) ? "flex" : "none";
            }
        }
    </script>
</body>
</html>
