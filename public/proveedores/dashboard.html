<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Proveedor - JADI REPAIZ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; --text: #eee; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; padding-bottom: 100px; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 25px; }

        /* Pilares de Suministros */
        .main-pillars { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 30px; }
        .pillar-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; transition: 0.3s; }
        .pillar-card i { font-size: 1.6rem; margin-bottom: 8px; display: block; color: var(--gold); }
        .pillar-card h3 { margin: 5px 0; font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .pillar-card span { font-size: 1.4rem; font-weight: bold; }

        /* Sección de Pedidos Entrantes */
        .order-section { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; margin-bottom: 20px; }
        .order-section h2 { color: var(--gold); font-size: 1rem; margin-top: 0; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        .order-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .order-item:last-child { border-bottom: none; }
        .btn-despachar { background: var(--gold); color: black; border: none; padding: 6px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }

        /* Herramientas de Catálogo */
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .tool-card { background: #0a0a0a; border: 1px solid #333; padding: 15px; border-radius: 12px; text-decoration: none; color: white; text-align: center; font-size: 0.8rem; }
        .tool-card i { font-size: 1.2rem; color: var(--gold); margin-bottom: 8px; display: block; }

        /* Barra Inferior */
        .quick-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(10,10,10,0.95); padding: 12px 30px; border-radius: 50px; border: 1px solid var(--gold); display: flex; gap: 30px; backdrop-filter: blur(10px); }
        .nav-item { color: #fff; font-size: 1.2rem; text-decoration: none; opacity: 0.6; transition: 0.3s; }
        .nav-item:hover { opacity: 1; color: var(--gold); }
    </style>
</head>
<body>

<header>
    <div>
        <h2 style="color:var(--gold); margin:0; font-size: 1.1rem;" id="prov-name">PROVEEDOR JADI</h2>
        <small style="color: #555;">Gestión de Insumos y Pedidos</small>
    </div>
    <button onclick="cerrarSesion()" style="background:none; border:1px solid #333; color:#444; padding:5px 10px; border-radius:5px; cursor:pointer; font-size: 0.7rem;">CERRAR</button>
</header>

<div class="main-pillars">
    <div class="pillar-card">
        <i class="fas fa-file-invoice-dollar"></i>
        <h3>PEDIDOS HOY</h3><span id="p-today">0</span>
    </div>
    <div class="pillar-card">
        <i class="fas fa-truck-loading"></i>
        <h3>PENDIENTES</h3><span id="p-wait">0</span>
    </div>
    <div class="pillar-card">
        <i class="fas fa-boxes"></i>
        <h3>PRODUCTOS</h3><span id="p-total">0</span>
    </div>
</div>

<div class="tool-grid">
    <a href="mis-productos.html" class="tool-card">
        <i class="fas fa-list-ul"></i> Catálogo Materiales
    </a>
    <a href="nuevo-producto.html" class="tool-card">
        <i class="fas fa-plus-circle"></i> Subir Insumo
    </a>
</div>

<div class="order-section">
    <h2><i class="fas fa-bell"></i> ÓRDENES DE TALLER JADI</h2>
    <div id="lista-pedidos">
        <p style="text-align:center; color:#444; padding:20px; font-size: 0.8rem;">No hay órdenes de compra activas.</p>
    </div>
</div>

<div class="quick-nav">
    <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i></a>
    <a href="envios-historial.html" class="nav-item"><i class="fas fa-truck"></i></a>
    <a href="mis-productos.html" class="nav-item"><i class="fas fa-warehouse"></i></a>
    <button onclick="cerrarSesion()" class="nav-item" style="background:none; border:none; cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    async function validarAcceso() {
        const session = JSON.parse(localStorage.getItem('session_jadi'));
        
        if(!session) {
            window.location.href = "../login.html";
            return;
        }

        const snap = await db.ref('usuarios/' + session.uid).once('value');
        if(!snap.exists()) {
            cerrarSesion();
            return;
        }

        const u = snap.val();
        // Solo PRV (Proveedor) o ADM (Tú)
        if(u.rolCodigo !== 'PRV' && u.rolCodigo !== 'ADM') {
            window.location.href = "../login.html";
            return;
        }

        document.getElementById('prov-name').innerText = "PROVEEDOR: " + u.nombre.toUpperCase();
        cargarDatosProveedor();
    }

    function cargarDatosProveedor() {
        console.log("Conectando con órdenes de insumos...");
    }

    function cerrarSesion() {
        auth.signOut();
        localStorage.removeItem('session_jadi');
        window.location.href = "../login.html";
    }

    validarAcceso();
</script>
</body>
</html>
