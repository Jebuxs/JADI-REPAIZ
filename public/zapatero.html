<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Panel Zapatero</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --gold: #fbc02d; --dark: #000; --grey: #121212; --card: #1a1a1a; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* Cabecera */
        nav { background: var(--grey); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .logo { color: var(--gold); font-weight: 900; letter-spacing: 3px; }
        .id-badge { background: #333; color: var(--gold); padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }

        /* Contenido Principal */
        .container { padding: 20px; max-width: 600px; margin: auto; padding-bottom: 80px; }
        
        .welcome { margin-bottom: 25px; }
        .welcome h2 { margin: 0; font-size: 1.4rem; }
        .welcome p { color: #666; margin: 5px 0; }

        /* Menú de Cuadrícula */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-item { background: var(--card); border: 1px solid #222; padding: 25px 15px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .menu-item:active { transform: scale(0.95); border-color: var(--gold); }
        .menu-item i { font-size: 2rem; display: block; margin-bottom: 10px; }
        .menu-item span { font-size: 0.9rem; font-weight: bold; display: block; }
        .menu-item small { font-size: 0.7rem; color: #555; }

        /* Sección de Pedidos Urgentes */
        .urgent-section { margin-top: 30px; }
        .urgent-card { background: #1a1500; border-left: 4px solid var(--gold); padding: 15px; border-radius: 10px; margin-top: 10px; }

        /* Navegación Inferior */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--grey); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-link { color: #555; text-decoration: none; font-size: 0.7rem; text-align: center; }
        .nav-link.active { color: var(--gold); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">J.A.D.I</div>
        <div class="id-badge" id="my-id">ID: ...</div>
    </nav>

    <div class="container">
        <div class="welcome">
            <h2 id="user-name">Bienvenido</h2>
            <p>Panel de Control del Taller</p>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="window.location.href='perfil.html'">
                <span>👤 PERFIL</span>
                <small>Datos del local</small>
            </div>
            <div class="menu-item" onclick="alert('Módulo en construcción')">
                <span>📦 INVENTARIO</span>
                <small>Materiales y stock</small>
            </div>
            <div class="menu-item" onclick="alert('Módulo de Clientes')">
                <span>👥 CLIENTES</span>
                <small>Registro y QR</small>
            </div>
            <div class="menu-item" onclick="alert('Pedidos')">
                <span>🛠️ REPARACIONES</span>
                <small>Nuevas solicitudes</small>
            </div>
        </div>

        <div class="urgent-section">
            <span style="color:var(--gold); font-size: 0.8rem; font-weight: bold;">⚠️ TRABAJOS PENDIENTES</span>
            <div class="urgent-card">
                <div style="font-size: 0.9rem; font-weight: bold;">Sin pedidos nuevos</div>
                <div style="font-size: 0.7rem; color: #888;">Escanea un QR de cliente para empezar.</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-link active">INICIO</a>
        <a href="#" class="nav-link">TRABAJOS</a>
        <a href="perfil.html" class="nav-link">MI CUENTA</a>
    </div>

<script>
    const config = { 
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
        projectId: "jadi-repaiz"
    };
    firebase.initializeApp(config);

    const auth = firebase.auth();
    const db = firebase.database();

    auth.onAuthStateChanged(user => {
        if (user) {
            cargarDatosZapatero(user.uid);
        } else {
            window.location.href = "index.html";
        }
    });

    async function cargarDatosZapatero(uid) {
        const snap = await db.ref('usuarios/' + uid).once('value');
        const data = snap.val();
        if(data) {
            document.getElementById('user-name').innerText = "Hola, " + (data.nombre_local || data.nombre);
            document.getElementById('my-id').innerText = "ID: " + data.id_jadi;
        }
    }
</script>
</body>
</html>
