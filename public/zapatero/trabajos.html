<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Trabajos - JADI REPAIZ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --dark: #000; --card: #111; --danger: #ff4444; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .header { padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; background: #050505; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .btn-back { color: var(--gold); text-decoration: none; }
        .search-container { padding: 15px; }
        .search-bar { background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 10px; display: flex; align-items: center; }
        .search-bar input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }
        .orders-container { padding: 0 15px; }
        .order-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .card-actions { display: flex; gap: 15px; }
        .btn-icon { color: #666; font-size: 18px; cursor: pointer; }
        .btn-icon:hover { color: var(--gold); }
        
        #modal-orden { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 300; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; font-size: 16px; }
        label { font-size: 11px; color: var(--gold); margin-bottom: 5px; display: block; }
        
        .row-flex { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .btn-mini-plus { background: #222; color: var(--gold); border: 1px solid var(--gold); border-radius: 8px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .item-listado { border-bottom: 1px solid #222; padding: 10px; display: flex; justify-content: space-between; align-items: flex-start; cursor: pointer; }
        .item-listado:active { background: #1a1a1a; }
        .detalles-texto { font-size: 12px; color: #888; white-space: pre-wrap; }

        .caja-totales { background: #0a0a0a; padding: 15px; border-radius: 12px; margin-top:15px; border: 1px solid #222; }
        .factura-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .factura-total { border-top: 1px solid #333; padding-top: 10px; margin-top: 10px; font-size: 18px; font-weight: bold; color: var(--gold); }
        
        .badge-saldo { background: #222; color: #00ff00; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-left: 5px; border: 1px solid #004400; }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 24px; border: none; z-index: 200; }
    </style>
</head>
<body>

    <div class="header">
        <a href="zapatero.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        <h2 style="margin:0; font-size: 1.1rem;">Panel JADI REPAIZ</h2>
        <i class="fas fa-sync-alt" onclick="location.reload()" style="color: var(--gold);"></i>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="inputBusqueda" onkeyup="filtrarTrabajos()" placeholder="Buscar cliente o ID...">
        </div>
    </div>

    <div class="orders-container" id="lista-trabajos"></div>

    <button class="fab" onclick="abrirModal()"><i class="fas fa-plus"></i></button>

    <div id="modal-orden">
        <h2 id="titulo-modal" style="color: var(--gold); margin-top: 0;">Nueva Orden</h2>
        
        <label>CELULAR CLIENTE</label>
        <input type="tel" id="cli-celular" onkeyup="verificarCliente(this.value)">

        <label>NOMBRE CLIENTE</label>
        <input type="text" id="cli-nombre">
        
        <div id="form-item-caja" style="background: #080808; border-radius: 10px; padding: 12px; border: 1px dashed #444;">
            <div class="row-flex">
                <input type="number" id="item-cant" value="1" style="flex:0.4;">
                <input type="text" id="item-tipo" placeholder="¿Qué vas a reparar?" style="flex:2;">
            </div>
            <div class="row-flex">
                <input type="text" id="item-desc-input" placeholder="Detalle rápido..." style="flex:1;">
                <div class="btn-mini-plus" onclick="acumularEnTexto()"><i class="fas fa-plus"></i></div>
            </div>
            <textarea id="item-detalles-final" placeholder="Resumen detalles..."></textarea>
            <div class="row-flex">
                <input type="number" id="item-precio" placeholder="Precio $">
                <button onclick="bajarItem()" style="background:var(--gold); border:none; border-radius:8px; height:45px; width:60px;"><i class="fas fa-arrow-down"></i></button>
            </div>
        </div>

        <div id="visor-items" style="margin-top:15px;"></div>

        <div class="caja-totales">
            <div class="factura-row">
                <span>SUBTOTAL:</span>
                <span id="txt-subtotal">$0.00</span>
            </div>
            <div class="factura-row" style="color: var(--danger);">
                <span>DESCUENTO:</span>
                <span id="txt-descuento">-$0.00</span>
            </div>
            
            <label>TOTAL A COBRAR $</label>
            <input type="number" id="precio-total" oninput="calcularDiferencias()">
            
            <label>ABONO $</label>
            <input type="number" id="abono-inicial" oninput="calcularDiferencias()">

            <div class="factura-row factura-total">
                <span>SALDO:</span>
                <span id="txt-saldo-pendiente">$0.00</span>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button onclick="cerrarModal()" style="flex:1; background:transparent; color:white; border:1px solid #444; padding:15px; border-radius:10px;">CANCELAR</button>
            <button onclick="guardarOrdenFinal()" style="flex:1; background:var(--gold); color:black; border:none; padding:15px; border-radius:10px; font-weight:bold;">GUARDAR</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const session = JSON.parse(localStorage.getItem('session_jadi')) || { uid: "ZPT00001" };

        let itemsParaGuardar = [];
        let subtotalGlobal = 0;
        let idFirebaseActual = null;
        let clienteEncontradoID = null;

        function abrirModal() {
            idFirebaseActual = null;
            document.getElementById('modal-orden').style.display = 'block';
            itemsParaGuardar = [];
            renderizarLista();
        }

        function cerrarModal() { document.getElementById('modal-orden').style.display = 'none'; }

        function bajarItem() {
            const it = {
                cant: document.getElementById('item-cant').value,
                tipo: document.getElementById('item-tipo').value,
                detalles: document.getElementById('item-detalles-final').value,
                precio: parseFloat(document.getElementById('item-precio').value) || 0
            };
            if(!it.tipo) return;
            itemsParaGuardar.push(it);
            renderizarLista();
            limpiarFormItem();
        }

        function editarItem(index) {
            const it = itemsParaGuardar[index];
            document.getElementById('item-cant').value = it.cant;
            document.getElementById('item-tipo').value = it.tipo;
            document.getElementById('item-detalles-final').value = it.detalles;
            document.getElementById('item-precio').value = it.precio;
            itemsParaGuardar.splice(index, 1);
            renderizarLista();
        }

        function renderizarLista() {
            const visor = document.getElementById('visor-items');
            visor.innerHTML = ""; subtotalGlobal = 0;
            itemsParaGuardar.forEach((it, index) => {
                subtotalGlobal += it.precio;
                visor.innerHTML += `
                <div class="item-listado">
                    <div style="flex:1" onclick="editarItem(${index})">
                        <b>${it.cant} ${it.tipo}</b> - $${it.precio}
                        <div class="detalles-texto">${it.detalles}</div>
                    </div>
                    <i class="fas fa-trash" style="color:var(--danger); padding:10px;" onclick="itemsParaGuardar.splice(${index},1);renderizarLista();"></i>
                </div>`;
            });
            document.getElementById('txt-subtotal').innerText = "$" + subtotalGlobal.toFixed(2);
            if(!idFirebaseActual) document.getElementById('precio-total').value = subtotalGlobal;
            calcularDiferencias();
        }

        function calcularDiferencias() {
            const totalCobrado = parseFloat(document.getElementById('precio-total').value) || 0;
            const abono = parseFloat(document.getElementById('abono-inicial').value) || 0;
            
            const descuento = subtotalGlobal - totalCobrado;
            document.getElementById('txt-descuento').innerText = (descuento > 0) ? `-$${descuento.toFixed(2)}` : "$0.00";
            document.getElementById('txt-saldo-pendiente').innerText = "$" + (totalCobrado - abono).toFixed(2);
        }

        function acumularEnTexto() {
            const i = document.getElementById('item-desc-input');
            const v = document.getElementById('item-detalles-final');
            if(!i.value) return;
            v.value += (v.value ? "\n" : "") + "- " + i.value;
            i.value = ""; i.focus();
        }

        function limpiarFormItem() {
            document.getElementById('item-tipo').value="";
            document.getElementById('item-detalles-final').value="";
            document.getElementById('item-precio').value="";
            document.getElementById('item-cant').value="1";
        }

        // --- Lógica de Firebase (Guardar y Cargar) ---
        async function guardarOrdenFinal() {
            if(itemsParaGuardar.length === 0) return alert("Agrega artículos");
            const tel = document.getElementById('cli-celular').value;
            const nom = document.getElementById('cli-nombre').value;
            
            let idCarpeta = idFirebaseActual;

            if(!idFirebaseActual) {
                if(!clienteEncontradoID) {
                    const snapC = await db.ref('contadores/CLN').once('value');
                    let numC = (snapC.val() || 0) + 1;
                    clienteEncontradoID = 'CLN' + numC.toString().padStart(9, '0');
                    await db.ref('usuarios/' + clienteEncontradoID).set({ uid: clienteEncontradoID, nombre: nom, telefono: tel, tipo: 'CLIENTE', registroCompleto: false });
                    await db.ref('contadores/CLN').set(numC);
                }

                const zapID = parseInt(session.uid.replace(/[^0-9]/g, ''));
                const cliID = parseInt(clienteEncontradoID.replace(/[^0-9]/g, ''));
                const sZ = (await db.ref(`contadores_stats/zpts/${session.uid}`).once('value')).val() || 0;
                const sC = (await db.ref(`contadores_stats/clns/${clienteEncontradoID}`).once('value')).val() || 0;
                const sR = (await db.ref(`contadores_stats/relaciones/${session.uid}_${clienteEncontradoID}`).once('value')).val() || 0;

                idCarpeta = `ZPT${zapID}_CLN${cliID}-${sZ+1}-${sC+1}-${sR+1}`;
                await db.ref(`contadores_stats/zpts/${session.uid}`).set(sZ+1);
                await db.ref(`contadores_stats/clns/${clienteEncontradoID}`).set(sC+1);
                await db.ref(`contadores_stats/relaciones/${session.uid}_${clienteEncontradoID}`).set(sR+1);
            }

            const data = {
                ordenID: idCarpeta,
                zapateroId: session.uid,
                clienteId: clienteEncontradoID,
                cliente: nom,
                telefono: tel,
                items: itemsParaGuardar,
                subtotal: subtotalGlobal,
                precioTotal: parseFloat(document.getElementById('precio-total').value),
                abono: parseFloat(document.getElementById('abono-inicial').value),
                saldo: parseFloat(document.getElementById('precio-total').value) - parseFloat(document.getElementById('abono-inicial').value),
                timestamp: Date.now()
            };

            await db.ref('trabajos/' + idCarpeta).update(data);
            alert("Orden Guardada");
            cerrarModal();
        }

        function verificarCliente(tel) {
            if(tel.length < 9) return;
            db.ref('usuarios').orderByChild('telefono').equalTo(tel).once('value', snap => {
                if(snap.exists()){
                    const data = Object.values(snap.val())[0];
                    document.getElementById('cli-nombre').value = data.nombre;
                    clienteEncontradoID = data.uid;
                }
            });
        }

        function filtrarTrabajos() {
            const b = document.getElementById('inputBusqueda').value.toLowerCase();
            document.querySelectorAll('.order-card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(b) ? "flex" : "none";
            });
        }
// --- LÓGICA DE CÁLCULOS AUTOMÁTICOS CORREGIDA ---

function renderizarLista() {
    const visor = document.getElementById('visor-items');
    visor.innerHTML = ""; 
    subtotalGlobal = 0;

    // 1. Sumamos todos los items actuales
    itemsParaGuardar.forEach((it, index) => {
        subtotalGlobal += it.precio;
        visor.innerHTML += `
        <div class="item-listado">
            <div style="flex:1" onclick="editarItem(${index})">
                <b>${it.cant} ${it.tipo}</b> - $${it.precio.toFixed(2)}
                <div class="detalles-texto">${it.detalles}</div>
            </div>
            <i class="fas fa-trash" style="color:var(--danger); padding:10px;" 
               onclick="eliminarItem(${index})"></i>
        </div>`;
    });

    // 2. Actualizamos el Subtotal en la pantalla
    document.getElementById('txt-subtotal').innerText = "$" + subtotalGlobal.toFixed(2);
    
    // 3. ¡CLAVE!: El Total a cobrar se iguala al subtotal automáticamente 
    // cada vez que la lista cambia (añadir o eliminar)
    document.getElementById('precio-total').value = subtotalGlobal.toFixed(2);
    
    // 4. Ejecutamos el cálculo de saldos y descuentos
    calcularDiferencias();
}

function eliminarItem(index) {
    // Al eliminar de la lista, el renderizarLista() volverá a sumar todo desde cero
    itemsParaGuardar.splice(index, 1);
    renderizarLista();
}

function calcularDiferencias() {
    const subtotal = subtotalGlobal;
    const totalCobrado = parseFloat(document.getElementById('precio-total').value) || 0;
    const abono = parseFloat(document.getElementById('abono-inicial').value) || 0;
    
    // El descuento es la diferencia entre el valor real (subtotal) y lo que decides cobrar
    const descuento = subtotal - totalCobrado;
    
    // Si el descuento es positivo (cobras menos del subtotal), se muestra
    if (descuento > 0) {
        document.getElementById('txt-descuento').innerText = "-$" + descuento.toFixed(2);
        document.getElementById('txt-descuento').style.color = "var(--danger)";
    } else {
        document.getElementById('txt-descuento').innerText = "$0.00";
        document.getElementById('txt-descuento').style.color = "#888";
    }

    // El saldo es simplemente Total Cobrado - lo que ya pagó
    const saldo = totalCobrado - abono;
    document.getElementById('txt-saldo-pendiente').innerText = "$" + saldo.toFixed(2);
    
    // Cambio de color si ya está pagado
    document.getElementById('txt-saldo-pendiente').style.color = (saldo <= 0) ? "#00ff00" : "var(--gold)";
}

        function cargarTrabajos() {
            db.ref('trabajos').orderByChild('zapateroId').equalTo(session.uid).on('value', snap => {
                const container = document.getElementById('lista-trabajos');
                container.innerHTML = "";
                snap.forEach(child => {
                    const o = child.val();
                    container.innerHTML += `
                        <div class="order-card">
                            <div style="flex:1;">
                                <h3 style="color:var(--gold); margin:0;">${o.cliente}</h3>
                                <div style="font-size:10px; color:#aaa;">ID: ${o.ordenID}</div>
                                <div style="font-weight:bold; margin-top:5px;">Total: $${o.precioTotal} <span class="badge-saldo">Saldo: $${o.saldo}</span></div>
                            </div>
                            <div class="card-actions">
                                <i class="fas fa-comment-dots btn-icon" onclick="window.location.href='chat.html?id=${o.clienteId}'"></i>
                                <i class="fas fa-edit btn-icon" onclick="editarOrden('${child.key}')"></i>
                            </div>
                        </div>`;
                });
            });
        }
        
        async function editarOrden(id) {
            const snap = await db.ref('trabajos/' + id).once('value');
            const o = snap.val();
            idFirebaseActual = id;
            clienteEncontradoID = o.clienteId;
            document.getElementById('cli-celular').value = o.telefono;
            document.getElementById('cli-nombre').value = o.cliente;
            document.getElementById('precio-total').value = o.precioTotal;
            document.getElementById('abono-inicial').value = o.abono;
            itemsParaGuardar = o.items || [];
            renderizarLista();
            document.getElementById('modal-orden').style.display = 'block';
        }

        window.onload = cargarTrabajos;
    </script>
</body>
</html>
