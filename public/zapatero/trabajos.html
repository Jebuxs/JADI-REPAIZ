<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Trabajos - JADI REPAIZ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --dark: #000; --card: #111; --danger: #ff4444; --success: #00ff00; --edit: #0088ff; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .header { padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; background: #050505; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .btn-back { color: var(--gold); text-decoration: none; }
        .search-container { padding: 15px; }
        .search-bar { background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 10px; display: flex; align-items: center; }
        .search-bar input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }
        
        .orders-container { padding: 0 15px; }
        .order-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; display: flex; flex-direction: column; gap: 12px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-actions { display: flex; gap: 18px; justify-content: flex-end; border-top: 1px solid #222; padding-top: 10px; }
        
        .btn-icon { color: #888; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-icon:hover { color: var(--gold); }
        .icon-edit { color: var(--edit); }
        .icon-bill { color: var(--gold); }
        
        .badge-status { padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .status-paid { background: rgba(0, 255, 0, 0.1); color: var(--success); border: 1px solid var(--success); }
        .status-pending { background: rgba(255, 215, 0, 0.1); color: var(--gold); border: 1px solid var(--gold); }

        /* Estilos Modal (Solo para Nueva Orden) */
        #modal-orden { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 300; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        label { font-size: 11px; color: var(--gold); margin-bottom: 5px; display: block; }
        .row-flex { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .btn-mini-plus { background: #222; color: var(--gold); border: 1px solid var(--gold); border-radius: 8px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .item-listado { border-bottom: 1px solid #222; padding: 10px; display: flex; justify-content: space-between; }
        .caja-totales { background: #0a0a0a; padding: 15px; border-radius: 12px; border: 1px solid #222; }
        .factura-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 24px; border: none; z-index: 200; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3); }
    </style>
</head>
<body>

    <div class="header">
        <a href="zapatero.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        <h2 style="margin:0; font-size: 1.1rem;">Panel JADI REPAIZ</h2>
        <i class="fas fa-sync-alt" onclick="location.reload()" style="color: var(--gold);"></i>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="inputBusqueda" onkeyup="filtrarTrabajos()" placeholder="Buscar cliente o ID...">
        </div>
    </div>

    <div id="lista-trabajos" class="orders-container"></div>

    <button class="fab" onclick="abrirModal()"><i class="fas fa-plus"></i></button>

    <div id="modal-orden">
        <h2 style="color: var(--gold); margin-top: 0;">Nueva Orden</h2>
        <label>NOMBRE CLIENTE</label>
        <input type="text" id="cli-nombre" placeholder="Nombre completo">

        <div style="background: #080808; border-radius: 10px; padding: 12px; border: 1px dashed #444;">
            <div class="row-flex">
                <input type="text" id="item-tipo" list="lista-sugerencias" placeholder="¿Qué vas a reparar?" style="flex:2;">
                <datalist id="lista-sugerencias"></datalist>
            </div>
            <div class="row-flex">
                <input type="text" id="item-desc-input" placeholder="Detalle rápido..." style="flex:1;">
                <div class="btn-mini-plus" onclick="acumularEnTexto()"><i class="fas fa-plus"></i></div>
            </div>
            <textarea id="item-detalles-final" placeholder="Resumen de reparaciones..."></textarea>
            <div class="row-flex">
                <input type="number" id="item-precio" placeholder="Precio $">
                <button onclick="bajarItem()" style="background:var(--gold); border:none; border-radius:8px; height:45px; width:60px;"><i class="fas fa-arrow-down"></i></button>
            </div>
        </div>

        <div id="visor-items" style="margin-top:15px;"></div>

        <div class="caja-totales">
            <div class="factura-row"><span>SUBTOTAL:</span> <span id="txt-subtotal">$0.00</span></div>
            <label>TOTAL A COBRAR $</label>
            <input type="number" id="precio-total" oninput="calcularDiferencias()">
            <label>ABONO $</label>
            <input type="number" id="abono-inicial" oninput="calcularDiferencias()">
            <div class="factura-row" style="margin-top:10px; font-weight:bold;">
                <span>SALDO PENDIENTE:</span> <span id="txt-saldo-pendiente" style="color:var(--gold);">$0.00</span>
            </div>
        </div>

        <label style="margin-top:15px;">CELULAR (Opcional)</label>
        <input type="tel" id="cli-celular" placeholder="09..." onkeyup="verificarCliente(this.value)">

        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button onclick="cerrarModal()" style="flex:1; background:transparent; border:1px solid #444; color:white; padding:15px; border-radius:10px;">CANCELAR</button>
            <button onclick="guardarOrdenFinal()" style="flex:1; background:var(--gold); border:none; color:black; padding:15px; border-radius:10px; font-weight:bold;">GUARDAR ORDEN</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const sessionStored = JSON.parse(localStorage.getItem('session_jadi')) || { uid: "ZPT1" };
        const myZapID = "ZPT" + parseInt(sessionStored.uid.replace(/\D/g, ""));

        let itemsParaGuardar = [];
        let subtotalGlobal = 0;
        let clienteEncontradoID = null;

        function cargarTrabajos() {
            db.ref('trabajos').orderByChild('zapateroId').equalTo(myZapID).on('value', snap => {
                const container = document.getElementById('lista-trabajos');
                container.innerHTML = "";
                if(!snap.exists()) return;
                
                let lista = [];
                snap.forEach(child => { lista.push({key: child.key, ...child.val()}); });
                lista.sort((a,b) => b.timestamp - a.timestamp);

                lista.forEach(o => {
                    const esPagado = o.saldo <= 0;
                    container.innerHTML += `
                        <div class="order-card">
                            <div class="card-header">
                                <div>
                                    <h3 style="margin:0; color:white;">${o.cliente}</h3>
                                    <span style="font-size:10px; color:#666;">ID: ${o.ordenID}</span>
                                </div>
                                <span class="badge-status ${esPagado ? 'status-paid' : 'status-pending'}">
                                    ${esPagado ? 'PAGADO' : 'PENDIENTE'}
                                </span>
                            </div>
                            
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <div style="font-size:14px;">
                                    <span style="color:#888;">Total:</span> <b>$${o.precioTotal.toFixed(2)}</b>
                                    <span style="color:#888; margin-left:10px;">Saldo:</span> <b style="color:${esPagado ? 'var(--success)' : 'var(--gold)'}">$${o.saldo.toFixed(2)}</b>
                                </div>
                            </div>

                            <div class="card-actions">
                                <i class="fas fa-receipt btn-icon icon-bill" onclick="window.location.href='factura.html?id=${o.key}'"></i>
                                <i class="fas fa-comment-dots btn-icon" onclick="window.location.href='chat.html?id=${o.clienteId}'"></i>
                                <i class="fas fa-edit btn-icon icon-edit" onclick="window.location.href='editar_orden.html?id=${o.key}'"></i>
                            </div>
                        </div>`;
                });
            });
        }

        // Lógica de Nueva Orden
        function abrirModal() {
            document.getElementById('modal-orden').style.display = 'block';
            itemsParaGuardar = [];
            renderizarLista();
            document.getElementById('cli-nombre').value = "";
            document.getElementById('cli-celular').value = "";
        }

        function cerrarModal() { document.getElementById('modal-orden').style.display = 'none'; }

        function bajarItem() {
            const it = {
                tipo: document.getElementById('item-tipo').value.toUpperCase(),
                detalles: document.getElementById('item-detalles-final').value,
                precio: parseFloat(document.getElementById('item-precio').value) || 0
            };
            if(!it.tipo) return;
            itemsParaGuardar.push(it);
            renderizarLista();
            document.getElementById('item-tipo').value = "";
            document.getElementById('item-detalles-final').value = "";
            document.getElementById('item-precio').value = "";
        }

        function renderizarLista() {
            const visor = document.getElementById('visor-items');
            visor.innerHTML = ""; subtotalGlobal = 0;
            itemsParaGuardar.forEach((it, idx) => {
                subtotalGlobal += it.precio;
                visor.innerHTML += `<div class="item-listado"><span>${it.tipo}</span><b>$${it.precio}</b></div>`;
            });
            document.getElementById('txt-subtotal').innerText = "$" + subtotalGlobal.toFixed(2);
            document.getElementById('precio-total').value = subtotalGlobal;
            calcularDiferencias();
        }

        function calcularDiferencias() {
            const total = parseFloat(document.getElementById('precio-total').value) || 0;
            const abono = parseFloat(document.getElementById('abono-inicial').value) || 0;
            document.getElementById('txt-saldo-pendiente').innerText = "$" + (total - abono).toFixed(2);
        }

        function acumularEnTexto() {
            const i = document.getElementById('item-desc-input');
            const v = document.getElementById('item-detalles-final');
            if(!i.value) return;
            v.value += (v.value ? "\n" : "") + "- " + i.value;
            i.value = "";
        }

        async function guardarOrdenFinal() {
            const nom = document.getElementById('cli-nombre').value.trim();
            const tel = document.getElementById('cli-celular').value.trim();
            if(!nom || itemsParaGuardar.length === 0) return alert("Datos incompletos");

            // Generar ID de Cliente
            if(!tel) {
                const snapSN = await db.ref(`contadores/SN_${myZapID}`).once('value');
                let numSN = (snapSN.val() || 0) + 1;
                clienteEncontradoID = `SN${numSN}`;
                await db.ref(`contadores/SN_${myZapID}`).set(numSN);
            } else if(!clienteEncontradoID) {
                const snapC = await db.ref('contadores/CLN').once('value');
                let numC = (snapC.val() || 0) + 1;
                clienteEncontradoID = 'CLN' + numC;
                await db.ref('usuarios/' + clienteEncontradoID).set({ uid: clienteEncontradoID, nombre: nom, telefono: tel, tipo: 'CLIENTE' });
                await db.ref('contadores/CLN').set(numC);
            }

            const sZ = (await db.ref(`stats/z/${myZapID}`).once('value')).val() || 0;
            const idCarpeta = `${myZapID}_${clienteEncontradoID}_N${sZ+1}`;
            
            const data = {
                ordenID: idCarpeta,
                zapateroId: myZapID,
                clienteId: clienteEncontradoID,
                cliente: nom,
                telefono: tel || "S/N",
                items: itemsParaGuardar,
                precioTotal: parseFloat(document.getElementById('precio-total').value),
                abono: parseFloat(document.getElementById('abono-inicial').value) || 0,
                saldo: parseFloat(document.getElementById('precio-total').value) - (parseFloat(document.getElementById('abono-inicial').value) || 0),
                timestamp: Date.now()
            };

            await db.ref('trabajos/' + idCarpeta).set(data);
            await db.ref(`stats/z/${myZapID}`).set(sZ+1);
            cerrarModal();
        }

        function filtrarTrabajos() {
            const b = document.getElementById('inputBusqueda').value.toLowerCase();
            document.querySelectorAll('.order-card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(b) ? "flex" : "none";
            });
        }

        function verificarCliente(tel) {
            if(tel.length < 9) return;
            db.ref('usuarios').orderByChild('telefono').equalTo(tel).once('value', snap => {
                if(snap.exists()){
                    const data = Object.values(snap.val())[0];
                    document.getElementById('cli-nombre').value = data.nombre;
                    clienteEncontradoID = data.uid;
                }
            });
        }

        window.onload = cargarTrabajos;
    </script>
</body>
</html>
