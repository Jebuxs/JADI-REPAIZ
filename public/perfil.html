<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU"></script>

    <style>
        :root { --gold: #fbc02d; --dark: #000; --grey: #1a1a1a; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; padding-bottom: 50px; }
        
        /* Encabezado y Foto */
        .header-perfil { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .foto-container { position: relative; width: 80px; height: 80px; border: 2px solid var(--gold); border-radius: 15px; overflow: hidden; background: #111; }
        .foto-container img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        #file-input { display: none; }

        /* Secciones */
        .section-title { color: var(--gold); font-size: 1.2rem; font-weight: bold; margin-top: 30px; display: block; }
        hr { border: 0; border-top: 1px solid #333; margin: 10px 0 20px 0; }
        
        .info-gmail { font-size: 0.9rem; color: #888; background: var(--grey); padding: 10px; border-radius: 8px; margin-bottom: 20px; }
        
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--grey); border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        
        /* Mapa */
        #map { width: 100%; height: 200px; border-radius: 12px; margin-bottom: 10px; background: #222; }
        .btn-map { background: var(--gold); color: #000; border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Password Wrapper */
        .pass-wrapper { position: relative; }
        .pass-wrapper span { position: absolute; right: 10px; top: 12px; cursor: pointer; color: var(--gold); }

        .btn-guardar { background: #fff; color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; margin-top: 30px; cursor: pointer; }
        .link-recovery { color: var(--gold); font-size: 0.8rem; cursor: pointer; text-decoration: underline; display: block; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-perfil">
        <div>
            <h1 style="margin:0; letter-spacing: 2px;">MI PERFIL</h1>
            <div id="display-id" style="color:var(--gold); font-weight: bold; font-size: 0.8rem;">Cargando ID...</div>
        </div>
        <div class="foto-container" onclick="document.getElementById('file-input').click()">
            <img id="img-perfil" src="https://via.placeholder.com/150" alt="Logo">
            <input type="file" id="file-input" accept="image/*">
        </div>
    </div>

    <div class="info-gmail" id="user-email">email@gmail.com</div>

    <span class="section-title">DATOS PERSONALES</span>
    <hr>
    <input type="text" id="p-nombre" placeholder="Nombre del Local / Usuario">
    <input type="text" id="p-documento" placeholder="RUC / C.I.">
    <textarea id="p-resena" rows="3" placeholder="Pequeña reseña o descripción del local..."></textarea>

    <span class="section-title">UBICACIÓN</span>
    <hr>
    <div id="map"></div>
    <button class="btn-map" id="btn-location">CAPTURAR UBICACIÓN</button>

    <span class="section-title">CONFIGURAR USUARIO</span>
    <hr>
    <input type="text" id="p-username" readonly style="background:#000; color:#666; border-color:#222;">
    
    <div id="pass-container">
        </div>

    <button class="btn-guardar" onclick="guardarPerfil()">GUARDAR CAMBIOS</button>
</div>

<script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = { 
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
        projectId: "jadi-repaiz",
        storageBucket: "jadi-repaiz.appspot.com"
    };
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.database();
    let map, marker, userCoords = null;
    let mapEnabled = true;

    // CARGAR DATOS
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('user-email').innerText = user.email;
            cargarDatos(user.uid);
            initMap();
        } else {
            window.location.href = "index.html";
        }
    });

    async function cargarDatos(uid) {
        const snapshot = await db.ref('usuarios/' + uid).once('value');
        const data = snapshot.val();
        
        if (data) {
            document.getElementById('display-id').innerText = data.id_jadi;
            document.getElementById('p-username').value = data.id_jadi;
            document.getElementById('p-nombre').value = data.nombre_local || data.nombre || "";
            document.getElementById('p-documento').value = data.documento || "";
            document.getElementById('p-resena').value = data.resena || "";
            if(data.foto) document.getElementById('img-perfil').src = data.foto;

            // Lógica de Contraseña
            const passContainer = document.getElementById('pass-container');
            if (!data.passSet) {
                passContainer.innerHTML = `
                    <div class="pass-wrapper"><input type="password" id="pass1" placeholder="Nueva Contraseña"></div>
                    <div class="pass-wrapper"><input type="password" id="pass2" placeholder="Confirmar Contraseña"></div>
                `;
            } else {
                passContainer.innerHTML = `
                    <div class="pass-wrapper"><input type="password" id="old-pass" placeholder="Contraseña Antigua"></div>
                    <span class="link-recovery" onclick="recuperar()">¿Olvidaste tu contraseña?</span>
                    <div class="pass-wrapper"><input type="password" id="pass1" placeholder="Contraseña Nueva"></div>
                    <div class="pass-wrapper"><input type="password" id="pass2" placeholder="Confirmar Nueva Contraseña"></div>
                `;
            }
        }
    }

    // MAPA
    function initMap() {
        const defaultLoc = { lat: -0.1807, lng: -78.4678 }; // Quito
        map = new google.maps.Map(document.getElementById("map"), { zoom: 15, center: defaultLoc, disableDefaultUI: true });
        marker = new google.maps.Marker({ map: map, draggable: true, position: defaultLoc });

        document.getElementById('btn-location').onclick = function() {
            if (mapEnabled) {
                userCoords = { lat: marker.getPosition().lat(), lng: marker.getPosition().lng() };
                map.setOptions({ draggable: false, zoomControl: false, scrollwheel: false, disableDoubleClickZoom: true });
                marker.setDraggable(false);
                this.innerText = "EDITAR UBICACIÓN";
                this.style.background = "#fff";
                mapEnabled = false;
            } else {
                map.setOptions({ draggable: true, zoomControl: true, scrollwheel: true, disableDoubleClickZoom: false });
                marker.setDraggable(true);
                this.innerText = "CAPTURAR UBICACIÓN";
                this.style.background = "#fbc02d";
                mapEnabled = true;
            }
        };
    }

    function recuperar() {
        auth.sendPasswordResetEmail(auth.currentUser.email).then(() => alert("Correo de recuperación enviado"));
    }

    async function guardarPerfil() {
        const uid = auth.currentUser.uid;
        const updates = {
            nombre_local: document.getElementById('p-nombre').value,
            documento: document.getElementById('p-documento').value,
            resena: document.getElementById('p-resena').value,
            ubicacion: userCoords,
            passSet: true
        };
        
        await db.ref('usuarios/' + uid).update(updates);
        alert("¡Perfil Actualizado!");
    }
</script>

</body>
</html>
