<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard J.A.D.I REPAIZ</title>

    <script src="/js/estilo_visual.js"></script>
    <script src="/js/controlador_jadi.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --gold: #fbc02d; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; border-bottom: 1px solid var(--gold); background: #050505; }
        .profile-btn-img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--gold); object-fit: cover; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        .stat-box { background: #111; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #222; }
        .stat-box span { font-size: 1.5rem; font-weight: bold; display: block; color: var(--gold); }
        .stat-box p { font-size: 10px; color: #888; margin: 5px 0 0; text-transform: uppercase; }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .menu-card { background: #111; padding: 25px; border-radius: 15px; text-align: center; text-decoration: none; color: white; border: 1px solid #222; transition: 0.3s; }
        .menu-card i { font-size: 24px; color: var(--gold); margin-bottom: 10px; display: block; }
        
        .welcome-section { padding: 20px 25px; }
        .badge-role { background: var(--gold); color: black; padding: 2px 10px; border-radius: 10px; font-size: 10px; font-weight: bold; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <span style="color: var(--gold); font-weight: 900; font-size: 1.2rem;">J.A.D.I</span>
            <span style="font-size: 0.7rem; letter-spacing: 2px; display: block;">REPAIZ</span>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span id="user-name-top" style="font-size: 12px;">...</span>
            <img id="user-photo" class="profile-btn-img" src="https://via.placeholder.com/35" alt="P">
        </div>
    </div>

    <div class="welcome-section">
        <h2 style="margin: 0; font-size: 1.5rem;">Hola, <span id="display-nombre">Maestro</span><span id="role-badge" class="badge-role">ZPT</span></h2>
        <p id="display-local" style="color: #666; margin: 5px 0;">Cargando local...</p>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><span id="count-nuevos">0</span><p>Nuevos</p></div>
        <div class="stat-box"><span id="count-proceso">0</span><p>Proceso</p></div>
        <div class="stat-box"><span id="count-listos">0</span><p>Listos</p></div>
    </div>

    <div class="menu-grid">
        <a href="trabajos.html" class="menu-card"><i class="fas fa-hammer"></i>Trabajos</a>
        <a href="clientes.html" class="menu-card"><i class="fas fa-users"></i>Clientes</a>
        <a href="inventario.html" class="menu-card"><i class="fas fa-box"></i>Stock</a>
        <a href="perfil.html" class="menu-card"><i class="fas fa-user-cog"></i>Perfil</a>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <button onclick="cerrarSesion()" style="background: none; border: none; color: #444; font-size: 12px; cursor: pointer;">
            <i class="fas fa-power-off"></i> CERRAR SESIÓN MAESTRA
        </button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = function() {
            // 1. Cargar Sesión del LocalStorage
            const session = JSON.parse(localStorage.getItem('session_jadi'));

            // 2. SEGURIDAD: Validamos contra los códigos reales de tu Login (ZPT y ADM)
            if (session && (session.rolCodigo === 'ZPT' || session.rolCodigo === 'ADM')) {
                
                // Llenar datos en pantalla
                document.getElementById('display-nombre').innerText = session.nombre || "Usuario";
                document.getElementById('user-name-top').innerText = (session.nombre || "Usuario").split(' ')[0];
                document.getElementById('display-local').innerText = session.empresaNombre || "J.A.D.I REPAIZ";
                document.getElementById('role-badge').innerText = session.rolCodigo;

                if(session.foto) document.getElementById('user-photo').src = session.foto;

                // Aplicar tema visual si existe la librería
                if(typeof JadiEstilo !== 'undefined') {
                    const tema = localStorage.getItem('jadi_tema_preferido') || 'elegante';
                    JadiEstilo.aplicar(tema);
                }

                cargarEstadisticas(session.uid);
            } else {
                // Si no tiene el rol correcto, fuera
                console.log("Acceso denegado. Rol:", session ? session.rolCodigo : "Ninguno");
                window.location.href = "../index.html";
            }
        };

        function cargarEstadisticas(uid) {
            db.ref('trabajos').orderByChild('maestroId').equalTo(uid).on('value', snap => {
                let n = 0, p = 0, l = 0;
                snap.forEach(c => {
                    const est = c.val().estado;
                    if(est === 'Nuevo') n++;
                    else if(est === 'En Proceso') p++;
                    else if(est === 'Listo') l++;
                });
                document.getElementById('count-nuevos').innerText = n;
                document.getElementById('count-proceso').innerText = p;
                document.getElementById('count-listos').innerText = l;
            });
        }

        function cerrarSesion() {
            if(confirm("¿Cerrar el sistema Maestro?")) {
                localStorage.removeItem('session_jadi');
                window.location.href = "../index.html";
            }
        }
    </script>
</body>
</html>
