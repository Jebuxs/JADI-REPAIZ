<div class="section-header">Grupo Trabajos Local</div>
<div class="scroll-container" id="contenedor-trabajos-real">
    <div id="loading-msg" style="text-align:center; padding:20px; color:var(--text-muted);">Cargando base de datos...</div>
</div>

<script>
    // 1. CONFIGURACIÓN FIREBASE
    const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    window.onload = function() {
        const session = JSON.parse(localStorage.getItem('session_jadi'));
        if (!session) { window.location.href = "/index.html"; return; }

        // Aplicar estilo visual guardado
        const tema = localStorage.getItem('jadi_tema_preferido') || 'elegante';
        if(typeof JadiEstilo !== 'undefined') JadiEstilo.aplicar(tema);

        // 2. LEER DATOS EN TIEMPO REAL
        cargarTrabajosDesdeFirebase(session.uid);
    };

    function cargarTrabajosDesdeFirebase(maestroId) {
        const refTrabajos = db.ref('trabajos');
        
        // Escuchamos los cambios
        refTrabajos.orderByChild('maestroId').equalTo(maestroId).on('value', snapshot => {
            const contenedor = document.getElementById('contenedor-trabajos-real');
            contenedor.innerHTML = ''; // Limpiamos para actualizar

            if (!snapshot.exists()) {
                contenedor.innerHTML = '<div style="text-align:center; padding:40px; color:#444;">No tienes órdenes registradas.</div>';
                return;
            }

            snapshot.forEach(childSnapshot => {
                const data = childSnapshot.val();
                const idDoc = childSnapshot.key;

                // Creamos la tarjeta con tu diseño Premium
                const tarjeta = `
                    <div class="card-trabajo">
                        <div class="card-top">
                            <div>
                                <div class="client-name">${data.clienteNombre || 'Sin Nombre'}</div>
                                <div class="client-id">ID: ${idDoc}</div>
                            </div>
                            <div class="card-actions">
                                <i class="fas fa-file-invoice" onclick="location.href='facturar.html?id=${idDoc}'"></i>
                                <i class="fas fa-comment-dots" onclick="location.href='chat.html?id=${idDoc}'"></i>
                                <i class="fas fa-edit" onclick="location.href='editar.html?id=${idDoc}'"></i>
                            </div>
                        </div>
                        
                        <div class="money-box">
                            <span>Total: <b>$${data.total || '0.00'}</b></span>
                            <span class="saldo-tag">Saldo: $${data.saldo || '0.00'}</span>
                        </div>

                        <div class="status-selector">
                            <div class="status-pill ${data.estado === 'Recibido' ? 'active' : ''}" onclick="actualizarEstado('${idDoc}', 'Recibido')">Recibido</div>
                            <div class="status-pill ${data.estado === 'En Proceso' ? 'active' : ''}" onclick="actualizarEstado('${idDoc}', 'En Proceso')">En Proceso</div>
                            <div class="status-pill ${data.estado === 'Finalizado' ? 'active' : ''}" onclick="actualizarEstado('${idDoc}', 'Finalizado')">Finalizado</div>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += tarjeta;
            });
        });
    }

    // Función para cambiar el estado desde la tarjeta (Extra)
    function actualizarEstado(id, nuevoEstado) {
        db.ref('trabajos/' + id).update({ estado: nuevoEstado })
          .then(() => console.log("Estado actualizado"))
          .catch(err => alert("Error: " + err.message));
    }
</script>
