<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - CONTROL MAESTRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --red: #ff5252; --card: #111; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); color: white; margin: 0; padding-bottom: 40px; }
        
        /* Header Superior */
        .header { background: var(--card); padding: 15px 20px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header h1 { color: var(--gold); margin: 0; font-size: 1.3rem; letter-spacing: 1px; font-weight: 900; }
        
        .btn-logout { background: rgba(255, 82, 82, 0.1); color: var(--red); border: 1px solid var(--red); padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }
        .btn-logout:hover { background: var(--red); color: white; }

        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        /* Monitor de Usuarios */
        .stat-box { background: #1a1a1a; padding: 25px; border-radius: 20px; border-left: 5px solid var(--gold); margin-bottom: 25px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .stat-box h2 { font-size: 3rem; margin: 5px 0; color: white; }
        .stat-box p { color: var(--gold); margin: 0; font-size: 0.8rem; text-transform: uppercase; font-weight: bold; }

        /* Cuadrícula de Navegación */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .nav-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #222; text-align: center; cursor: pointer; transition: 0.3s; text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-card:hover { border-color: var(--gold); transform: translateY(-5px); background: #1a1a1a; }
        .nav-card i { font-size: 2rem; color: var(--gold); margin-bottom: 12px; }
        .nav-card span { font-weight: bold; font-size: 0.9rem; letter-spacing: 1px; }

        /* Zona de Mantenimiento */
        .danger-zone { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid #333; text-align: center; }
        .danger-zone h3 { margin: 0; font-size: 1.1rem; color: white; }
        .danger-zone p { color: #666; font-size: 0.8rem; margin: 10px 0 20px 0; line-height: 1.4; }
        
        .btn-danger { background: var(--red); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-size: 1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-danger:hover { background: #d32f2f; }
        .btn-danger:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="header">
    <h1><i class="fas fa-crown"></i> J.A.D.I ADMIN</h1>
    <button class="btn-logout" onclick="cerrarSesion()">
        <i class="fas fa-power-off"></i> SALIR
    </button>
</div>

<div class="container">
    <div class="stat-box">
        <p>Usuarios Registrados</p>
        <h2 id="user-count">...</h2>
        <small style="color:#444">Conexión activa con Firebase</small>
    </div>

    <h3 style="margin: 0 0 15px 5px; font-size: 0.9rem; color: #666; letter-spacing: 1px;">MOVILIZAR A MÓDULOS:</h3>
    
    <div class="nav-grid">
        <a href="cliente.html" class="nav-card">
            <i class="fas fa-user-circle"></i>
            <span>CLIENTE</span>
        </a>
        <a href="zapatero.html" class="nav-card">
            <i class="fas fa-hammer"></i>
            <span>ZAPATERO</span>
        </a>
        <a href="proveedor.html" class="nav-card">
            <i class="fas fa-box-open"></i>
            <span>PROVEEDOR</span>
        </a>
        <a href="delivery.html" class="nav-card">
            <i class="fas fa-motorcycle"></i>
            <span>DELIVERY</span>
        </a>
    </div>

    <div class="danger-zone">
        <i class="fas fa-exclamation-triangle" style="color: var(--red); font-size: 2rem; margin-bottom: 10px;"></i>
        <h3>Mantenimiento de Pruebas</h3>
        <p>Esta acción borrará todos los usuarios e IDs de la base de datos para iniciar un ciclo de pruebas limpio.</p>
        
        <button class="btn-danger" onclick="limpiarSistema()">
            <i class="fas fa-trash-alt"></i> RESETEAR SISTEMA COMPLETO
        </button>
    </div>
</div>

<script>
    // Configuración Firebase (Asegúrate de que coincida con tu index.html)
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
        projectId: "jadi-repaiz",
        storageBucket: "jadi-repaiz.appspot.com",
        appId: "1:847134630000:web:0b7806aeda52b991d554b5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Seguridad de Acceso: Solo Admins
    window.onload = () => {
        const sesion = localStorage.getItem('session_jadi');
        if(!sesion) {
            window.location.href = 'index.html';
            return;
        }
        const user = JSON.parse(sesion);
        if(user.rolCodigo !== 'ADM') {
            window.location.href = 'index.html';
        }
    };

    // Contador de usuarios en tiempo real
    db.ref('usuarios').on('value', snap => {
        document.getElementById('user-count').innerText = snap.numChildren();
    });

    // Función para salir
    function cerrarSesion() {
        if(confirm("¿Deseas cerrar el panel de control?")) {
            localStorage.removeItem('session_jadi');
            window.location.href = 'index.html';
        }
    }

    // Función de limpieza total
    async function limpiarSistema() {
        if (confirm("⚠️ ¡ADVERTENCIA! Se borrarán todos los datos. ¿Continuar?")) {
            const confirmacion = prompt("Escribe la palabra BORRAR para confirmar:");
            if (confirmacion === "BORRAR") {
                try {
                    await db.ref('usuarios').remove();
                    await db.ref('contadores').remove();
                    alert("✅ Base de datos reseteada con éxito.");
                    localStorage.removeItem('session_jadi');
                    window.location.href = 'index.html';
                } catch (e) {
                    alert("Error: " + e.message);
                }
            } else {
                alert("Acción cancelada.");
            }
        }
    }
</script>

</body>
</html>
