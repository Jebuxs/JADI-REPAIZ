<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat JADI REPAIZ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --dark: #0b141a; --bubble-me: #005c4b; --bubble-other: #202c33; }
        
        /* Ajuste total de pantalla */
        html, body { 
            height: 100%; margin: 0; padding: 0; 
            background: var(--dark); overflow: hidden; 
        }

        body { display: flex; flex-direction: column; font-family: 'Segoe UI', sans-serif; }
        
        /* Header Fijo */
        .chat-header { 
            padding: 10px 15px; background: #202c33; 
            display: flex; align-items: center; gap: 12px; 
            border-bottom: 1px solid #333; flex-shrink: 0;
        }
        .back-btn { color: var(--gold); text-decoration: none; font-size: 20px; }
        .user-info h4 { margin: 0; font-size: 16px; color: var(--gold); }
        .user-info span { font-size: 11px; color: #888; }

        /* Contenedor de mensajes con Scroll */
        #chat-container { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 10px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
        }
        
        .msg { 
            max-width: 80%; padding: 8px 12px; border-radius: 12px; 
            position: relative; font-size: 15px; line-height: 1.4; 
            word-wrap: break-word; color: white;
        }
        .msg.me { align-self: flex-end; background: var(--bubble-me); border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: var(--bubble-other); border-bottom-left-radius: 2px; }
        
        .msg-meta { 
            display: flex; justify-content: flex-end; align-items: center; 
            gap: 4px; font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 4px;
        }

        /* Área de escritura FIJA abajo */
        .input-area { 
            background: #202c33; padding: 10px; 
            display: flex; align-items: center; gap: 8px; 
            flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom, 10px);
        }
        .input-area input { 
            flex: 1; background: #2a3942; border: none; padding: 10px 15px; 
            border-radius: 20px; color: white; outline: none; font-size: 16px;
        }
        .btn-action { color: #8696a0; font-size: 22px; cursor: pointer; }
        .btn-send { color: var(--gold); }

        .visto-read { color: #53bdeb; }
    </style>
</head>
<body>

    <div class="chat-header">
        <a href="trabajos.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="user-info">
            <h4 id="chat-user-name">...</h4>
            <span id="chat-status">Desconectado</span>
        </div>
    </div>

    <div id="chat-container"></div>

    <div class="input-area">
        <label for="file-input" class="btn-action"><i class="fas fa-camera"></i></label>
        <input type="file" id="file-input" style="display:none" accept="image/*" onchange="subirImagen(this)">
        
        <input type="text" id="msg-input" placeholder="Escribe un mensaje..." autocomplete="off">
        
        <div class="btn-action btn-send" onclick="enviarTexto()"><i class="fas fa-paper-plane"></i></div>
    </div>

    <script>
        // Configuración Firebase (Usando IDs limpios)
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com", storageBucket: "jadi-repaiz.appspot.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const rawSession = JSON.parse(localStorage.getItem('session_jadi')) || { uid: "ZPT1" };
        const myID = "ZPT" + parseInt(rawSession.uid.replace(/\D/g, ""));
        
        const params = new URLSearchParams(window.location.search);
        const rawReceptor = params.get('id') || "CLN1";
        const receptorID = "CLN" + parseInt(rawReceptor.replace(/\D/g, ""));
        
        const chatID = [myID, receptorID].sort().join("_");
        const hoy = new Date().toISOString().split('T')[0];

        // 1. Cargar nombre y estado
        db.ref('usuarios/' + rawReceptor).once('value', snap => {
            if(snap.exists()) document.getElementById('chat-user-name').innerText = snap.val().nombre;
        });

        db.ref(`presencia/${receptorID}`).on('value', snap => {
            document.getElementById('chat-status').innerText = snap.val() === "online" ? "En línea" : "Desconectado";
        });

        // 2. Escuchar mensajes
        function cargarChat() {
            db.ref(`chats/${chatID}/${hoy}`).on('child_added', snap => {
                const m = snap.val();
                renderizarMensaje(m, snap.key);
                // Marcar como leído si lo recibo yo
                if(m.sender !== myID && m.status !== 'read') {
                    db.ref(`chats/${chatID}/${hoy}/${snap.key}`).update({ status: 'read' });
                }
            });

            db.ref(`chats/${chatID}/${hoy}`).on('child_changed', snap => {
                const meta = document.getElementById('meta-' + snap.key);
                if(meta) meta.innerHTML = generarVistosHTML(snap.val().status, snap.val().timestamp, m.sender === myID);
            });
        }

        async function enviarTexto() {
            const input = document.getElementById('msg-input');
            const txt = input.value.trim();
            if(!txt) return;

            const msgData = {
                sender: myID,
                text: txt,
                timestamp: Date.now(),
                status: 'sent',
                tipo: 'texto'
            };

            input.value = "";
            const ref = db.ref(`chats/${chatID}/${hoy}`).push();
            await ref.set(msgData);

            db.ref(`presencia/${receptorID}`).once('value', snap => {
                if(snap.val() === "online") ref.update({ status: 'delivered' });
            });
        }

        function renderizarMensaje(m, key) {
            const container = document.getElementById('chat-container');
            const esMio = m.sender === myID;
            const contenido = m.tipo === 'texto' ? m.text : `<img src="${m.url}" style="width:100%; border-radius:8px;">`;
            
            const div = document.createElement('div');
            div.className = `msg ${esMio ? 'me' : 'other'}`;
            div.innerHTML = `
                ${contenido}
                <div class="msg-meta" id="meta-${key}">
                    ${generarVistosHTML(m.status, m.timestamp, esMio)}
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function generarVistosHTML(status, time, esMio) {
            const hora = new Date(time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            if(!esMio) return hora;
            let checks = '<i class="fas fa-check"></i>';
            if(status === 'delivered') checks = '<i class="fas fa-check-double"></i>';
            if(status === 'read') checks = '<i class="fas fa-check-double visto-read"></i>';
            return `${hora} ${checks}`;
        }

        // Manejo del teclado en móviles
        window.addEventListener('resize', () => {
            document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
        });

        window.onload = cargarChat;
    </script>
</body>
</html>
