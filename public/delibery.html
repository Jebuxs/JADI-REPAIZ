<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transporte - Taller Master</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilo consistente con los módulos anteriores */
        .delivery-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8f9fa;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .logout-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #34495e;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
        }
        .logout-link:hover {
            background-color: #2c3e50;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="delivery-container">
        <h1>Bienvenido SR. Transportista</h1>
        
        <a href="index.html" class="logout-link">Cerrar Sesión</a>
    </div>

</body>
</html>
