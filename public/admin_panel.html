<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - PANEL MAESTRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; --text: #eee; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .stat-card i { color: var(--gold); font-size: 1.5rem; margin-bottom: 10px; }
        .stat-card h2 { margin: 5px 0; font-size: 2rem; }
        
        .grid-modules { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 30px; }
        .mod-btn { background: #1a1a1a; border: 1px solid #333; color: white; padding: 15px; border-radius: 10px; cursor: pointer; text-decoration: none; text-align: center; font-weight: bold; transition: 0.3s; }
        .mod-btn:hover { border-color: var(--gold); background: #222; }

        .table-container { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--gold); padding: 12px; border-bottom: 2px solid #222; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 0.9rem; }
        
        .role-badge { padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
        .bg-adm { background: #d32f2f; } .bg-zpt { background: #1976d2; } .bg-cln { background: #388e3c; }
        
        select { background: #222; color: white; border: 1px solid #444; padding: 6px; border-radius: 5px; outline: none; }
        .btn-action { background: var(--gold); color: black; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:1000; }
    </style>
</head>
<body>

<div id="loader"><i class="fas fa-spinner fa-spin fa-3x" style="color:var(--gold)"></i></div>

<header>
    <div>
        <h1 style="color:var(--gold); margin:0; font-size: 1.5rem;">J.A.D.I REPAIZ <span style="color:white">| MAESTRO</span></h1>
        <p id="welcome-msg" style="margin:5px 0 0 0; color:#888;"></p>
    </div>
    <button onclick="logout()" style="background:#333; color:white; border:none; padding:10px 20px; border-radius:20px; cursor:pointer;">Cerrar Sesión</button>
</header>

<div class="stats-grid">
    <div class="stat-card"><i class="fas fa-users"></i><p>Usuarios</p><h2 id="count-users">0</h2></div>
    <div class="stat-card"><i class="fas fa-shoe-prints"></i><p>Trabajos Hoy</p><h2 id="count-jobs">0</h2></div>
    <div class="stat-card"><i class="fas fa-cash-register"></i><p>Ingresos Mes</p><h2 id="count-cash">$0</h2></div>
</div>

<div class="grid-modules">
    <a href="trabajos.html" class="mod-btn"><i class="fas fa-hammer"></i> ZAPATERÍA</a>
    <a href="mensajeria.html" class="mod-btn"><i class="fab fa-whatsapp"></i> MARKETING</a>
    <a href="inventario.html" class="mod-btn"><i class="fas fa-boxes"></i> INVENTARIO</a>
    <a href="proveedores.html" class="mod-btn"><i class="fas fa-truck"></i> PROVEEDORES</a>
</div>

<div class="table-container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3>GESTIÓN DE ACCESOS</h3>
        <input type="text" id="search-user" placeholder="Buscar por nombre o celular..." style="padding:8px; border-radius:5px; border:1px solid #333; background:#111; color:white; width:250px;">
    </div>
    <table>
        <thead>
            <tr>
                <th>NOMBRE / ID</th>
                <th>CONTACTO</th>
                <th>ROL</th>
                <th>EMPRESA</th>
                <th>ACCIONES</th>
            </tr>
        </thead>
        <tbody id="user-list"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // SEGURIDAD DE ACCESO
    const session = JSON.parse(localStorage.getItem('session_jadi'));
    if(!session || session.rolCodigo !== 'ADM') {
        alert("¡Alto! No tienes permisos de Administrador Maestro.");
        window.location.href = "index.html";
    }
    document.getElementById('welcome-msg').innerText = "Bienvenido, Maestro " + session.nombre;

    // CARGA DE DATOS Y ESTADÍSTICAS
    function init() {
        showLoader(true);
        // Contar Usuarios
        db.ref('usuarios').on('value', snap => {
            document.getElementById('count-users').innerText = snap.numChildren();
            renderUsers(snap);
        });

        // Contar Trabajos (Lógica simple para demo)
        db.ref('trabajos').on('value', snap => {
            document.getElementById('count-jobs').innerText = snap.numChildren();
        });
        showLoader(false);
    }

    function renderUsers(snap) {
        const container = document.getElementById('user-list');
        container.innerHTML = "";
        
        snap.forEach(child => {
            const u = child.val();
            const badge = u.rolCodigo === 'ADM' ? 'bg-adm' : (u.rolCodigo === 'ZPT' ? 'bg-zpt' : 'bg-cln');
            
            container.innerHTML += `
                <tr>
                    <td><b>${u.nombre}</b><br><small style="color:#666">${u.uid}</small></td>
                    <td>${u.telefono}<br><small>${u.email || ''}</small></td>
                    <td><span class="role-badge ${badge}">${u.rolCodigo || 'CLN'}</span></td>
                    <td>${u.empresaNombre || '---'}</td>
                    <td>
                        <select onchange="updateRole('${child.key}', this.value)">
                            <option value="">Cambiar Rango</option>
                            <option value="ADM">Admin Maestro</option>
                            <option value="ZPT">Zapatero</option>
                            <option value="CLN">Cliente</option>
                            <option value="PRV">Proveedor</option>
                        </select>
                        <button onclick="deleteUser('${child.key}')" style="background:none; border:none; color:#ff4444; margin-left:10px; cursor:pointer;"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `;
        });
    }

    async function updateRole(uid, newRole) {
        if(!newRole) return;
        if(confirm("¿Confirmas el cambio de rango para este usuario?")) {
            showLoader(true);
            await db.ref('usuarios/' + uid).update({ rolCodigo: newRole });
            alert("Rango actualizado correctamente.");
            showLoader(false);
        }
    }

    async function deleteUser(uid) {
        if(uid === session.uid) return alert("No puedes eliminarte a ti mismo, Maestro.");
        if(confirm("¿ESTÁS SEGURO? Esta acción eliminará al usuario del ecosistema.")) {
            await db.ref('usuarios/' + uid).remove();
        }
    }

    function showLoader(state) { document.getElementById('loader').style.display = state ? 'flex' : 'none'; }

    function logout() {
        localStorage.removeItem('session_jadi');
        window.location.href = "index.html";
    }

    // Búsqueda en tiempo real
    document.getElementById('search-user').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        const rows = document.querySelectorAll('#user-list tr');
        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(val) ? '' : 'none';
        });
    });

    init();
</script>
</body>
</html>
