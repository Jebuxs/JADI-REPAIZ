<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo de Prueba - J.A.D.I</title>
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .mensaje-box {
            border: 2px solid #FFD700;
            padding: 40px;
            border-radius: 20px;
            background: #0a0a0a;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        h1 {
            color: #FFD700;
            font-size: 3rem;
            margin: 0;
            letter-spacing: 2px;
        }

        p {
            color: #888;
            margin-top: 10px;
            font-size: 1.2rem;
        }

        .btn-regresar {
            margin-top: 30px;
            display: inline-block;
            color: #FFD700;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #FFD700;
            padding: 10px 20px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-regresar:hover {
            background: #FFD700;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="mensaje-box">
        <h1>¡Hola!</h1>
        <p>Aquí estoy.</p>
        
        <a href="javascript:history.back()" class="btn-regresar">← VOLVER</a>
    </div>

</body>
</html>
