<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Ecosistema Profesional</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { width: 90%; max-width: 400px; padding: 30px; background: #0a0a0a; border-radius: 20px; border: 1px solid #1a1a1a; text-align: center; }
        .brand { font-size: 2.5rem; font-weight: 900; color: var(--gold); letter-spacing: 5px; margin-bottom: 10px; }
        .btn-google { background: white; color: black; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }
        .roles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .role-btn { padding: 15px; border: 1px solid #222; border-radius: 12px; background: #111; color: #555; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .role-btn.active { border-color: var(--gold); color: var(--gold); background: #1a1500; }
        #pantalla-registro, #loader { display: none; }
    </style>
</head>
<body>

    <div class="card" id="pantalla-login">
        <div class="brand">J.A.D.I</div>
        <p style="font-size: 0.8rem; color: #666;">RESTAURACIÓN Y CUIDADO DE CALZADO</p>
        <button class="btn-google" onclick="iniciarConGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
            ENTRAR CON GOOGLE
        </button>
    </div>

    <div class="card" id="pantalla-registro">
        <h3 style="color: var(--gold);">COMPLETAR REGISTRO</h3>
        <p style="font-size: 0.8rem; color: #555;">Selecciona tu rol en el ecosistema</p>
        
        <div class="roles">
            <button class="role-btn" onclick="setRol(this, 'ZAPATERO')">ZAPATERO</button>
            <button class="role-btn" onclick="setRol(this, 'CLIENTE')">CLIENTE</button>
            <button class="role-btn" onclick="setRol(this, 'TIENDA')">TIENDA</button>
            <button class="role-btn" onclick="setRol(this, 'PROVEEDOR')">PROVEEDOR</button>
            <button class="role-btn" onclick="setRol(this, 'MOTORIZADO')">MOTORIZADO</button>
        </div>

        <input type="tel" id="reg-tel" placeholder="Número de WhatsApp" style="width:100%; padding:15px; margin-top:20px; background:#000; border:1px solid #222; color:white; border-radius:12px; box-sizing:border-box;">
        
        <button class="btn-google" style="background: var(--gold);" onclick="finalizarRegistro()">FINALIZAR REGISTRO</button>
    </div>

    <div id="loader" style="text-align:center;">
        <i class="fas fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--gold);"></i>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU", 
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let tempUser = null;
    let rolSeleccionado = null;

    function iniciarConGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then(res => {
            tempUser = res.user;
            db.ref('usuarios/' + tempUser.uid).once('value', snap => {
                if (snap.exists()) {
                    irAPanel(snap.val());
                } else {
                    document.getElementById('pantalla-login').style.display = 'none';
                    document.getElementById('pantalla-registro').style.display = 'block';
                }
            });
        });
    }

    function setRol(btn, rol) {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        rolSeleccionado = rol;
    }

    async function finalizarRegistro() {
        const tel = document.getElementById('reg-tel').value;
        if (!rolSeleccionado || !tel) return alert("Selecciona rol y pon tu teléfono");

        document.getElementById('pantalla-registro').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        try {
            const prefijo = generarPrefijo(rolSeleccionado);
            const snapCount = await db.ref('contadores/' + rolSeleccionado).once('value');
            let num = (snapCount.val() || 0) + 1;
            await db.ref('contadores/' + rolSeleccionado).set(num);
            
            const idUnico = prefijo + num.toString().padStart(4, '0');

            // AQUÍ ESTÁ EL CAMBIO: Limpiamos los nombres repetidos.
            const nuevoUser = {
                uid: tempUser.uid,
                nombre: tempUser.displayName,
                email: tempUser.email,
                foto: tempUser.photoURL,
                telefono: tel,
                rolCodigo: rolSeleccionado.toLowerCase(), // Solo guardamos el código (ej: proveedor)
                id_jadi: idUnico,
                fecha_registro: new Date().toLocaleDateString()
            };

            await db.ref('usuarios/' + tempUser.uid).set(nuevoUser);
            irAPanel(nuevoUser);
        } catch (e) { alert("Error: " + e.message); }
    }

    function generarPrefijo(rol) {
        // Lógica de consonantes para el ID
        const consonantes = rol.replace(/[AEIOU]/gi, '');
        return consonantes.slice(0, 3).toUpperCase();
    }

    function irAPanel(data) {
        localStorage.setItem('session_jadi', JSON.stringify(data));
        const paginas = { 
            'cliente': 'cliente.html', 
            'zapatero': 'zapatero.html', 
            'motorizado': 'motorizado.html',
            'proveedor': 'proveedor.html',
            'tienda': 'tienda.html'
        };
        window.location.href = paginas[data.rolCodigo] || 'cliente.html';
    }
</script>
</body>
</html>
