<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Matriz Expandida</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #0d0d0d; --card: #1a1a1a; --side: #111; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; height: 100vh; overflow: hidden; }

        /* CABECERA FIJA */
        .top-header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; display: flex; justify-content: center; align-items: center; background: var(--dark); border-bottom: 1px solid #222; z-index: 100; }
        .header-info h1 { margin: 0; font-size: 1.4rem; color: var(--gold); letter-spacing: 2px; }
        .header-info span { font-size: 0.75rem; color: #666; }

        .profile-zone { position: fixed; top: 15px; right: 20px; z-index: 101; cursor: pointer; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--gold); }

        /* MENÚ LATERAL RETRÁCTIL */
        .sidebar { 
            position: fixed; top: 70px; left: 0; width: 220px; height: calc(100vh - 70px); 
            background: var(--side); border-right: 1px solid #222; padding: 20px 10px; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 90;
        }
        .sidebar.collapsed { left: -220px; } /* Se esconde a la izquierda */

        .nav-btn { width: 100%; padding: 12px; margin-bottom: 10px; background: #222; border: 1px solid #333; color: #aaa; text-align: left; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .nav-btn:hover { background: #282828; color: var(--gold); }
        .btn-danger { color: #ff4444 !important; }

        /* ÁREA DE TRABAJO DINÁMICA */
        .main-content { 
            margin-left: 220px; margin-top: 70px; height: calc(100vh - 70px); 
            padding: 25px; transition: all 0.4s ease; overflow-y: auto; 
        }
        .main-content.expanded { margin-left: 0; } /* Toma todo el ancho */

        /* TABS DE MATRIZ */
        .tabs-header { display: flex; gap: 5px; background: #111; padding: 8px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #222; overflow-x: auto; }
        .tab-item { flex: 1; padding: 12px; text-align: center; background: #1a1a1a; border: 1px solid #333; color: #666; cursor: pointer; border-radius: 6px; font-size: 0.75rem; font-weight: bold; white-space: nowrap; }
        .tab-item.active { background: #222; color: var(--gold); border: 1px solid var(--gold); }

        .workspace-box { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; min-height: 400px; }

        /* BOTÓN PARA VOLVER A VER EL MENÚ */
        #btn-return { position: fixed; bottom: 20px; left: 20px; background: var(--gold); color: black; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: none; z-index: 110; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="top-header">
    <div class="header-info">
        <h1 id="txt-nombre-local">NOMBRE LOCAL</h1>
        <span id="txt-id-local">ID: 0000000000</span>
    </div>
</div>

<div class="profile-zone" onclick="alert('Editar Perfil')">
    <img src="https://via.placeholder.com/40" class="profile-img" alt="perfil">
</div>

<div id="sidebar" class="sidebar">
    <button class="nav-btn" onclick="activarMatriz()" style="background:var(--gold); color:black; border:none;">
        <i class="fas fa-th-large"></i> <b>Abrir Matriz</b>
    </button>
    <button class="nav-btn btn-danger" onclick="confirm('¿Eliminar cuenta?')">
        <i class="fas fa-trash-alt"></i> Eliminar Registro
    </button>
</div>

<button id="btn-return" onclick="cerrarMatriz()" title="Cerrar Matriz">
    <i class="fas fa-arrow-left"></i>
</button>

<div id="main-content" class="main-content">
    
    <div id="area-matriz" style="display: none;">
        <div class="tabs-header">
            <button class="tab-item active" onclick="setTab(this, 'inventario')">INVENTARIO</button>
            <button class="tab-item" onclick="setTab(this, 'personal')">PERSONAL</button>
            <button class="tab-item" onclick="setTab(this, 'venta')">VENTA</button>
            <button class="tab-item" onclick="setTab(this, 'facturas')">FACTURACIONES</button>
        </div>

        <div class="workspace-box">
            <h3 id="workspace-title" style="color:var(--gold); margin-top:0;">Gestión de Inventario</h3>
            <hr border="0" style="border-top:1px solid #333; margin-bottom:20px;">
            <div id="workspace-content">
                </div>
        </div>
    </div>

    <div id="area-bienvenida" style="text-align: center; margin-top: 15vh;">
        <i class="fas fa-store" style="font-size: 4rem; color: #222;"></i>
        <h2 style="color: #444;">Bienvenido al Panel de Gestión</h2>
        <p style="color: #333;">Selecciona "Abrir Matriz" en el menú para comenzar.</p>
    </div>

</div>

<script>
    const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);

    function activarMatriz() {
        // 1. Esconder Menú Lateral y Expandir Contenido
        document.getElementById('sidebar').classList.add('collapsed');
        document.getElementById('main-content').classList.add('expanded');
        
        // 2. Cambiar pantallas
        document.getElementById('area-bienvenida').style.display = 'none';
        document.getElementById('area-matriz').style.display = 'block';
        
        // 3. Mostrar botón de retorno
        document.getElementById('btn-return').style.display = 'block';
        
        cargarContenido('inventario');
    }

    function cerrarMatriz() {
        // 1. Mostrar Menú Lateral y Contraer Contenido
        document.getElementById('sidebar').classList.remove('collapsed');
        document.getElementById('main-content').classList.remove('expanded');
        
        // 2. Cambiar pantallas
        document.getElementById('area-bienvenida').style.display = 'block';
        document.getElementById('area-matriz').style.display = 'none';
        
        // 3. Esconder botón de retorno
        document.getElementById('btn-return').style.display = 'none';
    }

    function setTab(btn, seccion) {
        document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        cargarContenido(seccion);
    }

    function cargarContenido(seccion) {
        const title = document.getElementById('workspace-title');
        const content = document.getElementById('workspace-content');
        
        if(seccion === 'inventario') {
            title.innerText = "Inventario de Calzado";
            content.innerHTML = `
                <button onclick="alert('Formulario para crear')" style="background:var(--gold); border:none; padding:12px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">
                    <i class="fas fa-plus"></i> CREAR INVENTARIO
                </button>
            `;
        } else {
            title.innerText = seccion.toUpperCase();
            content.innerHTML = `<p style="color:#666;">Módulo ${seccion} en desarrollo...</p>`;
        }
    }
</script>

</body>
</html>
