<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRUEBA J.A.D.I</title>
    <style>
        body { 
            background: #000; 
            color: #fbc02d; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        .box { border: 2px solid #fbc02d; padding: 40px; border-radius: 20px; }
        button { background: #fbc02d; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h1 id="mensaje">Verificando sesión...</h1>
        <p id="detalle"></p>
        <button onclick="window.location.href='admin_panel.html'">VOLVER AL PANEL</button>
    </div>

    <script>
        // 1. Recuperamos lo que hay en la memoria del navegador
        const session = JSON.parse(localStorage.getItem('session_jadi'));

        const texto = document.getElementById('mensaje');
        const detalle = document.getElementById('detalle');

        // 2. Verificamos qué encontró
        if (!session) {
            texto.innerText = "❌ NO HAY SESIÓN";
            detalle.innerText = "El navegador no encontró tus datos. Ve al index e inicia sesión.";
            detalle.style.color = "red";
        } else {
            // 3. Si hay sesión, mostramos los datos reales
            texto.innerText = "¡BIENVENIDO, " + session.nombre + "!";
            detalle.innerHTML = `
                Tu ID es: <b>${session.uid}</b><br>
                Tu Rol es: <b>${session.rolCodigo}</b>
            `;
            detalle.style.color = "#aaa";
            console.log("Datos completos:", session);
        }
    </script>
</body>
</html>
