<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Trabajos - J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --dark: #000; --card: #111; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .header { padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; background: #050505; position: sticky; top: 0; z-index: 100; justify-content: space-between; }
        .btn-back { color: var(--gold); text-decoration: none; font-size: 1.2rem; }
        .search-container { padding: 15px; }
        .search-bar { background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 10px; display: flex; align-items: center; }
        .search-bar input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }
        .orders-container { padding: 0 15px; }
        .order-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .order-header h3 { margin: 0; font-size: 16px; color: var(--gold); cursor: pointer; text-decoration: underline; }
        .status-tag { font-size: 10px; padding: 4px 8px; border-radius: 5px; text-transform: uppercase; font-weight: bold; }
        .tag-recibido { background: #444; color: white; }
        .tag-proceso { background: #0066ff; color: white; }
        .tag-listo { background: #00cc66; color: black; }
        .order-details { font-size: 13px; color: #aaa; margin-bottom: 10px; }
        .order-price { font-weight: bold; color: white; display: flex; justify-content: space-between; border-top: 1px solid #222; padding-top: 10px; font-size: 12px; }
        .order-actions { display: flex; gap: 8px; margin-top: 15px; }
        .btn-status { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 11px; cursor: pointer; }
        
        #modal-orden { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 300; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        label { font-size: 11px; color: var(--gold); margin-bottom: 5px; display: block; }
        
        .item-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .item-table { background: #080808; border-radius: 10px; padding: 10px; margin-bottom: 15px; border: 1px dashed #333; }
        .item-list-row { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; border-bottom: 1px solid #1a1a1a; }
        
        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 24px; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(255,215,0,0.4); }
    </style>
</head>
<body>

    <div class="header">
        <a href="zapatero.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        <h2 style="margin:0; font-size: 1.1rem;">Panel de Órdenes</h2>
        <i class="fas fa-sync-alt" onclick="location.reload()" style="color: var(--gold); cursor: pointer;"></i>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <i class="fas fa-search" style="color: #555;"></i>
            <input type="text" id="inputBusqueda" onkeyup="filtrarTrabajos()" placeholder="Buscar cliente o calzado...">
        </div>
    </div>

    <div class="orders-container" id="lista-trabajos"></div>

    <button class="fab" onclick="abrirModal()"><i class="fas fa-plus"></i></button>

    <div id="modal-orden">
        <h2 style="color: var(--gold); margin-top: 0;">Nueva Orden de Trabajo</h2>
        
        <label>CLIENTE (CELULAR)</label>
        <input type="tel" id="cli-celular" placeholder="Número Celular" onkeyup="detectarCliente(this.value)">

        <div id="box-invitacion" style="display:none; background:#1a1500; border:1px solid var(--gold); padding:10px; border-radius:10px; margin-bottom:15px; text-align:center;">
            <p style="font-size: 11px; margin:0 0 10px 0;">¿Enviar ticket de ingreso al cliente?</p>
            <button onclick="enviarWhatsAppMaster('ingreso')" style="background:var(--gold); border:none; padding:8px 15px; border-radius:5px; font-weight:bold; font-size:11px;">
                <i class="fab fa-whatsapp"></i> ENVIAR INVITACIÓN
            </button>
        </div>

        <input type="text" id="cli-nombre" placeholder="Nombre completo">

        <div class="item-table">
            <label>AGREGAR TRABAJOS (ESTILO FACTURA)</label>
            <div class="item-row">
                <input type="text" id="item-cant" placeholder="Cant" style="flex:0.6;" value="1">
                <input list="lista-servicios" id="item-tipo" placeholder="Tipo" style="flex:1.2;">
                <input list="lista-desc" id="item-desc" placeholder="Detalle" style="flex:2;">
                <input type="number" id="item-precio" placeholder="$" style="flex:1;">
                <button onclick="agregarItemALista()" style="background:var(--gold); border:none; border-radius:8px; width:45px; height:42px; color:black;"><i class="fas fa-plus"></i></button>
            </div>
            <div id="tabla-items-visual"></div>
        </div>

        <div style="background: #0a0a0a; padding: 12px; border-radius: 10px; border: 1px solid #222;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <label style="margin:0;">TOTAL NEGOCIADO $</label>
                <input type="number" id="precio-total" style="width:100px; margin:0; text-align:right; color:var(--gold); font-weight:bold;" onkeyup="calcularSaldo()">
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <label style="margin:0;">ABONO INICIAL $</label>
                <input type="number" id="abono-inicial" style="width:100px; margin:0; text-align:right;" onkeyup="calcularSaldo()">
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label style="margin:0; font-weight:bold;">SALDO PENDIENTE $</label>
                <input type="number" id="saldo-pendiente" readonly style="width:100px; margin:0; text-align:right; border:none; background:transparent; color:#ff4444; font-weight:bold;">
            </div>
        </div>

        <label style="margin-top:15px;">FECHA DE ENTREGA</label>
        <input type="date" id="fecha-entrega">
        
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="cerrarModal()" style="flex:1; background:transparent; color:white; border:1px solid #444; padding:15px; border-radius:10px;">CANCELAR</button>
            <button onclick="guardarOrden()" style="flex:1; background:var(--gold); color:black; border:none; padding:15px; border-radius:10px; font-weight:bold;">GUARDAR ORDEN</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const session = JSON.parse(localStorage.getItem('session_jadi')) || { uid: "ZAP001" };

        let itemsTemporales = [];

        function abrirModal() { 
            document.getElementById('modal-orden').style.display = 'block'; 
            itemsTemporales = [];
            document.getElementById('tabla-items-visual').innerHTML = "";
            document.getElementById('cli-celular').value = "";
            document.getElementById('cli-nombre').value = "";
            document.getElementById('precio-total').value = "";
            document.getElementById('abono-inicial').value = "";
            document.getElementById('saldo-pendiente').value = "";
        }
        function cerrarModal() { document.getElementById('modal-orden').style.display = 'none'; }

        // --- LÓGICA DE MENSAJERÍA INTELIGENTE ---
        async function enviarWhatsAppMaster(tipo, dataExtra = null) {
            const tel = dataExtra ? dataExtra.telefono : document.getElementById('cli-celular').value;
            const nom = dataExtra ? dataExtra.nombre : document.getElementById('cli-nombre').value;
            const total = dataExtra ? dataExtra.total : document.getElementById('precio-total').value;

            if(!tel) return alert("Ingrese un teléfono");

            // Traer configuración de la nube
            const snap = await db.ref('configuracion/mensajes').once('value');
            const config = snap.val() || { saludo: "Hola", cuerpo: "Recibimos tu calzado.", firma: "J.A.D.I Repaiz" };

            let mensaje = "";
            if(tipo === 'ingreso') {
                mensaje = `*${config.saludo} ${nom}*%0A%0A${config.cuerpo}%0A*Total: $${total}*%0A%0A${config.firma}`;
            } else if(tipo === 'listo') {
                mensaje = `*¡Buenas noticias ${nom}!* 👞✨%0A%0ATu calzado ya está listo para retirar en *J.A.D.I Repaiz*.%0A*Saldo pendiente: $${dataExtra.saldo}*%0A%0A${config.firma}`;
            }

            window.open(`https://web.whatsapp.com/send?phone=593${tel}&text=${mensaje}`, '_blank');
        }

        function agregarItemALista() {
            const cant = document.getElementById('item-cant').value;
            const tipo = document.getElementById('item-tipo').value;
            const desc = document.getElementById('item-desc').value;
            const precio = parseFloat(document.getElementById('item-precio').value) || 0;

            if(!tipo || !desc) return alert("Completa tipo y detalle");

            const nuevoItem = { cant, tipo, desc, precio };
            itemsTemporales.push(nuevoItem);
            renderItems();
        }

        function renderItems() {
            const container = document.getElementById('tabla-items-visual');
            container.innerHTML = "";
            let suma = 0;
            itemsTemporales.forEach((it, index) => {
                suma += it.precio;
                container.innerHTML += `<div class="item-list-row"><span>${it.cant} | ${it.tipo} - ${it.desc}</span><span>$${it.precio.toFixed(2)}</span></div>`;
            });
            document.getElementById('precio-total').value = suma.toFixed(2);
            calcularSaldo();
        }

        function calcularSaldo() {
            const total = parseFloat(document.getElementById('precio-total').value) || 0;
            const abono = parseFloat(document.getElementById('abono-inicial').value) || 0;
            document.getElementById('saldo-pendiente').value = (total - abono).toFixed(2);
        }

        async function detectarCliente(cel) {
            if(cel.length >= 10) {
                const snap = await db.ref('usuarios').orderByChild('telefono').equalTo(cel).once('value');
                document.getElementById('box-invitacion').style.display = 'block';
                if(snap.exists()) {
                    snap.forEach(c => { document.getElementById('cli-nombre').value = c.val().nombre; });
                }
            }
        }

        async function guardarOrden() {
            const cel = document.getElementById('cli-celular').value;
            const nom = document.getElementById('cli-nombre').value;
            if(!cel || !nom || itemsTemporales.length === 0) return alert("Faltan datos");

            const snapT = await db.ref('contadores/TRB').once('value');
            let numT = (snapT.val() || 0) + 1;
            const trbID = 'TRB-' + numT.toString().padStart(5, '0');

            await db.ref('trabajos').push({
                ordenID: trbID,
                zapateroId: session.uid,
                cliente: nom,
                telefono: cel,
                items: itemsTemporales,
                precio: document.getElementById('precio-total').value,
                abono: document.getElementById('abono-inicial').value,
                saldo: document.getElementById('saldo-pendiente').value,
                entrega: document.getElementById('fecha-entrega').value,
                estado: 'Recibido',
                timestamp: Date.now()
            });
            await db.ref('contadores/TRB').set(numT);
            cerrarModal();
        }

        function cargarTrabajos() {
            db.ref('trabajos').orderByChild('zapateroId').equalTo(session.uid).on('value', snap => {
                const container = document.getElementById('lista-trabajos');
                container.innerHTML = "";
                snap.forEach(child => {
                    const o = child.val();
                    container.innerHTML += `
                        <div class="order-card" data-nombre="${o.cliente.toLowerCase()}">
                            <div class="order-header">
                                <h3>${o.cliente} <small style="color:#666">#${o.ordenID}</small></h3>
                                <span class="status-tag tag-${o.estado.toLowerCase()}">${o.estado}</span>
                            </div>
                            <div class="order-price">
                                <span>TOTAL: $${o.precio}</span>
                                <span style="color:var(--gold)">DEBE: $${o.saldo}</span>
                            </div>
                            <div class="order-actions">
                                <button class="btn-status" onclick="updateStatus('${child.key}','En Proceso')">PROCESO</button>
                                <button class="btn-status" style="background: #00cc66; color:black; font-weight:bold;" 
                                    onclick="marcarComoListo('${child.key}', '${o.cliente}', '${o.telefono}', '${o.saldo}')">LISTO</button>
                            </div>
                        </div>`;
                });
            });
        }

        function updateStatus(id, s) { db.ref('trabajos/'+id).update({estado: s}); }

        function marcarComoListo(id, nombre, tel, saldo) {
            updateStatus(id, 'Listo');
            if(confirm("¿Enviar WhatsApp de 'Trabajo Listo' al cliente?")) {
                enviarWhatsAppMaster('listo', { nombre: nombre, telefono: tel, saldo: saldo });
            }
        }

        function filtrarTrabajos() {
            const bus = document.getElementById('inputBusqueda').value.toLowerCase();
            document.querySelectorAll('.order-card').forEach(c => {
                c.style.display = c.getAttribute('data-nombre').includes(bus) ? "block" : "none";
            });
        }

        window.onload = () => { cargarTrabajos(); };
    </script>
</body>
</html>
