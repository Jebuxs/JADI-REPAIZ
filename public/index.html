<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I REPAIZ - Ecosistema</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #fbc02d; --dark: #000; --input-bg: #111; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 380px; text-align: center; padding: 20px; }
        
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .brand { font-size: 3.5rem; font-weight: 900; color: var(--gold); letter-spacing: -4px; margin: 0; }
        .sub-brand { color: var(--gold); font-size: 0.8rem; letter-spacing: 5px; margin-top: -10px; text-transform: uppercase; margin-bottom: 30px; }
        
        .input-group { position: relative; width: 100%; margin-bottom: 12px; }
        .input-field, .select-field { width: 100%; padding: 16px; border: 1px solid #222; border-radius: 12px; background: var(--input-bg); color: white; font-size: 1rem; box-sizing: border-box; outline: none; }
        .toggle-pass { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #555; cursor: pointer; }

        .btn-gold { width: 100%; padding: 15px; background: var(--gold); color: #000; border: none; border-radius: 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-google { width: 100%; padding: 12px; background: white; color: #444; border-radius: 25px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; border:none; }
        
        .terms-text { font-size: 0.75rem; color: #666; margin-top: 15px; line-height: 1.4; }
        .terms-text b { color: var(--gold); }

        .view { display: none; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .link-text { color: #555; cursor: pointer; margin-top: 20px; font-size: 0.9rem; display: block; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="color:var(--gold); margin-top:10px;">Procesando...</p></div>

<div class="container">
    
    <div id="view-login" class="view active">
        <h1 class="brand">J.A.D.I</h1>
        <div class="sub-brand">REPAIZ</div>
        <div class="input-group">
            <input type="text" id="login-input" class="input-field" placeholder="ID, Celular o Correo">
        </div>
        <div class="input-group">
            <input type="password" id="login-pass" class="input-field" placeholder="Contraseña">
            <i class="fas fa-eye toggle-pass" onclick="togglePassword('login-pass', this)"></i>
        </div>
        <button class="btn-gold" onclick="login()">Entrar</button>
        
        <button class="btn-google" onclick="registroConGoogle()">
            <img src="https://www.google.com/images/branding/product/2x/googleg_32dp.png" alt="G" style="width:20px;"> Entrar con Google
        </button>

        <p class="terms-text">Al entrar, aceptas nuestros <b>Términos de Servicio</b> y <b>Política de Privacidad</b>.</p>
        <span class="link-text" onclick="mostrarVista('view-register')">Crear empresa o cuenta</span>
    </div>

    <div id="view-register" class="view">
        <h2 style="color:var(--gold)">Nuevo Registro</h2>
        <div class="input-group"><input type="text" id="reg-name" class="input-field" placeholder="Nombre Completo"></div>
        <div class="input-group"><input type="email" id="reg-email" class="input-field" placeholder="Correo"></div>
        <div class="input-group"><input type="tel" id="reg-tel" class="input-field" placeholder="Celular (10 dígitos)"></div>
        
        <select id="reg-rol" class="select-field" onchange="verificarRolEmpresa('reg-rol','box-empresa')">
            <option value="" disabled selected>Selecciona tu Rol</option>
            <option value="PRV">Proveedor</option>
            <option value="ZPT">Maestro Zapatero</option>
            <option value="SHP">Tienda</option>
            <option value="CLN">Cliente</option>
            <option value="DLV">Delivery</option>
        </select>

        <div id="box-empresa" style="display:none; margin-top:12px;">
            <input type="text" id="reg-empresa-nombre" class="input-field" placeholder="Nombre del Local">
        </div>

        <div class="input-group" style="margin-top:12px;">
            <input type="password" id="reg-pass" class="input-field" placeholder="Contraseña">
            <i class="fas fa-eye toggle-pass" onclick="togglePassword('reg-pass', this)"></i>
        </div>
        <div class="input-group">
            <input type="password" id="reg-confirm" class="input-field" placeholder="Confirmar Contraseña">
            <i class="fas fa-eye toggle-pass" onclick="togglePassword('reg-confirm', this)"></i>
        </div>

        <button class="btn-gold" onclick="validarYCrearEcosistema()">Registrarme</button>
        
        <p class="terms-text">Al registrarte, confirmas que aceptas el uso de tus datos para la gestión de servicios en <b>J.A.D.I REPAIZ</b>.</p>
        <span class="link-text" onclick="mostrarVista('view-login')">Volver</span>
    </div>

    <div id="view-google-setup" class="view">
        <h2 style="color:var(--gold)">Completa tu perfil</h2>
        <div class="input-group"><input type="tel" id="google-tel" class="input-field" placeholder="Celular (Necesario)"></div>
        <select id="google-rol" class="select-field" onchange="verificarRolEmpresa('google-rol','box-empresa-google')">
            <option value="" disabled selected>Tu Rol</option>
            <option value="PRV">Proveedor</option>
            <option value="ZPT">Zapatero</option>
            <option value="SHP">Tienda</option>
            <option value="CLN">Cliente</option>
            <option value="DLV">Delivery</option>
        </select>
        <div id="box-empresa-google" style="display:none; margin-top:12px;">
            <input type="text" id="google-empresa-nombre" class="input-field" placeholder="Nombre Local">
        </div>
        <button class="btn-gold" onclick="finalizarRegistroGoogle()">Finalizar Registro</button>
    </div>

</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    let tempGoogleUser = null;

    const paginasMaster = { 'ZPT': 'zapatero.html', 'PRV': 'proveedor.html', 'CLN': 'cliente.html', 'DLV': 'delivery.html', 'SHP': 'tienda.html', 'ADM': 'admin_panel.html' };

    function mostrarVista(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }

    function togglePassword(id, icon) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function verificarRolEmpresa(s, b) {
        const r = document.getElementById(s).value;
        document.getElementById(b).style.display = (['PRV','ZPT','SHP'].includes(r)) ? 'block' : 'none';
    }

    async function login() {
        const input = document.getElementById('login-input').value.trim();
        const pass = document.getElementById('login-pass').value;
        if(!input || !pass) return alert("Completa los datos");

        toggleLoader(true);
        try {
            const snap = await db.ref('usuarios').once('value');
            let uFound = null;
            snap.forEach(c => {
                const u = c.val();
                if(u.uid === input || u.email === input || u.telefono === input) uFound = u;
            });

            if(uFound && (uFound.pass === pass || uFound.pass === "G_AUTH")) {
                localStorage.setItem('session_jadi', JSON.stringify(uFound));
                window.location.href = paginasMaster[uFound.rolCodigo] || 'index.html';
            } else alert("Datos incorrectos");
        } catch(e) { alert("Error"); } finally { toggleLoader(false); }
    }

    // --- LÓGICA DE REGISTRO CON SINCRONIZACIÓN DE CELULAR ---
    async function validarYCrearEcosistema() {
        const n = document.getElementById('reg-name').value;
        const em = document.getElementById('reg-email').value;
        const t = document.getElementById('reg-tel').value;
        const r = document.getElementById('reg-rol').value;
        const p = document.getElementById('reg-pass').value;
        const cp = document.getElementById('reg-confirm').value;

        if(!n || !em || !t || !r || !p) return alert("Faltan datos");
        if(p !== cp) return alert("Las contraseñas no coinciden");

        toggleLoader(true);
        try {
            // 1. BUSCAR SI EL CELULAR YA EXISTE (Creado por un zapatero)
            const snapExistente = await db.ref('usuarios').orderByChild('telefono').equalTo(t).once('value');
            let finalUID;

            if(snapExistente.exists()){
                // SI EXISTE, ACTUALIZAMOS LOS DATOS EN EL MISMO ID
                snapExistente.forEach(child => { finalUID = child.key; });
                const updateObj = { nombre: n, email: em, pass: p, verificado: true, rolCodigo: r, empresaNombre: document.getElementById('reg-empresa-nombre').value || "Personal" };
                await db.ref('usuarios/' + finalUID).update(updateObj);
                
                const fullUser = (await db.ref('usuarios/' + finalUID).once('value')).val();
                localStorage.setItem('session_jadi', JSON.stringify(fullUser));
            } else {
                // SI NO EXISTE, CREAMOS UNO NUEVO CON CONTADOR
                const snapC = await db.ref('contadores/' + r).once('value');
                let num = (snapC.val() || 0) + 1;
                finalUID = r + num.toString().padStart(9,'0');
                
                const nuevoObj = { nombre: n, email: em, telefono: t, rolCodigo: r, uid: finalUID, pass: p, verificado: true, empresaNombre: document.getElementById('reg-empresa-nombre').value || "Personal" };
                
                await db.ref('usuarios/' + finalUID).set(nuevoObj);
                await db.ref('contadores/' + r).set(num);
                localStorage.setItem('session_jadi', JSON.stringify(nuevoObj));
            }

            window.location.href = paginasMaster[r];
        } catch(e) { alert(e.message); } finally { toggleLoader(false); }
    }

    async function registroConGoogle() {
        toggleLoader(true);
        try {
            const res = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
            tempGoogleUser = res.user;
            
            // Buscar por Email
            const snap = await db.ref('usuarios').orderByChild('email').equalTo(tempGoogleUser.email).once('value');
            
            if(snap.exists()) {
                let u; snap.forEach(c => u = c.val());
                localStorage.setItem('session_jadi', JSON.stringify(u));
                window.location.href = paginasMaster[u.rolCodigo];
            } else {
                mostrarVista('view-google-setup');
            }
        } catch(e) { alert(e.message); } finally { toggleLoader(false); }
    }

    async function finalizarRegistroGoogle() {
        const r = document.getElementById('google-rol').value;
        const t = document.getElementById('google-tel').value;
        if(!r || !t) return alert("Completa los datos");

        toggleLoader(true);
        try {
            // Verificar si el teléfono ya existe para vincular con Google
            const snapTel = await db.ref('usuarios').orderByChild('telefono').equalTo(t).once('value');
            let finalUID;

            if(snapTel.exists()){
                snapTel.forEach(c => finalUID = c.key);
                await db.ref('usuarios/' + finalUID).update({ email: tempGoogleUser.email, pass: "G_AUTH", verificado: true });
            } else {
                const snapC = await db.ref('contadores/' + r).once('value');
                let num = (snapC.val() || 0) + 1;
                finalUID = r + num.toString().padStart(9,'0');
                
                await db.ref('usuarios/' + finalUID).set({
                    nombre: tempGoogleUser.displayName, email: tempGoogleUser.email, telefono: t, rolCodigo: r, uid: finalUID, pass: "G_AUTH", verificado: true, empresaNombre: document.getElementById('google-empresa-nombre').value || "Personal"
                });
                await db.ref('contadores/' + r).set(num);
            }

            const finalUser = (await db.ref('usuarios/' + finalUID).once('value')).val();
            localStorage.setItem('session_jadi', JSON.stringify(finalUser));
            window.location.href = paginasMaster[r];
        } catch(e) { alert(e.message); } finally { toggleLoader(false); }
    }
</script>
</body>
</html>
