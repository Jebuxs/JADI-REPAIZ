<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Gestión de Inventarios</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; --green: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 15px; }
        .container { max-width: 1200px; margin: auto; }
        
        /* Cabecera Dinámica */
        .header-shop { border-left: 4px solid var(--gold); padding-left: 15px; margin-bottom: 25px; }
        .header-shop h1 { margin: 0; color: var(--gold); font-size: 1.5rem; }
        
        /* Controles Principales */
        .admin-controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-main { background: var(--gold); color: black; }
        .btn-edit { background: #3498db; color: white; }
        .btn-staff { background: #555; color: white; }
        
        /* Tabla de Inventario */
        .table-container { background: var(--card); border-radius: 12px; border: 1px solid #333; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #1a1a1a; color: var(--gold); padding: 15px; text-align: left; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #222; font-size: 0.85rem; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .active { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        
        /* Secciones Ocultas */
        .hidden { display: none; }
        .modal { background: rgba(0,0,0,0.9); position: fixed; top:0; left:0; width:100%; height:100%; display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--gold); width: 90%; max-width: 400px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-shop">
        <h1 id="nombre-tienda">Cargando Tienda...</h1>
        <p id="info-propietario" style="color:#666; margin:5px 0;">ID Propietario: ---</p>
    </div>

    <div class="admin-controls">
        <button id="btn-inventario" class="btn btn-main" onclick="abrirInventario()">
            <i class="fas fa-plus-circle"></i> <span id="txt-inventario">Crear Inventario</span>
        </button>
        
        <button class="btn btn-staff" onclick="togglePersonal()">
            <i class="fas fa-users-cog"></i> Habilitar Personal
        </button>
    </div>

    <div class="table-container">
        <h3 style="padding:15px; margin:0; border-bottom:1px solid #333;">Detalle de Stock Registrado</h3>
        <table>
            <thead>
                <tr>
                    <th>Referencia / Modelo</th>
                    <th>Categoría</th>
                    <th>Talla</th>
                    <th>Color</th>
                    <th>Cantidad</th>
                    <th>Precio Sugerido</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tabla-inventario">
                </tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Simulamos la tienda activa (esto vendría del login)
    const TIENDA_ID = "TND7890"; 
    let tieneInventario = false;

    // 1. CARGAR DATOS DE LA TIENDA Y VERIFICAR BOTÓN
    function cargarModulo() {
        db.ref('tiendas/' + TIENDA_ID).on('value', snap => {
            if(snap.exists()) {
                const t = snap.val();
                document.getElementById('nombre-tienda').innerText = t.nombre || "Local J.A.D.I";
                document.getElementById('info-propietario').innerText = "Dueño: " + (t.propietario || "---");
                
                // Si existe la rama 'inventario', cambiamos el botón
                if(t.inventario) {
                    tieneInventario = true;
                    document.getElementById('txt-inventario').innerText = "Editar Inventario";
                    document.getElementById('btn-inventario').className = "btn btn-edit";
                    cargarTablaInventario(t.inventario);
                }
            }
        });
    }

    // 2. LOGICA TABLA: MOSTRAR DATOS O VACÍO
    function cargarTablaInventario(data) {
        const tbody = document.getElementById('tabla-inventario');
        tbody.innerHTML = "";
        
        Object.keys(data).forEach(key => {
            const item = data[key];
            tbody.innerHTML += `
                <tr>
                    <td style="font-weight:bold; color:white;">${item.modelo || ''}</td>
                    <td>${item.categoria || ''}</td>
                    <td>${item.talla || ''}</td>
                    <td>${item.color || ''}</td>
                    <td style="color:var(--gold);">${item.cantidad || '0'}</td>
                    <td>${item.precio ? '$' + item.precio : ''}</td>
                    <td><span class="status-badge active">EN STOCK</span></td>
                </tr>
            `;
        });
    }

    // Funciones de acción (Para los siguientes pasos)
    function abrirInventario() {
        const accion = tieneInventario ? "Editando" : "Creando";
        alert(accion + " inventario para la tienda...");
        // Aquí iría el formulario de carga
    }

    function togglePersonal() {
        alert("Abriendo panel de permisos para trabajadores...");
    }

    window.onload = cargarModulo;
</script>
</body>
</html>
