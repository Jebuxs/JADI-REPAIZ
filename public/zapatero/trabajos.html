<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Trabajos | J.A.D.I REPAIZ</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="/js/estilo_visual.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #D4AF37;
            --bg-dark: #000000;
            --card-bg: #0a0a0a;
            --text-gray: #888;
            --border: #1a1a1a;
        }

        body {
            margin: 0; background-color: var(--bg-dark); color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* HEADER Y NAVEGACIÓN */
        .header {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: #000; border-bottom: 1px solid var(--gold);
            position: sticky; top: 0; z-index: 1000;
        }
        .header i { color: var(--gold); cursor: pointer; font-size: 20px; }

        /* PANEL DE BÚSQUEDA */
        .search-container { padding: 15px; background: #050505; }
        .search-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .search-bar { 
            grid-column: span 2; background: #111; border: 1px solid #333; 
            padding: 12px; border-radius: 10px; display: flex; align-items: center;
        }
        .search-bar input, .search-grid input {
            background: transparent; border: none; color: white; width: 100%; outline: none;
        }
        .search-grid input { background: #111; border: 1px solid #333; padding: 10px; border-radius: 8px; }

        .section-title {
            padding: 15px 20px 5px; font-size: 12px; color: var(--gold);
            text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
        }

        /* ÁREAS DE SCROLL */
        .scroll-area { max-height: 45vh; overflow-y: auto; padding: 10px 0; }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--gold); }

        /* TARJETAS LOCALES */
        .card-trabajo {
            background: var(--card-bg); margin: 0 15px 12px; padding: 15px;
            border-radius: 12px; border: 1px solid var(--border); position: relative;
        }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .client-info h3 { margin: 0; font-size: 16px; color: #fff; }
        .client-info span { font-size: 10px; color: var(--text-gray); }

        .actions { display: flex; gap: 18px; }
        .actions i { font-size: 18px; cursor: pointer; transition: 0.3s; }
        .icon-bill { color: var(--gold); }
        .icon-chat { color: #fff; }
        .icon-edit { color: #3498db; }

        .money-box { margin: 12px 0; font-size: 13px; }
        .money-box b { color: var(--gold); }

        /* ESTADOS */
        .status-row { display: flex; gap: 5px; margin-top: 10px; }
        .status-btn {
            flex: 1; font-size: 9px; padding: 8px; border-radius: 6px;
            border: 1px solid #222; background: #000; color: #444;
            text-align: center; font-weight: 800; cursor: pointer;
        }
        .status-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.1); }

        /* TARJETAS SOLICITUD */
        .card-solicitud {
            background: #0d0d0d; border-left: 3px solid var(--gold);
            margin: 0 15px 10px; padding: 15px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
        }

        /* MODAL */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #111; width: 85%; max-width: 350px; padding: 25px;
            border-radius: 20px; border: 1px solid #333; position: relative;
        }
        .close-modal { position: absolute; right: 20px; top: 20px; color: #666; font-size: 20px; cursor: pointer; }

        /* BOTÓN FLOTANTE */
        .fab {
            position: fixed; bottom: 25px; right: 25px;
            background: var(--gold); width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4); text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-arrow-left" onclick="window.location.href='dashboard.html'"></i> <div style="font-weight: 800; font-size: 14px; letter-spacing: 2px;">JADI REPAIZ</div>
        <i class="fas fa-sync-alt" onclick="location.reload()"></i> </div>

    <div class="search-container">
        <div class="search-bar">
            <i class="fas fa-search" style="color: #444; margin-right: 10px;"></i>
            <input type="text" id="globalSearch" onkeyup="filtrarTodo()" placeholder="Nombre, ID, Celular o Precio..."> </div>
        <div class="search-grid" style="margin-top: 10px;">
            <input type="date" id="filterFecha" onchange="filtrarTodo()"> <div style="color: #444; font-size: 11px; align-self: center; text-align: right;">FILTRO POR FECHA</div>
        </div>
    </div>

    <div class="section-title">Grupo Trabajos Local</div>
    <div class="scroll-area" id="listaTrabajos"> <p style="text-align: center; color: #333; padding: 20px;">Cargando inventario local...</p>
    </div>

    <div class="section-title">Solicitudes de Reparación</div>
    <div class="scroll-area" id="listaSolicitudes"> <p style="text-align: center; color: #333; padding: 20px;">Buscando órdenes pendientes...</p>
    </div>

    <div id="modalDetalle" class="modal">
        <div class="modal-content">
            <i class="fas fa-times close-modal" onclick="cerrarModal()"></i>
            <h3 style="color: var(--gold); margin-top: 0;">Detalle de Solicitud</h3>
            <div id="contenidoDetalle" style="font-size: 13px; line-height: 1.8; color: #ccc; margin: 20px 0;"></div> <button id="btnAceptar" style="width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">ACEPTAR TRABAJO</button> </div>
    </div>

    <a href="nueva_orden.html" class="fab"> <i class="fas fa-plus" style="color: #000; font-size: 24px;"></i>
    </a>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = function() {
            const tema = localStorage.getItem('jadi_tema_preferido') || 'elegante';
            if(typeof JadiEstilo !== 'undefined') JadiEstilo.aplicar(tema); // [cite: 1]
            
            escucharTrabajosLocal(); // [cite: 5]
            escucharOrdenesPendientes(); // 
        };

        // 1. CARPETA 'trabajos' (EL LOCAL)
        function escucharTrabajosLocal() {
            db.ref('trabajos').on('value', snap => {
                const cont = document.getElementById('listaTrabajos');
                cont.innerHTML = "";
                
                snap.forEach(child => {
                    const o = child.val();
                    const id = child.key;
                    cont.innerHTML += `
                        <div class="card-trabajo" data-search="${o.cliente} ${id} ${o.telefono} ${o.precioTotal}" data-fecha="${o.fecha || ''}">
                            <div class="card-header">
                                <div class="client-info">
                                    <h3>${o.cliente}</h3> <span>ID: ${id}</span>
                                </div>
                                <div class="actions">
                                    <i class="fas fa-file-invoice icon-bill" onclick="location.href='facturar.html?id=${id}'"></i> <i class="fas fa-comment-dots icon-chat" onclick="location.href='chat.html?id=${o.clienteId}'"></i>
                                    <i class="fas fa-edit icon-edit" onclick="location.href='editar.html?id=${id}'"></i>
                                </div>
                            </div>
                            <div class="money-box">
                                Total: <b>$${o.precioTotal}</b> | Saldo: <b style="color:#FF5252">$${o.saldo}</b> </div>
                            <div class="status-row">
                                <div class="status-btn ${o.estado === 'Recibido' ? 'active' : ''}" onclick="updateEstadoLocal('${id}','Recibido')">Recibido</div> <div class="status-btn ${o.estado === 'En Proceso' ? 'active' : ''}" onclick="updateEstadoLocal('${id}','En Proceso')">En Proceso</div>
                                <div class="status-btn ${o.estado === 'Listo' ? 'active' : ''}" onclick="updateEstadoLocal('${id}','Listo')">Listo</div>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // 2. CARPETA 'ordenes' (SOLICITUDES EXTERNAS)
        function escucharOrdenesPendientes() {
            db.ref('ordenes').orderByChild('status').equalTo('Pendiente').on('value', snap => {
                const cont = document.getElementById('listaSolicitudes');
                cont.innerHTML = "";
                
                let hayPendientes = false;
                snap.forEach(child => {
                    hayPendientes = true;
                    const o = child.val();
                    const id = child.key;
                    const nombre = (o.cliente && o.cliente.nombre) ? o.cliente.nombre : "Sin nombre"; // [cite: 10]
                    
                    // Construir listado de detalles para el modal [cite: 10]
                    let listaDetalles = "";
                    if(o.trabajos) {
                        o.trabajos.forEach((t, i) => {
                            listaDetalles += `${i+1}. ${t.tipo || 'Ítem'}, ${t.detalle || 'Sin detalle'}<br>`;
                        });
                    }

                    cont.innerHTML += `
                        <div class="card-solicitud" onclick="abrirModalSolicitud('${listaDetalles}', '${id}')">
                            <div>
                                <b style="font-size:14px;">${nombre}</b><br>
                                <small style="color:#666"><i class="fas fa-map-marker-alt"></i> a ${o.distancia || '0.5'} km</small> </div>
                            <div style="display:flex; align-items:center; gap:15px;">
                                <span style="color:var(--gold); font-weight:800">${o.trabajos ? o.trabajos.length : 1} Items</span> <i class="fas fa-trash" style="color:#444" onclick="eliminarVisualizacion('${id}', event)"></i> </div>
                        </div>
                    `;
                });

                if(!hayPendientes) {
                    cont.innerHTML = "<p style='text-align: center; color: #333; padding: 20px; font-size: 11px;'>No hay órdenes pendientes</p>";
                }
            });
        }

        function updateEstadoLocal(id, nuevo) {
            db.ref('trabajos/' + id).update({ estado: nuevo }); // [cite: 8]
        }

        function abrirModalSolicitud(detalleHTML, id) {
            document.getElementById('contenidoDetalle').innerHTML = detalleHTML; // [cite: 10]
            document.getElementById('modalDetalle').style.display = 'flex';
            
            document.getElementById('btnAceptar').onclick = function() {
                db.ref('ordenes/' + id).update({ status: 'Aceptado' }); // 
                cerrarModal();
                alert("Orden aceptada y movida al listado local.");
            };
        }

        function eliminarVisualizacion(id, e) {
            e.stopPropagation(); // Evita abrir el modal al hacer clic en borrar [cite: 10]
            if(confirm("¿Ocultar esta solicitud?")) {
                db.ref('ordenes/' + id).update({ status: 'Oculto' });
            }
        }

        function cerrarModal() { document.getElementById('modalDetalle').style.display = 'none'; }

        function filtrarTodo() {
            const txt = document.getElementById('globalSearch').value.toLowerCase(); // [cite: 3]
            const fechaFiltro = document.getElementById('filterFecha').value;
            const cards = document.querySelectorAll('.card-trabajo');

            cards.forEach(c => {
                const infoBusqueda = c.getAttribute('data-search').toLowerCase();
                const fechaCard = c.getAttribute('data-fecha'); 
                
                let coincideFecha = true;
                if(fechaFiltro) { // [cite: 4]
                    const partes = fechaFiltro.split('-');
                    const fComp = `${parseInt(partes[2])}/${parseInt(partes[1])}/${partes[0]}`;
                    coincideFecha = (fechaCard === fComp);
                }
                const coincideTxt = infoBusqueda.includes(txt);
                c.style.display = (coincideTxt && coincideFecha) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
