<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Selector Maestro de Módulos - JADI</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #0d1117; }
        body { background: #000; color: #eee; font-family: sans-serif; padding: 20px; }
        
        .panel { background: var(--dark); border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
        h2 { color: var(--gold); border-bottom: 1px solid #333; padding-bottom: 10px; }

        /* LISTADO DE GITHUB */
        .github-list { margin: 20px 0; max-height: 400px; overflow-y: auto; border: 1px solid #222; border-radius: 5px; }
        .file-item { 
            display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #21262d; 
            transition: 0.2s; cursor: pointer;
        }
        .file-item:hover { background: #161b22; }
        .file-item input[type="checkbox"] { margin-right: 15px; transform: scale(1.3); }
        .file-item i { margin-right: 10px; color: #8b949e; }

        .btn-sync { background: #238636; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--gold); color: black; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="panel">
    <h2><i class="fab fa-github"></i> Sincronizador JADI/GitHub</h2>
    <p style="font-size: 0.8rem; color: #8b949e;">Selecciona los archivos que quieres activar en tu Dashboard:</p>
    
    <button class="btn-sync" onclick="escanearGitHub()"><i class="fas fa-sync"></i> Escanear mi GitHub</button>

    <div class="github-list" id="contenedor-archivos">
        <div style="padding: 20px; color: #555;">Dale al botón de escanear para ver tus archivos...</div>
    </div>

    <button class="btn-save" onclick="guardarSeleccionados()"><i class="fas fa-check"></i> ACTIVAR MÓDULOS SELECCIONADOS</button>
</div>

<script>
    // Tu config de Firebase
    const firebaseConfig = {
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // AQUÍ PONES TUS DATOS DE GITHUB
    const USER = "tu-usuario-github"; // Cambia por tu usuario
    const REPO = "tu-repositorio";    // Cambia por el nombre de tu repo

    async function escanearGitHub() {
        const container = document.getElementById('contenedor-archivos');
        container.innerHTML = "<div style='padding:20px'>Escaneando carpetas...</div>";

        try {
            // Buscamos archivos en la raíz y en /admin
            const rutas = ['', 'admin']; 
            let todosLosArchivos = [];

            for (const ruta of rutas) {
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${ruta}`);
                const data = await response.json();
                if(Array.isArray(data)) {
                    data.forEach(item => {
                        if(item.name.endsWith('.html')) {
                            todosLosArchivos.push({ nombre: item.name, ruta: item.path });
                        }
                    });
                }
            }

            container.innerHTML = "";
            todosLosArchivos.forEach(file => {
                container.innerHTML += `
                    <div class="file-item">
                        <input type="checkbox" class="modulo-check" data-name="${file.nombre}" data-url="${file.ruta}">
                        <i class="far fa-file-code"></i>
                        <span>${file.ruta}</span>
                    </div>
                `;
            });

        } catch (error) {
            container.innerHTML = "<div style='color:red; padding:20px'>Error al conectar con GitHub. Verifica el usuario/repo.</div>";
        }
    }

    async function guardarSeleccionados() {
        const checks = document.querySelectorAll('.modulo-check:checked');
        if(checks.length === 0) return alert("Selecciona al menos un archivo");

        const promesas = [];
        checks.forEach(check => {
            const data = {
                nombre: check.getAttribute('data-name').replace('.html', '').toUpperCase(),
                url: check.getAttribute('data-url'),
                fecha: new Date().toISOString()
            };
            // Guardamos en Firebase
            promesas.push(db.ref('modulos_disponibles').push(data));
        });

        await Promise.all(promesas);
        alert("¡Módulos activados con éxito!");
        window.location.href = "dashboard.html";
    }
</script>
</body>
</html>
