<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajos J.A.D.I REPAIZ - Premium</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script src="/js/estilo_visual.js"></script>

    <style>
        :root {
            --gold: #D4AF37;
            --bg-dark: #0A0B10;
            --bg-card: #16181D;
            --border-color: #2D3139;
            --text-main: #E6E8ED;
            --text-muted: #9499A6;
            --shadow-premium: 0 10px 30px rgba(0,0,0,0.5);
            --font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0; background-color: var(--bg-dark); color: var(--text-main);
            font-family: var(--font-family); -webkit-font-smoothing: antialiased;
            padding-bottom: 100px;
        }

        /* HEADER PREMIUM */
        .header {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: rgba(10, 11, 16, 0.95);
            border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .header i { font-size: 20px; color: var(--gold); cursor: pointer; transition: 0.3s; }
        .header i:hover { transform: scale(1.2); }

        /* PANEL DE BUSQUEDA */
        .search-container { padding: 20px; background: var(--bg-dark); }
        .search-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .search-box input {
            width: 100%; padding: 12px; background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; color: white; font-size: 14px; box-sizing: border-box;
        }
        .search-box input:focus { border-color: var(--gold); outline: none; }

        .section-title {
            padding: 15px 20px; font-size: 11px; color: var(--gold);
            text-transform: uppercase; letter-spacing: 2px; font-weight: 700;
        }

        /* TARJETAS DE TRABAJO LOCAL */
        .card-trabajo {
            background: var(--bg-card); margin: 0 20px 15px; padding: 20px;
            border-radius: 16px; border: 1px solid var(--border-color);
            position: relative; box-shadow: var(--shadow-premium);
        }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .card-actions { display: flex; gap: 15px; }
        .card-actions i { color: var(--gold); font-size: 18px; cursor: pointer; }

        .info-name { font-size: 16px; font-weight: 700; color: var(--text-main); }
        .info-id { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .info-money { display: flex; gap: 20px; margin: 15px 0; font-size: 14px; }
        .saldo { color: #FF5252; font-weight: 700; }

        /* SELECTOR DE ESTADO */
        .status-bar { display: flex; gap: 8px; margin-top: 15px; }
        .status-btn {
            flex: 1; font-size: 10px; padding: 8px 5px; border-radius: 8px;
            border: 1px solid var(--border-color); text-align: center; color: var(--text-muted);
            cursor: pointer; font-weight: 600; text-transform: uppercase;
        }
        .status-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }

        /* TARJETAS DE SOLICITUD */
        .card-solicitud {
            background: var(--bg-card); border-left: 4px solid var(--gold);
            margin: 0 20px 10px; padding: 15px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.3s;
        }
        .card-solicitud:hover { transform: translateX(5px); }

        /* VENTANA EMERGENTE (MODAL) */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--bg-card); width: 85%; max-width: 400px; padding: 25px;
            border-radius: 20px; border: 1px solid var(--border-color); box-shadow: var(--shadow-premium);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        /* BOTON AGREGAR */
        .btn-float {
            position: fixed; bottom: 30px; right: 25px;
            background: var(--gold); width: 60px; height: 60px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4); text-decoration: none;
            transition: 0.3s;
        }
        .btn-float:hover { transform: scale(1.1) rotate(90deg); }
        .btn-float i { color: black; font-size: 24px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-arrow-left" onclick="window.location.href='dashboard.html'"></i>
        <div style="text-align: center;">
            <div style="font-size: 14px; font-weight: 700; letter-spacing: 1px;">TRABAJOS</div>
            <div style="font-size: 9px; color: var(--text-muted); letter-spacing: 3px;">J.A.D.I REPAIZ</div>
        </div>
        <i class="fas fa-sync-alt" onclick="window.location.reload()"></i>
    </div>

    <div class="search-container">
        <div class="search-grid">
            <input type="text" id="busquedaGeneral" placeholder="CI / Celular / ID">
            <input type="date" id="filtroFecha">
        </div>
    </div>

    <div class="section-title">Grupo Trabajos Local</div>
    <div id="contenedorLocal">
        <div class="card-trabajo">
            <div class="card-header">
                <div>
                    <div class="info-name">David Villa</div>
                    <div class="info-id">ID: #REPA-9923</div>
                </div>
                <div class="card-actions">
                    <i class="fas fa-file-invoice" onclick="location.href='facturar.html'"></i>
                    <i class="fas fa-comment-dots" onclick="location.href='chat.html'"></i>
                    <i class="fas fa-edit" onclick="location.href='editar.html'"></i>
                </div>
            </div>
            <div class="info-money">
                <span>Total: <strong>$15.00</strong></span>
                <span class="saldo">Saldo: $5.00</span>
            </div>
            <div class="status-bar">
                <div class="status-btn active">Recibido</div>
                <div class="status-btn">En Proceso</div>
                <div class="status-btn">Finalizado</div>
            </div>
        </div>
    </div>

    <div class="section-title">Grupo Solicitudes de Reparación</div>
    <div id="contenedorSolicitudes">
        <div class="card-solicitud" onclick="verDetalleSolicitud()">
            <div>
                <div style="font-weight: 600;">Carlos Andrade</div>
                <div style="font-size: 11px; color: var(--text-muted);"><i class="fas fa-map-marker-alt"></i> a 0.8 km</div>
            </div>
            <div style="background: var(--gold-dim); color: var(--gold); padding: 5px 12px; border-radius: 15px; font-size: 11px; font-weight: 700;">
                2 items
            </div>
        </div>
    </div>

    <div id="modalPremium" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span style="font-weight: 700; color: var(--gold);">DETALLE SOLICITUD</span>
                <i class="fas fa-times" onclick="cerrarModal()" style="cursor: pointer; color: var(--text-muted);"></i>
            </div>
            <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; font-size: 13px; line-height: 2;">
                • 1, Zapatilla, Cocer al ruedo<br>
                • 1, Mochila, Cambio de cierre<br>
                • 1, Guante Box, Cocer
            </div>
            <button onclick="aceptar()" style="width: 100%; padding: 15px; margin-top: 20px; border-radius: 12px; background: var(--gold); border: none; font-weight: 800; cursor: pointer;">ACEPTAR Y REGISTRAR</button>
        </div>
    </div>

    <a href="nueva_orden.html" class="btn-float">
        <i class="fas fa-plus"></i>
    </a>

    <script>
        // Configuración Firebase (Asegúrate que sea la tuya)
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = function() {
            // SEGURIDAD Y ESTILO
            const session = JSON.parse(localStorage.getItem('session_jadi'));
            if (!session) window.location.href = "/index.html";

            // Aplicar Estilo del Dashboard
            const tema = localStorage.getItem('jadi_tema_preferido') || 'elegante';
            if(typeof JadiEstilo !== 'undefined') JadiEstilo.aplicar(tema);
        };

        function verDetalleSolicitud() { document.getElementById('modalPremium').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('modalPremium').style.display = 'none'; }
        function aceptar() { alert("Orden añadida!"); cerrarModal(); }
    </script>
</body>
</html>
