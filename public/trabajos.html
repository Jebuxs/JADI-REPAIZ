<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Trabajos - JADI REPAIZ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --dark: #000; --card: #111; --blue: #0066ff; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        
        .header { padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; background: #050505; position: sticky; top: 0; z-index: 100; justify-content: space-between; }
        .btn-back { color: var(--gold); text-decoration: none; font-size: 1.2rem; }

        /* BUSCADOR */
        .search-container { padding: 15px; }
        .search-bar { background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 10px; display: flex; align-items: center; }
        .search-bar input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }

        /* NUBE Y ÓRDENES */
        .orders-container { padding: 0 15px; }
        .order-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .order-header h3 { margin: 0; font-size: 16px; color: var(--gold); }
        .status-tag { font-size: 10px; padding: 4px 8px; border-radius: 5px; text-transform: uppercase; font-weight: bold; }
        .tag-recibido { background: #444; color: white; }
        
        /* MODAL Y FORMULARIO */
        #modal-orden { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 300; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; font-size: 16px; }
        label { font-size: 11px; color: var(--gold); margin-bottom: 5px; display: block; font-weight: bold; }

        /* SECCIÓN DE AGREGAR TRABAJOS (EL "+" QUE ME MENCIONAS) */
        .add-item-box { background: #080808; border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px dashed #444; }
        .input-group-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        
        /* Ajuste de anchos para que no se vea apretado en móvil */
        #item-cant { flex: 1; min-width: 50px; }
        #item-tipo { flex: 2; min-width: 100px; }
        #item-desc { flex: 100%; } /* El detalle ocupa toda la línea para que escribas cómodo */
        #item-precio { flex: 1; min-width: 80px; }
        .btn-add-plus { background: var(--gold); border: none; border-radius: 8px; padding: 0 20px; height: 45px; color: black; font-weight: bold; cursor: pointer; }

        /* LISTA VISUAL DE ITEMS AGREGADOS */
        #tabla-items-visual { margin-top: 10px; }
        .item-agregado { background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--gold); }
        .item-info { font-size: 13px; color: #eee; }
        .item-info b { color: var(--gold); }

        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 24px; border: none; box-shadow: 0 4px 15px rgba(255,215,0,0.4); z-index: 200; }
    </style>
</head>
<body>

    <div class="header">
        <a href="zapatero.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        <h2 style="margin:0; font-size: 1.1rem;">Panel de Órdenes</h2>
        <i class="fas fa-sync-alt" onclick="location.reload()" style="color: var(--gold);"></i>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <i class="fas fa-search" style="color: #555;"></i>
            <input type="text" id="inputBusqueda" onkeyup="filtrarTrabajos()" placeholder="Buscar cliente...">
        </div>
    </div>

    <div class="orders-container" id="lista-trabajos"></div>

    <button class="fab" onclick="abrirModal()"><i class="fas fa-plus"></i></button>

    <div id="modal-orden">
        <h2 id="modal-titulo" style="color: var(--gold); margin-top: 0;">Nueva Orden</h2>
        
        <label>CLIENTE</label>
        <input type="tel" id="cli-celular" placeholder="Celular">
        <input type="text" id="cli-nombre" placeholder="Nombre del cliente">
        
        <div class="add-item-box">
            <label>AGREGAR TRABAJO (Toca + para añadir a la lista)</label>
            <div class="input-group-row">
                <input type="number" id="item-cant" value="1">
                <input type="text" id="item-tipo" placeholder="Ej: Zapatilla">
                <input type="number" id="item-precio" placeholder="Precio $">
            </div>
            <div class="input-group-row">
                <input type="text" id="item-desc" placeholder="¿Qué le vas a hacer? (Suela, limpieza, etc)">
                <button class="btn-add-plus" onclick="agregarItemALista()"><i class="fas fa-plus"></i> AGREGAR</button>
            </div>

            <div id="tabla-items-visual">
                <p style="font-size: 11px; color: #555; text-align: center;">No hay trabajos agregados aún.</p>
            </div>
        </div>

        <div style="background: #0a0a0a; padding: 15px; border-radius: 12px; border: 1px solid #222;">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;">
                    <label>TOTAL $</label>
                    <input type="number" id="precio-total" onkeyup="calcularSaldo()" value="0">
                </div>
                <div style="flex:1;">
                    <label>ABONO $</label>
                    <input type="number" id="abono-inicial" onkeyup="calcularSaldo()" value="0">
                </div>
            </div>
            <label>SALDO PENDIENTE $</label>
            <input type="text" id="saldo-pendiente" readonly style="color:#ff4444; border:none; background:transparent; font-size: 20px; font-weight: bold; margin:0;">
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button onclick="cerrarModal()" style="flex:1; background:transparent; color:white; border:1px solid #444; padding:15px; border-radius:10px;">CANCELAR</button>
            <button onclick="guardarOrden()" style="flex:1; background:var(--gold); color:black; border:none; padding:15px; border-radius:10px; font-weight:bold;">GUARDAR ORDEN</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const session = JSON.parse(localStorage.getItem('session_jadi')) || { uid: "ZAP-TEMP" };

        let itemsTemporales = [];

        function abrirModal() { document.getElementById('modal-orden').style.display = 'block'; itemsTemporales = []; renderItems(); }
        function cerrarModal() { document.getElementById('modal-orden').style.display = 'none'; }

        function agregarItemALista() {
            const cant = document.getElementById('item-cant').value;
            const tipo = document.getElementById('item-tipo').value.trim();
            const desc = document.getElementById('item-desc').value.trim();
            const precio = parseFloat(document.getElementById('item-precio').value) || 0;

            if(!tipo || !desc) return alert("Escribe el tipo y el detalle");

            // Acumulación: si ya existe el tipo de calzado, unimos los detalles
            let existente = itemsTemporales.find(it => it.tipo.toLowerCase() === tipo.toLowerCase());
            if(existente) {
                existente.desc += ` + ${desc}`;
                existente.precio += precio;
            } else {
                itemsTemporales.push({ cant, tipo, desc, precio });
            }

            // Limpiar inputs de detalle para el siguiente
            document.getElementById('item-desc').value = "";
            document.getElementById('item-precio').value = "";
            renderItems();
        }

        function renderItems() {
            const container = document.getElementById('tabla-items-visual');
            container.innerHTML = "";
            let suma = 0;

            if(itemsTemporales.length === 0) {
                container.innerHTML = '<p style="font-size: 11px; color: #555; text-align: center;">No hay trabajos agregados aún.</p>';
            }

            itemsTemporales.forEach((it, index) => {
                suma += it.precio;
                container.innerHTML += `
                    <div class="item-agregado">
                        <div class="item-info">
                            <b>${it.cant} ${it.tipo}</b><br>
                            <span>${it.desc}</span>
                        </div>
                        <div style="text-align:right;">
                            <span style="display:block; font-weight:bold;">$${it.precio}</span>
                            <i class="fas fa-trash-alt" onclick="eliminarItem(${index})" style="color:#ff4444; font-size:14px; padding:5px;"></i>
                        </div>
                    </div>`;
            });

            document.getElementById('precio-total').value = suma;
            calcularSaldo();
        }

        function eliminarItem(index) {
            itemsTemporales.splice(index, 1);
            renderItems();
        }

        function calcularSaldo() {
            const total = parseFloat(document.getElementById('precio-total').value) || 0;
            const abono = parseFloat(document.getElementById('abono-inicial').value) || 0;
            document.getElementById('saldo-pendiente').value = "$" + (total - abono).toFixed(2);
        }

        async function guardarOrden() {
            if(itemsTemporales.length === 0) return alert("Agrega al menos un trabajo a la lista");
            const cliente = document.getElementById('cli-nombre').value;
            if(!cliente) return alert("Escribe el nombre del cliente");

            const snapT = await db.ref('contadores/TRB').once('value');
            let numT = (snapT.val() || 0) + 1;
            const trbID = 'TRB-' + numT.toString().padStart(5, '0');

            await db.ref('trabajos').push({
                ordenID: trbID,
                zapateroId: session.uid,
                cliente: cliente,
                telefono: document.getElementById('cli-celular').value,
                items: itemsTemporales,
                precio: document.getElementById('precio-total').value,
                abono: document.getElementById('abono-inicial').value,
                saldo: document.getElementById('saldo-pendiente').value.replace('$',''),
                estado: 'Recibido',
                timestamp: Date.now()
            });

            await db.ref('contadores/TRB').set(numT);
            alert("¡Orden guardada con éxito!");
            cerrarModal();
        }

        function cargarTrabajos() {
            db.ref('trabajos').orderByChild('zapateroId').equalTo(session.uid).on('value', snap => {
                const container = document.getElementById('lista-trabajos');
                container.innerHTML = "";
                snap.forEach(child => {
                    const o = child.val();
                    container.innerHTML += `
                        <div class="order-card">
                            <div class="order-header">
                                <h3>${o.cliente} <small style="color:#444">#${o.ordenID}</small></h3>
                                <span class="status-tag tag-recibido">${o.estado}</span>
                            </div>
                            <div class="order-price">
                                <span>Total: $${o.precio}</span>
                                <span style="color:var(--gold)">Debe: $${o.saldo}</span>
                            </div>
                        </div>`;
                });
            });
        }

        function filtrarTrabajos() {
            const bus = document.getElementById('inputBusqueda').value.toLowerCase();
            document.querySelectorAll('.order-card').forEach(c => {
                const nombre = c.querySelector('h3').innerText.toLowerCase();
                c.style.display = nombre.includes(bus) ? "block" : "none";
            });
        }

        window.onload = cargarTrabajos;
    </script>
</body>
</html>
