<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Trabajos | J.A.D.I REPAIZ</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="/js/estilo_visual.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #D4AF37;
            --bg-dark: #000000;
            --card-bg: #0a0a0a;
            --text-gray: #888;
            --border: #1a1a1a;
        }

        body {
            margin: 0; background-color: var(--bg-dark); color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: #000; border-bottom: 1px solid var(--gold);
            position: sticky; top: 0; z-index: 1000;
        }
        .header i { color: var(--gold); cursor: pointer; font-size: 20px; }

        .search-container { padding: 15px; background: #050505; }
        .search-bar { 
            background: #111; border: 1px solid #333; 
            padding: 12px; border-radius: 10px; display: flex; align-items: center;
        }
        .search-bar input {
            background: transparent; border: none; color: white; width: 100%; outline: none;
        }

        .section-title {
            padding: 15px 20px 5px; font-size: 12px; color: var(--gold);
            text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
        }

        .scroll-area { max-height: 45vh; overflow-y: auto; padding: 10px 0; }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--gold); }

        .card-trabajo {
            background: var(--card-bg); margin: 0 15px 12px; padding: 15px;
            border-radius: 12px; border: 1px solid var(--border); position: relative;
        }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .client-info h3 { margin: 0; font-size: 16px; color: #fff; }
        .client-info span { font-size: 10px; color: var(--text-gray); }

        .actions { display: flex; gap: 18px; }
        .actions i { font-size: 18px; cursor: pointer; transition: 0.3s; }
        .icon-bill { color: var(--gold); }
        .icon-chat { color: #fff; }
        .icon-edit { color: #3498db; }

        .money-box { margin: 12px 0; font-size: 13px; }
        .money-box b { color: var(--gold); }

        .status-row { display: flex; gap: 5px; margin-top: 10px; }
        .status-btn {
            flex: 1; font-size: 9px; padding: 8px; border-radius: 6px;
            border: 1px solid #222; background: #000; color: #444;
            text-align: center; font-weight: 800; cursor: pointer;
        }
        .status-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.1); }

        .card-solicitud {
            background: #0d0d0d; border-left: 3px solid var(--gold);
            margin: 0 15px 10px; padding: 15px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #111; width: 85%; max-width: 350px; padding: 25px;
            border-radius: 20px; border: 1px solid #333; position: relative;
        }
        .close-modal { position: absolute; right: 20px; top: 20px; color: #666; font-size: 20px; cursor: pointer; }

        .fab {
            position: fixed; bottom: 25px; right: 25px;
            background: var(--gold); width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4); text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-arrow-left" onclick="window.location.href='dashboard.html'"></i>
        <div style="font-weight: 800; font-size: 14px; letter-spacing: 2px;">JADI REPAIZ</div>
        <i class="fas fa-sync-alt" onclick="location.reload()"></i>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <i class="fas fa-search" style="color: #444; margin-right: 10px;"></i>
            <input type="text" id="globalSearch" onkeyup="filtrarTodo()" placeholder="Nombre, ID, Celular o Precio...">
        </div>
    </div>

    <div class="section-title">Grupo Trabajos Local</div>
    <div class="scroll-area" id="listaTrabajos">
        <p style="text-align: center; color: #333; padding: 20px;">Cargando trabajos...</p>
    </div>

    <div class="section-title">Solicitudes de Reparación</div>
    <div id="listaSolicitudes">
        <p style="text-align: center; color: #333; padding: 20px;">Buscando solicitudes...</p>
    </div>

    <div id="modalDetalle" class="modal">
        <div class="modal-content">
            <i class="fas fa-times close-modal" onclick="cerrarModal()"></i>
            <h3 style="color: var(--gold); margin-top: 0;">Detalle de Solicitud</h3>
            <div id="contenidoDetalle" style="font-size: 13px; line-height: 1.8; color: #ccc; margin: 20px 0;"></div>
            <button id="btnAceptar" style="width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">ACEPTAR TRABAJO</button>
        </div>
    </div>

    <a href="nueva_orden.html" class="fab">
        <i class="fas fa-plus" style="color: #000; font-size: 24px;"></i>
    </a>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let idSeleccionado = null;

        window.onload = function() {
            escucharOrdenes(); // Una sola escucha para ambas secciones
        };

        function escucharOrdenes() {
            db.ref('ordenes').on('value', snap => {
                const contTrabajos = document.getElementById('listaTrabajos');
                const contSolicitudes = document.getElementById('listaSolicitudes');
                
                contTrabajos.innerHTML = "";
                contSolicitudes.innerHTML = "";
                
                let haySolicitudes = false;

                snap.forEach(child => {
                    const o = child.val();
                    const id = child.key;

                    // SECCIÓN 1: TRABAJOS LOCALES (Los que ya NO son pendientes)
                    if(o.status !== 'Pendiente') {
                        contTrabajos.innerHTML += `
                            <div class="card-trabajo" data-search="${o.cliente.nombre} ${id} ${o.cliente.telefono} ${o.totales.cobrado}">
                                <div class="card-header">
                                    <div class="client-info">
                                        <h3>${o.cliente.nombre}</h3>
                                        <span>ID: ${id}</span>
                                    </div>
                                    <div class="actions">
                                        <i class="fas fa-file-invoice icon-bill" onclick="location.href='facturar.html?id=${id}'"></i>
                                        <i class="fas fa-comment-dots icon-chat" onclick="location.href='chat.html?id=${o.cliente.uid}'"></i>
                                        <i class="fas fa-edit icon-edit" onclick="location.href='editar.html?id=${id}'"></i>
                                    </div>
                                </div>
                                <div class="money-box">
                                    Total: <b>$${(o.totales.cobrado || 0).toFixed(2)}</b> | Saldo: <b style="color:#FF5252">$${(o.totales.saldo || 0).toFixed(2)}</b>
                                </div>
                                <div class="status-row">
                                    <div class="status-btn ${o.status === 'Recibido' ? 'active' : ''}" onclick="updateEstado('${id}','Recibido')">Recibido</div>
                                    <div class="status-btn ${o.status === 'En Proceso' ? 'active' : ''}" onclick="updateEstado('${id}','En Proceso')">En Proceso</div>
                                    <div class="status-btn ${o.status === 'Terminado' ? 'active' : ''}" onclick="updateEstado('${id}','Terminado')">Finalizado</div>
                                </div>
                            </div>
                        `;
                    } 
                    // SECCIÓN 2: SOLICITUDES (Los que están como Pendiente)
                    else {
                        haySolicitudes = true;
                        const primerDetalle = o.trabajos && o.trabajos[0] ? o.trabajos[0].detalle : "Sin detalle";
                        
                        contSolicitudes.innerHTML += `
                            <div class="card-solicitud" onclick="abrirModal('${primerDetalle}', '${id}')">
                                <div>
                                    <b style="font-size:14px; color:white;">${o.cliente.nombre}</b><br>
                                    <small style="color:var(--gold)">Folio: ${id}</small>
                                </div>
                                <div style="text-align:right">
                                    <span style="color:var(--gold); font-weight:800">${o.trabajos ? o.trabajos.length : 1} Items</span>
                                    <br><small style="color:#555">CLICK PARA VER</small>
                                </div>
                            </div>
                        `;
                    }
                });

                if(!haySolicitudes) {
                    contSolicitudes.innerHTML = "<p style='text-align: center; color: #333; padding: 20px; font-size:12px;'>No hay pedidos pendientes</p>";
                }
            });
        }

        function updateEstado(id, nuevo) {
            db.ref('ordenes/' + id).update({ status: nuevo });
        }

        function abrirModal(detalle, id) {
            idSeleccionado = id;
            document.getElementById('contenidoDetalle').innerHTML = `
                <b style="color:var(--gold)">ORDEN:</b> ${id}<br><br>
                <b style="color:var(--gold)">TRABAJO:</b><br>${detalle}
            `;
            document.getElementById('modalDetalle').style.display = 'flex';
            
            // Configurar el botón de aceptar
            document.getElementById('btnAceptar').onclick = function() {
                updateEstado(id, 'Recibido');
                cerrarModal();
                alert("Trabajo aceptado y movido a la lista local.");
            };
        }

        function cerrarModal() { 
            document.getElementById('modalDetalle').style.display = 'none'; 
        }

        function filtrarTodo() {
            const txt = document.getElementById('globalSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.card-trabajo');
            cards.forEach(c => {
                const matchTxt = c.getAttribute('data-search').toLowerCase().includes(txt);
                c.style.display = matchTxt ? "block" : "none";
            });
        }
    </script>
</body>
</html>
