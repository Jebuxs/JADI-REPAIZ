<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Trabajos - J.A.D.I REPAIZ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --dark: #000; --card: #111; --danger: #ff4444; --green: #25d366; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        /* HEADER */
        .header { padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; background: #050505; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .btn-back { color: var(--gold); text-decoration: none; font-size: 20px; padding: 5px 10px; }

        /* BUSCADOR */
        .search-container { padding: 15px; }
        .search-bar { background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 12px; display: flex; align-items: center; }
        .search-bar input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; font-size: 14px; }

        /* LISTADO DE ORDENES */
        .orders-container { padding: 0 15px; }
        .order-card { background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 15px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .order-card:active { transform: scale(0.98); background: #050505; }
        
        .status-pill { font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: bold; margin-bottom: 5px; display: inline-block; }
        .status-recibido { background: #332b00; color: var(--gold); }

        /* MODAL DE NUEVA ORDEN */
        #modal-orden { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 300; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        input, textarea { width: 100%; padding: 14px; margin-bottom: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; outline: none; font-size: 16px; }
        label { font-size: 11px; color: var(--gold); margin-bottom: 6px; display: block; font-weight: bold; letter-spacing: 1px; }
        
        .row-flex { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
        .btn-mini-plus { background: #222; color: var(--gold); border: 1px solid var(--gold); border-radius: 10px; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        #btn-invitar { display: none; background: #0066ff; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; margin-bottom: 15px; cursor: pointer; }

        /* BOTÓN FLOTANTE */
        .fab { position: fixed; bottom: 25px; right: 25px; width: 65px; height: 65px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 28px; border: none; z-index: 200; box-shadow: 0 5px 15px rgba(255,215,0,0.3); }
        
        /* ITEMS AGREGADOS */
        .item-listado { border-bottom: 1px solid #222; padding: 12px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .item-info { flex: 1; }
        .detalles-texto { font-size: 12px; color: #888; margin-top: 4px; white-space: pre-wrap; }
        .btn-eliminar-item { color: var(--danger); background: transparent; border: none; font-size: 20px; padding: 10px; }

        .caja-totales { background: #0a0a0a; padding: 18px; border-radius: 15px; margin-top:15px; border: 1px solid #222; }
        #txt-descuento-info { color: var(--danger); font-size: 12px; font-weight: 900; margin-bottom: 12px; display: none; text-align: center; }
        .badge-saldo { background: #222; color: #00ff00; padding: 4px 8px; border-radius: 6px; font-size: 11px; margin-left: 8px; border: 1px solid #004400; font-weight: bold; }

        .btn-whatsapp { background: var(--green); color: white; padding: 15px; border-radius: 12px; border: none; font-weight: bold; width: 100%; margin-top: 15px; display: none; text-align: center; text-decoration: none; }
    </style>
</head>
<body>

    <div class="header">
        <a href="zapatero.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        <h2 style="margin:0; font-size: 1rem; letter-spacing: 1px;">GESTIÓN TRABAJOS</h2>
        <i class="fas fa-sync-alt" onclick="location.reload()" style="color: var(--gold); font-size: 18px;"></i>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <i class="fas fa-search" style="color: var(--gold);"></i>
            <input type="text" id="inputBusqueda" onkeyup="filtrarTrabajos()" placeholder="Buscar cliente o número de orden...">
        </div>
    </div>

    <div class="orders-container" id="lista-trabajos">
        </div>

    <button class="fab" onclick="abrirModal()"><i class="fas fa-plus"></i></button>

    <div id="modal-orden">
        <h2 id="titulo-modal" style="color: var(--gold); margin-top: 0; font-size: 1.5rem;">Nueva Orden</h2>
        
        <label>CONTACTO DEL CLIENTE</label>
        <input type="tel" id="cli-celular" placeholder="Celular (ej: 098...)" onkeyup="verificarCliente(this.value)">
        <button id="btn-invitar" onclick="invitarCliente()">CLIENTE NO REGISTRADO - ¿CREAR AHORA?</button>

        <label>NOMBRE DEL CLIENTE</label>
        <input type="text" id="cli-nombre" placeholder="Nombre y Apellido">
        
        <div id="form-item-caja" style="background: #080808; border-radius: 12px; padding: 15px; border: 1px dashed #444;">
            <label>¿QUÉ ARTÍCULO RECIBES?</label>
            <div class="row-flex">
                <input type="number" id="item-cant" value="1" style="flex:0.4; text-align: center;">
                <input type="text" id="item-tipo" placeholder="Zapato, Bolso, etc..." style="flex:2;">
            </div>
            
            <label>DETALLES DEL TRABAJO</label>
            <div class="row-flex">
                <input type="text" id="item-desc-input" placeholder="Ej: Cambio suela vibram" style="flex:1; margin-bottom:0;">
                <div class="btn-mini-plus" onclick="acumularEnTexto()"><i class="fas fa-plus"></i></div>
            </div>
            <textarea id="item-detalles-final" style="min-height:70px; font-size: 13px;" placeholder="Los detalles aparecerán aquí..."></textarea>
            
            <div class="row-flex">
                <input type="number" id="item-precio" placeholder="Precio Unitario $" style="margin-bottom:0;">
                <button id="btn-bajar-item" onclick="bajarItem()" style="background:var(--gold); border:none; border-radius:10px; height:50px; width:70px; color:black; font-weight: 900;">
                    <i class="fas fa-arrow-down" id="icono-bajar"></i>
                </div>
            </div>
        </div>

        <div id="visor-items" style="margin-top:15px; background: #050505; border-radius: 12px;"></div>

        <div class="caja-totales">
            <div id="txt-descuento-info">REBAJA APLICADA: -$0</div>
            
            <label>PRECIO FINAL ACORDADO $</label>
            <input type="number" id="precio-total" value="0" oninput="calcularDiferencias()">
            
            <label>ABONO / PAGO INICIAL $</label>
            <input type="number" id="abono-inicial" value="0" oninput="calcularDiferencias()">

            <div style="margin-top: 15px; border-top: 1px solid #333; padding-top: 15px; color: #00ff00; font-weight: 900; display: flex; justify-content: space-between; font-size: 18px;">
                <span>SALDO:</span>
                <span id="txt-saldo-pendiente">$0.00</span>
            </div>
        </div>

        <a id="btn-enviar-wa" class="btn-whatsapp" target="_blank">
            <i class="fab fa-whatsapp"></i> ENVIAR TICKET AL CLIENTE
        </a>

        <div style="display: flex; gap: 12px; margin-top: 25px; padding-bottom: 30px;">
            <button onclick="cerrarModal()" style="flex:1; background:transparent; color:white; border:1px solid #444; padding:18px; border-radius:12px; font-weight: bold;">CANCELAR</button>
            <button id="btn-guardar-principal" onclick="guardarOrdenFinal()" style="flex:1; background:var(--gold); color:black; border:none; padding:18px; border-radius:12px; font-weight:900;">GUARDAR ORDEN</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentMaestroId = "";
        let itemsParaGuardar = [];
        let totalRealSuma = 0;
        let indiceEditando = -1;
        let idFirebaseActual = null;
        let trbIDActual = null;

        // SEGURIDAD: VERIFICAR SESIÓN
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                currentMaestroId = user.uid;
                cargarTrabajos();
            } else {
                const session = JSON.parse(localStorage.getItem('session_jadi'));
                if(session) {
                    currentMaestroId = session.uid;
                    cargarTrabajos();
                } else {
                    window.location.href = "../index.html";
                }
            }
        });

        function abrirModal() { 
            idFirebaseActual = null; trbIDActual = null;
            document.getElementById('titulo-modal').innerText = "Nueva Orden";
            document.getElementById('btn-guardar-principal').innerText = "GUARDAR ORDEN";
            document.getElementById('modal-orden').style.display = 'block'; 
            document.getElementById('btn-enviar-wa').style.display = 'none';
            itemsParaGuardar = []; totalRealSuma = 0;
            renderizarLista();
            document.getElementById('cli-celular').value = "";
            document.getElementById('cli-nombre').value = "";
            document.getElementById('precio-total').value = 0;
            document.getElementById('abono-inicial').value = 0;
            document.getElementById('txt-descuento-info').style.display = "none";
            limpiarCamposItem();
        }

        function cerrarModal() { document.getElementById('modal-orden').style.display = 'none'; }

        function bajarItem() {
            const cant = document.getElementById('item-cant').value;
            const tipo = document.getElementById('item-tipo').value;
            const detalles = document.getElementById('item-detalles-final').value;
            const precio = parseFloat(document.getElementById('item-precio').value) || 0;
            if(!tipo) return alert("Escribe qué artículo recibes");
            
            if(indiceEditando > -1) {
                itemsParaGuardar[indiceEditando] = { cant, tipo, detalles, precio };
                indiceEditando = -1;
            } else {
                itemsParaGuardar.push({ cant, tipo, detalles, precio });
            }
            renderizarLista();
            limpiarCamposItem();
        }

        function renderizarLista() {
            const visor = document.getElementById('visor-items');
            visor.innerHTML = "";
            totalRealSuma = 0;
            itemsParaGuardar.forEach((it, index) => {
                totalRealSuma += it.precio;
                visor.innerHTML += `
                    <div class="item-listado">
                        <div class="item-info">
                            <b style="color:var(--gold)">${it.cant} ${it.tipo}</b> - $${it.precio.toFixed(2)}
                            <div class="detalles-texto">${it.detalles}</div>
                        </div>
                        <button class="btn-eliminar-item" onclick="eliminarItem(${index})"><i class="fas fa-trash-alt"></i></button>
                    </div>`;
            });
            if(!idFirebaseActual) document.getElementById('precio-total').value = totalRealSuma;
            calcularDiferencias();
        }

        function calcularDiferencias() {
            const cobrado = parseFloat(document.getElementById('precio-total').value) || 0;
            const abono = parseFloat(document.getElementById('abono-inicial').value) || 0;
            const infoDesc = document.getElementById('txt-descuento-info');
            
            if(cobrado < totalRealSuma && totalRealSuma > 0){
                const diff = totalRealSuma - cobrado;
                infoDesc.innerHTML = `AHORRO PARA EL CLIENTE: -$${diff.toFixed(2)}`;
                infoDesc.style.display = "block";
            } else {
                infoDesc.style.display = "none";
            }

            const saldo = cobrado - abono;
            document.getElementById('txt-saldo-pendiente').innerText = "$" + (saldo < 0 ? 0 : saldo).toFixed(2);
        }

        async function guardarOrdenFinal() {
            if(itemsParaGuardar.length === 0) return alert("No has añadido ningún trabajo");
            const cobrado = parseFloat(document.getElementById('precio-total').value);
            const abono = parseFloat(document.getElementById('abono-inicial').value);
            const nombre = document.getElementById('cli-nombre').value;
            const telf = document.getElementById('cli-celular').value;

            if(!idFirebaseActual) {
                const snapT = await db.ref('contadores/TRB').once('value');
                let numT = (snapT.val() || 0) + 1;
                trbIDActual = 'TRB-' + numT.toString().padStart(5, '0');
                await db.ref('contadores/TRB').set(numT);
            }

            const data = {
                ordenID: trbIDActual,
                zapateroId: currentMaestroId,
                cliente: nombre,
                telefono: telf,
                items: itemsParaGuardar,
                subtotal: totalRealSuma,
                precioTotal: cobrado,
                abono: abono,
                saldo: (cobrado - abono),
                timestamp: Date.now(),
                estado: 'Recibido'
            };

            const ref = idFirebaseActual ? db.ref('trabajos/' + idFirebaseActual) : db.ref('trabajos').push();
            await ref.update(data);
            
            // PREPARAR WHATSAPP
            const msg = `👞 *J.A.D.I REPAIZ - TICKET DIGITAL*\n---------------------------\nHola ${nombre}, tu orden *${trbIDActual}* ha sido registrada.\n\n*Total:* $${cobrado.toFixed(2)}\n*Abono:* $${abono.toFixed(2)}\n*Saldo:* $${(cobrado-abono).toFixed(2)}\n\n¡Gracias por confiar en nosotros!`;
            const waUrl = `https://wa.me/593${telf.startsWith('0') ? telf.substring(1) : telf}?text=${encodeURIComponent(msg)}`;
            
            document.getElementById('btn-enviar-wa').href = waUrl;
            document.getElementById('btn-enviar-wa').style.display = 'block';
            document.getElementById('btn-guardar-principal').innerText = "ORDEN ACTUALIZADA";
            
            alert("Orden Guardada en Sistema.");
        }

        function verificarCliente(tel) {
            if(tel.length < 9) return;
            db.ref('clientes').orderByChild('telefono').equalTo(tel).once('value', snap => {
                const btn = document.getElementById('btn-invitar');
                if(snap.exists()){
                    const data = Object.values(snap.val())[0];
                    document.getElementById('cli-nombre').value = data.nombre;
                    btn.style.display = "none";
                } else { btn.style.display = "block"; }
            });
        }

        function invitarCliente() {
            const tel = document.getElementById('cli-celular').value;
            const nom = document.getElementById('cli-nombre').value;
            if(!nom) return alert("Escribe el nombre del cliente primero");
            db.ref('clientes').push({ 
                nombre: nom, 
                telefono: tel, 
                maestroId: currentMaestroId,
                trabajosRealizados: 0,
                timestamp: Date.now() 
            });
            document.getElementById('btn-invitar').style.display = "none";
            alert("Cliente registrado en tu cartera.");
        }

        function acumularEnTexto() {
            const i = document.getElementById('item-desc-input');
            const v = document.getElementById('item-detalles-final');
            if(!i.value) return;
            v.value += (v.value ? "\n" : "") + "• " + i.value;
            i.value = ""; i.focus();
        }

        function cargarTrabajos() {
            db.ref('trabajos').orderByChild('zapateroId').equalTo(currentMaestroId).on('value', snap => {
                const container = document.getElementById('lista-trabajos');
                container.innerHTML = "";
                if(!snap.exists()){
                    container.innerHTML = "<div style='text-align:center; padding:50px; color:#444;'>No tienes trabajos pendientes.</div>";
                    return;
                }
                snap.forEach(child => {
                    const o = child.val();
                    const key = child.key;
                    const saldoColor = o.saldo > 0 ? '#ffaa00' : '#00ff00';
                    container.innerHTML += `
                        <div class="order-card" onclick="cargarOrdenParaEditar('${key}')">
                            <div style="flex:1;">
                                <span class="status-pill status-recibido">${o.estado}</span>
                                <h3 style="color:var(--gold); margin:5px 0;">${o.cliente}</h3>
                                <div style="font-size:11px; color:#aaa;">ORDEN: ${o.ordenID}</div>
                                <div style="font-weight:bold; margin-top:8px; font-size:15px;">
                                    Total: $${o.precioTotal.toFixed(2)} 
                                    <span class="badge-saldo" style="color:${saldoColor}; border-color:${saldoColor}">Saldo: $${o.saldo.toFixed(2)}</span>
                                </div>
                            </div>
                            <i class="fas fa-chevron-right" style="color:#333;"></i>
                        </div>`;
                });
            });
        }

        async function cargarOrdenParaEditar(key) {
            const snap = await db.ref('trabajos/' + key).once('value');
            if(!snap.exists()) return;
            const o = snap.val();
            idFirebaseActual = key;
            trbIDActual = o.ordenID;
            document.getElementById('titulo-modal').innerText = "Editar " + trbIDActual;
            document.getElementById('cli-celular').value = o.telefono;
            document.getElementById('cli-nombre').value = o.cliente;
            document.getElementById('precio-total').value = o.precioTotal;
            document.getElementById('abono-inicial').value = o.abono;
            itemsParaGuardar = o.items || [];
            renderizarLista();
            document.getElementById('modal-orden').style.display = 'block';
            document.getElementById('btn-enviar-wa').style.display = 'none';
        }

        function limpiarCamposItem() {
            document.getElementById('item-cant').value = "1";
            document.getElementById('item-tipo').value = "";
            document.getElementById('item-detalles-final').value = "";
            document.getElementById('item-precio').value = "";
        }

        function filtrarTrabajos() {
            const bus = document.getElementById('inputBusqueda').value.toLowerCase();
            const cards = document.querySelectorAll('.order-card');
            cards.forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(bus) ? "flex" : "none";
            });
        }

        function eliminarItem(index) {
            if(confirm("¿Eliminar este artículo de la orden?")) { 
                itemsParaGuardar.splice(index, 1); 
                renderizarLista(); 
            }
        }
    </script>
</body>
</html>
