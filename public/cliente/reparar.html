<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Reparaciones - J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; --success: #00cc66; --danger: #ff4444; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; padding-bottom: 80px; }
        
        header { display: flex; align-items: center; gap: 15px; padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 20px; }
        .back-btn { color: var(--gold); text-decoration: none; font-size: 1.2rem; }

        .repa-box { background: var(--card); border-radius: 15px; padding: 20px; border: 1px dotted #444; margin-bottom: 20px; position: relative; cursor: pointer; transition: 0.3s; }
        .repa-box:active { transform: scale(0.98); }
        
        .item-row-main { display: flex; gap: 10px; margin-bottom: 10px; }
        .col-cant { flex: 0.5; }
        .col-tipo { flex: 1.5; }
        
        input, select, textarea { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; outline: none; font-size: 0.9rem; }
        input:focus, select:focus, textarea:focus { border-color: var(--gold); }

        .btn-add-circle { 
            position: absolute; bottom: -25px; right: 20px; background: var(--gold); 
            color: black; width: 50px; height: 50px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; border: 4px solid var(--dark); cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10;
        }

        .btn-send { background: var(--gold); color: black; border: none; width: 100%; padding: 15px; border-radius: 10px; cursor: pointer; margin-top: 40px; font-weight: bold; font-size: 1rem; text-transform: uppercase; }
        
        .invoice-item { background: #0a0a0a; padding: 12px; border-radius: 8px; margin-bottom: 8px; font-size: 0.85rem; display: flex; justify-content: space-between; border-left: 3px solid var(--gold); border: 1px solid #222; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 8px; background: #111; color: #666; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .tab.active { background: var(--gold); color: black; }

        .hidden { display: none; }

        /* Estilo para el contenedor del modal inyectado */
        #modal-trabajos-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; justify-content: center; 
            align-items: center; z-index: 9999; backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>

<header>
    <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <h2 style="margin:0; font-size: 1.1rem;">Gestión de Reparaciones</h2>
</header>

<div class="tabs">
    <div id="tab-nueva" class="tab active" onclick="switchTab('nueva')">NUEVA SOLICITUD</div>
    <div id="tab-seg" class="tab" onclick="switchTab('seguimiento')">SEGUIMIENTO</div>
</div>

<div id="sec-nueva" class="content-sec">
    <div class="repa-box" style="cursor: default;">
        <h3 style="color: var(--gold); margin-top:0; font-size: 0.9rem; margin-bottom: 15px;"><i class="fas fa-plus-circle"></i> Agregar Ítem de Reparación</h3>
        
        <div class="item-row-main">
            <div class="col-cant">
                <input type="number" id="cant" value="1" min="1">
            </div>
            <div class="col-tipo">
                <select id="tipo">
                    <option value="Zapatillas">Zapatillas</option>
                    <option value="Zapatos">Zapatos</option>
                    <option value="Mochila">Mochila</option>
                    <option value="Chompa">Chompa</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>
        </div>
        
        <textarea id="detalle" placeholder="¿Qué necesita el calzado? (Ej: Cambio de suelas, costura...)" rows="3"></textarea>
        
        <div class="btn-add-circle" onclick="agregarAlCarrito()"><i class="fas fa-plus"></i></div>
    </div>

    <div class="invoice-list" id="lista-previa"></div>
    <button id="btn-finalizar" class="btn-send hidden" onclick="enviarSolicitud()">LANZAR PEDIDO A RED JADI</button>
</div>

<div id="sec-seg" class="content-sec hidden">
    <div id="lista-seguimiento"></div>
</div>

<div id="modal-trabajos-container"></div>

<script>
    // Configuración Base
    const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const session = JSON.parse(localStorage.getItem('session_jadi'));
    if(!session) window.location.href = "index.html";

    let carritoReparaciones = [];

    function switchTab(t) {
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.content-sec').forEach(el => el.classList.add('hidden'));
        if(t === 'nueva') {
            document.getElementById('tab-nueva').classList.add('active');
            document.getElementById('sec-nueva').classList.remove('hidden');
        } else {
            document.getElementById('tab-seg').classList.add('active');
            document.getElementById('sec-seg').classList.remove('hidden');
            cargarSeguimiento();
        }
    }

    function agregarAlCarrito() {
        const cant = document.getElementById('cant').value;
        const tipo = document.getElementById('tipo').value;
        const desc = document.getElementById('detalle').value;

        if(!desc) return alert("Escribe el detalle del trabajo");

        // Estructura compatible con el modal_trabajos.js
        const item = { 
            cant: parseInt(cant), 
            detalle: `${tipo.toUpperCase()}: ${desc}`, 
            precio: 0 
        };
        
        carritoReparaciones.push(item);

        document.getElementById('lista-previa').innerHTML += `
            <div class="invoice-item">
                <span><b>${cant}</b> | ${tipo} - <small>${desc}</small></span>
                <i class="fas fa-check-circle" style="color:var(--gold)"></i>
            </div>`;
        
        document.getElementById('detalle').value = "";
        document.getElementById('btn-finalizar').classList.remove('hidden');
    }

    function enviarSolicitud() {
        if(carritoReparaciones.length === 0) return;
        
        const ordenId = db.ref('ordenes').push().key;
        
        // Guardamos directamente como una 'orden' inicial para que el zapatero la gestione
        const nuevaOrden = {
            id: ordenId,
            fecha: new Date().toLocaleDateString(),
            status: 'Pendiente',
            cliente: {
                uid: session.uid,
                nombre: session.nombre,
                telefono: session.telefono || "Sin registrar"
            },
            trabajos: carritoReparaciones,
            totales: { cobrado: 0, abono: 0, saldo: 0 }
        };

        db.ref('ordenes/' + ordenId).set(nuevaOrden).then(() => {
            // También indexamos en el perfil del usuario para búsqueda rápida
            db.ref(`usuarios/${session.uid}/mis_ordenes/${ordenId}`).set(true);
            
            alert("¡Pedido enviado con éxito!");
            carritoReparaciones = [];
            document.getElementById('lista-previa').innerHTML = "";
            switchTab('seguimiento');
        });
    }

    function cargarSeguimiento() {
        // Buscamos órdenes donde el UID del cliente coincida
        db.ref('ordenes').orderByChild('cliente/uid').equalTo(session.uid).on('value', snap => {
            const container = document.getElementById('lista-seguimiento');
            container.innerHTML = "";
            
            if(!snap.exists()) {
                container.innerHTML = "<p style='text-align:center; color:#444; margin-top:50px;'>No tienes órdenes registradas.</p>";
                return;
            }

            snap.forEach(child => {
                const s = child.val();
                const id = child.key;
                
                // Estilos por estado
                let borderCol = "var(--gold)";
                if(s.status === 'En Proceso') borderCol = "#2196F3";
                if(s.status === 'Terminado') borderCol = "var(--success)";

                container.innerHTML += `
                    <div class="repa-box" style="border-style:solid; border-left:6px solid ${borderCol};" onclick="verOrdenPremium('${id}')">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <b style="font-size:0.8rem;">ORDEN #${id.substring(1, 6).toUpperCase()}</b>
                            <span style="font-size:9px; background:#222; padding:4px 8px; border-radius:5px; color:${borderCol}; border: 1px solid ${borderCol}">${s.status}</span>
                        </div>
                        <p style="font-size:12px; color:#aaa; margin: 12px 0;">${s.trabajos[0].detalle.substring(0, 40)}...</p>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:10px; color:#555;"><i class="far fa-calendar-alt"></i> ${s.fecha}</span>
                            <b style="color:var(--gold);">$${s.totales.cobrado.toFixed(2)}</b>
                        </div>
                    </div>`;
            });
        });
    }

    // --- CONEXIÓN CON MODAL_TRABAJOS.JS ---
    function verOrdenPremium(id) {
        db.ref(`ordenes/${id}`).once('value', snap => {
            if(snap.exists()) {
                // Esta función vive en modal_trabajos.js
                abrirModalOrden('editar', snap.val());
            }
        });
    }

</script>

<script src="../js/modal_trabajos.js"></script>

</body>
</html>
