<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - CONTROL FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        h2 { color: #fbc02d; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #111; }
        th { background: #222; color: #fbc02d; padding: 12px; text-align: left; border: 1px solid #333; }
        td { padding: 12px; border: 1px solid #333; font-size: 0.9rem; }
        .btn-borrar { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        #estado { text-align: center; color: #888; margin-top: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h2>BASE DE DATOS J.A.D.I</h2>
    <div id="estado">Conectando...</div>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Rol</th>
                <th>Empresa</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="tabla-cuerpo">
            </tbody>
    </table>

<script>
    // Configuración DIRECTA
    const config = {
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com"
    };
    
    if (!firebase.apps.length) { firebase.initializeApp(config); }
    const db = firebase.database();

    // Función de carga inmediata
    db.ref('usuarios').on('value', (snap) => {
        const cuerpo = document.getElementById('tabla-cuerpo');
        const estado = document.getElementById('estado');
        cuerpo.innerHTML = "";
        
        if (snap.exists()) {
            estado.innerText = "✅ Datos recibidos correctamente";
            snap.forEach((child) => {
                const u = child.val();
                const id = child.key;
                cuerpo.innerHTML += `
                    <tr>
                        <td style="font-weight:bold; color:#fbc02d;">${u.nombre || 'N/A'}</td>
                        <td>${u.telefono || id}</td>
                        <td>${u.rolCodigo || 'N/A'}</td>
                        <td>${u.empresaNombre || 'N/A'}</td>
                        <td><button class="btn-borrar" onclick="eliminar('${id}')">Borrar</button></td>
                    </tr>
                `;
            });
        } else {
            estado.innerText = "❌ No hay datos en la carpeta 'usuarios'";
            cuerpo.innerHTML = "<tr><td colspan='5' style='text-align:center;'>Carpeta vacía</td></tr>";
        }
    }, (error) => {
        estado.innerText = "🚫 Error de Firebase: " + error.message;
    });

    function eliminar(id) {
        if(confirm("¿Borrar a " + id + "?")) {
            db.ref('usuarios/' + id).remove();
        }
    }
</script>
</body>
</html>
