<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JADI MULTI-TASK - MASTER</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; --text: #eee; --danger: #d32f2f; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; padding-bottom: 100px; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 25px; }

        /* Pilares Principales */
        .main-pillars { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 30px; }
        .pillar-card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #222; text-align: center; cursor: pointer; transition: 0.3s; }
        .pillar-card:hover { border-color: var(--gold); transform: translateY(-3px); background: #1a1a1a; }
        .pillar-card i { font-size: 1.5rem; margin-bottom: 8px; display: block; }
        .pillar-card h3 { margin: 5px 0; font-size: 0.7rem; color: var(--gold); text-transform: uppercase; }
        .pillar-card span { font-size: 1.3rem; font-weight: bold; }

        /* MÓDULOS DINÁMICOS */
        .support-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 40px; }
        .support-btn { background: #111; border: 1px solid #333; color: #aaa; padding: 10px 18px; border-radius: 8px; text-decoration: none; font-size: 0.8rem; transition: 0.2s; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .support-btn:hover { background: var(--gold); color: #000; border-color: var(--gold); }
        .btn-add-mod { border: 1px dashed var(--gold); color: var(--gold); background: rgba(251, 192, 45, 0.05); }

        /* TABLA DE GESTIÓN */
        .user-section { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; margin-top: 20px; }
        .user-section h2 { color: var(--gold); font-size: 1rem; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { text-align: left; color: var(--gold); padding: 12px; border-bottom: 2px solid #222; font-size: 0.7rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 0.8rem; color: #ccc; }
        
        .role-badge { padding: 3px 7px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; }
        .bg-adm { background: var(--danger); }
        .bg-zpt { background: #1976d2; }
        .bg-cln { background: #388e3c; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #111; margin: 10% auto; padding: 20px; border: 1px solid var(--gold); width: 80%; max-width: 500px; border-radius: 15px; }
        .mod-item-select { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .mod-item-select:hover { background: #222; color: var(--gold); }

        /* Barra Flotante */
        .quick-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(10,10,10,0.9); padding: 12px 25px; border-radius: 50px; border: 1px solid var(--gold); display: flex; gap: 20px; backdrop-filter: blur(10px); z-index: 1000; }
        .nav-item { color: #fff; font-size: 1.1rem; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <h2 style="color:var(--gold); margin:0; font-size: 1.2rem;">JADI MULTI-TASK <small style="font-size: 0.6rem; color:#666;">v2.0</small></h2>
    <div id="admin-name" style="font-size: 0.8rem; font-weight: bold;"></div>
</header>

<div class="main-pillars">
    <div class="pillar-card" onclick="window.open('cliente.html')"><i class="fas fa-users" style="color:#2196f3;"></i><h3>CLIENTES</h3><span id="c-cln">0</span></div>
    <div class="pillar-card" onclick="window.open('zapatero.html')"><i class="fas fa-hammer" style="color:#fbc02d;"></i><h3>ZAPATEROS</h3><span id="c-zpt">0</span></div>
    <div class="pillar-card" onclick="window.open('tienda.html')"><i class="fas fa-store" style="color:#e91e63;"></i><h3>TIENDAS</h3><span id="c-shp">0</span></div>
    <div class="pillar-card" onclick="window.open('delivery.html')"><i class="fas fa-motorcycle" style="color:#ff9800;"></i><h3>DELIVERY</h3><span id="c-dlv">0</span></div>
    <div class="pillar-card" onclick="window.open('proveedor.html')"><i class="fas fa-truck-loading" style="color:#4caf50;"></i><h3>PROVEEDORES</h3><span id="c-prv">0</span></div>
</div>

<p style="color:#555; font-size:0.7rem; font-weight:bold; text-transform:uppercase; letter-spacing: 1px;">Módulos de Apoyo Activos</p>
<div class="support-grid" id="grid-modulos-dinamicos">
    </div>

<div class="user-section">
    <h2><i class="fas fa-users-cog"></i> GESTIÓN MASTER DE USUARIOS</h2>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>ID / UID</th>
                    <th>Rol</th>
                    <th>Usuario</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="user-list"></tbody>
        </table>
    </div>
</div>

<div id="modal-modulos" class="modal">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="color:var(--gold); margin:0;">Añadir Módulo al Panel</h3>
            <i class="fas fa-times" onclick="cerrarModal()" style="cursor:pointer;"></i>
        </div>
        <div id="lista-disponibles">
            </div>
        <hr style="border:0; border-top: 1px solid #333; margin: 15px 0;">
        <button onclick="registrarNuevoModuloEnDB()" style="width:100%; padding:10px; background:none; border:1px dashed #555; color:#888; border-radius:8px; cursor:pointer;">
            + Registrar nuevo archivo .html en DB
        </button>
    </div>
</div>

<div class="quick-nav">
    <a href="mensajeris.html" class="nav-item"><i class="fab fa-whatsapp"></i></a>
    <a href="inventario.html" class="nav-item"><i class="fas fa-boxes"></i></a>
    <a href="trabajos.html" class="nav-item"><i class="fas fa-list-ul"></i></a>
    <a href="chat.html" class="nav-item"><i class="fas fa-comments"></i></a>
    <button onclick="abrirModal()" style="background:none; border:none; color:var(--gold); font-size:1.2rem; cursor:pointer;"><i class="fas fa-plus-circle"></i></button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const session = JSON.parse(localStorage.getItem('session_jadi'));
    if(!session || session.rolCodigo !== 'ADM') window.location.href = "index.html";
    document.getElementById('admin-name').innerText = "MAESTRO: " + (session.nombre || "Admin").toUpperCase();

    // --- LÓGICA DE MÓDULOS DINÁMICOS ---

    function cargarModulosDinamicos() {
        const adminID = session.uid || "admin_general";
        // 1. Cargamos los que ya tienes elegidos en tu panel
        db.ref(`config_panel/${adminID}/mis_accesos`).on('value', snap => {
            const grid = document.getElementById('grid-modulos-dinamicos');
            grid.innerHTML = "";
            
            snap.forEach(child => {
                const m = child.val();
                grid.innerHTML += `
                    <a href="${m.url}" target="_blank" class="support-btn">
                        <i class="fas ${m.icono}"></i> ${m.nombre}
                    </a>
                `;
            });

            // Botón de acceso rápido para añadir
            grid.innerHTML += `
                <div class="support-btn btn-add-mod" onclick="abrirModal()">
                    <i class="fas fa-plus"></i> Gestionar Módulos
                </div>
            `;
        });
    }

    function abrirModal() {
        document.getElementById('modal-modulos').style.display = 'block';
        // Cargamos la lista de todos los módulos que has "creado" en la base de datos
        db.ref('modulos_disponibles').once('value', snap => {
            const lista = document.getElementById('lista-disponibles');
            lista.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                lista.innerHTML += `
                    <div class="mod-item-select" onclick="activarModuloEnMiPanel('${child.key}')">
                        <i class="fas ${m.icono}" style="color:var(--gold)"></i>
                        <div style="flex:1">
                            <div style="font-size:14px">${m.nombre}</div>
                            <small style="color:#555; font-size:10px">${m.url}</small>
                        </div>
                        <i class="fas fa-chevron-right" style="font-size:10px; color:#333"></i>
                    </div>
                `;
            });
        });
    }

    async function activarModuloEnMiPanel(key) {
        const adminID = session.uid || "admin_general";
        const snap = await db.ref('modulos_disponibles/' + key).once('value');
        await db.ref(`config_panel/${adminID}/mis_accesos`).push(snap.val());
        cerrarModal();
    }

    // Esta función es para cuando creas un .html nuevo y quieres que el sistema lo conozca
    async function registrarNuevoModuloEnDB() {
        const nombre = prompt("Nombre del módulo (Ej: Ventas Zapatería):");
        const url = prompt("Nombre del archivo .html (Ej: ventas.html):");
        const icono = prompt("Icono de FontAwesome (Ej: fa-tag):", "fa-cube");

        if(nombre && url) {
            await db.ref('modulos_disponibles').push({
                nombre: nombre,
                url: url,
                icono: icono
            });
            alert("Módulo registrado en la base de datos maestra.");
            abrirModal();
        }
    }

    function cerrarModal() { document.getElementById('modal-modulos').style.display = 'none'; }

    // --- LÓGICA DE USUARIOS ---

    function cargarUsuarios() {
        db.ref('usuarios').on('value', snap => {
            let z=0, c=0, s=0, d=0, p=0;
            const tbody = document.getElementById('user-list');
            tbody.innerHTML = "";

            snap.forEach(child => {
                const u = child.val();
                if(u.rolCodigo === 'ZPT') z++;
                if(u.rolCodigo === 'CLN') c++;
                if(u.rolCodigo === 'SHP') s++;
                if(u.rolCodigo === 'DLV') d++;
                if(u.rolCodigo === 'PRV') p++;

                const roleClass = u.rolCodigo === 'ADM' ? 'bg-adm' : (u.rolCodigo === 'ZPT' ? 'bg-zpt' : 'bg-cln');
                tbody.innerHTML += `
                    <tr>
                        <td><b>${u.nombre || '---'}</b></td>
                        <td>${u.telefono || '---'}</td>
                        <td><small>${child.key.substring(0,8)}...</small></td>
                        <td><span class="role-badge ${roleClass}">${u.rolCodigo || 'CLN'}</span></td>
                        <td>${u.correo || u.usuario || '---'}</td>
                        <td>
                            <button onclick="editarRol('${child.key}')" style="background:#222; color:var(--gold); border:1px solid #444; padding:5px; border-radius:5px; cursor:pointer;"><i class="fas fa-user-edit"></i></button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('c-zpt').innerText = z;
            document.getElementById('c-cln').innerText = c;
            document.getElementById('c-shp').innerText = s;
            document.getElementById('c-dlv').innerText = d;
            document.getElementById('c-prv').innerText = p;
        });
    }

    async function editarRol(uid) {
        const nuevoRol = prompt("Cambiar rol (ADM, ZPT, CLN, SHP, DLV, PRV):");
        if(nuevoRol) {
            await db.ref('usuarios/' + uid).update({ rolCodigo: nuevoRol.toUpperCase() });
        }
    }

    // Inicio de la app
    cargarUsuarios();
    cargarModulosDinamicos();
</script>
</body>
</html>
