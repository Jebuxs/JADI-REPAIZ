<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Zapatero - JADI REPAIZ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; --text: #eee; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; padding-bottom: 100px; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 25px; }

        /* Pilares de Producción */
        .main-pillars { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .pillar-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; cursor: pointer; transition: 0.3s; }
        .pillar-card:hover { border-color: var(--gold); transform: translateY(-5px); background: #1a1a1a; }
        .pillar-card i { font-size: 1.8rem; margin-bottom: 10px; display: block; }
        .pillar-card h3 { margin: 5px 0; font-size: 0.8rem; color: var(--gold); text-transform: uppercase; }
        .pillar-card span { font-size: 1.5rem; font-weight: bold; }

        /* Acciones Rápidas */
        .support-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 40px; }
        .support-btn { background: #111; border: 1px solid #333; color: #aaa; padding: 12px 25px; border-radius: 10px; text-decoration: none; font-size: 0.9rem; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .support-btn:hover { background: var(--gold); color: #000; border-color: var(--gold); font-weight: bold; }

        /* Lista de Trabajos Recientes */
        .work-section { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; }
        .work-section h2 { color: var(--gold); font-size: 1.1rem; margin-top: 0; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        .work-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .work-item:last-child { border-bottom: none; }
        .status-badge { padding: 4px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .bg-pend { background: #ff9800; color: white; }
        .bg-proc { background: #2196f3; color: white; }
        .bg-done { background: #4caf50; color: white; }

        /* Barra de Navegación Inferior */
        .quick-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(15,15,15,0.95); padding: 12px 30px; border-radius: 50px; border: 1px solid var(--gold); display: flex; gap: 25px; backdrop-filter: blur(10px); z-index: 1000; }
        .nav-item { color: #fff; font-size: 1.3rem; transition: 0.3s; text-decoration: none; border: none; background: none; cursor: pointer; }
        .nav-item:hover { color: var(--gold); transform: scale(1.2); }
    </style>
</head>
<body>

<header>
    <div>
        <h2 style="color:var(--gold); margin:0; font-size: 1.2rem;">TALLER JADI</h2>
        <small id="zpt-name" style="color: #666;">Cargando perfil...</small>
    </div>
    <button onclick="cerrarSesion()" style="background:none; border:1px solid #333; color:#555; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:0.7rem;">SALIR</button>
</header>

<div class="main-pillars">
    <div class="pillar-card">
        <i class="fas fa-hammer" style="color:var(--gold);"></i>
        <h3>PENDIENTES</h3><span id="c-pend">0</span>
    </div>
    <div class="pillar-card">
        <i class="fas fa-spinner fa-spin" style="color:#2196f3;"></i>
        <h3>EN PROCESO</h3><span id="c-proc">0</span>
    </div>
    <div class="pillar-card">
        <i class="fas fa-check-double" style="color:#4caf50;"></i>
        <h3>LISTOS HOY</h3><span id="c-done">0</span>
    </div>
</div>

<p style="color:#555; font-size:0.75rem; font-weight:bold; text-transform:uppercase;">Herramientas de Trabajo</p>
<div class="support-grid">
    <a href="orden-trabajo.html" class="support-btn"><i class="fas fa-plus-circle"></i> Nueva Orden</a>
    <a href="inventario.html" class="support-btn"><i class="fas fa-boxes"></i> Ver Materiales</a>
    <a href="../chat.html" class="support-btn"><i class="fas fa-comments"></i> Chat Admin</a>
</div>

<div class="work-section">
    <h2><i class="fas fa-tasks"></i> ÚLTIMOS TRABAJOS ASIGNADOS</h2>
    <div id="lista-trabajos">
        <p style="text-align:center; color:#444; padding:20px;">No hay trabajos asignados recientemente.</p>
    </div>
</div>

<div class="quick-nav">
    <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i></a>
    <a href="orden-trabajo.html" class="nav-item"><i class="fas fa-plus-square"></i></a>
    <a href="inventario.html" class="nav-item"><i class="fas fa-box"></i></a>
    <button onclick="cerrarSesion()" class="nav-item"><i class="fas fa-sign-out-alt"></i></button>
</div>

<script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    // SEGURIDAD DE ENTRADA
    async function validarAcceso() {
        const session = JSON.parse(localStorage.getItem('session_jadi'));
        
        // 1. ¿Existe sesión local?
        if(!session) {
            window.location.href = "../login.html";
            return;
        }

        // 2. ¿Sigue existiendo el usuario y tiene el rol?
        const snap = await db.ref('usuarios/' + session.uid).once('value');
        if(!snap.exists()) {
            cerrarSesion();
            return;
        }

        const u = snap.val();
        // Permitimos ZPT y ADM (para que tú puedas entrar a supervisar)
        if(u.rolCodigo !== 'ZPT' && u.rolCodigo !== 'ADM') {
            window.location.href = "../login.html";
            return;
        }

        document.getElementById('zpt-name').innerText = "ZAPATERO: " + u.nombre.toUpperCase();
        cargarDatosDashboard();
    }

    function cargarDatosDashboard() {
        // Aquí conectaremos con la carpeta 'trabajos' en el futuro
        // Por ahora inicializamos contadores en 0
        console.log("Dashboard cargado para producción.");
    }

    function cerrarSesion() {
        auth.signOut();
        localStorage.removeItem('session_jadi');
        window.location.href = "../login.html";
    }

    validarAcceso();
</script>
</body>
</html>
