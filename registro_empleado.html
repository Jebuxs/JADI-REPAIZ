<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unirse a Empresa - J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --input-bg: #111; }
        body { font-family: sans-serif; background: var(--dark); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 350px; text-align: center; }
        .input-field { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #333; background: var(--input-bg); color: white; box-sizing: border-box; }
        .btn-gold { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .info-box { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold)">Registro de Empleado</h2>
    <div class="info-box">
        <p style="margin:0; font-size: 0.8rem;">Pide al dueño el <b>ID de Empresa</b> (Ej: JD-CCC-001) para poder registrarte.</p>
    </div>

    <input type="text" id="emp-id" class="input-field" placeholder="ID de Empresa (JD-...)">
    <hr style="border: 0.5px solid #222; margin: 20px 0;">
    
    <input type="text" id="emp-nombre" class="input-field" placeholder="Tu Nombre Completo">
    <input type="tel" id="emp-tel" class="input-field" placeholder="Tu Celular (Será tu ID)">
    <input type="password" id="emp-pass" class="input-field" placeholder="Crea tu Contraseña">
    
    <button class="btn-gold" onclick="unirseAEmpresa()">Unirse a la Empresa</button>
    <p onclick="location.href='index.html'" style="color:#555; cursor:pointer; margin-top:20px;">Ya tengo cuenta, entrar</p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function unirseAEmpresa() {
        const idEmpresa = document.getElementById('emp-id').value.trim().toUpperCase();
        const nombre = document.getElementById('emp-nombre').value.trim();
        const tel = document.getElementById('emp-tel').value.replace(/\D/g,'');
        const pass = document.getElementById('emp-pass').value;

        if(!idEmpresa || !nombre || !tel || !pass) return alert("Completa todos los campos");

        // 1. Verificar si la empresa existe
        const snapEmpresa = await db.ref('Ecosistema_JADI/Config_Empresas/' + idEmpresa).once('value');
        
        if (!snapEmpresa.exists()) {
            return alert("El ID de Empresa no existe. Verifica con tu jefe.");
        }

        const datosEmp = snapEmpresa.val();

        // 2. Crear el perfil de EMPLEADO
        const userObj = {
            nombre: nombre,
            telefono: tel,
            rolCodigo: 'EMP', // Rol fijo de Empleado
            uid: 'EMP-' + tel.substring(6), // ID corto basado en tel
            pass: pass,
            empresaID: idEmpresa,
            nombreEmpresa: datosEmp.datos.nombre,
            sucursalID: "matriz_01", // Por defecto a la matriz
            fecha_ingreso: new Date().toLocaleDateString(),
            permisos: {
                ventas: false, // El dueño debe activarlos manualmente
                bodega: false,
                creditos: false
            }
        };

        try {
            await db.ref('usuarios/' + tel).set(userObj);
            alert("¡Registrado! Ahora espera a que tu jefe active tus permisos.");
            localStorage.setItem('session_jadi', JSON.stringify(userObj));
            window.location.href = 'proveedor.html'; 
        } catch (e) {
            alert("Error al registrarte: " + e.message);
        }
    }
</script>
</body>
</html>
