<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - JADI REPAIZ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; --text: #eee; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; padding-bottom: 100px; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 25px; }

        /* Pilares de Estadísticas */
        .main-pillars { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 25px; }
        .pillar-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #222; text-align: center; }
        .pillar-card i { font-size: 1.2rem; margin-bottom: 8px; display: block; color: var(--gold); }
        .pillar-card h3 { margin: 5px 0; font-size: 0.6rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .pillar-card span { font-size: 1.1rem; font-weight: bold; color: #fff; }

        /* REJILLA DE MÓDULOS (HERRAMIENTAS) */
        .admin-tools-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 15px; 
            margin-bottom: 30px; 
        }
        .tool-card { 
            background: var(--card); 
            border: 1px solid #222; 
            padding: 20px 10px; 
            border-radius: 15px; 
            text-align: center; 
            text-decoration: none; 
            color: #fff; 
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .tool-card i { font-size: 1.8rem; color: var(--gold); }
        .tool-card span { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .tool-card:hover { 
            border-color: var(--gold); 
            background: #1a1a1a; 
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(251, 192, 45, 0.1);
        }
        .tool-card.active-module { border: 1px dashed var(--gold); }

        /* Secciones de Control */
        .admin-section { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; margin-bottom: 25px; }
        .admin-section h2 { color: var(--gold); font-size: 0.9rem; margin-top: 0; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #222; padding-bottom: 10px; text-transform: uppercase; }

        /* Tabla de Usuarios */
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { text-align: left; color: #555; padding: 12px; border-bottom: 1px solid #333; }
        td { padding: 12px; border-bottom: 1px solid #222; }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; }
        .badge-adm { background: rgba(251, 192, 45, 0.2); color: var(--gold); }
        .badge-user { background: #222; color: #888; }

        /* Explorador GitHub */
        #github-explorer { display: none; }
        .file-row { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #222; font-size: 0.8rem; text-decoration: none; color: #888; }
        .file-row:hover { background: #161b22; color: var(--gold); }

        /* Barra de Navegación Rápida */
        .quick-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 12px 25px; border-radius: 50px; border: 1px solid var(--gold); display: flex; gap: 20px; backdrop-filter: blur(10px); z-index: 1000; }
        .nav-item { color: #fff; font-size: 1.1rem; text-decoration: none; opacity: 0.5; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { opacity: 1; color: var(--gold); }
    </style>
</head>
<body>

<header>
    <div>
        <h2 style="color:var(--gold); margin:0; font-size: 1.1rem; letter-spacing: 1px;">J.A.D.I. MASTER</h2>
        <small id="admin-name" style="color: #666; font-weight: bold;">Cargando Privilegios...</small>
    </div>
    <button onclick="cerrarSesion()" style="background:none; border:1px solid #333; color:#777; padding:5px 12px; border-radius:8px; cursor:pointer; font-size: 0.7rem;">CERRAR SISTEMA</button>
</header>

<div class="main-pillars">
    <div class="pillar-card"><i class="fas fa-hammer"></i><h3>Zapateros</h3><span id="count-zpt">0</span></div>
    <div class="pillar-card"><i class="fas fa-users"></i><h3>Clientes</h3><span id="count-cln">0</span></div>
    <div class="pillar-card"><i class="fas fa-store"></i><h3>Tiendas</h3><span id="count-shp">0</span></div>
    <div class="pillar-card"><i class="fas fa-truck"></i><h3>Delivery</h3><span id="count-dlv">0</span></div>
    <div class="pillar-card"><i class="fas fa-box-open"></i><h3>Prov</h3><span id="count-prv">0</span></div>
</div>

<div class="admin-tools-grid">
    <a href="publicidad.html" class="tool-card">
        <i class="fas fa-bullhorn"></i>
        <span>Publicidad</span>
    </a>
    <a href="modulos.html" class="tool-card active-module">
        <i class="fas fa-cubes"></i>
        <span>Módulos</span>
    </a>
    <a href="datos.html" class="tool-card">
        <i class="fas fa-database"></i>
        <span>Datos (BD)</span>
    </a>
    <a href="finanzas.html" class="tool-card">
        <i class="fas fa-file-invoice-dollar"></i>
        <span>Finanzas</span>
    </a>
    <a href="auditoria.html" class="tool-card">
        <i class="fas fa-history"></i>
        <span>Auditoría</span>
    </a>
    <a href="soporte.html" class="tool-card">
        <i class="fas fa-headset"></i>
        <span>Soporte</span>
    </a>
</div>

<div class="admin-section">
    <h2><i class="fas fa-users-cog"></i> Últimos Accesos</h2>
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>USUARIO</th>
                    <th>ROL</th>
                    <th>TELÉFONO</th>
                    <th>ESTADO</th>
                </tr>
            </thead>
            <tbody id="tabla-usuarios-body"></tbody>
        </table>
    </div>
</div>

<div class="admin-section" id="github-explorer">
    <h2><i class="fab fa-github"></i> Estructura Root</h2>
    <div id="archivos-dinamicos"></div>
</div>

<div class="quick-nav">
    <a href="dashboard.html" class="nav-item active"><i class="fas fa-home"></i></a>
    <a href="modulos.html" class="nav-item"><i class="fas fa-th-large"></i></a>
    <a href="../index.html" class="nav-item"><i class="fas fa-external-link-alt"></i></a>
    <a href="config.html" class="nav-item"><i class="fas fa-cog"></i></a>
</div>

<script>
    const SUPER_ADMIN_UID = "ADM000000001";
    
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    async function iniciarConsola() {
        const session = JSON.parse(localStorage.getItem('session_jadi'));
        if(!session || session.rolCodigo !== 'ADM') {
            window.location.href = "../login.html";
            return;
        }

        db.ref('usuarios/' + session.uid).on('value', snap => {
            if(!snap.exists()){ cerrarSesion(); return; }
            const u = snap.val();
            document.getElementById('admin-name').innerText = "MAESTRO: " + u.nombre.toUpperCase();
            
            if(u.uid === SUPER_ADMIN_UID) {
                document.getElementById('github-explorer').style.display = 'block';
                cargarExplorador();
            }
        });

        cargarMetricas();
        cargarTabla();
    }

    function cargarMetricas() {
        db.ref('usuarios').on('value', snap => {
            let counts = { ZPT:0, CLN:0, SHP:0, DLV:0, PRV:0 };
            snap.forEach(child => {
                const u = child.val();
                if(counts[u.rolCodigo] !== undefined) counts[u.rolCodigo]++;
            });
            for(let key in counts) {
                const el = document.getElementById('count-' + key.toLowerCase());
                if(el) el.innerText = counts[key];
            }
        });
    }

    function cargarTabla() {
        db.ref('usuarios').limitToLast(8).on('value', snap => {
            const tbody = document.getElementById('tabla-usuarios-body');
            tbody.innerHTML = "";
            snap.forEach(child => {
                const u = child.val();
                tbody.innerHTML += `
                    <tr>
                        <td>
                            <div style="color:white; font-weight:bold;">${u.nombre}</div>
                            <div style="font-size:0.6rem; color:#555;">${u.uid}</div>
                        </td>
                        <td><span class="badge ${u.rolCodigo==='ADM'?'badge-adm':'badge-user'}">${u.rolCodigo}</span></td>
                        <td style="color:#888;">${u.telefono || 'S/N'}</td>
                        <td><i class="fas fa-circle" style="color:#2ecc71; font-size:0.5rem;"></i></td>
                    </tr>
                `;
            });
        });
    }

    function cargarExplorador() {
        db.ref('modulos_disponibles').on('value', snap => {
            const container = document.getElementById('archivos-dinamicos');
            container.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                container.innerHTML += `
                    <a href="../${m.url}" class="file-row">
                        <i class="far fa-file-alt" style="margin-right:10px;"></i>
                        <span>${m.url}</span>
                    </a>
                `;
            });
        });
    }

    function cerrarSesion() {
        auth.signOut();
        localStorage.removeItem('session_jadi');
        window.location.href = "../login.html";
    }

    iniciarConsola();
</script>
</body>
</html>
