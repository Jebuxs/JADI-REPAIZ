<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Global - J.A.D.I</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #FFD700; --dark: #000; --card: #111; --low-stock: #ff4d4d; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 20px; }
        
        .header { padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; background: #050505; position: sticky; top:0; z-index: 100; }
        .btn-back { color: var(--gold); text-decoration: none; font-size: 1.2rem; margin-right: 15px; }

        .container { padding: 20px; max-width: 600px; margin: auto; }

        /* Buscador */
        .search-box { background: #1a1a1a; padding: 12px; border-radius: 12px; display: flex; align-items: center; margin-bottom: 20px; border: 1px solid #333; }
        .search-box input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }

        /* Categorías */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab { padding: 8px 18px; background: #1a1a1a; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; border: 1px solid #333; }
        .tab.active { background: var(--gold); color: black; border-color: var(--gold); }

        /* Tarjetas de Producto */
        .inventory-list { display: grid; gap: 12px; }
        .item-card { background: var(--card); border-radius: 15px; padding: 15px; display: flex; align-items: center; border: 1px solid #222; }
        .item-img { width: 50px; height: 50px; background: #222; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--gold); }
        .item-info { flex: 1; margin-left: 15px; }
        .item-info h4 { margin: 0; font-size: 14px; }
        .item-info p { margin: 2px 0; font-size: 11px; color: #666; }
        
        .stock-badge { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .stock-ok { background: #1b3320; color: #4dff88; }
        .stock-low { background: #331b1b; color: #ff4d4d; }

        /* Botón Flotante para Pedidos */
        .btn-order { position: fixed; bottom: 20px; right: 20px; background: var(--gold); color: black; padding: 15px 25px; border-radius: 30px; font-weight: bold; text-decoration: none; box-shadow: 0 5px 15px rgba(255,215,0,0.3); display: flex; align-items: center; gap: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <a href="zapatero.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        <h2 style="margin:0; font-size: 1.1rem;">Inventario & Suministros</h2>
    </div>

    <div class="container">
        
        <div class="search-box">
            <i class="fas fa-search" style="color: #555;"></i>
            <input type="text" placeholder="Buscar suelas, tintes, pegantes...">
        </div>

        <div class="tabs">
            <div class="tab active">Mi Stock</div>
            <div class="tab">Suelas</div>
            <div class="tab">Químicos</div>
            <div class="tab">Herramientas</div>
        </div>

        <div class="inventory-list" id="lista-inventario">
            <div class="item-card">
                <div class="item-img"><i class="fas fa-flask"></i></div>
                <div class="item-info">
                    <h4>Tinte Negro Especial</h4>
                    <p>Marca: J.A.D.I Premium</p>
                    <p>Última compra: 12/03/2026</p>
                </div>
                <div class="stock-badge stock-low">2 u.</div>
            </div>

            <div class="item-card">
                <div class="item-img"><i class="fas fa-shoe-prints"></i></div>
                <div class="item-info">
                    <h4>Suela TPU Running</h4>
                    <p>Tallas: 38 - 42</p>
                    <p>Proveedor: Repaiz Global</p>
                </div>
                <div class="stock-badge stock-ok">15 pr.</div>
            </div>
        </div>

        <button class="btn-order" onclick="alert('Abriendo Marketplace de Proveedores...')">
            <i class="fas fa-shopping-cart"></i> COMPRAR INSUMOS
        </button>

    </div>

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        window.onload = function() {

            if (!session) window.location.href = "index.html";

        };

            db.ref('inventarios/' + uid).on('value', snapshot => {
                // Renderizar items...
            });
        }
    </script>
</body>
</html>
