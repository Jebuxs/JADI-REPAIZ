<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Reparaciones - J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; --success: #00cc66; --danger: #ff4444; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; padding-bottom: 80px; }
        
        header { display: flex; align-items: center; gap: 15px; padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 20px; }
        .back-btn { color: var(--gold); text-decoration: none; font-size: 1.2rem; }

        .repa-box { background: var(--card); border-radius: 15px; padding: 20px; border: 1px dotted #444; margin-bottom: 20px; position: relative; }
        
        /* NUEVA GRID PARA COINCIDIR CON TRABAJOS */
        .item-row-main { display: flex; gap: 10px; margin-bottom: 10px; }
        .col-cant { flex: 0.5; }
        .col-tipo { flex: 1.5; }
        
        input, select, textarea { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; outline: none; font-size: 0.9rem; }
        input:focus, select:focus, textarea:focus { border-color: var(--gold); }

        .btn-add-circle { 
            position: absolute; bottom: -25px; right: 20px; background: var(--gold); 
            color: black; width: 50px; height: 50px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; border: 4px solid var(--dark); cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10;
        }

        .btn-send { background: var(--gold); color: black; border: none; width: 100%; padding: 15px; border-radius: 10px; cursor: pointer; margin-top: 40px; font-weight: bold; font-size: 1rem; text-transform: uppercase; }
        
        .invoice-item { background: #0a0a0a; padding: 12px; border-radius: 8px; margin-bottom: 8px; font-size: 0.85rem; display: flex; justify-content: space-between; border-left: 3px solid var(--gold); border: 1px solid #222; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 8px; background: #111; color: #666; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .tab.active { background: var(--gold); color: black; }

        .negoc-box { background: #1a1500; border: 1px solid var(--gold); padding: 12px; border-radius: 10px; margin-top: 10px; text-align: center; }
        .btn-negoc { border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; flex: 1; font-size: 0.8rem; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <a href="cliente.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <h2 style="margin:0; font-size: 1.1rem;">Gestión de Reparaciones</h2>
</header>

<div class="tabs">
    <div id="tab-nueva" class="tab active" onclick="switchTab('nueva')">NUEVA SOLICITUD</div>
    <div id="tab-seg" class="tab" onclick="switchTab('seguimiento')">SEGUIMIENTO</div>
</div>

<div id="sec-nueva" class="content-sec">
    <div class="repa-box">
        <h3 style="color: var(--gold); margin-top:0; font-size: 0.9rem; margin-bottom: 15px;"><i class="fas fa-plus-circle"></i> Agregar Ítem de Reparación</h3>
        
        <div class="item-row-main">
            <div class="col-cant">
                <input type="number" id="cant" value="1" placeholder="Cant">
            </div>
            <div class="col-tipo">
                <select id="tipo">
                    <option value="Zapatillas">Zapatillas</option>
                    <option value="Zapatos">Zapatos</option>
                    <option value="Mochila">Mochila</option>
                    <option value="Chompa">Chompa</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>
        </div>
        
        <textarea id="detalle" placeholder="Detalle: (Ej: Color negro, cambio de suela, costura lateral...)" rows="3"></textarea>
        
        <div class="btn-add-circle" onclick="agregarAlCarrito()"><i class="fas fa-plus"></i></div>
    </div>

    <div class="invoice-list" id="lista-previa"></div>
    <button id="btn-finalizar" class="btn-send hidden" onclick="enviarSolicitud()">LANZAR PEDIDO A RED JADI</button>
</div>

<div id="sec-seg" class="content-sec hidden">
    <div id="lista-seguimiento"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const session = JSON.parse(localStorage.getItem('session_jadi'));
    let carritoReparaciones = [];

    function switchTab(t) {
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.content-sec').forEach(el => el.classList.add('hidden'));
        if(t === 'nueva') {
            document.getElementById('tab-nueva').classList.add('active');
            document.getElementById('sec-nueva').classList.remove('hidden');
        } else {
            document.getElementById('tab-seg').classList.add('active');
            document.getElementById('sec-seg').classList.remove('hidden');
            cargarSeguimiento();
        }
    }

    // --- AQUÍ ESTÁ LA MAGIA: COINCIDE CON TRABAJOS.HTML ---
    function agregarAlCarrito() {
        const cant = document.getElementById('cant').value;
        const tipo = document.getElementById('tipo').value;
        const desc = document.getElementById('detalle').value;

        if(!desc) return alert("Por favor escribe el detalle del trabajo");

        // Estructura idéntica a la que el zapatero usa en el mostrador
        const item = { 
            cant: cant, 
            tipo: tipo, 
            desc: desc, 
            precio: 0 // El zapatero lo llenará en su proforma
        };
        
        carritoReparaciones.push(item);

        document.getElementById('lista-previa').innerHTML += `
            <div class="invoice-item">
                <span><b>${cant}</b> | ${tipo} - <small>${desc}</small></span>
                <i class="fas fa-check-circle" style="color:var(--gold)"></i>
            </div>`;
        
        // Limpiamos campos
        document.getElementById('cant').value = "1";
        document.getElementById('detalle').value = "";
        document.getElementById('btn-finalizar').classList.remove('hidden');
    }

    function enviarSolicitud() {
        if(carritoReparaciones.length === 0) return;
        const solicitudId = db.ref('solicitudes_reparacion').push().key;
        
        db.ref('solicitudes_reparacion/' + solicitudId).set({
            clienteId: session.uid,
            clienteNombre: session.nombre,
            clienteTelefono: session.telefono || "09xxxxxxx",
            items: carritoReparaciones, // Aquí va el array con cant, tipo y desc
            estado: 'PENDIENTE',
            fecha: new Date().toISOString(),
            totalOfertado: 0
        }).then(() => {
            alert("¡Pedido enviado! Los zapateros cercanos recibirán tu solicitud.");
            carritoReparaciones = [];
            document.getElementById('lista-previa').innerHTML = "";
            switchTab('seguimiento');
        });
    }

    function cargarSeguimiento() {
        db.ref('solicitudes_reparacion').orderByChild('clienteId').equalTo(session.uid).on('value', snap => {
            const container = document.getElementById('lista-seguimiento');
            container.innerHTML = "";
            if(!snap.exists()) container.innerHTML = "<p style='text-align:center; color:#444;'>No tienes solicitudes activas.</p>";

            snap.forEach(child => {
                const s = child.val();
                const id = child.key;
                let negocHtml = "";

                if(s.estado === 'PENDIENTE') {
                    negocHtml = `<p style="font-size:11px; color:#555; text-align:center;">Esperando proformas...</p>`;
                } else if(s.estado === 'NEGOCIACION') {
                    negocHtml = `
                        <div class="negoc-box">
                            <span style="font-size:11px; color:var(--gold)">PROPUESTA DE: ${s.zapateroNombre}</span>
                            <h2 style="margin:5px 0;">$${parseFloat(s.totalOfertado).toFixed(2)}</h2>
                            <div style="display:flex; gap:8px;">
                                <button class="btn-negoc" style="background:var(--success);" onclick="responder('${id}','ACEPTADO')">ACEPTAR</button>
                                <button class="btn-negoc" style="background:var(--danger); color:white;" onclick="responder('${id}','REBAJA_SOLICITADA')">REBAJA</button>
                            </div>
                            <button onclick="responder('${id}','PENDIENTE')" style="background:transparent; color:#555; border:none; font-size:10px; margin-top:8px;">BUSCAR OTRO ZAPATERO</button>
                        </div>`;
                } else if(s.estado === 'ACEPTADO') {
                    negocHtml = `<button class="btn-send" style="margin-top:10px;" onclick="location.href='chat.html'">CHATEAR CON ZAPATERO</button>`;
                }

                container.innerHTML += `
                    <div class="repa-box" style="border-style:solid; border-left:5px solid var(--gold);">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <b>${s.items[0].tipo}</b>
                            <span style="font-size:10px; background:#222; padding:3px 7px; border-radius:5px; text-transform:uppercase;">${s.estado}</span>
                        </div>
                        <p style="font-size:12px; color:#888;">${s.items[0].cant} unidad(es) - ${s.items[0].desc}</p>
                        ${negocHtml}
                    </div>`;
            });
        });
    }

    async function responder(id, estado) {
        let update = { estado: estado };
        if(estado === 'PENDIENTE') { 
            update.zapateroId = null; 
            update.totalOfertado = 0; 
            update.zapateroNombre = null;
        }
        await db.ref('solicitudes_reparacion/' + id).update(update);
        alert("Respuesta enviada correctamente.");
    }

    if(!session) window.location.href = "index.html";
</script>
</body>
</html>
