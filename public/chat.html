<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --msg-in: #1a1a1a; --msg-out: #302a00; }
        
        /* Ajuste para que quepa en pantalla sin scroll lateral */
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--dark); font-family: -apple-system, sans-serif; }
        
        body { display: flex; flex-direction: column; }

        .chat-header { padding: 10px 15px; background: #050505; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; height: 60px; box-sizing: border-box; }
        .btn-back { color: var(--gold); text-decoration: none; font-size: 1.2rem; }
        .user-info h4 { margin: 0; font-size: 15px; color: white; }
        .user-info span { font-size: 10px; color: var(--gold); }

        /* Área de mensajes con scroll fluido */
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: #080808; }

        .msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 14px; position: relative; color: white; line-height: 1.4; word-wrap: break-word; }
        .msg.received { align-self: flex-start; background: var(--msg-in); border-bottom-left-radius: 2px; }
        .msg.sent { align-self: flex-end; background: var(--msg-out); border-bottom-right-radius: 2px; border: 0.5px solid #4a4100; }

        .msg-meta { display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-top: 4px; font-size: 9px; color: #888; }
        .ticks { color: #4fc3f7; font-size: 10px; } /* Color azul para el visto */

        /* Barra de entrada ajustada al teclado del móvil */
        .input-area { padding: 10px; background: #050505; display: flex; gap: 8px; align-items: center; border-top: 1px solid #222; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        #input-text { flex: 1; background: #151515; border: 1px solid #333; padding: 10px 15px; border-radius: 20px; color: white; outline: none; font-size: 15px; }
        .btn-send { background: var(--gold); color: black; border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

    </style>
</head>
<body>

    <div class="chat-header">
        <a href="javascript:history.back()" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        <div class="user-info">
            <h4 id="chat-name">Cargando...</h4>
            <span id="chat-status">En línea</span>
        </div>
    </div>

    <div id="chat-flow"></div>

    <div class="input-area">
        <input type="text" id="input-text" placeholder="Escribe un mensaje..." autocomplete="off">
        <button class="btn-send" onclick="enviarMensaje()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const session = JSON.parse(localStorage.getItem('session_jadi'));
        const chatInfo = JSON.parse(localStorage.getItem('chat_activo'));

        if(!chatInfo) window.location.href = "index.html";
        document.getElementById('chat-name').innerText = chatInfo.nombre;

        // --- CARGA EN TIEMPO REAL ULTRA RÁPIDA ---
        function iniciarChat() {
            const ref = db.ref('mensajes_nativos/' + chatInfo.id);
            
            // child_added es más rápido que 'value' porque solo trae el nuevo mensaje
            ref.on('child_added', snap => {
                const m = snap.val();
                renderizarMensaje(m);
            });
        }

        function renderizarMensaje(m) {
            const container = document.getElementById('chat-flow');
            const esMio = m.senderId === session.uid;
            const hora = new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            // Los "dos vistos" (ticks)
            const ticks = esMio ? '<i class="fas fa-check-double ticks"></i>' : '';

            const msgHtml = `
                <div class="msg ${esMio ? 'sent' : 'received'}">
                    ${m.text}
                    <div class="msg-meta">
                        ${hora} ${ticks}
                    </div>
                </div>`;
            
            container.insertAdjacentHTML('beforeend', msgHtml);
            container.scrollTop = container.scrollHeight;
        }

        async function enviarMensaje() {
            const input = document.getElementById('input-text');
            const texto = input.value.trim();
            if(!texto) return;

            const nuevoMensaje = {
                senderId: session.uid,
                text: texto,
                timestamp: Date.now(),
                status: 'sent'
            };

            // Limpiar input de inmediato para sensación de velocidad
            input.value = "";

            // Guardar en Firebase
            await db.ref('mensajes_nativos/' + chatInfo.id).push(nuevoMensaje);
            
            // Actualizar última actividad para la lista general
            db.ref('ultimos_mensajes/' + chatInfo.id).set({
                text: texto,
                timestamp: Date.now(),
                clienteNombre: chatInfo.nombre
            });
        }

        // Enviar con Enter
        document.getElementById('input-text').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') enviarMensaje();
        });

        window.onload = iniciarChat;
    </script>
</body>
</html>
