<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes - Taller Master</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <div class="container">
        <nav class="sidebar">
            <h2>👞 Taller Master</h2>
            <ul>
                <li><a href="index.html">🏠 Inicio</a></li>
                <li><a href="zapatero.html">🔨 Zapateros</a></li>
                <li><a href="cliente.html" class="active">👤 Clientes</a></li>
                <li><a href="proveedor.html">📦 Proveedores</a></li>
                <li><a href="pedido.html">📝 Pedidos</a></li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <h1>Gestión de Clientes</h1>
                <p>Registro y consulta de base de datos de clientes.</p>
            </header>

            <section class="form-section">
                <h3>➕ Registrar Nuevo Cliente</h3>
                <form id="form-cliente">
                    <div class="form-group">
                        <label for="nombre">Nombre Completo:</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez" required>
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono / WhatsApp:</label>
                        <input type="tel" id="telefono" name="telefono" placeholder="0987654321">
                    </div>
                    <div class="form-group">
                        <label for="email">Correo Electrónico:</label>
                        <input type="email" id="email" name="email" placeholder="juan@correo.com">
                    </div>
                    <button type="submit" class="btn-save">Guardar Cliente</button>
                </form>
            </section>

            <hr>

            <section class="list-section">
                <h3>📋 Clientes Registrados</h3>
                <div class="search-bar">
                    <input type="text" id="search-cliente" placeholder="Buscar por nombre o teléfono...">
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Teléfono</th>
                            <th>Email</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-clientes">
                        <tr>
                            <td>101</td>
                            <td>María García</td>
                            <td>0991234455</td>
                            <td>m.garcia@mail.com</td>
                            <td>
                                <button class="btn-edit">Editar</button>
                                <button class="btn-delete">Eliminar</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
</body>
</html>
