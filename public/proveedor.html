<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I REPAIZ - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; height: 100vh; }

        /* HEADER CON JERARQUÍA SOLICITADA */
        .top-header { 
            height: 100px; 
            border-bottom: 1px solid #222; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: #000; 
            position: relative; 
        }
        
        .brand-mini { font-size: 0.6rem; color: #666; letter-spacing: 3px; margin-bottom: 5px; text-transform: uppercase; }
        .local-title { font-size: 1.8rem; color: var(--gold); font-weight: 800; text-transform: uppercase; margin: 0; }

        /* BOTÓN DE PERFIL SUPERIOR DERECHA */
        .profile-corner { 
            position: absolute; right: 20px; top: 25px; 
            width: 50px; height: 50px; border-radius: 50%; 
            border: 2px solid #333; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            background: #111; overflow: hidden; transition: 0.3s;
        }
        .profile-corner:hover { border-color: var(--gold); }
        .profile-corner i { font-size: 1.4rem; color: #444; }

        /* CONTENIDO PRINCIPAL */
        #main-wrapper { height: calc(100vh - 100px); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .btn-box { width: 280px; padding: 20px; background: #111; border: 1px solid #333; color: white; border-radius: 12px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .btn-sucursales { border-color: var(--gold); color: var(--gold); }

        /* CAPA MATRIZ */
        #area-matriz { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #000; z-index: 1000; display: none; flex-direction: column; }
        .tab-bar { display: flex; background: #0a0a0a; padding: 10px; gap: 5px; border-bottom: 1px solid #222; margin-top: 100px; }
        .tab-item { flex: 1; padding: 12px; background: #111; border: 1px solid #333; color: #555; border-radius: 5px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        .tab-item.active { border-color: var(--gold); color: var(--gold); }
        
        .workspace { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-back { position: fixed; bottom: 30px; left: 30px; background: var(--gold); color: black; border: none; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; z-index: 1100; }
    </style>
</head>
<body>

<div class="top-header">
    <div class="brand-mini">J.A.D.I REPAIZ</div>
    <h1 class="local-title" id="display-local-name">NOMBRE DEL LOCAL</h1>
    
    <div class="profile-corner" onclick="alert('Configuración de Perfil')">
        <i class="fas fa-user-circle"></i>
    </div>
</div>

<div id="main-wrapper">
    <button class="btn-box btn-sucursales" onclick="abrirMatriz()">
        <i class="fas fa-city"></i> SUCURSALES
    </button>
    <button class="btn-box" style="color:#ff4444; border-color:#441111;" onclick="cerrarSesion()">
        <i class="fas fa-sign-out-alt"></i> CERRAR SESIÓN / ELIMINAR
    </button>
</div>

<div id="area-matriz">
    <div class="tab-bar">
        <button class="tab-item active">INVENTARIO</button>
        <button class="tab-item">PERSONAL</button>
        <button class="tab-item">VENTA</button>
        <button class="tab-item">FACTURACIÓN</button>
    </div>
    <div class="workspace">
        <h2 style="color:var(--gold);">HOLA</h2>
    </div>
    <button class="btn-back" onclick="cerrarMatriz()"><i class="fas fa-arrow-left"></i></button>
</div>

<script>
    // BLOQUEO DE SESIÓN: Si no hay marca, lo saca al login
    window.onload = function() {
        if (localStorage.getItem('sesion_activa') !== 'true') {
            window.location.href = "index.html"; 
        }
    };

    function abrirMatriz() {
        document.getElementById('main-wrapper').style.display = 'none';
        document.getElementById('area-matriz').style.display = 'flex';
    }

    function cerrarMatriz() {
        document.getElementById('area-matriz').style.display = 'none';
        document.getElementById('main-wrapper').style.display = 'flex';
    }

    function cerrarSesion() {
        localStorage.removeItem('sesion_activa'); // Borra la memoria
        window.location.href = "index.html";
    }
</script>

</body>
</html>
