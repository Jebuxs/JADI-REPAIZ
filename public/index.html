<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Ecosistema Profesional</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { width: 90%; max-width: 400px; padding: 30px; background: #0a0a0a; border-radius: 20px; border: 1px solid #1a1a1a; text-align: center; }
        .brand { font-size: 2.2rem; font-weight: 900; color: var(--gold); letter-spacing: 4px; margin-bottom: 5px; }
        
        /* Botón Google */
        .btn-google { width: 100%; padding: 15px; background: white; color: black; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }
        
        /* Secciones */
        #selector-rol, #seccion-telefono { display: none; margin-top: 20px; text-align: left; }
        
        .rol-option { background: #111; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #222; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 15px; }
        .rol-option:hover { border-color: var(--gold); background: #1a1a1a; }
        .rol-option i { color: var(--gold); width: 20px; text-align: center; }
        
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #222; border-radius: 12px; color: white; font-size: 1rem; margin-top: 10px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--gold); }

        .btn-final { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        #loader { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:100; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div id="loader"><div style="color:var(--gold)">PROCESANDO...</div></div>

    <div class="card">
        <div class="brand">J.A.D.I</div>
        
        <div id="vista-login">
            <div style="font-size: 0.7rem; color: #444; letter-spacing: 2px; margin-bottom: 20px;">ACCESO AL ECOSISTEMA</div>
            <button class="btn-google" onclick="accesoGoogle()">
                <i class="fab fa-google"></i> Continuar con Gmail
            </button>
        </div>

        <div id="selector-rol">
            <p style="font-size: 0.9rem; color: var(--gold); margin-bottom: 15px;">¿Cuál es tu función?</p>
            <div class="rol-option" onclick="seleccionarRol('CLIENTE')"> <i class="fas fa-user"></i> <span>CLIENTE</span> </div>
            <div class="rol-option" onclick="seleccionarRol('ZAPATERO')"> <i class="fas fa-hammer"></i> <span>ZAPATERO</span> </div>
            <div class="rol-option" onclick="seleccionarRol('TIENDA')"> <i class="fas fa-store"></i> <span>TIENDA</span> </div>
            <div class="rol-option" onclick="seleccionarRol('PROVEEDOR')"> <i class="fas fa-box-open"></i> <span>PROVEEDOR</span> </div>
            <div class="rol-option" onclick="seleccionarRol('MOTORIZADO')"> <i class="fas fa-motorcycle"></i> <span>MOTORIZADO</span> </div>
        </div>

        <div id="seccion-telefono">
            <p style="font-size: 0.9rem; color: var(--gold);">Para terminar, ingresa tu teléfono:</p>
            <input type="tel" id="user-tel" placeholder="Ej: 0987654321" maxlength="10">
            <button class="btn-final" onclick="finalizarRegistro()">FINALIZAR REGISTRO</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
        projectId: "jadi-repaiz"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let tempUser = null;
    let rolSeleccionado = "";

    async function accesoGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        document.getElementById('loader').style.display = 'flex';
        try {
            const result = await auth.signInWithPopup(provider);
            tempUser = result.user;
            const snap = await db.ref('usuarios/' + tempUser.uid).once('value');
            if (snap.exists()) {
                irAPanel(snap.val());
            } else {
                document.getElementById('vista-login').style.display = 'none';
                document.getElementById('selector-rol').style.display = 'block';
                document.getElementById('loader').style.display = 'none';
            }
        } catch (error) { alert("Error: " + error.message); document.getElementById('loader').style.display = 'none'; }
    }

    function seleccionarRol(rol) {
        rolSeleccionado = rol;
        document.getElementById('selector-rol').style.display = 'none';
        document.getElementById('seccion-telefono').style.display = 'block';
    }

    async function finalizarRegistro() {
        const tel = document.getElementById('user-tel').value.trim();
        if (tel.length < 7) return alert("Ingresa un número de teléfono válido");

        document.getElementById('loader').style.display = 'flex';
        try {
            const prefijo = generarPrefijo(rolSeleccionado);
            const snapCount = await db.ref('contadores/' + rolSeleccionado).once('value');
            let num = (snapCount.val() || 0) + 1;
            await db.ref('contadores/' + rolSeleccionado).set(num);
            
            const idUnico = prefijo + num.toString().padStart(4, '0');

            const nuevoUser = {
                uid: tempUser.uid,
                nombre: tempUser.displayName,
                email: tempUser.email,
                telefono: tel,
                rolNombre: rolSeleccionado,
                rolCodigo: rolSeleccionado.toLowerCase(),
                id_jadi: idUnico,
                fecha_registro: new Date().toLocaleDateString()
            };

            await db.ref('usuarios/' + tempUser.uid).set(nuevoUser);
            irAPanel(nuevoUser);
        } catch (e) { alert("Error: " + e.message); }
    }

    function generarPrefijo(rol) {
        const consonantes = rol.replace(/[AEIOU]/gi, '');
        return consonantes.slice(0, 3).toUpperCase();
    }

    function irAPanel(data) {
        localStorage.setItem('session_jadi', JSON.stringify(data));
        const paginas = { 
            'cliente': 'cliente.html', 'zapatero': 'zapatero.html', 
            'motorizado': 'delivery.html', 'tienda': 'tienda.html', 'proveedor': 'proveedor.html' 
        };
        window.location.href = paginas[data.rolCodigo] || 'cliente.html';
    }
</script>
</body>
</html>
