<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Flexible J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; padding: 15px; }
        .back-btn { color: var(--gold); text-decoration: none; display: block; margin-bottom: 20px; }
        .form-add { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 25px; }
        .input-j { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .btn-add { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .product-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .stock-number { color: var(--gold); font-size: 1.1rem; font-weight: bold; }
        .badge-cat { font-size: 0.7rem; background: #333; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
    </style>
</head>
<body>

<a href="admin_panel.html" class="back-btn"><i class="fas fa-arrow-left"></i> Volver al Panel</a>

<h3>📦 Registro de Bodega Flexible</h3>
<div class="form-add">
    <select id="inv-categoria" class="input-j" onchange="renderizarCampos()">
        <option value="">-- Seleccione Categoría --</option>
        <option value="plantas">Plantas (Zuelas)</option>
        <option value="pieles">Piel (Cueros, Textiles)</option>
        <option value="fluidos">Fluidos (Pegantes/Pinturas)</option>
        <option value="otros">Otros (Cierres/Hilos)</option>
    </select>

    <input type="text" id="inv-nombre" class="input-j" placeholder="Nombre (Ej: Suelin o Juanito 21)">
    
    <div id="dynamic-fields" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>

    <input type="number" id="inv-cantidad" class="input-j" placeholder="Cantidad (Unidades/Pares/Bultos)">
    <input type="number" id="inv-precio" class="input-j" placeholder="Precio de Venta ($)">
    
    <button class="btn-add" onclick="guardarProductoFlexible()">Guardar en Ecosistema</button>
</div>

<h3>📋 Inventario Detallado</h3>
<div id="lista-inventario"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const session = JSON.parse(localStorage.getItem('session_jadi'));
    const empresaID = session.empresaID;

    function renderizarCampos() {
        const cat = document.getElementById('inv-categoria').value;
        const container = document.getElementById('dynamic-fields');
        container.innerHTML = "";

        if(cat === 'plantas') {
            container.innerHTML = `
                <input type="number" id="extra-talla" class="input-j" placeholder="Talla (Ej: 37)">
                <input type="text" id="extra-color" class="input-j" placeholder="Color">
            `;
        } else if(cat === 'pieles') {
            container.innerHTML = `
                <input type="text" id="extra-medida" class="input-j" placeholder="Tamaño (Ej: 12 ft)">
                <input type="text" id="extra-color" class="input-j" placeholder="Color/Textura">
            `;
        } else if(cat === 'fluidos') {
            container.innerHTML = `
                <input type="text" id="extra-capacidad" class="input-j" placeholder="Capacidad (Ej: 200 ML)">
            `;
        }
    }

    async function guardarProductoFlexible() {
        const cat = document.getElementById('inv-categoria').value;
        const nom = document.getElementById('inv-nombre').value;
        const cant = document.getElementById('inv-cantidad').value;
        const prec = document.getElementById('inv-precio').value;

        if(!cat || !nom || !cant) return alert("Completa los campos básicos");

        const data = {
            categoria: cat,
            nombre: nom,
            cantidad: cant,
            precio: prec,
            talla: document.getElementById('extra-talla')?.value || "",
            color: document.getElementById('extra-color')?.value || "",
            medida_ft: document.getElementById('extra-medida')?.value || "",
            capacidad: document.getElementById('extra-capacidad')?.value || "",
            fecha: new Date().toLocaleString()
        };

        // Guardamos en tu inventario
        await db.ref('Ecosistema_JADI/Inventarios/' + empresaID).push(data);
        
        // IA Retroalimentación: Guardamos el nombre para sugerirlo a otros (Punto 13)
        await db.ref('Ecosistema_JADI/Diccionario_Global/Nombres_Productos/' + nom).set(true);

        alert("Producto registrado en la red J.A.D.I");
        location.reload();
    }

    function cargarInventario() {
        db.ref('Ecosistema_JADI/Inventarios/' + empresaID).on('value', snap => {
            const list = document.getElementById('lista-inventario');
            list.innerHTML = "";
            snap.forEach(child => {
                const p = child.val();
                let detalle = p.talla ? `Talla: ${p.talla}` : (p.medida_ft || p.capacidad || "");
                list.innerHTML += `
                    <div class="product-card">
                        <div>
                            <span class="badge-cat">${p.categoria}</span>
                            <div style="font-weight:bold">${p.nombre}</div>
                            <div style="font-size:0.8rem; color:#888">${detalle} ${p.color ? '| '+p.color : ''}</div>
                        </div>
                        <div style="text-align:right">
                            <div class="stock-number">${p.cantidad} <small>Stock</small></div>
                            <div style="font-size:0.8rem">$${p.precio}</div>
                        </div>
                    </div>
                `;
            });
        });
    }
    cargarInventario();
</script>
</body>
</html>
