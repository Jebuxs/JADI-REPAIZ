<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajes - J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --dark: #000; --card: #111; --msg-in: #222; --msg-out: #443a00; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header dinámico */
        .chat-header { padding: 15px; background: #050505; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 15px; z-index: 100; }
        .btn-back { color: var(--gold); text-decoration: none; font-size: 1.2rem; }
        .user-info h4 { margin: 0; font-size: 16px; color: var(--gold); }
        .user-info span { font-size: 10px; color: #888; display: block; }

        /* Contenedor de mensajes */
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #080808; }
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.received { align-self: flex-start; background: var(--msg-in); border-bottom-left-radius: 4px; }
        .msg.sent { align-self: flex-end; background: var(--msg-out); border-bottom-right-radius: 4px; border: 1px solid #554a00; }
        .msg-time { font-size: 9px; color: #666; display: block; margin-top: 5px; text-align: right; }

        /* Input de texto */
        .input-box { padding: 15px; background: #050505; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; }
        #input-text { flex: 1; background: #151515; border: 1px solid #333; padding: 12px 18px; border-radius: 25px; color: white; outline: none; font-size: 14px; }
        .btn-send { background: var(--gold); color: black; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-send:active { transform: scale(0.9); }

        /* Vista de bandeja vacía / Lista */
        .empty-state { text-align: center; margin-top: 100px; color: #444; }
        .empty-state i { font-size: 4rem; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="chat-header">
        <a href="trabajos.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        <div class="user-info">
            <h4 id="display-name">Mensajes</h4>
            <span id="display-status">Selecciona un chat</span>
        </div>
    </div>

    <div id="chat-flow">
        <div class="empty-state">
            <i class="fas fa-comments"></i>
            <p>Cargando conversación...</p>
        </div>
    </div>

    <div class="input-box">
        <input type="text" id="input-text" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') enviarMensaje()">
        <button class="btn-send" onclick="enviarMensaje()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const session = JSON.parse(localStorage.getItem('session_jadi'));
        const chatInfo = JSON.parse(localStorage.getItem('chat_activo'));

        // Redirigir si no hay sesión
        if(!session) window.location.href = "index.html";

        function inicializarChat() {
            if(chatInfo) {
                // Configurar interfaz para el cliente específico
                document.getElementById('display-name').innerText = chatInfo.nombre;
                document.getElementById('display-status').innerText = "Orden: " + chatInfo.id.substring(0,8).toUpperCase();
                escucharMensajes(chatInfo.id);
            } else {
                document.getElementById('chat-flow').innerHTML = '<div class="empty-state"><p>No se seleccionó ninguna orden.</p></div>';
            }
        }

        function escucharMensajes(chatId) {
            const ref = db.ref('mensajes_nativos/' + chatId);
            ref.on('value', snap => {
                const container = document.getElementById('chat-flow');
                container.innerHTML = "";
                
                if(snap.exists()) {
                    snap.forEach(child => {
                        const m = child.val();
                        const esMio = m.senderId === session.uid;
                        const hora = new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                        container.innerHTML += `
                            <div class="msg ${esMio ? 'sent' : 'received'}">
                                ${m.text}
                                <span class="msg-time">${hora}</span>
                            </div>`;
                    });
                    container.scrollTop = container.scrollHeight;
                } else {
                    container.innerHTML = '<div class="empty-state"><p>Envía el primer mensaje para iniciar la conversación.</p></div>';
                }
            });
        }

        function enviarMensaje() {
            const input = document.getElementById('input-text');
            const texto = input.value.trim();
            if(!texto || !chatInfo) return;

            const msj = {
                senderId: session.uid,
                senderNombre: session.nombre,
                text: texto,
                timestamp: Date.now()
            };

            // 1. Guardar en el nodo de la orden
            db.ref('mensajes_nativos/' + chatInfo.id).push(msj);

            // 2. Notificar a la bandeja de entrada (para que aparezca en la lista general)
            db.ref('ultimos_mensajes/' + chatInfo.id).set({
                ...msj,
                clienteNombre: chatInfo.nombre
            });

            input.value = "";
        }

        window.onload = inicializarChat;
    </script>
</body>
</html>
