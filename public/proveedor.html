<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Matriz Full Screen</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; --side: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; height: 100vh; overflow: hidden; }

        /* HEADER */
        .top-header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; display: flex; justify-content: center; align-items: center; background: var(--dark); border-bottom: 1px solid #222; z-index: 10; }
        .header-info { text-align: center; }
        .header-info h1 { margin: 0; font-size: 1.3rem; color: var(--gold); }
        .header-info span { font-size: 0.7rem; color: #555; }

        .profile-zone { position: fixed; top: 15px; right: 20px; z-index: 11; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--gold); }

        /* SIDEBAR INICIAL */
        .sidebar { position: fixed; top: 70px; left: 0; width: 220px; height: calc(100vh - 70px); background: var(--side); border-right: 1px solid #222; padding: 20px 10px; z-index: 5; }
        .nav-btn { width: 100%; padding: 12px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #333; color: #888; text-align: left; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .btn-danger { color: #ff4444 !important; border-color: #441111; margin-top: 20px; }

        /* --- LA MATRIZ (PANTALLA COMPLETA) --- */
        #capa-matriz { 
            position: fixed; top: 70px; left: 0; width: 100%; height: calc(100vh - 70px); 
            background: var(--dark); z-index: 200; display: none; /* Oculta por defecto */
            overflow-y: auto; padding: 20px; box-sizing: border-box;
        }

        .tabs-superior { display: flex; gap: 5px; background: #111; padding: 8px; border-radius: 8px; border: 1px solid #222; margin-bottom: 20px; position: sticky; top: 0; z-index: 201; }
        .tab-btn { flex: 1; padding: 12px; background: #0a0a0a; border: 1px solid #333; color: #555; cursor: pointer; border-radius: 5px; font-size: 0.75rem; font-weight: bold; }
        .tab-btn.active { border: 1px solid var(--gold); color: var(--gold); background: #1a1a1a; }

        /* ÁREA DE TRABAJO DENTRO DE MATRIZ */
        .work-area { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; min-height: 400px; }

        /* BOTÓN VOLVER */
        .btn-volver { position: fixed; bottom: 25px; left: 25px; background: var(--gold); color: black; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; z-index: 300; display: none; box-shadow: 0 0 15px rgba(251, 192, 45, 0.3); }

        /* PANTALLA DE BIENVENIDA (DETRÁS) */
        .main-view { margin-left: 220px; margin-top: 70px; padding: 40px; text-align: center; color: #333; }
    </style>
</head>
<body>

<div class="top-header">
    <div class="header-info">
        <h1 id="shop-name">NOMBRE DEL LOCAL</h1>
        <span id="shop-id">ID: 0000000000</span>
    </div>
</div>

<div class="profile-zone">
    <img src="https://via.placeholder.com/40" class="profile-img">
</div>

<div class="sidebar">
    <button class="nav-btn" onclick="abrirMatriz()" style="border: 1px solid var(--gold); color: var(--gold);">
        <i class="fas fa-th-large"></i> Abrir Matriz
    </button>
    <button class="nav-btn btn-danger" onclick="alert('Eliminar registro...')">
        <i class="fas fa-trash"></i> Eliminar Cuenta
    </button>
</div>

<div class="main-view">
    <i class="fas fa-arrow-left" style="font-size: 2rem; margin-bottom: 20px;"></i>
    <h3>Usa el menú lateral para gestionar la matriz</h3>
</div>

<div id="capa-matriz">
    <div class="tabs-superior">
        <button class="tab-btn active" onclick="cambiarSeccion(this, 'inventario')">INVENTARIO</button>
        <button class="tab-btn" onclick="cambiarSeccion(this, 'personal')">PERSONAL</button>
        <button class="tab-btn" onclick="cambiarSeccion(this, 'venta')">VENTA</button>
        <button class="tab-btn" onclick="cambiarSeccion(this, 'facturas')">FACTURACIONES</button>
    </div>

    <div class="work-area">
        <h2 id="titulo-seccion" style="color:var(--gold); margin-top:0;">Inventario</h2>
        <div id="contenido-matriz">
            </div>
    </div>
</div>

<button id="btn-cerrar-matriz" class="btn-volver" onclick="cerrarMatriz()">
    <i class="fas fa-chevron-left"></i>
</button>

<script>
    const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);

    function abrirMatriz() {
        // Mostramos la capa que cubre todo
        document.getElementById('capa-matriz').style.display = 'block';
        document.getElementById('btn-cerrar-matriz').style.display = 'block';
        cargarModulo('inventario');
    }

    function cerrarMatriz() {
        // Escondemos la capa y volvemos al menú
        document.getElementById('capa-matriz').style.display = 'none';
        document.getElementById('btn-cerrar-matriz').style.display = 'none';
    }

    function cambiarSeccion(btn, seccion) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        cargarModulo(seccion);
    }

    function cargarModulo(seccion) {
        const titulo = document.getElementById('titulo-seccion');
        const contenido = document.getElementById('contenido-matriz');
        
        titulo.innerText = seccion.toUpperCase();

        if(seccion === 'inventario') {
            contenido.innerHTML = `
                <div style="border: 1px dashed #333; padding: 40px; text-align: center; border-radius: 10px;">
                    <button onclick="alert('Abriendo Formulario...')" style="background:var(--gold); border:none; padding:15px 30px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:1rem;">
                        <i class="fas fa-plus"></i> CREAR INVENTARIO
                    </button>
                </div>
            `;
        } else {
            contenido.innerHTML = `<p style="color:#555; text-align:center; padding:50px;">Módulo de ${seccion} en construcción...</p>`;
        }
    }
</script>

</body>
</html>
