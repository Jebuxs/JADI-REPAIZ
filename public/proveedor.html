<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Panel Operativo</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; height: 100vh; }
        .top-header { height: 100px; border-bottom: 1px solid #222; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; position: relative; z-index: 500; }
        .brand-mini { font-size: 0.6rem; color: #444; letter-spacing: 3px; margin-bottom: 5px; text-transform: uppercase; }
        .local-title { font-size: 1.6rem; color: var(--gold); font-weight: 800; text-transform: uppercase; margin: 0; }
        .profile-corner { position: absolute; right: 20px; top: 25px; width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); cursor: pointer; overflow: hidden; }
        .profile-corner img { width: 100%; height: 100%; object-fit: cover; }
        #main-wrapper { height: calc(100vh - 100px); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .btn-box { width: 280px; padding: 20px; background: #111; border: 1px solid #333; color: white; border-radius: 12px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 15px; transition: 0.3s; font-size: 1rem; }
        .btn-box:hover { border-color: var(--gold); }
        .btn-sucursales { border-color: var(--gold); color: var(--gold); }
    </style>
</head>
<body>

<div class="top-header">
    <div class="brand-mini">J.A.D.I REPAIZ</div>
    <h1 class="local-title" id="txt-local">PROVEEDOR</h1>
    <div class="profile-corner" onclick="window.location.href='perfil.html'">
        <img id="img-perfil" src="" alt="Foto">
    </div>
</div>

<div id="main-wrapper">
    <button class="btn-box btn-sucursales" id="btn-matriz" onclick="abrirMatriz()">
        <i class="fas fa-city"></i> MI SUCURSAL / MATRIZ
    </button>

    <button class="btn-box" style="color:#ff4444; border-color:#441111;" onclick="cerrarSesion()">
        <i class="fas fa-sign-out-alt"></i> SALIR DEL SISTEMA
    </button>
</div>

<script>
    // Configuración Firebase (Poner la tuya)
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const session = JSON.parse(localStorage.getItem('session_jadi'));

    window.onload = function() {
        if(!session) { window.location.href = "index.html"; return; }
        
        document.getElementById('img-perfil').src = session.foto || "";
        document.getElementById('txt-local').innerText = session.empresaNombre || "PROVEEDOR";

        // VIGILANTE DE MORA: Bloquea tu función matriz si hay deuda
        db.ref('usuarios/' + session.uid).on('value', (snap) => {
            const user = snap.val();
            const btn = document.getElementById('btn-matriz');
            if(user && user.pagoMora === true) {
                btn.disabled = true;
                btn.style.opacity = "0.3";
                btn.onclick = () => alert("Acceso restringido. Revisa tu estado de cuenta en Perfil.");
            } else {
                btn.disabled = false;
                btn.style.opacity = "1";
                // Restauramos el onclick original que tenías
                btn.onclick = () => abrirMatriz(); 
            }
        });
    };

    // TU FUNCIÓN ORIGINAL (La que ya tenías configurada)
    function abrirMatriz() {
        // Aquí va el código que ya tenías para entrar a tu inventario/sucursal
        console.log("Entrando a la configuración de matriz...");
        // window.location.href = 'tu_archivo_de_inventario.html'; 
    }

    function cerrarSesion() {
        if(confirm("¿Salir de J.A.D.I?")) {
            firebase.auth().signOut().then(() => {
                localStorage.clear();
                window.location.href = "index.html";
            });
        }
    }
</script>
</body>
</html>
