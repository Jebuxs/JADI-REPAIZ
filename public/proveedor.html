<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Panel Operativo</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script src="config.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; --text-dim: #666; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; height: 100vh; }
        .top-header { height: 100px; border-bottom: 1px solid #222; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; }
        .local-title { font-size: 1.6rem; color: var(--gold); font-weight: 800; text-transform: uppercase; margin: 0; }
        #main-wrapper { height: calc(100vh - 100px); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .btn-box { width: 280px; padding: 20px; background: #111; border: 1px solid #333; color: white; border-radius: 12px; cursor: pointer; font-weight: bold; }
        #pantalla-perfil { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #000; z-index: 2000; display: none; flex-direction: column; }
        .card-form { background: #0d0d0d; border: 1px solid #222; border-radius: 15px; width: 90%; max-width: 400px; padding: 25px; margin: 120px auto 0; }
        .input-group { margin-bottom: 15px; text-align: left; position: relative; }
        .input-field { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        .toggle-eye { position: absolute; right: 12px; top: 35px; color: #444; cursor: pointer; }
        .btn-action { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-back { position: fixed; bottom: 30px; left: 30px; background: var(--gold); color: black; border: none; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div class="top-header">
    <div class="brand-mini">J.A.D.I REPAIZ</div>
    <h1 class="local-title" id="display-nombre-local">CARGANDO...</h1>
</div>

<div id="main-wrapper">
    <button class="btn-box" onclick="abrirPerfil()">MI PERFIL</button>
    <button class="btn-box" style="color:#ff4444;" onclick="auth.signOut().then(() => window.location.href='index.html')">CERRAR SESIÓN</button>
</div>

<div id="pantalla-perfil">
    <div class="card-form">
        <h2 style="color:var(--gold);">SEGURIDAD</h2>
        <div class="input-group">
            <label>Clave Actual</label>
            <input type="password" id="p1" class="input-field">
            <i class="fas fa-eye toggle-eye" onclick="togglePass('p1', this)"></i>
        </div>
        <div class="input-group">
            <label>Nueva Clave</label>
            <input type="password" id="p2" class="input-field">
            <i class="fas fa-eye toggle-eye" onclick="togglePass('p2', this)"></i>
        </div>
        <button class="btn-action" onclick="actualizarPassword()">ACTUALIZAR</button>
    </div>
    <button class="btn-back" onclick="document.getElementById('pantalla-perfil').style.display='none'"><i class="fas fa-arrow-left"></i></button>
</div>

<script>
    // Usamos 'db' y 'auth' que ya vienen de config.js
    window.onload = () => {
        db.ref('Ecosistema_JADI/Configuracion/nombreLocal').on('value', (s) => {
            document.getElementById('display-nombre-local').innerText = s.exists() ? s.val().toUpperCase() : "JADI REPAIZ";
        });
    };

    function abrirPerfil() { document.getElementById('pantalla-perfil').style.display = 'flex'; }

    function togglePass(id, icon) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
        icon.classList.toggle("fa-eye-slash");
        icon.style.color = input.type === "text" ? "var(--gold)" : "#444";
    }

    async function actualizarPassword() {
        const p1 = document.getElementById('p1').value;
        const p2 = document.getElementById('p2').value;
        if(!p1 || !p2) return alert("Pana, llena los campos.");
        
        const user = auth.currentUser;
        const cred = firebase.auth.EmailAuthProvider.credential(user.email, p1);

        try {
            await user.reauthenticateWithCredential(cred);
            await user.updatePassword(p2);
            alert("✅ ¡Contraseña actualizada con éxito!");
            document.getElementById('p1').value = ""; document.getElementById('p2').value = "";
        } catch (e) { alert("Error: " + e.message); }
    }
</script>
</body>
</html>
