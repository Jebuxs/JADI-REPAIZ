<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Panel Proveedor</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background-color: #000; color: white; margin: 0; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden;">

    <div id="header-fixed" style="position: fixed; top: 0; width: 100%; height: 75px; background: #000; border-bottom: 1px solid #222; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;">
        <h1 id="db-nombre-local" style="margin: 0; font-size: 1.2rem; color: #fbc02d; text-transform: uppercase; letter-spacing: 2px;">CARGANDO...</h1>
        <span id="db-id-local" style="font-size: 0.7rem; color: #555; font-family: monospace;">ID: 0000000000</span>
    </div>

    <div style="position: fixed; top: 15px; right: 20px; z-index: 1001;">
        <img id="db-foto-perfil" src="https://via.placeholder.com/40" style="width: 40px; height: 40px; border-radius: 50%; border: 1px solid #fbc02d;">
    </div>

    <div id="vista-inicio" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px;">
        <button onclick="abrirMatriz()" style="width: 280px; padding: 20px; background: #111; border: 1px solid #fbc02d; color: #fbc02d; border-radius: 15px; cursor: pointer; font-size: 1rem; font-weight: bold; display: flex; align-items: center; gap: 15px;">
            <i class="fas fa-city"></i> SUCURSALES
        </button>
        
        <button onclick="eliminarCuenta()" style="width: 280px; padding: 20px; background: #111; border: 1px solid #441111; color: #ff4444; border-radius: 15px; cursor: pointer; font-size: 1rem; font-weight: bold; display: flex; align-items: center; gap: 15px;">
            <i class="fas fa-user-times"></i> ELIMINAR CUENTA
        </button>
    </div>

    <div id="pantalla-matriz" style="position: fixed; top: 75px; left: 0; width: 100%; height: calc(100vh - 75px); background: #000; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center;">
        <div style="font-size: 5rem; font-weight: 900; color: #fbc02d; letter-spacing: 10px;">HOLA</div>
        
        <button onclick="cerrarMatriz()" style="position: fixed; bottom: 30px; left: 30px; background: #fbc02d; color: black; border: none; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; font-size: 1.2rem;">
            <i class="fas fa-arrow-left"></i>
        </button>
    </div>

<script>
    // FIREBASE
    const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // PERSISTENCIA DE ID (Asegúrate que el login guarde el ID en localStorage)
    const USUARIO_ID = localStorage.getItem('user_id') || "3001234567"; 

    window.onload = function() {
        // Cargar datos reales
        db.ref('usuarios/' + USUARIO_ID).on('value', snap => {
            if(snap.exists()) {
                const data = snap.val();
                document.getElementById('db-nombre-local').innerText = data.nombre || "J.A.D.I LOCAL";
                document.getElementById('db-id-local').innerText = "ID: " + USUARIO_ID;
            }
        });

        // REVISAR SI YA ESTABA DENTRO PARA NO PEDIR CLAVE
        if(localStorage.getItem('sesion_activa') === 'true') {
            console.log("Sesión mantenida");
            // Si quieres que entre directo al HOLA al recargar, activa la siguiente línea:
            // abrirMatriz();
        }
    }

    function abrirMatriz() {
        localStorage.setItem('sesion_activa', 'true');
        document.getElementById('vista-inicio').style.display = 'none';
        document.getElementById('pantalla-matriz').style.display = 'flex';
    }

    function cerrarMatriz() {
        // Mantenemos la sesion_activa en true para que no pida login, 
        // pero volvemos visualmente a los dos botones
        document.getElementById('pantalla-matriz').style.display = 'none';
        document.getElementById('vista-inicio').style.display = 'flex';
    }

    function eliminarCuenta() {
        if(confirm("¿Seguro que quieres eliminar el registro?")) {
            localStorage.clear();
            window.location.href = "index.html";
        }
    }
</script>
</body>
</html>
