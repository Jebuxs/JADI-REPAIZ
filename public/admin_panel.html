<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER CONTROL - J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; --red: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: auto; }
        .admin-box { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; overflow-x: auto; }
        h2 { color: var(--gold); text-align: center; letter-spacing: 2px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; color: var(--gold); border-bottom: 2px solid #333; padding: 10px; font-size: 0.8rem; }
        td { padding: 10px; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .btn-del { background: var(--red); color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; }
        #login-admin { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .login-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 300px; }
        input[type="password"] { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; text-align: center; }
    </style>
</head>
<body>

<div id="login-admin">
    <div class="login-card">
        <h3 style="color:var(--gold);">LLAVE MAESTRA</h3>
        <input type="password" id="master-key" placeholder="••••••••">
        <button onclick="verificarMaestro()" style="background:var(--gold); border:none; padding:12px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer;">ACCEDER</button>
    </div>
</div>

<div class="container">
    <button onclick="localStorage.removeItem('master_auth'); location.reload();" style="float:right; background:none; color:#444; border:1px solid #444; cursor:pointer; padding:5px; font-size: 0.7rem;">Cerrar Master</button>
    <h2>BASE DE DATOS J.A.D.I</h2>

    <div class="admin-box">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>ID / Celular</th>
                    <th>Clave</th>
                    <th>Rol</th>
                    <th>Empresa / Ingreso</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="lista-usuarios">
                <tr><td colspan="6" style="text-align:center;">Conectando con us-central1...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // ESTA ES LA CONFIGURACIÓN QUE MANDA
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com", // URL de tu imagen
        projectId: "jadi-repaiz"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const CLAVE_SECRETA = "JADI2026";

    window.onload = () => {
        if(localStorage.getItem('master_auth') === 'true') {
            document.getElementById('login-admin').style.display = 'none';
            cargarUsuarios();
        } else {
            document.getElementById('login-admin').style.display = 'flex';
        }
    };

    function verificarMaestro() {
        if(document.getElementById('master-key').value === CLAVE_SECRETA) {
            localStorage.setItem('master_auth', 'true');
            document.getElementById('login-admin').style.display = 'none';
            cargarUsuarios();
        } else { alert("Clave Incorrecta"); }
    }

    function cargarUsuarios() {
        // Leemos la carpeta 'usuarios' que vimos en tu captura
        db.ref('usuarios').on('value', snap => {
            const tbody = document.getElementById('lista-usuarios');
            tbody.innerHTML = "";

            if(!snap.exists()) {
                tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>No hay datos en la ruta /usuarios</td></tr>";
                return;
            }

            snap.forEach(child => {
                const u = child.val();
                const id = child.key; 

                tbody.innerHTML += `
                    <tr>
                        <td style="color:var(--gold); font-weight:bold;">${u.nombre || 'N/A'}</td>
                        <td>
                            <small style="color:#666;">UID: ${u.uid || '---'}</small><br>
                            ${u.telefono || id}
                        </td>
                        <td style="font-family:monospace; font-size:0.8rem;">${u.pass || '---'}</td>
                        <td style="font-weight:bold; color:var(--gold);">${u.rolCodigo || '??'}</td>
                        <td style="font-size:0.75rem; color:#888;">
                            Empresa: ${u.empresaNombre || 'N/A'}<br>
                            ID Emp: ${u.empresaID || '---'}<br>
                            Ingreso: ${u.fecha_ingreso || '---'}
                        </td>
                        <td>
                            <button class="btn-del" onclick="eliminarUsuario('${id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        });
    }

    function eliminarUsuario(id) {
        if(confirm("¿Seguro que quieres borrar al usuario con ID " + id + "?")) {
            db.ref('usuarios/' + id).remove();
        }
    }
</script>
</body>
</html>
