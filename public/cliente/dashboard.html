<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel - JADI REPAIZ</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="/js/estilo_visual.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; --text: #eee; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; padding-bottom: 100px; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 25px; }

        .main-pillars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .pillar-card { background: var(--card); padding: 15px 5px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .pillar-card i { font-size: 1.4rem; margin-bottom: 8px; color: var(--gold); }
        .pillar-card h3 { margin: 5px 0; font-size: 0.65rem; color: #888; text-transform: uppercase; }
        .pillar-card span { font-size: 1.2rem; font-weight: bold; color: #fff; }

        .client-section { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; }
        .client-section h2 { color: var(--gold); font-size: 1rem; margin-top: 0; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        /* Card de Zapato */
        .shoe-card { 
            background: #1a1a1a; border-radius: 12px; padding: 15px; 
            display: flex; align-items: center; gap: 15px; margin-top: 12px; 
            border-left: 4px solid #333; transition: 0.3s;
        }
        .shoe-card.proceso { border-left-color: var(--gold); }
        .shoe-card.listo { border-left-color: #4caf50; }
        
        .shoe-thumb { width: 50px; height: 50px; background: #222; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--gold); }
        .shoe-info { flex: 1; }
        .shoe-info h4 { margin: 0; font-size: 0.9rem; color: #fff; }
        .shoe-info p { margin: 2px 0; font-size: 0.75rem; color: #777; }
        .status-badge { font-size: 9px; padding: 3px 8px; border-radius: 4px; background: #333; color: #fff; font-weight: bold; }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 25px 0; }
        .action-btn { background: #111; border: 1px solid #333; color: #ccc; padding: 15px; border-radius: 12px; text-decoration: none; text-align: center; font-size: 0.8rem; display: flex; flex-direction: column; align-items: center; gap: 8px; }

        .quick-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(10,10,10,0.9); padding: 10px 25px; border-radius: 50px; border: 1px solid var(--gold); display: flex; gap: 25px; backdrop-filter: blur(10px); z-index: 1000; }
        .nav-item { color: #555; font-size: 1.2rem; text-decoration: none; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<header>
    <div>
        <h2 style="color:var(--gold); margin:0; font-size: 1.1rem;">HOLA, <span id="user-display">...</span></h2>
        <small id="user-welcome" style="color: #555;">Cargando tu perfil...</small>
    </div>
    <div id="user-points" style="text-align: right;">
        <span style="color:var(--gold); font-weight:bold;"><i class="fas fa-coins"></i> 50</span>
        <div style="font-size: 0.6rem; color:#444;">JADI POINTS</div>
    </div>
</header>

<div class="main-pillars">
    <div class="pillar-card">
        <i class="fas fa-shoe-prints"></i>
        <h3>ÓRDENES</h3><span id="c-total">0</span>
    </div>
    <div class="pillar-card">
        <i class="fas fa-tools"></i>
        <h3>TALLER</h3><span id="c-process">0</span>
    </div>
    <div class="pillar-card">
        <i class="fas fa-box-open"></i>
        <h3>LISTOS</h3><span id="c-ready">0</span>
    </div>
</div>

<div class="action-grid">
    <a href="solicitar_reparacion.html" class="action-btn" style="border-color: var(--gold); color: var(--gold);">
        <i class="fas fa-plus-circle"></i> Nueva Solicitud
    </a>
    <a href="rastreo.html" class="action-btn">
        <i class="fas fa-search-location"></i> Rastrear
    </a>
</div>

<div class="client-section">
    <h2><i class="fas fa-history"></i> ESTADO DE MI CALZADO</h2>
    <div id="lista-zapatos">
        <p style="text-align:center; color:#444; padding:20px; font-size: 0.8rem;">Buscando tus trabajos...</p>
    </div>
</div>

<div class="quick-nav">
    <a href="dashboard.html" class="nav-item active"><i class="fas fa-home"></i></a>
    <a href="mis-fotos.html" class="nav-item"><i class="fas fa-camera"></i></a>
    <a href="notificaciones.html" class="nav-item"><i class="fas fa-bell"></i></a>
    <a href="perfil.html" class="nav-item"><i class="fas fa-user"></i></a>
</div>

<script>
    // Configuración Firebase (Usamos la de tu proyecto)
    const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function iniciarDashboard() {
        const session = JSON.parse(localStorage.getItem('session_jadi'));
        if(!session) { window.location.href = "/index.html"; return; }

        // 1. Mostrar nombre (de la sesión o DB)
        document.getElementById('user-display').innerText = (session.nombre || "CLIENTE").split(' ')[0].toUpperCase();
        document.getElementById('user-welcome').innerText = "Tus zapatos en las mejores manos.";

        // 2. Aplicar estilo visual preferido
        const tema = localStorage.getItem('jadi_tema_preferido') || 'elegante';
        if(typeof JadiEstilo !== 'undefined') JadiEstilo.aplicar(tema);

        cargarTrabajos(session.uid);
    }

    function cargarTrabajos(uid) {
        // Buscamos en la rama 'trabajos' donde clienteId coincida
        db.ref('trabajos').orderByChild('clienteId').equalTo(uid).on('value', snap => {
            const container = document.getElementById('lista-zapatos');
            container.innerHTML = "";
            
            let total = 0, proceso = 0, listos = 0;

            if(!snap.exists()) {
                container.innerHTML = `<p style="text-align:center; color:#444; padding:20px; font-size: 0.8rem;">Aún no tienes trabajos registrados.</p>`;
                actualizarContadores(0, 0, 0);
                return;
            }

            snap.forEach(child => {
                const o = child.val();
                total++;
                
                let claseEstado = "";
                if(o.estado === 'En Proceso') { proceso++; claseEstado = "proceso"; }
                if(o.estado === 'Listo' || o.estado === 'Finalizado') { listos++; claseEstado = "listo"; }

                container.innerHTML += `
                    <div class="shoe-card ${claseEstado}">
                        <div class="shoe-thumb">
                            <i class="fas fa-shoe-prints"></i>
                        </div>
                        <div class="shoe-info">
                            <h4>${o.detalle || 'Reparación de Calzado'}</h4>
                            <p>ID Orden: ${child.key}</p>
                            <p>Saldo: <b>$${o.saldo}</b></p>
                        </div>
                        <div class="status-badge">${o.estado.toUpperCase()}</div>
                    </div>
                `;
            });

            actualizarContadores(total, proceso, listos);
        });
    }

    function actualizarContadores(t, p, r) {
        document.getElementById('c-total').innerText = t;
        document.getElementById('c-process').innerText = p;
        document.getElementById('c-ready').innerText = r;
    }

    iniciarDashboard();
</script>
</body>
</html>
