<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I REPAIZ - Acceso Google</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .login-card { width: 90%; max-width: 350px; padding: 40px; background: #080808; border-radius: 25px; border: 1px solid #111; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .brand { font-size: 2.5rem; font-weight: 900; color: var(--gold); letter-spacing: 5px; margin-bottom: 10px; }
        .slogan { font-size: 0.7rem; color: #555; letter-spacing: 2px; margin-bottom: 40px; }
        
        .btn-google { 
            width: 100%; padding: 15px; background: white; color: #000; border: none; border-radius: 12px; 
            font-weight: bold; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: 0.3s;
        }
        .btn-google:hover { background: #eee; transform: translateY(-2px); }
        .btn-google i { color: #4285F4; font-size: 1.2rem; }

        #loader { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:100; flex-direction:column; align-items:center; justify-content:center; }
        .spinner { width: 30px; height: 30px; border: 3px solid #222; border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div style="color:var(--gold); font-size: 0.8rem; letter-spacing: 2px;">VERIFICANDO IDENTIDAD</div>
    </div>

    <div class="login-card">
        <div class="brand">J.A.D.I</div>
        <div class="slogan">EL ALMA EN LOS PASOS</div>
        
        <button class="btn-google" onclick="accesoGoogle()">
            <i class="fab fa-google"></i> Continuar con Google
        </button>

        <p id="msg-error" style="color: #ff5252; font-size: 0.8rem; margin-top: 20px; display: none;"></p>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
        projectId: "jadi-repaiz"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const paginasMaster = { 'ZPT':'zapatero.html', 'PRV':'proveedor.html', 'CLN':'cliente.html', 'DLV':'delivery.html', 'ADM':'admin_panel.html' };

    async function accesoGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        document.getElementById('loader').style.display = 'flex';

        try {
            const result = await auth.signInWithPopup(provider);
            const user = result.user;

            // 1. Buscamos si el usuario ya existe en nuestra base de datos por su email
            const snap = await db.ref('usuarios').orderByChild('email').equalTo(user.email).once('value');
            
            if (snap.exists()) {
                // USUARIO EXISTE: Redirigir según su rol
                const data = snap.val();
                const userData = Object.values(data)[0];
                localStorage.setItem('session_jadi', JSON.stringify(userData));
                window.location.href = paginasMaster[userData.rolCodigo] || 'index.html';
            } else {
                // USUARIO NUEVO: Guardar datos básicos y mandarlo a completar perfil (o asignar rol por defecto)
                // Por seguridad, si es nuevo, podrías mandarlo a una pantalla de "Completar Registro"
                const nuevoUser = {
                    nombre: user.displayName,
                    email: user.email,
                    foto: user.photoURL,
                    rolCodigo: 'CLN', // Rol por defecto
                    empresaID: 'SISTEMA_JADI',
                    fecha_ingreso: new Date().toLocaleDateString()
                };
                
                // Guardamos usando su UID de Google como llave para que sea único
                await db.ref('usuarios/' + user.uid).set(nuevoUser);
                localStorage.setItem('session_jadi', JSON.stringify(nuevoUser));
                window.location.href = 'cliente.html'; // O la página que decidas para nuevos
            }
        } catch (error) {
            console.error(error);
            document.getElementById('msg-error').innerText = "Error: " + error.message;
            document.getElementById('msg-error').style.display = 'block';
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>
</body>
</html>
