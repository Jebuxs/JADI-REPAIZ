<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo Zapatero - J.A.D.I REPAIZ</title>
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* --- 1. HEADER: LOGO Y PERFIL --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: #111;
            border-bottom: 2px solid #FFD700;
        }

        .logo-group {
            text-align: left;
        }

        .logo-group h1 {
            margin: 0;
            font-size: 3rem; /* Más visible */
            color: #FFD700;
            letter-spacing: 4px;
            font-weight: 900;
            line-height: 0.8;
        }

        .logo-group span {
            font-size: 1rem;
            color: #FFF;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .profile-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #FFD700;
            background-color: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s;
            overflow: hidden;
        }

        .profile-btn:hover {
            transform: scale(1.1);
            background-color: #333;
        }

        /* --- 2. BIENVENIDA Y LOGIN --- */
        .welcome-section {
            padding: 30px 40px;
        }

        .welcome-section h2 {
            color: #FFD700;
            margin: 0 0 10px 0;
            font-size: 1.8rem;
        }

        .user-info-box {
            margin-top: 15px;
        }

        .label-personal {
            color: #888;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 8px;
        }

        .login-badge {
            display: inline-block;
            background: #222;
            padding: 8px 15px;
            border-radius: 5px;
            border: 1px solid #444;
            font-family: 'Courier New', Courier, monospace;
        }

        .login-badge strong {
            color: #FFD700;
        }

        /* --- BOTÓN CERRAR SESIÓN --- */
        .logout-container {
            padding: 0 40px;
        }

        .btn-logout {
            color: #ff4d4d;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .btn-logout:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-group">
            <h1>J.A.D.I</h1>
            <span>REPAIZ</span>
        </div>

        <a href="perfil.html" title="Ir a mi perfil">
            <div class="profile-btn">
                <span style="font-size: 1.8rem;">👤</span>
            </div>
        </a>
    </header>

    <main>
        <section class="welcome-section">
            <h2>Bienvenido, Maestro Jesus Eduardo Villa Orozco</h2>
            
            <div class="user-info-box">
                <span class="label-personal">Personal</span>
                <div class="login-badge">
                    <strong>Usuario Login:</strong> ZPT-2026-X
                </div>
            </div>
        </section>

        <div class="logout-container">
            <a href="index.html" class="btn-logout">Cerrar Sesión</a>
        </div>
    </main>

</body>
</html>
