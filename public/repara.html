<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Reparaciones - J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        
        header { display: flex; align-items: center; gap: 15px; padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 20px; }
        .back-btn { color: var(--gold); text-decoration: none; font-size: 1.2rem; }

        /* Estilo Factura / Formulario */
        .repa-box { background: var(--card); border-radius: 15px; padding: 20px; border: 1px dotted #444; margin-bottom: 20px; }
        .item-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        input, select, textarea { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--gold); }

        .btn-add { background: #222; color: var(--gold); border: 1px dashed var(--gold); width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .btn-send { background: var(--gold); color: black; border: none; width: 100%; padding: 15px; border-radius: 10px; cursor: pointer; margin-top: 20px; font-weight: bold; font-size: 1rem; }

        /* Lista de Ítems Agregados */
        .invoice-list { margin-top: 20px; }
        .invoice-item { background: #0a0a0a; padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--gold); }

        /* Pestañas */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; background: #111; color: #555; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .tab.active { background: var(--gold); color: black; }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <a href="cliente.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <h2 style="margin:0; font-size: 1.1rem;">Mis Reparaciones</h2>
</header>

<div class="tabs">
    <div id="tab-nueva" class="tab active" onclick="switchTab('nueva')">NUEVA SOLICITUD</div>
    <div id="tab-seg" class="tab" onclick="switchTab('seguimiento')">SEGUIMIENTO</div>
</div>

<div id="sec-nueva" class="content-sec">
    <div class="repa-box">
        <h3 style="color: var(--gold); margin-top:0; font-size: 1rem;"><i class="fas fa-file-invoice"></i> Detalle del Pedido</h3>
        
        <div class="item-row">
            <select id="tipo">
                <option value="Zapatillas">Zapatillas</option>
                <option value="Zapatos">Zapatos</option>
                <option value="Mochila">Mochila</option>
                <option value="Chompa">Chompa</option>
                <option value="Otro">Otro</option>
            </select>
            <input type="text" id="color" placeholder="Color (Ej: Negro)">
        </div>
        <textarea id="trabajo" placeholder="¿Qué trabajo necesita? (Ej: Cambio de suela, costura, teñido...)" rows="2"></textarea>
        
        <button class="btn-add" onclick="agregarAlCarrito()">+ AÑADIR OTRO ÍTEM</button>
    </div>

    <div class="invoice-list" id="lista-previa">
        </div>

    <button id="btn-finalizar" class="btn-send hidden" onclick="enviarSolicitud()">LANZAR PEDIDO A ZAPATEROS</button>
</div>

<div id="sec-seg" class="content-sec hidden">
    <div id="lista-seguimiento">
        </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const session = JSON.parse(localStorage.getItem('session_jadi'));
    let carritoReparaciones = [];

    function switchTab(t) {
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.content-sec').forEach(el => el.classList.add('hidden'));
        
        if(t === 'nueva') {
            document.getElementById('tab-nueva').classList.add('active');
            document.getElementById('sec-nueva').classList.remove('hidden');
        } else {
            document.getElementById('tab-seg').classList.add('active');
            document.getElementById('sec-seg').classList.remove('hidden');
            cargarSeguimiento();
        }
    }

    function agregarAlCarrito() {
        const tipo = document.getElementById('tipo').value;
        const color = document.getElementById('color').value;
        const desc = document.getElementById('trabajo').value;

        if(!color || !desc) { alert("Completa el color y la descripción"); return; }

        const item = { tipo, color, desc };
        carritoReparaciones.push(item);

        // Actualizar vista previa
        const lista = document.getElementById('lista-previa');
        lista.innerHTML += `
            <div class="invoice-item">
                <span><b>${tipo}</b> (${color}) - ${desc}</span>
                <i class="fas fa-check-circle" style="color:var(--gold)"></i>
            </div>
        `;

        // Limpiar campos y mostrar botón enviar
        document.getElementById('color').value = "";
        document.getElementById('trabajo').value = "";
        document.getElementById('btn-finalizar').classList.remove('hidden');
    }

    function enviarSolicitud() {
        if(carritoReparaciones.length === 0) return;

        const solicitudId = db.ref('solicitudes_reparacion').push().key;
        const data = {
            clienteId: session.uid,
            clienteNombre: session.nombre,
            items: carritoReparaciones,
            estado: 'PENDIENTE', // Esperando que un zapatero acepte
            fecha: new Date().toISOString(),
            zapateroId: null // Se llena cuando alguien acepta
        };

        db.ref('solicitudes_reparacion/' + solicitudId).set(data)
            .then(() => {
                alert("¡Pedido lanzado! Los zapateros cercanos recibirán tu notificación.");
                carritoReparaciones = [];
                document.getElementById('lista-previa').innerHTML = "";
                switchTab('seguimiento');
            });
    }

    function cargarSeguimiento() {
        db.ref('solicitudes_reparacion').orderByChild('clienteId').equalTo(session.uid).on('value', snap => {
            const container = document.getElementById('lista-seguimiento');
            container.innerHTML = "";
            
            if(!snap.exists()) {
                container.innerHTML = "<p style='text-align:center; color:#555;'>No tienes pedidos activos.</p>";
                return;
            }

            snap.forEach(child => {
                const s = child.val();
                const colorEstado = s.estado === 'ACEPTADO' ? '#4caf50' : '#fbc02d';
                
                container.innerHTML += `
                    <div style="background:var(--card); padding:15px; border-radius:12px; margin-bottom:10px; border-left: 5px solid ${colorEstado}">
                        <div style="display:flex; justify-content:space-between;">
                            <small style="color:#666;">ID: ${child.key.slice(-5)}</small>
                            <b style="color:${colorEstado}">${s.estado}</b>
                        </div>
                        <p style="margin:5px 0; font-size:0.9rem;">${s.items.length} artículo(s) en este pedido.</p>
                        ${s.estado === 'ACEPTADO' ? 
                            `<button onclick="irAlChat('${s.zapateroId}')" style="background:var(--gold); border:none; padding:8px; border-radius:5px; width:100%; margin-top:10px; font-weight:bold;">CHATEAR CON ZAPATERO</button>` : 
                            `<p style="font-size:0.7rem; color:#444;">Esperando respuesta de zapateros...</p>`
                        }
                    </div>
                `;
            });
        });
    }

    function irAlChat(zId) {
        localStorage.setItem('chat_receptor_id', zId);
        window.location.href = 'chat.html';
    }

    init();
</script>
</body>
</html>
