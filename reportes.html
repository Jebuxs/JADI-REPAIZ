<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; padding: 15px; }
        .back-btn { color: var(--gold); text-decoration: none; display: block; margin-bottom: 20px; }
        
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; margin-bottom: 15px; }
        .stat-val { font-size: 2rem; font-weight: bold; color: var(--gold); display: block; }
        .stat-label { font-size: 0.8rem; color: #888; text-transform: uppercase; }

        .tabla-reporte { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; font-size: 0.9rem; }
        .tabla-reporte th { background: #222; color: var(--gold); padding: 10px; text-align: left; }
        .tabla-reporte td { padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<a href="admin_panel.html" class="back-btn"><i class="fas fa-arrow-left"></i> Volver al Panel</a>

<h2>Reporte Diario</h2>

<div class="stat-card">
    <span class="stat-label">Ventas Totales (Hoy)</span>
    <span class="stat-val" id="total-hoy">$0.00</span>
</div>

<div class="stat-card">
    <span class="stat-label">Pares Vendidos</span>
    <span class="stat-val" id="pares-hoy">0</span>
</div>

<h3>Detalle de Ventas</h3>
<table class="tabla-reporte">
    <thead>
        <tr>
            <th>Hora</th>
            <th>Vendedor</th>
            <th>Total</th>
        </tr>
    </thead>
    <tbody id="lista-ventas">
        </tbody>
</table>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const session = JSON.parse(localStorage.getItem('session_jadi'));
    const empresaID = session.empresaID;

    function cargarReportes() {
        const hoy = new Date().toLocaleDateString();
        
        db.ref('Ecosistema_JADI/Ventas/' + empresaID).on('value', snap => {
            let sumaDinero = 0;
            let sumaPares = 0;
            const container = document.getElementById('lista-ventas');
            container.innerHTML = "";

            snap.forEach(child => {
                const v = child.val();
                
                // Solo sumar si es de la fecha de hoy
                if(v.fecha.includes(hoy)) {
                    sumaDinero += parseFloat(v.total);
                    sumaPares += v.items.length;

                    container.innerHTML += `
                        <tr>
                            <td>${v.fecha.split(', ')[1]}</td>
                            <td>${v.vendedor}</td>
                            <td style="color:var(--gold)">$${v.total.toFixed(2)}</td>
                        </tr>
                    `;
                }
            });

            document.getElementById('total-hoy').innerText = "$" + sumaDinero.toFixed(2);
            document.getElementById('pares-hoy').innerText = sumaPares;
        });
    }

    cargarReportes();
</script>
</body>
</html>
