<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Registro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
        .card { width: 90%; max-width: 380px; padding: 30px; background: #0a0a0a; border-radius: 20px; border: 1px solid #222; }
        h1 { color: #fbc02d; letter-spacing: 5px; margin-bottom: 20px; }
        .btn-google { background: #fff; color: #000; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; border: none; cursor: pointer; font-size: 1rem; margin-top: 20px; }
        #seccion-rol, #seccion-tel, #loader, #vista-login { display: none; }
        .roles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-rol { background: #111; color: #888; padding: 15px; border: 1px solid #333; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-rol.active { border-color: #fbc02d; color: #fbc02d; background: #1a1500; }
        input { width: 100%; padding: 18px; margin: 20px 0; background: #000; color: #fff; border: 1px solid #333; border-radius: 12px; box-sizing: border-box; text-align: center; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="loader"><p style="color:#fbc02d;">CONECTANDO...</p></div>

    <div class="card" id="vista-login">
        <h1>J.A.D.I</h1>
        <button class="btn-google" id="btn-login">ENTRAR CON GOOGLE</button>
    </div>

    <div class="card" id="seccion-rol">
        <h2 style="color:#fbc02d">¿QUIÉN ERES?</h2>
        <div class="roles">
            <button class="btn-rol" onclick="pasoTelefono('ZAPATERO')">ZAPATERO</button>
            <button class="btn-rol" onclick="pasoTelefono('CLIENTE')">CLIENTE</button>
            <button class="btn-rol" onclick="pasoTelefono('TIENDA')">TIENDA</button>
            <button class="btn-rol" onclick="pasoTelefono('MOTORIZADO')">MOTORIZADO</button>
            <button class="btn-rol" onclick="pasoTelefono('PROVEEDOR')" style="grid-column: span 2;">PROVEEDOR</button>
        </div>
    </div>

    <div class="card" id="seccion-tel">
        <h2 id="txt-saludo" style="color:#fbc02d; margin-bottom:5px;">HOLA</h2>
        <p style="color:#666; margin:0;">Danos tu WhatsApp para pedidos</p>
        <input type="tel" id="user-tel" placeholder="099 000 0000">
        <button class="btn-google" style="background:#fbc02d" onclick="crearUsuario()">FINALIZAR REGISTRO</button>
        <p onclick="location.reload()" style="font-size:12px; color:#444; margin-top:15px; cursor:pointer;">Regresar</p>
    </div>

<script>
    const config = { 
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
        projectId: "jadi-repaiz"
    };
    firebase.initializeApp(config);

    const auth = firebase.auth();
    const db = firebase.database();
    let uTmp = null;
    let rTmp = "";

    auth.onAuthStateChanged(user => {
        document.getElementById('loader').style.display = 'none';
        if (user) {
            uTmp = user;
            db.ref('usuarios/' + user.uid).once('value', s => {
                if (s.exists()) {
                    window.location.href = s.val().rolCodigo + ".html";
                } else {
                    document.getElementById('vista-login').style.display = 'none';
                    document.getElementById('seccion-rol').style.display = 'block';
                }
            });
        } else {
            document.getElementById('vista-login').style.display = 'block';
        }
    });

    document.getElementById('btn-login').onclick = () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        auth.signInWithRedirect(provider);
    };

    // FUNCIÓN PARA EL SALTO AL TELÉFONO
    function pasoTelefono(rol) {
        rTmp = rol;
        document.getElementById('seccion-rol').style.display = 'none';
        document.getElementById('seccion-tel').style.display = 'block';
        document.getElementById('txt-saludo').innerText = "HOLA, " + rol;
    }

    async function crearUsuario() {
        const t = document.getElementById('user-tel').value;
        if(t.length < 8) return alert("Por favor, ingresa un número válido");
        
        document.getElementById('seccion-tel').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        const s = await db.ref('contadores/' + rTmp).once('value');
        const n = (s.val() || 0) + 1;
        await db.ref('contadores/' + rTmp).set(n);

        const data = {
            uid: uTmp.uid,
            nombre: uTmp.displayName,
            email: uTmp.email,
            telefono: t,
            rolCodigo: rTmp.toLowerCase(),
            id_jadi: rTmp.slice(0,3).toUpperCase() + n.toString().padStart(4, '0')
        };

        await db.ref('usuarios/' + uTmp.uid).set(data);
        window.location.href = data.rolCodigo + ".html";
    }
</script>
</body>
</html>
