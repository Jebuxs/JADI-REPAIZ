<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiendas Registradas - J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        
        header { display: flex; align-items: center; gap: 15px; padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 20px; }
        .back-btn { color: var(--gold); text-decoration: none; font-size: 1.2rem; }
        
        .search-bar { background: var(--card); border: 1px solid #333; padding: 12px; border-radius: 10px; display: flex; align-items: center; margin-bottom: 20px; }
        .search-bar input { background: none; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }

        .shops-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        
        .shop-card { 
            background: var(--card); 
            border-radius: 15px; 
            padding: 20px; 
            border: 1px solid #222; 
            display: flex; 
            align-items: center; 
            gap: 15px;
            transition: 0.3s;
            cursor: pointer;
        }
        .shop-card:hover { border-color: var(--gold); background: #1a1a1a; }
        
        .shop-logo { 
            width: 60px; 
            height: 60px; 
            background: #222; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--gold);
            font-size: 1.5rem;
            border: 1px solid #333;
        }
        
        .shop-info h3 { margin: 0; font-size: 1.1rem; color: var(--gold); }
        .shop-info p { margin: 5px 0 0; font-size: 0.8rem; color: #777; }
        .status-dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; display: inline-block; margin-right: 5px; }

        .loader { text-align: center; padding: 50px; color: #555; }
    </style>
</head>
<body>

<header>
    <a href="cliente.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <h2 style="margin:0; font-size: 1.2rem;">Tiendas Aliadas</h2>
</header>

<div class="search-bar">
    <i class="fas fa-search" style="color: #555;"></i>
    <input type="text" id="searchInput" placeholder="Buscar tienda por nombre..." onkeyup="filtrarTiendas()">
</div>

<div id="shops-container" class="shops-grid">
    <div class="loader"><i class="fas fa-circle-notch fa-spin fa-2x"></i><p>Localizando tiendas...</p></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function cargarTiendas() {
        db.ref('usuarios').orderByChild('rolCodigo').equalTo('SHP').on('value', snap => {
            const container = document.getElementById('shops-container');
            container.innerHTML = "";

            if (!snap.exists()) {
                container.innerHTML = "<p style='text-align:center; color:#666;'>No hay tiendas registradas aún.</p>";
                return;
            }

            snap.forEach(child => {
                const s = child.val();
                const shopId = child.key;
                const nombreTienda = s.empresaNombre || s.nombre || "Tienda JADI";
                
                container.innerHTML += `
                    <div class="shop-card" onclick="irAlCatalogo('${shopId}', '${nombreTienda}')">
                        <div class="shop-logo">
                            <i class="fas fa-store"></i>
                        </div>
                        <div class="shop-info">
                            <h3>${nombreTienda}</h3>
                            <p><span class="status-dot"></span> Abierto ahora</p>
                            <p style="color:#555; font-size: 0.7rem;">ID: ${shopId.slice(-6)}</p>
                        </div>
                        <i class="fas fa-chevron-right" style="margin-left: auto; color: #333;"></i>
                    </div>
                `;
            });
        });
    }

    function irAlCatalogo(id, nombre) {
        // Guardamos el nombre temporalmente para el catálogo
        localStorage.setItem('temp_shop_name', nombre);
        // Enviamos el ID por la URL
        window.location.href = `catalogo.html?tienda=${id}`;
    }

    function filtrarTiendas() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('shop-card');
        
        for (let i = 0; i < cards.length; i++) {
            let name = cards[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
            cards[i].style.display = name.includes(input) ? "flex" : "none";
        }
    }

    // Iniciar carga
    cargarTiendas();
</script>
</body>
</html>
