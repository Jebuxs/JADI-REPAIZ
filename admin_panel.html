<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 20px; }
        .info-card { background: var(--card); padding: 15px; border-radius: 15px; border-left: 5px solid var(--gold); margin-bottom: 20px; }
        .id-badge { background: var(--gold); color: black; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-family: monospace; }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-item { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .menu-item i { font-size: 2rem; color: var(--gold); margin-bottom: 10px; }
        .menu-item:active { transform: scale(0.95); }
        .btn-logout { margin-top: 30px; color: #ff5252; cursor: pointer; text-align: center; width: 100%; display: block; text-decoration: none; }
    </style>
</head>
<body>

<div class="header">
    <h2 id="txt-nombre-empresa">Cargando...</h2>
    <p>ID Empresa: <span class="id-badge" id="txt-id-empresa">---</span></p>
</div>

<div class="info-card">
    <p style="margin:0; font-size: 0.8rem; color: #888;">Bienvenido, Dueño:</p>
    <h3 id="txt-nombre-dueño" style="margin:5px 0 0 0">---</h3>
</div>

<div class="grid-menu">
    <div class="menu-item" onclick="location.href='gestion_sucursales.html'">
        <i class="fas fa-store"></i>
        <div>Sucursales</div>
    </div>
    <div class="menu-item" onclick="location.href='inventario_bultos.html'">
        <i class="fas fa-boxes"></i>
        <div>Inventario Flexible</div>
    </div>
    <div class="menu-item" onclick="abrirConfiguracion()">
        <i class="fas fa-percentage"></i>
        <div>Comisiones Marketplace</div>
    </div>
    <div class="menu-item" onclick="location.href='reportes.html'">
        <i class="fas fa-chart-line"></i>
        <div>Reportes</div>
    </div>
</div>

<a class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</a>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const session = JSON.parse(localStorage.getItem('session_jadi'));

    if (!session || session.rolCodigo === 'CLN') {
        window.location.href = 'index.html';
    } else {
        cargarDatosPanel();
    }

    async function cargarDatosPanel() {
        const snap = await db.ref('Ecosistema_JADI/Config_Empresas/' + session.empresaID + '/datos').once('value');
        const datosEmpresa = snap.val();
        if (datosEmpresa) {
            document.getElementById('txt-nombre-empresa').innerText = datosEmpresa.nombre;
            document.getElementById('txt-id-empresa').innerText = session.empresaID;
            document.getElementById('txt-nombre-dueño').innerText = session.nombre;
        }
    }

    async function abrirConfiguracion() {
        const extraCli = prompt("Porcentaje EXTRA que paga el CLIENTE (Ej: 10 para cobrar $16.50 sobre $15):", "10");
        const descZap = prompt("Porcentaje que se descuenta al ZAPATERO (Ej: 10 para pagar $13.50 sobre $15):", "10");

        if (extraCli && descZap) {
            await db.ref('Ecosistema_JADI/Config_Global/Comisiones').set({
                cliente_plus: parseFloat(extraCli),
                zapatero_fee: parseFloat(descZap),
                actualizado_por: session.nombre
            });
            alert("Configuración de Marketplace guardada correctamente.");
        }
    }

    function cerrarSesion() {
        localStorage.removeItem('session_jadi');
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
