<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Trabajos | J.A.D.I REPAIZ</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --gold: #D4AF37;
            --bg-dark: #000000;
            --bg-card: #0a0a0a;
            --border-color: #1a1a1a;
            --text-main: #E6E8ED;
            --text-muted: #888;
            --shadow-premium: 0 4px 20px rgba(0,0,0,0.8);
        }

        body {
            margin: 0; background-color: var(--bg-dark); color: var(--text-main);
            font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased;
        }

        /* 2 & 3: HEADER */
        .header {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 20px; background: #000;
            border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 1000;
        }
        .header i { font-size: 18px; color: var(--gold); cursor: pointer; transition: 0.3s; }

        /* 4: PANEL DE BÚSQUEDA */
        .search-area { padding: 15px 20px; background: #000; }
        .search-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }
        .search-grid input {
            background: #0f0f0f; border: 1px solid #333;
            padding: 10px 15px; border-radius: 8px; color: white; font-size: 13px; outline: none;
        }
        .search-grid input:focus { border-color: var(--gold); }

        .section-header {
            padding: 10px 20px; font-size: 11px; color: #fff;
            text-transform: uppercase; letter-spacing: 2px; font-weight: 800;
        }

        /* 5: GRUPO TRABAJOS LOCAL (SCROLL) */
        .scroll-container {
            max-height: 55vh; overflow-y: auto; padding-bottom: 10px;
        }
        .scroll-container::-webkit-scrollbar { width: 3px; }
        .scroll-container::-webkit-scrollbar-thumb { background: var(--gold); }

        /* ESTILO TARJETAS (Punto 5) */
        .card-trabajo {
            background: var(--bg-card); margin: 0 15px 10px; padding: 15px;
            border-radius: 10px; border: 1px solid var(--border-color);
            box-shadow: var(--shadow-premium); position: relative;
        }
        
        .card-top { display: flex; justify-content: space-between; align-items: center; }
        
        /* 5.1 ICONOS SUPERIOR DERECHA */
        .card-actions { display: flex; gap: 12px; }
        .card-actions i { font-size: 16px; color: #3498db; cursor: pointer; }
        .card-actions i.fa-file-invoice { color: #f1c40f; }
        .card-actions i.fa-comment-dots { color: #95a5a6; }

        .client-name { font-size: 15px; font-weight: 700; color: #fff; }
        .client-id { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        
        .money-box { margin: 10px 0; font-size: 12px; color: #fff; }
        .money-box b { color: var(--gold); }
        .saldo-tag { color: var(--gold); font-weight: 700; margin-left: 10px; }

        /* ESTADOS (h, i, j) */
        .status-badge {
            position: absolute; top: 15px; right: 80px;
            font-size: 9px; padding: 3px 8px; border-radius: 5px;
            border: 1px solid var(--gold); color: var(--gold);
            text-transform: uppercase; font-weight: 900;
        }

        .status-selector { display: flex; gap: 5px; margin-top: 10px; }
        .status-pill {
            flex: 1; font-size: 8px; padding: 6px; border-radius: 5px;
            border: 1px solid #222; text-align: center;
            color: #555; cursor: pointer; font-weight: 700; text-transform: uppercase;
        }
        .status-pill.active { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.05); }

        /* 6: SOLICITUDES CLIENTE */
        .card-solicitud {
            background: #0a0a0a; border-left: 3px solid var(--gold);
            margin: 0 15px 8px; padding: 12px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
