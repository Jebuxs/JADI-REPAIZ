<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Acceso</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .card { width: 85%; max-width: 350px; padding: 40px 20px; background: #0a0a0a; border-radius: 20px; border: 1px solid #222; }
        h1 { color: #fbc02d; letter-spacing: 5px; margin-bottom: 30px; }
        .btn-google { background: #fff; color: #000; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; border: none; cursor: pointer; font-size: 1rem; }
        #registro, #loader { display: none; }
        .btn-rol { background: #111; color: #888; padding: 12px; margin: 5px; border: 1px solid #333; border-radius: 8px; width: 45%; }
        .active { border-color: #fbc02d; color: #fbc02d; }
    </style>
</head>
<body>

    <div class="card" id="login-screen">
        <h1>J.A.D.I</h1>
        <button class="btn-google" id="btn-entrar">ENTRAR CON GOOGLE</button>
    </div>

    <div class="card" id="registro">
        <h2 style="color:#fbc02d">REGISTRO</h2>
        <button class="btn-rol" onclick="selR('ZAPATERO', this)">ZAPATERO</button>
        <button class="btn-rol" onclick="selR('CLIENTE', this)">CLIENTE</button>
        <input type="tel" id="tel" placeholder="WhatsApp" style="width:100%; padding:15px; margin:15px 0; background:#000; color:#fff; border:1px solid #333; border-radius:10px; box-sizing:border-box;">
        <button class="btn-google" style="background:#fbc02d" onclick="crear()">FINALIZAR</button>
    </div>

    <div id="loader" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center;">
        <p style="color:#fbc02d; font-weight:bold;">CARGANDO...</p>
    </div>

<script>
    // 1. CONFIGURACIÓN
    const firebaseConfig = { 
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU", 
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" 
    };
    
    try {
        firebase.initializeApp(firebaseConfig);
    } catch (e) {
        alert("Error al conectar con Firebase: " + e.message);
    }

    const auth = firebase.auth();
    const db = firebase.database();
    let uTemp = null;
    let rTemp = "";

    // 2. DETECTAR CLIC (Fuerza bruta)
    document.getElementById('btn-entrar').onclick = function() {
        try {
            localStorage.clear();
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider);
        } catch (err) {
            alert("Error al intentar iniciar sesión: " + err.message);
        }
    };

    // 3. RECIBIR DATOS AL VOLVER
    auth.getRedirectResult().then(res => {
        if (res.user) {
            uTemp = res.user;
            document.getElementById('loader').style.display = 'flex';
            db.ref('usuarios/' + res.user.uid).once('value', s => {
                document.getElementById('loader').style.display = 'none';
                if (s.exists()) {
                    const d = s.val();
                    localStorage.setItem('session_jadi', JSON.stringify(d));
                    window.location.href = d.rolCodigo + ".html";
                } else {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('registro').style.display = 'block';
                }
            });
        }
    }).catch(e => {
        alert("Error de Firebase: " + e.message);
    });

    function selR(r, b) {
        rTemp = r;
        document.querySelectorAll('.btn-rol').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
    }

    async function crear() {
        const t = document.getElementById('tel').value;
        if(!rTemp || t.length < 8) return alert("Selecciona rol y pon tu WhatsApp");

        const s = await db.ref('contadores/' + rTemp).once('value');
        const n = (s.val() || 0) + 1;
        await db.ref('contadores/' + rTemp).set(n);

        const data = {
            uid: uTemp.uid,
            nombre: uTemp.displayName,
            email: uTemp.email,
            telefono: t,
            rolCodigo: rTemp.toLowerCase(),
            id_jadi: rTemp.slice(0,3).toUpperCase() + n.toString().padStart(4, '0')
        };

        await db.ref('usuarios/' + uTemp.uid).set(data);
        localStorage.setItem('session_jadi', JSON.stringify(data));
        window.location.href = data.rolCodigo + ".html";
    }
</script>
</body>
</html>
