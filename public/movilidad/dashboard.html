<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Movilidad - JADI REPAIZ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; --text: #eee; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; padding-bottom: 100px; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 25px; }

        /* Pilares de Logística */
        .main-pillars { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 30px; }
        .pillar-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; transition: 0.3s; }
        .pillar-card i { font-size: 1.6rem; margin-bottom: 8px; display: block; color: var(--gold); }
        .pillar-card h3 { margin: 5px 0; font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .pillar-card span { font-size: 1.4rem; font-weight: bold; }

        /* Sección de Ruta Activa */
        .route-section { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; margin-bottom: 20px; }
        .route-section h2 { color: var(--gold); font-size: 1rem; margin-top: 0; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        .route-item { display: flex; align-items: flex-start; gap: 15px; padding: 15px; border-bottom: 1px solid #222; position: relative; }
        .route-item:last-child { border-bottom: none; }
        .route-icon { color: var(--gold); font-size: 1.2rem; margin-top: 3px; }
        .route-details h4 { margin: 0; font-size: 0.9rem; }
        .route-details p { margin: 3px 0; font-size: 0.75rem; color: #777; }
        
        .btn-status { position: absolute; right: 10px; top: 15px; background: #222; border: 1px solid #444; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.65rem; cursor: pointer; }
        .btn-status:hover { background: var(--gold); color: black; border-color: var(--gold); }

        /* Botones de Acción Rápida */
        .action-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 30px; }
        .action-btn { background: #111; border: 1px solid #333; color: white; padding: 18px; border-radius: 12px; text-decoration: none; text-align: center; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.9rem; }
        .action-btn i { font-size: 1.3rem; color: var(--gold); }

        /* Barra Inferior */
        .quick-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(10,10,10,0.95); padding: 12px 30px; border-radius: 50px; border: 1px solid var(--gold); display: flex; gap: 30px; backdrop-filter: blur(10px); z-index: 1000; }
        .nav-item { color: #fff; font-size: 1.2rem; text-decoration: none; opacity: 0.6; transition: 0.3s; }
        .nav-item:hover { opacity: 1; color: var(--gold); }
    </style>
</head>
<body>

<header>
    <div>
        <h2 style="color:var(--gold); margin:0; font-size: 1.1rem;" id="dlv-name">MOVILIDAD JADI</h2>
        <small style="color: #555;">Rutas de Entrega y Recolección</small>
    </div>
    <button onclick="cerrarSesion()" style="background:none; border:1px solid #333; color:#444; padding:5px 10px; border-radius:5px; cursor:pointer; font-size: 0.7rem;">SALIR</button>
</header>

<div class="main-pillars">
    <div class="pillar-card">
        <i class="fas fa-box"></i>
        <h3>RECOGER</h3><span id="d-pick">0</span>
    </div>
    <div class="pillar-card">
        <i class="fas fa-shipping-fast"></i>
        <h3>ENTREGAR</h3><span id="d-drop">0</span>
    </div>
    <div class="pillar-card">
        <i class="fas fa-check-double"></i>
        <h3>LISTOS HOY</h3><span id="d-done">0</span>
    </div>
</div>

<div class="action-grid">
    <a href="mapa-ruta.html" class="action-btn">
        <i class="fas fa-map-marked-alt"></i> VER RUTA EN MAPA
    </a>
</div>

<div class="route-section">
    <h2><i class="fas fa-list-ol"></i> PRÓXIMAS PARADAS</h2>
    <div id="lista-paradas">
        <div class="route-item">
            <i class="fas fa-map-pin route-icon"></i>
            <div class="route-details">
                <h4>Calle 6 de Julio - David</h4>
                <p>Recolección: 2 pares de zapatos deportivos.</p>
                <p style="color:var(--gold)">Prioridad: Alta</p>
            </div>
            <button class="btn-status">COMPLETAR</button>
        </div>
        <p style="text-align:center; color:#444; padding:20px; font-size: 0.8rem; display:none;" id="no-paradas">No tienes paradas asignadas por ahora.</p>
    </div>
</div>

<div class="quick-nav">
    <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i></a>
    <a href="historial-viajes.html" class="nav-item"><i class="fas fa-history"></i></a>
    <a href="reportar-novedad.html" class="nav-item"><i class="fas fa-exclamation-triangle"></i></a>
    <button onclick="cerrarSesion()" class="nav-item" style="background:none; border:none; cursor:pointer;"><i class="fas fa-power-off"></i></button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    async function validarAcceso() {
        const session = JSON.parse(localStorage.getItem('session_jadi'));
        
        if(!session) {
            window.location.href = "../login.html";
            return;
        }

        const snap = await db.ref('usuarios/' + session.uid).once('value');
        if(!snap.exists()) {
            cerrarSesion();
            return;
        }

        const u = snap.val();
        // Solo DLV (Delivery) o ADM (Tú)
        if(u.rolCodigo !== 'DLV' && u.rolCodigo !== 'ADM') {
            window.location.href = "../login.html";
            return;
        }

        document.getElementById('dlv-name').innerText = "DRIVER: " + u.nombre.toUpperCase();
        cargarDatosRuta();
    }

    function cargarDatosRuta() {
        console.log("Sincronizando coordenadas y pedidos...");
    }

    function cerrarSesion() {
        auth.signOut();
        localStorage.removeItem('session_jadi');
        window.location.href = "../login.html";
    }

    validarAcceso();
</script>
</body>
</html>
