<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Acceso</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --gold: #fbc02d; --dark: #000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .card { width: 90%; max-width: 380px; padding: 40px 25px; background: #0a0a0a; border-radius: 25px; border: 1px solid #222; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        .brand { font-size: 2.8rem; font-weight: 900; color: var(--gold); letter-spacing: 6px; margin-bottom: 5px; text-transform: uppercase; }
        .btn-google { background: white; color: black; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 30px; }
        #seccion-registro, #loader { display: none; }
        .roles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .btn-role { padding: 15px; background: #111; border: 1px solid #333; color: #888; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .btn-role.active { border-color: var(--gold); color: var(--gold); background: #1a1500; }
        input { width: 100%; padding: 16px; margin-top: 20px; background: #000; border: 1px solid #333; color: white; border-radius: 12px; box-sizing: border-box; text-align: center; font-size: 1rem; }
        .btn-finish { background: var(--gold); color: black; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 25px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card" id="vista-login">
        <div class="brand">J.A.D.I</div>
        <p style="color: #666; font-size: 0.7rem; letter-spacing: 2px;">RESTAURACIÓN PROFESIONAL</p>
        <button class="btn-google" id="btn-entrar">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
            ENTRAR CON GOOGLE
        </button>
    </div>

    <div class="card" id="seccion-registro">
        <h2 style="color: var(--gold); margin: 0;">BIENVENIDO</h2>
        <p style="color: #888; font-size: 0.9rem;">Elige tu perfil para continuar</p>
        <div class="roles-grid">
            <button class="btn-role" onclick="seleccionarRol(this, 'ZAPATERO')">ZAPATERO</button>
            <button class="btn-role" onclick="seleccionarRol(this, 'CLIENTE')">CLIENTE</button>
            <button class="btn-role" onclick="seleccionarRol(this, 'TIENDA')">TIENDA</button>
            <button class="btn-role" onclick="seleccionarRol(this, 'MOTORIZADO')">MOTORIZADO</button>
        </div>
        <input type="tel" id="user-phone" placeholder="WhatsApp (Ej: 0991234567)">
        <button class="btn-finish" onclick="completarRegistro()">FINALIZAR REGISTRO</button>
    </div>

    <div id="loader" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; flex-direction:column; z-index:1000;">
        <p style="color: var(--gold); font-weight: bold; letter-spacing: 2px;">CONECTANDO...</p>
    </div>

<script>
    // CONFIGURACIÓN OFICIAL
    const firebaseConfig = { 
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com", // Esto quita el error de la pantalla negra
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
        projectId: "jadi-repaiz",
        storageBucket: "jadi-repaiz.appspot.com"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let tempUser = null;
    let rolSeleccionado = "";

    // ESCUCHAR ESTADO: Detecta si ya regresó de Google
    auth.getRedirectResult().then(result => {
        if (result.user) {
            verificarUsuario(result.user);
        } else {
            auth.onAuthStateChanged(user => {
                if (user) verificarUsuario(user);
                else document.getElementById('loader').style.display = 'none';
            });
        }
    }).catch(error => {
        console.error(error);
        document.getElementById('loader').style.display = 'none';
    });

    // BOTÓN DE ACCIÓN
    document.getElementById('btn-entrar').onclick = () => {
        document.getElementById('loader').style.display = 'flex';
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithRedirect(provider);
    };

    function verificarUsuario(user) {
        tempUser = user;
        db.ref('usuarios/' + user.uid).once('value', snapshot => {
            document.getElementById('loader').style.display = 'none';
            if (snapshot.exists()) {
                const data = snapshot.val();
                localStorage.setItem('session_jadi', JSON.stringify(data));
                window.location.href = data.rolCodigo + ".html";
            } else {
                document.getElementById('vista-login').style.display = 'none';
                document.getElementById('seccion-registro').style.display = 'block';
            }
        });
    }

    function seleccionarRol(boton, rol) {
        document.querySelectorAll('.btn-role').forEach(b => b.classList.remove('active'));
        boton.classList.add('active');
        rolSeleccionado = rol;
    }

    async function completarRegistro() {
        const telefono = document.getElementById('user-phone').value;
        if (!rolSeleccionado || telefono.length < 8) {
            return alert("Selecciona un perfil y pon tu WhatsApp.");
        }

        document.getElementById('loader').style.display = 'flex';
        try {
            const snap = await db.ref('contadores/' + rolSeleccionado).once('value');
            let num = (snap.val() || 0) + 1;
            await db.ref('contadores/' + rolSeleccionado).set(num);

            const userFinal = {
                uid: tempUser.uid,
                nombre: tempUser.displayName,
                email: tempUser.email,
                telefono: telefono,
                rolCodigo: rolSeleccionado.toLowerCase(),
                id_jadi: rolSeleccionado.slice(0,3).toUpperCase() + num.toString().padStart(4, '0')
            };

            await db.ref('usuarios/' + tempUser.uid).set(userFinal);
            localStorage.setItem('session_jadi', JSON.stringify(userFinal));
            window.location.href = userFinal.rolCodigo + ".html";
        } catch (e) {
            alert("Error: " + e.message);
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>
</body>
</html>
