<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajos | J.A.D.I REPAIZ</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="/js/estilo_visual.js"></script>

    <style>
        :root {
            --gold: #D4AF37;
            --bg-dark: #000000;
            --bg-card: #0d0d0d;
            --border-color: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #888;
        }

        body {
            margin: 0; background-color: var(--bg-dark); color: var(--text-main);
            font-family: 'Inter', sans-serif; min-height: 100vh;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: #000; border-bottom: 1px solid var(--gold);
        }

        .search-area { padding: 15px; background: #000; }
        .search-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 8px; }
        .search-grid input {
            background: #111; border: 1px solid #333; padding: 10px;
            border-radius: 8px; color: white; font-size: 13px;
        }

        .section-header { padding: 15px 20px 5px; font-size: 11px; color: #fff; text-transform: uppercase; letter-spacing: 2px; }

        /* Contenedor con Scroll */
        #contenedorTrabajos {
            max-height: 50vh; overflow-y: auto; padding: 10px 0;
        }

        .card-trabajo {
            background: var(--bg-card); margin: 0 15px 12px; padding: 15px;
            border-radius: 12px; border: 1px solid var(--border-color);
            position: relative;
        }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-actions { display: flex; gap: 15px; }
        .card-actions i { font-size: 17px; cursor: pointer; }
        .fa-file-invoice { color: #f1c40f; }
        .fa-comment-dots { color: #3498db; }
        .fa-edit { color: #fff; }

        .client-name { font-size: 15px; font-weight: 700; }
        .client-id { font-size: 10px; color: var(--text-muted); }

        .money-line { margin: 10px 0; font-size: 13px; }
        .money-line b { color: var(--gold); }

        .status-selector { display: flex; gap: 5px; margin-top: 10px; }
        .status-pill {
            flex: 1; font-size: 8px; padding: 6px; border-radius: 5px;
            border: 1px solid #222; text-align: center; color: #555; font-weight: 700;
        }
        .status-pill.active { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.1); }

        .card-solicitud {
            background: #0a0a0a; border-left: 3px solid var(--gold);
            margin: 0 15px 8px; padding: 12px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .btn-add {
            position: fixed; bottom: 25px; right: 25px;
            background: var(--gold); width: 55px; height: 55px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>

        <i class="fas fa-sync-alt" onclick="window.location.reload()"></i>
    </div>

    <div class="search-area">
        <div class="search-grid">
            <input type="text" id="busqueda" placeholder="Nombre o ID...">
            <input type="date" id="fechaFiltro">
        </div>
    </div>

    <div class="section-header">Órdenes en Taller</div>
    <div id="contenedorTrabajos">
        <p style="text-align: center; color: #444;">Buscando en base de datos...</p>
    </div>

    <div class="section-header">Solicitudes de Clientes</div>
    <div id="contenedorSolicitudes"></div>
