<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JADI REPAIZ - Nueva Orden</title>
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px; }
        .order-id-box { text-align: left; }
        .order-id-box span { font-size: 0.8rem; color: var(--gold); text-transform: uppercase; }
        .order-id-box h2 { margin: 0; font-size: 1.4rem; }
        
        .section { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid #222; margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 12px; background: #080808; border: 1px solid #333; border-radius: 6px; color: white; box-sizing: border-box; margin-bottom: 10px; }
        
        .btn-add { background: var(--gold); color: black; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        .item-row { background: #1a1a1a; padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 3px solid var(--gold); position: relative; }
        .item-row b { font-size: 0.9rem; }
        .item-row p { margin: 3px 0; font-size: 0.8rem; color: #bbb; }
        .item-row .price { color: var(--gold); font-weight: bold; }
        .item-row .remove { position: absolute; right: 10px; top: 10px; color: #ff5252; cursor: pointer; }

        .summary { border-top: 1px solid #333; padding-top: 15px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9rem; }
        .total-row { font-size: 1.3rem; font-weight: bold; color: var(--gold); border-top: 1px solid var(--gold); padding-top: 10px; margin-top: 10px; }
        
        .btn-save { background: #4CAF50; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="order-id-box">
                <span>Orden No.</span>
                <h2 id="display-order-id">---</h2>
            </div>
            <div style="font-size: 1.5rem;">👟</div>
        </div>

        <!-- CLIENTE -->
        <div class="section">
            <label>WhatsApp del Cliente</label>
            <input type="tel" id="c-whatsapp" placeholder="Ej: 0987654321" oninput="generarVistaPreviaID()">
        </div>

        <!-- FORMULARIO ITEM -->
        <div class="section">
            <label>Detalle del Objeto</label>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="i-cantidad" value="1" style="flex: 1;">
                <input type="text" id="i-objeto" placeholder="¿Qué zapato es?" style="flex: 4;">
            </div>
            <textarea id="i-detalle" placeholder="¿Qué trabajo se va a realizar?" rows="2"></textarea>
            <label>Precio Unitario ($)</label>
            <input type="number" id="i-precio" placeholder="0.00">
            <button class="btn-add" onclick="añadirItem()">+ AÑADIR A LA ORDEN</button>
        </div>

        <!-- LISTADO -->
        <div id="lista-items"></div>

        <!-- TOTALES -->
        <div class="section summary">
            <div class="summary-row"><span>Subtotal:</span> <span id="res-sub">0.00</span></div>
            <div class="summary-row"><span>IVA (15%):</span> <span id="res-iva">0.00</span></div>
            <div class="summary-row">
                <span>Descuento ($):</span> 
                <input type="number" id="i-descuento" value="0" style="width: 70px; margin: 0; padding: 5px; height: 30px;" oninput="actualizarTotales()">
            </div>
            <div class="summary-row total-row"><span>TOTAL:</span> <span id="res-total">0.00</span></div>
        </div>

        <button class="btn-save" onclick="guardarOrdenFinal()">GUARDAR ORDEN COMPLETA</button>
    </div>

    <!-- Firebase SDK (Version 8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <!-- NUESTROS CEREBROS -->
    <script src="../js/core.js"></script>
    <script src="../js/nueva_orden.js"></script>
</body>
</html>
