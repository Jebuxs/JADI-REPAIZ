<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Gestión Proveedor</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; height: 100vh; overflow: hidden; }

        /* CABECERA */
        .top-header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; display: flex; justify-content: center; align-items: center; background: var(--dark); border-bottom: 1px solid #222; z-index: 100; }
        .header-info h1 { margin: 0; font-size: 1.2rem; color: var(--gold); text-align: center; }
        .header-info span { font-size: 0.7rem; color: #555; display: block; text-align: center; }

        .profile-zone { position: fixed; top: 15px; right: 20px; z-index: 101; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--gold); }

        /* MENÚ LATERAL ÚNICO */
        #menu-lateral { position: fixed; top: 70px; left: 0; width: 250px; height: calc(100vh - 70px); background: #0a0a0a; border-right: 1px solid #222; padding: 20px; z-index: 50; }
        
        .nav-btn { width: 100%; padding: 15px; margin-bottom: 15px; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 12px; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }
        .btn-sucursales { border-color: var(--gold); color: var(--gold); }
        .btn-danger { color: #ff4444 !important; border-color: #441111; position: absolute; bottom: 40px; width: calc(100% - 40px); }
        .nav-btn:hover { background: #1a1a1a; }

        /* PANTALLA DE TRABAJO (MATRIZ) */
        #pantalla-sucursales { 
            position: fixed; top: 70px; left: 0; width: 100%; height: calc(100vh - 70px); 
            background: var(--dark); z-index: 200; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto;
        }

        .tabs-nav { display: flex; gap: 5px; margin-bottom: 20px; position: sticky; top: 0; background: var(--dark); padding: 5px 0; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 12px; background: #0a0a0a; border: 1px solid #333; color: #555; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: bold; min-width: 100px; }
        .tab-btn.active { border-color: var(--gold); color: var(--gold); }

        .workspace { background: #0a0a0a; border: 1px solid #222; border-radius: 15px; padding: 20px; min-height: 400px; }

        /* BOTÓN VOLVER */
        .btn-return { position: fixed; bottom: 25px; left: 25px; background: var(--gold); color: black; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; z-index: 300; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="top-header">
    <div class="header-info">
        <h1 id="local-name">NOMBRE DEL LOCAL</h1>
        <span id="local-id">ID: 0000000000</span>
    </div>
</div>

<div class="profile-zone">
    <img src="https://via.placeholder.com/40" class="profile-img" alt="Perfil">
</div>

<div id="menu-lateral">
    <button class="nav-btn btn-sucursales" onclick="abrirSucursales()">
        <i class="fas fa-city"></i> SUCURSALES
    </button>
    
    <button class="nav-btn btn-danger" onclick="confirm('¿Seguro que deseas eliminar tu registro?')">
        <i class="fas fa-user-slash"></i> ELIMINAR CUENTA
    </button>
</div>

<div id="pantalla-sucursales">
    <div class="tabs-nav">
        <button class="tab-btn active" onclick="cambiarSeccion(this, 'inventario')">INVENTARIO</button>
        <button class="tab-btn" onclick="cambiarSeccion(this, 'personal')">PERSONAL</button>
        <button class="tab-btn" onclick="cambiarSeccion(this, 'venta')">VENTA</button>
        <button class="tab-btn" onclick="cambiarSeccion(this, 'facturas')">FACTURACIONES</button>
    </div>

    <div class="workspace">
        <h2 id="titulo-area" style="color:var(--gold); margin-top:0;">Inventario</h2>
        <div id="contenido-area">
            </div>
    </div>
</div>

<button id="btn-back" class="btn-return" onclick="cerrarSucursales()">
    <i class="fas fa-chevron-left"></i>
</button>

<script>
    // Conexión mínima Firebase
    const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);

    function abrirSucursales() {
        // Borramos el menú y mostramos la matriz
        document.getElementById('menu-lateral').style.display = 'none';
        document.getElementById('pantalla-sucursales').style.display = 'block';
        document.getElementById('btn-back').style.display = 'block';
        cambiarSeccion(null, 'inventario');
    }

    function cerrarSucursales() {
        // Regresamos al menú inicial
        document.getElementById('menu-lateral').style.display = 'block';
        document.getElementById('pantalla-sucursales').style.display = 'none';
        document.getElementById('btn-back').style.display = 'none';
    }

    function cambiarSeccion(btn, seccion) {
        if(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        
        const titulo = document.getElementById('titulo-area');
        const contenido = document.getElementById('contenido-area');
        titulo.innerText = seccion.toUpperCase();

        if(seccion === 'inventario') {
            contenido.innerHTML = `
                <div style="text-align:center; padding:60px; border: 1px dashed #333; border-radius:15px;">
                    <button onclick="alert('Formulario de Calzado')" style="background:var(--gold); border:none; padding:15px 30px; border-radius:10px; font-weight:bold; cursor:pointer;">
                        <i class="fas fa-boxes"></i> CREAR INVENTARIO
                    </button>
                </div>
            `;
        } else {
            contenido.innerHTML = `<p style="color:#444; text-align:center; padding-top:50px;">Módulo ${seccion} disponible próximamente.</p>`;
        }
    }
</script>

</body>
</html>
