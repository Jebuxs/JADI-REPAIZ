<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Mi Perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; --text-dim: #666; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; height: 100vh; }

        /* HEADER */
        .top-header { height: 100px; border-bottom: 1px solid #222; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; position: relative; z-index: 500; }
        .brand-mini { font-size: 0.6rem; color: #444; letter-spacing: 3px; margin-bottom: 5px; text-transform: uppercase; }
        .local-title { font-size: 1.6rem; color: var(--gold); font-weight: 800; text-transform: uppercase; margin: 0; }

        /* BOTÓN DE PERFIL */
        .profile-corner { position: absolute; right: 20px; top: 25px; width: 50px; height: 50px; border-radius: 50%; border: 2px solid #333; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #111; overflow: hidden; transition: 0.3s; }
        .profile-corner:hover { border-color: var(--gold); transform: scale(1.05); }
        .profile-corner i { font-size: 1.4rem; color: var(--gold); }

        /* --- PANTALLA MI PERFIL --- */
        #pantalla-perfil { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            background: #000; z-index: 2000; display: none; flex-direction: column; 
        }

        /* NAVEGACIÓN HORIZONTAL DE PERFIL */
        .nav-perfil-horizontal { 
            display: flex; gap: 10px; padding: 15px; background: #0a0a0a; 
            border-bottom: 1px solid #222; overflow-x: auto; white-space: nowrap;
            margin-top: 100px; /* Para que no lo tape el header si decides dejarlo */
        }
        /* Ocultar barra de scroll pero permitir movimiento */
        .nav-perfil-horizontal::-webkit-scrollbar { display: none; }

        .btn-nav-perfil { 
            padding: 10px 20px; background: #111; border: 1px solid #333; 
            color: var(--text-dim); border-radius: 20px; cursor: pointer; 
            font-size: 0.8rem; font-weight: bold; text-transform: uppercase; transition: 0.3s;
        }
        .btn-nav-perfil.active { border-color: var(--gold); color: var(--gold); background: #1a1a1a; }

        /* ÁREA DE CONTENIDO DE PERFIL */
        .content-perfil { flex-grow: 1; padding: 30px; display: flex; flex-direction: column; align-items: center; }
        .card-info { background: #0d0d0d; border: 1px solid #222; border-radius: 15px; width: 100%; max-width: 600px; padding: 25px; }

        .btn-back { position: fixed; bottom: 30px; left: 30px; background: var(--gold); color: black; border: none; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; z-index: 2100; font-size: 1.2rem; }

        /* VISTA INICIAL */
        #main-wrapper { height: calc(100vh - 100px); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-box { width: 280px; padding: 20px; background: #111; border: 1px solid #333; color: white; border-radius: 12px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .btn-sucursales { border-color: var(--gold); color: var(--gold); }
    </style>
</head>
<body>

<div class="top-header">
    <div class="brand-mini">J.A.D.I REPAIZ</div>
    <h1 class="local-title">TU LOCAL</h1>
    <div class="profile-corner" onclick="abrirPerfil()">
        <i class="fas fa-user-cog"></i>
    </div>
</div>

<div id="main-wrapper">
    <button class="btn-box btn-sucursales" onclick="alert('Abriendo Sucursales...')">
        <i class="fas fa-city"></i> SUCURSALES
    </button>
</div>

<div id="pantalla-perfil">
    <div class="nav-perfil-horizontal">
        <button class="btn-nav-perfil active" onclick="seccionPerfil(this, 'seguridad')">Seguridad</button>
        <button class="btn-nav-perfil" onclick="seccionPerfil(this, 'ubicacion')">Ubicación</button>
        <button class="btn-nav-perfil" onclick="seccionPerfil(this, 'personal')">Info Personal</button>
        <button class="tab-btn" onclick="seccionPerfil(this, 'extras')" style="display:none;"></button> <button class="btn-nav-perfil" onclick="seccionPerfil(this, 'adicionales')">Adicionales</button>
    </div>

    <div class="content-perfil">
        <div class="card-info">
            <h2 id="titulo-perfil" style="color:var(--gold); margin-top:0;">SEGURIDAD</h2>
            <hr border="0" style="border-top:1px solid #222; margin: 20px 0;">
            <div id="body-perfil">
                <p style="color:#555;">Aquí podrás cambiar tu contraseña y gestionar accesos.</p>
            </div>
        </div>
    </div>

    <button class="btn-back" onclick="cerrarPerfil()"><i class="fas fa-arrow-left"></i></button>
</div>

<script>
    function abrirPerfil() {
        document.getElementById('pantalla-perfil').style.display = 'flex';
    }

    function cerrarPerfil() {
        document.getElementById('pantalla-perfil').style.display = 'none';
    }

    function seccionPerfil(btn, tipo) {
        // Cambiar estado activo de los botones horizontales
        document.querySelectorAll('.btn-nav-perfil').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const titulo = document.getElementById('titulo-perfil');
        const body = document.getElementById('body-perfil');

        titulo.innerText = tipo.toUpperCase().replace('PERSONAL', 'PERSONAL (INFO)');

        // Lógica de contenido para cada botón
        if(tipo === 'seguridad') {
            body.innerHTML = `<p>Cambio de Clave:</p><input type="password" placeholder="Nueva Clave" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:white; border-radius:5px;">`;
        } else if(tipo === 'ubicacion') {
            body.innerHTML = `<p>Dirección del Local:</p><input type="text" placeholder="Calle, Ciudad..." style="width:100%; padding:10px; background:#000; border:1px solid #333; color:white; border-radius:5px;">`;
        } else if(tipo === 'personal') {
            body.innerHTML = `<p>Nombre del Dueño:</p><input type="text" placeholder="Tu nombre" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:white; border-radius:5px;">`;
        } else {
            body.innerHTML = `<p style="color:#444;">Módulo de ${tipo} en configuración...</p>`;
        }
    }
</script>

</body>
</html>
