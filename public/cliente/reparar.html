<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>J.A.D.I - Mis Reparaciones</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; }
        
        /* Modal: Fondo negro con opacidad y contenido centrado */
        #modal-trabajos-container {
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none; /* Oculto por defecto */
            justify-content: center; 
            align-items: center; 
            z-index: 99999; /* Asegura que esté al frente */
        }
    </style>
</head>
<body>

    <h1>Gestión de Reparaciones</h1>
    <button onclick="abrirModalOrden('solicitar')">Probar Modal</button>

    <div id="modal-trabajos-container"></div>

    <script src="../js/modal_trabajos.js"></script>
</body>
</html>
