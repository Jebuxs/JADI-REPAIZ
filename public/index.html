<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I REPAIZ - Ecosistema</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --input-bg: #111; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 380px; text-align: center; padding: 20px; position: relative; }
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .brand { font-size: 3.5rem; font-weight: 900; color: var(--gold); letter-spacing: -4px; margin: 0; }
        .sub-brand { color: var(--gold); font-size: 0.8rem; letter-spacing: 5px; margin-top: -10px; text-transform: uppercase; margin-bottom: 30px; }
        .field-group { position: relative; margin-bottom: 12px; }
        .input-field, .select-field { width: 100%; padding: 16px; border: 1px solid #222; border-radius: 12px; background: var(--input-bg); color: white; font-size: 1rem; box-sizing: border-box; outline: none; }
        .input-field:focus { border-color: var(--gold); }
        .toggle-pass { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--gold); cursor: pointer; z-index: 10; padding: 5px; }
        .btn-gold { width: 100%; padding: 15px; background: var(--gold); color: #000; border: none; border-radius: 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .view { display: none; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #login-error { color: #ff5252; font-size: 0.8rem; margin-bottom: 10px; }
        .terms { font-size: 0.7rem; color: #666; margin: 15px 0; }
        
        /* Estilo Botón Google */
        .btn-google { width: 100%; padding: 12px; background: white; color: #000; border: none; border-radius: 25px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="color:var(--gold); margin-top:10px;">Procesando...</p></div>

<div class="container">
    <div id="view-login" class="view active">
        <h1 class="brand">J.A.D.I</h1>
        <div class="sub-brand">REPAIZ</div>
        <div id="login-error"></div>
        <div class="field-group">
            <input type="text" id="login-input" class="input-field" placeholder="ID o Celular">
        </div>
        <div class="field-group">
            <input type="password" id="login-pass" class="input-field" placeholder="Contraseña">
            <i class="fas fa-eye toggle-pass" onclick="toggleView('login-pass')"></i>
        </div>
        <button class="btn-gold" onclick="login()">Entrar</button>
        <p onclick="mostrarVista('view-register')" style="color:#555; cursor:pointer; margin-top:30px; font-size: 0.9rem;">Crear empresa o cuenta</p>
    </div>

    <div id="view-register" class="view">
        <h2 style="color:var(--gold)">Nuevo Registro</h2>
        
        <button class="btn-google" onclick="loginConGoogle()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.
