<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Cliente - J.A.D.I REPAIZ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; }
        
        /* I. Estructura Visual: Minimalista Premium */
        body { 
            background: var(--dark); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            text-align: center; 
        }

        /* II. Cabecera de Bienvenida (Header) */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--gold); 
            padding-bottom: 15px; 
            margin-bottom: 40px; 
            text-align: left; 
        }
        .user-meta p { margin: 0; font-size: 0.8rem; color: #666; } /* */
        .user-meta h2 { margin: 0; color: var(--gold); font-size: 1.2rem; } /* Identidad dinámica */

        /* Listado de estilos (Visualización) */
        .style-selector {
            background: #1a1a1a;
            color: var(--gold);
            border: 1px solid #333;
            padding: 5px;
            border-radius: 8px;
            font-size: 0.75rem;
            outline: none;
            cursor: pointer;
        }

        .avatar-btn { 
            background: none; border: none; cursor: pointer; 
            padding: 0; color: #333; transition: 0.3s;
        } /* */
        .avatar-btn:hover { color: var(--gold); }

        /* III. Cuerpo Principal: Tarjetas con esquinas 20px */
        .client-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 20px; 
            max-width: 400px; 
            margin: 0 auto; 
        }
        
        .menu-card { 
            background: var(--card); 
            border: 1px solid #222; 
            border-radius: 20px; 
            padding: 35px 20px; 
            cursor: pointer; 
            transition: 0.3s; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
        } /* */
        .menu-card:hover { border-color: var(--gold); transform: translateY(-5px); background: #151515; }
        
        .menu-card i { font-size: 3rem; }
        .menu-card h3 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; }
        .menu-card p { margin: 0; font-size: 0.85rem; color: #777; }

        /* IV. Pie de Página */
        .btn-logout { 
            margin-top: 50px; 
            background: none; 
            border: 1px solid #333; 
            color: #555; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

<header>
    <div class="user-meta">
        <p>Bienvenido a J.A.D.I REPAIZ</p> <h2 id="client-name">Cargando...</h2> </div>

    <select class="style-selector" id="view-style" onchange="cambiarEstilo(this.value)">
        <option value="default">Estilo Dorado</option>
        <option value="classic">Estilo Clásico</option>
        <option value="modern">Estilo Moderno</option>
    </select>

    <button class="avatar-btn" onclick="irAlPerfil()">
        <i class="fas fa-user-circle fa-2x"></i> </button>
</header>

<div class="client-grid">
    <div class="menu-card" id="card-tiendas" onclick="navegar('tiendas.html')">
        <i class="fas fa-store" id="icon-tiendas" style="color: #e91e63;"></i>
        <h3 id="title-tiendas">TIENDAS</h3>
        <p>Ver locales y comprar productos</p> </div>

    <div class="menu-card" id="card-reparaciones" onclick="navegar('reparar.html')">
        <i class="fas fa-tools" id="icon-reparaciones" style="color: #2196f3;"></i>
        <h3 id="title-reparaciones">REPAR
