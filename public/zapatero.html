<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Hospital del Calzado</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --gold: #fbc02d; --dark: #000; --grey: #121212; --card: #1a1a1a; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* Pantalla de Carga de Seguridad */
        #bloqueo-seguridad { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        
        /* Navbar */
        nav { background: var(--grey); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .logo { color: var(--gold); font-weight: 900; letter-spacing: 3px; font-size: 1.2rem; }
        .id-badge { background: #333; color: var(--gold); padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }

        /* Contenido */
        .container { padding: 20px; max-width: 600px; margin: auto; padding-bottom: 80px; }
        .welcome { margin-bottom: 25px; }
        .welcome h2 { margin: 0; font-size: 1.4rem; color: var(--gold); }
        .welcome p { color: #666; margin: 5px 0; font-size: 0.9rem; }

        /* Cuadrícula de Funciones */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-item { background: var(--card); border: 1px solid #222; padding: 25px 15px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .menu-item:active { transform: scale(0.95); border-color: var(--gold); }
        .menu-item span { font-size: 1.5rem; display: block; margin-bottom: 10px; }
        .menu-item b { font-size: 0.8rem; color: #fff; display: block; text-transform: uppercase; }
        .menu-item small { font-size: 0.7rem; color: #555; }

        /* Sección de Notificaciones */
        .notif-box { margin-top: 30px; background: #1a1500; border: 1px solid #331100; padding: 20px; border-radius: 15px; text-align: center; }
        
        /* Navegación Inferior */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--grey); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-link { color: #444; text-decoration: none; font-size: 0.7rem; font-weight: bold; }
        .nav-link.active { color: var(--gold); }
    </style>
</head>
<body>

    <div id="bloqueo-seguridad">
        <p style="color:var(--gold); font-weight: bold; letter-spacing: 2px;">VERIFICANDO ACCESO J.A.D.I...</p>
    </div>

    <nav>
        <div class="logo">J.A.D.I</div>
        <div class="id-badge" id="txt-id">ID: ...</div>
    </nav>

    <div class="container">
        <div class="welcome">
            <h2 id="txt-saludo">Hola, Zapatero</h2>
            <p>Gestión del Hospital del Calzado</p>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="window.location.href='perfil.html'">
                <span>👤</span>
                <b>Perfil</b>
                <small>Configurar local</small>
            </div>
            <div class="menu-item" onclick="alert('Próximamente: Inventario')">
                <span>📦</span>
                <b>Inventario</b>
                <small>Suelas y tintes</small>
            </div>
            <div class="menu-item" onclick="alert('Próximamente: Clientes')">
                <span>👥</span>
                <b>Clientes</b>
                <small>Registro con QR</small>
            </div>
            <div class="menu-item" onclick="alert('Próximamente: Reparaciones')">
                <span>🛠️</span>
                <b>Trabajos</b>
                <small>Nuevos pedidos</small>
            </div>
        </div>

        <div class="notif-box">
            <p style="color: var(--gold); font-size: 0.8rem; margin: 0;">SISTEMA LISTO</p>
            <p style="font-size: 0.7rem; color: #888;">No tienes reparaciones pendientes por ahora.</p>
        </div>
        
        <button onclick="firebase.auth().signOut()" style="margin-top:40px; width:100%; background:none; border:none; color:#333; font-size:0.7rem;">CERRAR SESIÓN</button>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-link active">INICIO</a>
        <a href="#" class="nav-link">TRABAJOS</a>
        <a href="perfil.html" class="nav-link">CUENTA</a>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
        projectId: "jadi-repaiz"
    };
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.database();

    // GUARDIA DE SEGURIDAD (Anti-Bucle en PC)
    auth.onAuthStateChanged(user => {
        if (user) {
            db.ref('usuarios/' + user.uid).once('value', s => {
                const data = s.val();
                // Verificamos que el usuario exista y tenga el rol correcto
                if (data && data.rolCodigo === 'zapatero') {
                    document.getElementById('bloqueo-seguridad').style.display = 'none';
                    document.getElementById('txt-id').innerText = "ID: " + data.id_jadi;
                    document.getElementById('txt-saludo').innerText = "Hola, " + (data.nombre_local || data.nombre);
                } else {
                    // Si el rol es diferente (ej. proveedor), lo regresamos al inicio
                    window.location.href = "index.html";
                }
            }).catch(e => {
                console.error("Error en DB:", e);
                window.location.href = "index.html";
            });
        } else {
            // Si no hay sesión, al inicio
            window.location.href = "index.html";
        }
    });
</script>
</body>
</html>
