<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Sesión Permanente</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; height: 100vh; }

        .top-header { height: 70px; border-bottom: 1px solid #222; display: flex; justify-content: center; align-items: center; background: #000; }
        .header-info h1 { margin: 0; font-size: 1.2rem; color: var(--gold); text-transform: uppercase; }

        /* VISTA PRINCIPAL */
        #vista-inicio { 
            height: calc(100vh - 70px); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; 
        }

        .btn-menu { 
            width: 260px; padding: 20px; background: #111; border: 1px solid #333; color: white; 
            border-radius: 12px; cursor: pointer; font-size: 1rem; font-weight: bold; display: flex; align-items: center; gap: 15px; 
        }
        .btn-sucursales { border-color: var(--gold); color: var(--gold); }
        .btn-logout { color: #888; border-color: #222; font-size: 0.8rem; padding: 10px; width: 150px; margin-top: 50px; }

        /* PANTALLA MATRIZ */
        #pantalla-matriz { 
            position: fixed; top: 70px; left: 0; width: 100%; height: calc(100vh - 70px); 
            background: #000; z-index: 1000; display: none; 
            flex-direction: column; align-items: center; justify-content: center;
        }

        .mensaje-hola { font-size: 3.5rem; font-weight: bold; color: var(--gold); letter-spacing: 5px; text-shadow: 0 0 20px rgba(251, 192, 45, 0.4); }

        .btn-volver { 
            position: fixed; bottom: 30px; left: 30px; background: var(--gold); color: black; 
            border: none; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="top-header">
    <div class="header-info">
        <h1>J.A.D.I REPAIZ</h1>
    </div>
</div>

<div id="vista-inicio">
    <button class="btn-menu btn-sucursales" onclick="abrirMatriz()">
        <i class="fas fa-city"></i> SUCURSALES
    </button>
    
    <button class="btn-menu btn-logout" onclick="cerrarSesion()">
        <i class="fas fa-sign-out-alt"></i> CERRAR SESIÓN
    </button>
</div>

<div id="pantalla-matriz">
    <div class="mensaje-hola">HOLA</div>
    
    <button class="btn-volver" onclick="cerrarMatriz()">
        <i class="fas fa-arrow-left"></i>
    </button>
</div>

<script>
    // --- LÓGICA DE PERSISTENCIA ---
    
    window.onload = function() {
        // Al cargar la página, revisamos si ya "estaba logueado"
        const sesionActiva = localStorage.getItem('jadi_sesion');
        
        if (sesionActiva === 'true') {
            console.log("Sesión recuperada");
            // Aquí podrías incluso recuperar el nombre del local si lo guardamos
        } else {
            // Si no hay sesión, lo mandamos al index (opcional)
            // window.location.href = "index.html"; 
        }
    };

    function abrirMatriz() {
        // Guardamos en la memoria del navegador que la sesión está activa
        localStorage.setItem('jadi_sesion', 'true');
        
        document.getElementById('vista-inicio').style.display = 'none';
        document.getElementById('pantalla-matriz').style.display = 'flex';
    }

    function cerrarMatriz() {
        document.getElementById('pantalla-matriz').style.display = 'none';
        document.getElementById('vista-inicio').style.display = 'flex';
    }

    function cerrarSesion() {
        if(confirm("¿Quieres cerrar sesión? Te pedirá clave la próxima vez.")) {
            localStorage.removeItem('jadi_sesion');
            window.location.href = "index.html"; // O a donde tengas el login
        }
    }
</script>

</body>
</html>
