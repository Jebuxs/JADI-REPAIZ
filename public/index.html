<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Acceso</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #fbc02d; --dark: #000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .card { width: 90%; max-width: 380px; padding: 30px; background: #0a0a0a; border-radius: 20px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .brand { font-size: 2.5rem; font-weight: 900; color: var(--gold); letter-spacing: 5px; margin-bottom: 10px; }
        .btn-google { background: white; color: black; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; font-size: 1rem; }
        #seccion-registro, #loader { display: none; }
        .roles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .role-btn { padding: 15px; border: 1px solid #333; border-radius: 12px; background: #111; color: #888; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .role-btn.active { border-color: var(--gold); color: var(--gold); background: #1a1500; }
        input { width: 100%; padding: 15px; margin-top: 20px; background: #000; border: 1px solid #333; color: white; border-radius: 12px; box-sizing: border-box; text-align: center; }
        .btn-final { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card" id="vista-login">
        <div class="brand">J.A.D.I</div>
        <p style="color: #666; font-size: 0.8rem; letter-spacing: 2px;">RESTAURACIÓN PROFESIONAL</p>
        <button class="btn-google" id="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
            ENTRAR CON GOOGLE
        </button>
    </div>

    <div class="card" id="seccion-registro">
        <h3 style="color: var(--gold); margin-top: 0;">COMPLETAR PERFIL</h3>
        <p style="font-size: 0.8rem; color: #888;">¿Cómo usarás la plataforma?</p>
        <div class="roles">
            <button class="role-btn" onclick="seleccionarRol(this, 'ZAPATERO')">ZAPATERO</button>
            <button class="role-btn" onclick="seleccionarRol(this, 'CLIENTE')">CLIENTE</button>
            <button class="role-btn" onclick="seleccionarRol(this, 'TIENDA')">TIENDA</button>
            <button class="role-btn" onclick="seleccionarRol(this, 'MOTORIZADO')">MOTORIZADO</button>
        </div>
        <input type="tel" id="user-tel" placeholder="WhatsApp (Ej: 0987654321)">
        <button class="btn-final" onclick="finalizarRegistro()">EMPEZAR AHORA</button>
    </div>

    <div id="loader" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; flex-direction:column; z-index:100;">
        <div style="width:40px; height:40px; border:4px solid #333; border-top-color:var(--gold); border-radius:50%; animation: spin 1s linear infinite;"></div>
        <p style="color: var(--gold); margin-top: 15px; font-weight: bold;">CARGANDO...</p>
    </div>

    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<script>
    // 1. CONFIGURACIÓN COMPLETA (Corregida para evitar el error de AuthDomain)
    const firebaseConfig = { 
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
        projectId: "jadi-repaiz"
    };
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.database();
    let tempUser = null;
    let rolEscogido = null;

    // 2. DETECTAR SI YA ESTÁ LOGUEADO O VIENE DE GOOGLE
    auth.getRedirectResult().then(result => {
        if (result.user) {
            verificarUsuario(result.user);
        } else {
            auth.onAuthStateChanged(user => {
                if (user) {
                    verificarUsuario(user);
                }
            });
        }
    });

    document.getElementById('btn-google').onclick = function() {
        const provider = new firebase.auth.GoogleAuthProvider();
        // Usamos Redirect para que no lo bloquee el celular
        auth.signInWithRedirect(provider);
    };

    function verificarUsuario(user) {
        tempUser = user;
        document.getElementById('loader').style.display = 'flex';
        
        db.ref('usuarios/' + user.uid).once('value', snap => {
            document.getElementById('loader').style.display = 'none';
            if (snap.exists()) {
                const datos = snap.val();
                localStorage.setItem('session_jadi', JSON.stringify(datos));
                window.location.href = datos.rolCodigo + ".html";
            } else {
                document.getElementById('vista-login').style.display = 'none';
                document.getElementById('seccion-registro').style.display = 'block';
            }
        });
    }

    function seleccionarRol(btn, rol) {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        rolEscogido = rol;
    }

    async function finalizarRegistro() {
        const tel = document.getElementById('user-tel').value;
        if (!rolEscogido || tel.length < 8) return alert("Elige un rol y pon tu WhatsApp");

        document.getElementById('loader').style.display = 'flex';
        try {
            const snapCount = await db.ref('contadores/' + rolEscogido).once('value');
            let num = (snapCount.val() || 0) + 1;
            await db.ref('contadores/' + rolEscogido).set(num);
            
            const idUnico = rolEscogido.slice(0,3).toUpperCase() + num.toString().padStart(4, '0');

            const datosUsuario = {
                uid: tempUser.uid,
                nombre: tempUser.displayName,
                email: tempUser.email,
                foto: tempUser.photoURL,
                telefono: tel,
                rolCodigo: rolEscogido.toLowerCase(),
                id_jadi: idUnico
            };

            await db.ref('usuarios/' + tempUser.uid).set(datosUsuario);
            localStorage.setItem('session_jadi', JSON.stringify(datosUsuario));
            window.location.href = datosUsuario.rolCodigo + ".html";
        } catch (e) { alert("Error: " + e.message); document.getElementById('loader').style.display = 'none'; }
    }
</script>
</body>
</html>
