<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo Zapatero - J.A.D.I REPAIZ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --dark: #000; --card-bg: #0d1117; --border: #30363d; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* HEADER PREMIUM */
        .header {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 25px; border-bottom: 1px solid var(--gold); background: #050505;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-container h1 { color: var(--gold); margin: 0; font-size: 22px; letter-spacing: 3px; font-weight: 900; }
        .logo-container span { color: #FFF; font-size: 9px; letter-spacing: 4px; text-transform: uppercase; display: block; margin-top: -5px; }
        
        .header-actions { display: flex; align-items: center; gap: 15px; }

        .profile-btn { 
            text-decoration: none; color: white; display: flex; align-items: center; gap: 8px;
            padding: 5px; border-radius: 30px; border: 1px solid var(--border); transition: 0.3s;
        }
        .profile-btn:hover { border-color: var(--gold); background: #111; }
        .profile-btn img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--gold); background: #222; }

        /* CONTENIDO */
        .main-content { padding: 20px; max-width: 900px; margin: auto; }
        
        .welcome-section { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: flex-end; }
        .welcome-title { color: var(--gold); border-left: 5px solid var(--gold); padding-left: 15px; margin: 0; font-size: 1.3rem; }
        .login-id { 
            background: #1a1a1a; color: var(--gold); padding: 4px 12px; border-radius: 20px; 
            font-size: 10px; font-weight: bold; border: 1px solid var(--border); 
        }

        /* TABLERO DE ESTADÍSTICAS */
        .dashboard-stats {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px;
        }
        .stat-card { background: #111; border: 1px solid #222; padding: 12px 5px; border-radius: 12px; text-align: center; }
        .stat-card i { font-size: 1.1rem; margin-bottom: 5px; display: block; }
        .stat-card span { font-size: 1.4rem; font-weight: bold; display: block; }
        .stat-card p { font-size: 9px; color: #666; margin: 0; text-transform: uppercase; font-weight: bold; }
        
        .color-new { color: #ff4d4d; }
        .color-proc { color: #4dadff; }
        .color-ready { color: #4dff88; }

        /* GRILLA DE ACCIONES (4 BOTONES) */
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { 
            background-color: var(--card-bg); padding: 25px 15px; border-radius: 18px; text-align: center; 
            cursor: pointer; transition: 0.3s; border: 1px solid var(--border); text-decoration: none; color: white;
        }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); background: #161b22; }
        .card i { font-size: 32px; color: var(--gold); margin-bottom: 12px; }
        .card h3 { margin: 0; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }
        .card p { color: #666; font-size: 10px; margin-top: 5px; }

        /* FOOTER STATUS */
        .status-bar { 
            background: #050505; color: var(--gold); border: 1px solid #332b00;
            padding: 15px; border-radius: 12px; text-align: center; margin-top: 30px; 
            font-size: 13px;
        }
        .btn-logout { 
            display: block; text-align: center; color: #444; 
            text-decoration: none; margin-top: 30px; font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <h1>J.A.D.I</h1>
            <span>REPAIZ</span>
        </div>
        <div class="header-actions">
            <a href="../dashboard.html" style="color: #666; text-decoration: none; font-size: 18px;" title="Dashboard Master">
                <i class="fas fa-th-large"></i>
            </a>
            <a href="perfil.html" class="profile-btn" title="Mi Perfil">
                <span id="header-user-name" style="font-size: 11px; font-weight: bold; margin-left: 5px;">Cargando...</span>
                <img id="user-photo" src="https://via.placeholder.com/32" alt="Perfil">
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="welcome-section">
            <div>
                <h2 class="welcome-title" id="display-nombre">Bienvenido Maestro</h2>
                <div id="display-local" style="color: #888; font-size: 12px; margin: 5px 0 0 20px;">...</div>
            </div>
            <div class="login-id" id="display-id">ID: ZPT-PRO</div>
        </div>

        <div class="dashboard-stats">
            <div class="stat-card">
                <i class="fas fa-bell color-new"></i>
                <span id="count-nuevos">0</span>
                <p>Nuevos</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-hammer color-proc"></i>
                <span id="count-proceso">0</span>
                <p>En Proceso</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-circle color-ready"></i>
                <span id="count-listos">0</span>
                <p>Terminados</p>
            </div>
        </div>

        <div class="grid-container">
            <a href="local.html" class="card">
                <i class="fas fa-store"></i>
                <h3>Mi Local</h3>
                <p>Vitrina y Ubicación</p>
            </a>
            <a href="inventario.html" class="card">
                <i class="fas fa-boxes-stacked"></i>
                <h3>Inventarios</h3>
                <p>Suelas y Materiales</p>
            </a>
            <a href="clientes.html" class="card">
                <i class="fas fa-address-book"></i>
                <h3>Clientes</h3>
                <p>Base de Datos y QR</p>
            </a>
            <a href="trabajos.html" class="card">
                <i class="fas fa-tools"></i>
                <h3>Trabajos</h3>
                <p>Órdenes y Avances</p>
            </a>
        </div>

        <div class="status-bar">
            <i class="fas fa-shield-halved" style="margin-right: 8px;"></i> 
            <strong>SISTEMA J.A.D.I ACTIVO</strong>
            <div style="font-size: 10px; color: #666; margin-top: 4px;">Monitor real de <span id="local-footer">...</span></div>
        </div>

        <a href="#" class="btn-logout" id="logout-trigger">
            <i class="fas fa-power-off"></i> CERRAR SESIÓN
        </a>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = function() {
            const session = JSON.parse(localStorage.getItem('session_jadi'));
            if (session) {
                document.getElementById('display-nombre').innerText = "Maestro " + (session.nombre || "J.A.D.I");
                document.getElementById('header-user-name').innerText = (session.nombre || "Usuario");
                document.getElementById('display-id').innerText = "ID: " + (session.uid || "ZPT-PRO");
                document.getElementById('display-local').innerText = session.empresaNombre || "Local Independiente";
                document.getElementById('local-footer').innerText = session.empresaNombre || "Sucursal Principal";
                
                if(session.foto) document.getElementById('user-photo').src = session.foto;

                actualizarEstadisticas(session.uid);
            } else {
                window.location.href = "../index.html";
            }
        };

        function actualizarEstadisticas(uid) {
            db.ref('trabajos').orderByChild('maestroId').equalTo(uid).on('value', snap => {
                let n = 0, p = 0, l = 0;
                snap.forEach(c => {
                    const est = c.val().estado;
                    if(est === 'Recibido' || est === 'Nuevo') n++;
                    else if(est === 'En Proceso') p++;
                    else if(est === 'Listo') l++;
                });
                document.getElementById('count-nuevos').innerText = n;
                document.getElementById('count-proceso').innerText = p;
                document.getElementById('count-listos').innerText = l;
            });
        }

        document.getElementById('logout-trigger').onclick = function(e) {
            e.preventDefault();
            if(confirm("¿Cerrar sesión?")) {
                localStorage.removeItem('session_jadi');
                window.location.href = "../index.html";
            }
        };
    </script>
</body>
</html>
