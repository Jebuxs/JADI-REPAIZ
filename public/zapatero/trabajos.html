<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard J.A.D.I REPAIZ - Premium</title>

    <script src="/js/estilo_visual.js"></script>
    <script src="/js/controlador_jadi.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* --- VARIABLES PREMIUM (Inspiradas en modo oscuro de alta gama) --- */
        :root {
            --gold: #D4AF37;
            --gold-dim: rgba(212, 175, 55, 0.1);
            --bg-dark: #0A0B10; /* Fondo casi negro, muy profundo */
            --bg-card: #16181D; /* Tarjetas gris oscuro azulado */
            --border-color: #2D3139; /* Bordes sutiles */
            --text-main: #E6E8ED;
            --text-muted: #9499A6;
            --shadow-premium: 0 10px 30px rgba(0,0,0,0.5);
            --font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-family);
            -webkit-font-smoothing: antialiased;
            padding-bottom: 40px;
        }

        /* --- HEADER PREMIUM --- */
        .header {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 25px; 
            background: rgba(10, 11, 16, 0.95);
            border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(10px); /* Efecto cristal esmerilado */
        }
        
        .header-brand { line-height: 1; text-align: left; }
        .logo-j { color: var(--gold); font-weight: 900; font-size: 24px; letter-spacing: -1px; }
        .logo-r { color: var(--text-main); font-size: 10px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.8; }

        .header-actions { display: flex; align-items: center; gap: 18px; }
        .profile-btn-img { 
            width: 36px; height: 36px; 
            border-radius: 50%; 
            border: 2px solid var(--border-color); 
            object-fit: cover;
            transition: border-color 0.3s;
        }
        .profile-btn-img:hover { border-color: var(--gold); }
        .icon-crown { color: var(--text-muted); font-size: 18px; transition: color 0.3s; }
        .icon-crown:hover { color: var(--gold); }

        /* --- CONTENEDOR PRINCIPAL --- */
        .main-container { padding: 30px 20px; max-width: 1000px; margin: auto; }

        /* --- SECCIÓN BIENVENIDA --- */
        .welcome-box {
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 35px; background: var(--bg-card); 
            padding: 20px; border-radius: 16px; border: 1px solid var(--border-color);
            box-shadow: var(--shadow-premium);
        }
        .welcome-text h2 { margin: 0; font-size: 26px; font-weight: 700; color: var(--text-main); }
        .welcome-text p { margin: 5px 0 0; color: var(--text-muted); font-size: 14px; }
        .badge-id { 
            background: var(--gold-dim); color: var(--gold); 
            padding: 6px 14px; border-radius: 20px; 
            font-size: 11px; font-weight: 600; border: 1px solid rgba(212,175,55,0.3);
        }

        /* --- ESTADÍSTICAS (Estilo Tarjeta Elevada) --- */
        .dashboard-stats {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 35px;
        }
        .stat-card { 
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            padding: 20px 10px; 
            border-radius: 16px; 
            text-align: center; 
            transition: transform 0.3s, border-color 0.3s;
            box-shadow: var(--shadow-premium);
        }
        .stat-card:hover { transform: translateY(-3px); border-color: var(--gold); }
        .stat-card i { font-size: 20px; margin-bottom: 10px; display: block; }
        .stat-card span { font-size: 32px; font-weight: 700; display: block; color: var(--text-main); line-height: 1; }
        .stat-card p { font-size: 11px; color: var(--text-muted); margin: 8px 0 0; text-transform: uppercase; letter-spacing: 1px; }

        /* --- SELECTOR VISUAL (Borde Punteado Estilo GitHub) --- */
        .selector-visual-box {
            background: transparent;
            border: 2px dashed var(--border-color);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 35px;
            text-align: center;
        }
        .selector-label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        select#selector-tema {
            background: var(--bg-card); color: var(--gold); border: 1px solid var(--border-color);
            padding: 12px 20px; border-radius: 12px; font-size: 14px; width: 100%; max-width: 350px;
            appearance: none; cursor: pointer; text-align: center; font-weight: 600;
            transition: border-color 0.3s;
        }
        select#selector-tema:focus { border-color: var(--gold); outline: none; }

        /* --- GRILLA DE MENÚ PREMIUM --- */
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .card-jadi { 
            text-decoration: none; color: var(--text-main); 
            background: var(--bg-card); padding: 30px 20px; 
            border-radius: 20px; border: 1px solid var(--border-color); 
            text-align: center; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-premium);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        } 
        .card-jadi:hover { 
            transform: scale(1.03); 
            border-color: var(--gold); 
            background: rgba(22, 24, 29, 0.7);
        }
        .card-jadi i { font-size: 32px; color: var(--gold); margin-bottom: 15px; }
        .card-jadi h3 { font-size: 14px; font-weight: 600; margin: 0; letter-spacing: 0.5px; }

        /* --- FOOTER Y LOGOUT --- */
        .system-badge {
            background: var(--bg-card); color: var(--text-muted); 
            border: 1px solid var(--border-color); padding: 18px; 
            border-radius: 16px; text-align: center; margin-top: 40px; 
            font-size: 13px; box-shadow: var(--shadow-premium);
        }
        .system-badge strong { color: var(--gold); letter-spacing: 1px; }

        .btn-logout { 
            display: inline-block; text-align: center; color: var(--text-muted); 
            text-decoration: none; margin-top: 30px; font-size: 13px; font-weight: 500;
            padding: 10px 20px; border-radius: 20px; transition: color 0.3s, background 0.3s;
        }
        .btn-logout:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }

        /* Colores de estado nítidos */
        .color-new { color: #FF5252; }
        .color-proc { color: #448AFF; }
        .color-ready { color: #00E676; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-brand">
            <span class="logo-j">J.A.D.I</span>
            <span class="logo-r">REPAIZ</span>
        </div>
        <div class="header-actions">
            <a href="/admin/dashboard.html" class="icon-crown" title="Admin Master">
                <i class="fas fa-crown"></i>
            </a>
            <a href="perfil.html" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
                <span id="header-user-name" style="color: var(--text-main); font-size: 12px; font-weight: 600;">...</span>
                <img id="user-photo" class="profile-btn-img" src="https://via.placeholder.com/36" alt="P">
            </a>
        </div>
    </div>

    <div class="main-container">
        
        <div class="welcome-box">
            <div class="welcome-text">
                <h2 id="display-nombre">Bienvenido</h2>
                <p id="display-local">Cargando ubicación...</p>
            </div>
            <div id="display-id" class="badge-id">ID: ...</div>
        </div>

        <div class="selector-visual-box">
            <label class="selector-label">Personalización de Interfaz</label>
            <select id="selector-tema" onchange="cambiarApariencia(this.value)">
                <option value="elegante">👑 Dorado J.A.D.I (Premium)</option>
                <option value="azul">⚡ Azul Eléctrico</option>
                <option value="tomate">🍅 Tomate</option>
                <option value="verde">🔋 Verde Fosfo</option>
                <option value="estandar">⚪ Estándar Clásico</option>
            </select>
        </div>

        <div class="dashboard-stats">
            <div class="stat-card"><i class="fas fa-bell color-new"></i><span id="count-nuevos">0</span><p>Nuevos</p></div>
            <div class="stat-card"><i class="fas fa-hammer color-proc"></i><span id="count-proceso">0</span><p>Proceso</p></div>
            <div class="stat-card"><i class="fas fa-check-circle color-ready"></i><span id="count-listos">0</span><p>Listos</p></div>
        </div>

        <div class="grid-container">
            <a href="local.html" class="card-jadi">
                <i class="fas fa-store"></i>
                <h3>Mi Local</h3>
            </a>
            <a href="inventario.html" class="card-jadi">
                <i class="fas fa-boxes-stacked"></i>
                <h3>Inventarios</h3>
            </a>
            <a href="clientes.html" class="card-jadi">
                <i class="fas fa-address-book"></i>
                <h3>Clientes</h3>
            </a>
            <a href="trabajos.html" class="card-jadi">
                <i class="fas fa-tools"></i>
                <h3>Trabajos</h3>
            </a>
        </div>

        <div class="system-badge">
            <i class="fas fa-shield-halved" style="color: var(--gold);"></i> <strong>SISTEMA J.A.D.I ACTIVO</strong>
            <div style="font-size: 11px; margin-top: 6px;">Monitoreo en tiempo real de <span id="local-footer" style="color: var(--text-main);">...</span></div>
        </div>

        <div style="text-align: center;">
            <a href="#" id="logout-trigger" class="btn-logout">
                <i class="fas fa-power-off"></i> Cerrar Sesión Maestra
            </a>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = function() {
            // 1. CARGAR SESIÓN Y SEGURIDAD (Tu lógica corregida)
            const session = JSON.parse(localStorage.getItem('session_jadi'));
            
            if (session && (session.rolCodigo === 'zapatero' || session.rolCodigo === 'ADM' || session.rol === 'zapatero' || session.rol === 'ADM')) {
                
                document.getElementById('display-nombre').innerText = (session.rolCodigo === 'ADM' ? "Admin " : "Maestro ") + (session.nombre || "Jadi");
                document.getElementById('header-user-name').innerText = (session.nombre || "Usuario").split(' ')[0]; // Solo primer nombre
                document.getElementById('display-id').innerText = "ID: " + (session.uid || "ZPT-PRO");
                document.getElementById('display-local').innerText = session.empresaNombre || "Local Independiente";
                document.getElementById('local-footer').innerText = session.empresaNombre || "Sucursal Principal";
                
                if(session.foto) document.getElementById('user-photo').src = session.foto;

                actualizarEstadisticas(session.uid);
            } else {
                window.location.href = "/index.html";
            }

            // 2. APLICAR ESTILO VISUAL
            const temaActual = localStorage.getItem('jadi_tema_preferido') || 'elegante';
            document.getElementById('selector-tema').value = temaActual;
            // Solo llamamos si el script externo cargó bien
            if(typeof JadiEstilo !== 'undefined') JadiEstilo.aplicar(temaActual);
        };

        function cambiarApariencia(color) {
            if(typeof JadiEstilo !== 'undefined') {
                JadiEstilo.aplicar(color);
                localStorage.setItem('jadi_tema_preferido', color);
            }
        }

        function actualizarEstadisticas(uid) {
            db.ref('trabajos').orderByChild('maestroId').equalTo(uid).on('value', snap => {
                let n = 0, p = 0, l = 0;
                snap.forEach(c => {
                    const est = c.val().estado;
                    if(est === 'Recibido' || est === 'Nuevo') n++;
                    else if(est === 'En Proceso') p++;
                    else if(est === 'Listo') l++;
                });
                document.getElementById('count-nuevos').innerText = n;
                document.getElementById('count-proceso').innerText = p;
                document.getElementById('count-listos').innerText = l;
            });
        }

        document.getElementById('logout-trigger').onclick = function(e) {
            e.preventDefault();
            if(confirm("¿Cerrar sesión maestra?")) {
                localStorage.removeItem('session_jadi');
                window.location.href = "/index.html";
            }
        };
    </script>
</body>
</html>
