<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Acceso</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
        .card { width: 90%; max-width: 350px; padding: 30px; background: #0a0a0a; border-radius: 20px; border: 1px solid #222; }
        h1 { color: #fbc02d; letter-spacing: 5px; margin-bottom: 20px; }
        .btn-google { background: #fff; color: #000; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; border: none; cursor: pointer; font-size: 1rem; margin-top: 20px; }
        #seccion-registro, #loader, #vista-login { display: none; }
        .roles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-rol { background: #111; color: #888; padding: 12px; border: 1px solid #333; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-rol.active { border-color: #fbc02d; color: #fbc02d; background: #1a1500; }
        input { width: 100%; padding: 15px; margin: 15px 0; background: #000; color: #fff; border: 1px solid #333; border-radius: 10px; box-sizing: border-box; text-align: center; }
    </style>
</head>
<body>

    <div id="loader" style="display:flex; flex-direction:column; align-items:center;">
        <p style="color:#fbc02d; font-weight:bold;">VERIFICANDO SESIÓN...</p>
    </div>

    <div class="card" id="vista-login">
        <h1>J.A.D.I</h1>
        <p style="color:#666; font-size: 12px;">INICIAR SESIÓN</p>
        <button class="btn-google" id="btn-login">ENTRAR CON GOOGLE</button>
    </div>

    <div class="card" id="seccion-registro">
        <h2 style="color:#fbc02d">COMPLETAR PERFIL</h2>
        <div class="roles">
            <button class="btn-rol" onclick="selR('ZAPATERO', this)">ZAPATERO</button>
            <button class="btn-rol" onclick="selR('CLIENTE', this)">CLIENTE</button>
            <button class="btn-rol" onclick="selR('TIENDA', this)">TIENDA</button>
            <button class="btn-rol" onclick="selR('MOTORIZADO', this)">MOTORIZADO</button>
        </div>
        <input type="tel" id="user-tel" placeholder="Tu WhatsApp">
        <button class="btn-google" style="background:#fbc02d" onclick="crear()">GUARDAR Y ENTRAR</button>
    </div>

<script>
    const config = { 
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
        projectId: "jadi-repaiz"
    };
    firebase.initializeApp(config);

    const auth = firebase.auth();
    const db = firebase.database();
    let uTmp = null;
    let rTmp = "";

    // 1. LÓGICA DE DETECCIÓN INMEDIATA
    auth.onAuthStateChanged((user) => {
        if (user) {
            console.log("Usuario detectado:", user.uid);
            uTmp = user;
            verificarBaseDeDatos(user.uid);
        } else {
            console.log("No hay usuario, mostrando login.");
            document.getElementById('loader').style.display = 'none';
            document.getElementById('vista-login').style.display = 'block';
        }
    });

    // 2. FUNCIÓN PARA VERIFICAR SI YA EXISTE EN LA DB
    function verificarBaseDeDatos(uid) {
        db.ref('usuarios/' + uid).once('value').then((s) => {
            document.getElementById('loader').style.display = 'none';
            if (s.exists()) {
                // Si existe, lo mandamos a su panel
                window.location.href = s.val().rolCodigo + ".html";
            } else {
                // Si no existe, mostramos el registro
                document.getElementById('vista-login').style.display = 'none';
                document.getElementById('seccion-registro').style.display = 'block';
            }
        }).catch(e => {
            alert("Error en DB: " + e.message);
        });
    }

    document.getElementById('btn-login').onclick = () => {
        document.getElementById('loader').style.display = 'flex';
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        auth.signInWithRedirect(provider);
    };

    function selR(r, b) {
        rTmp = r;
        document.querySelectorAll('.btn-rol').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
    }

    async function crear() {
        const t = document.getElementById('user-tel').value;
        if(!rTmp || t.length < 8) return alert("Selecciona función y WhatsApp");
        
        document.getElementById('loader').style.display = 'flex';
        document.getElementById('seccion-registro').style.display = 'none';

        try {
            const s = await db.ref('contadores/' + rTmp).once('value');
            const n = (s.val() || 0) + 1;
            await db.ref('contadores/' + rTmp).set(n);

            const data = {
                uid: uTmp.uid,
                nombre: uTmp.displayName,
                email: uTmp.email,
                telefono: t,
                rolCodigo: rTmp.toLowerCase(),
                id_jadi: rTmp.slice(0,3).toUpperCase() + n.toString().padStart(4, '0')
            };

            await db.ref('usuarios/' + uTmp.uid).set(data);
            window.location.href = data.rolCodigo + ".html";
        } catch (e) {
            alert("Error al guardar: " + e.message);
            document.getElementById('seccion-registro').style.display = 'block';
        }
    }
</script>
</body>
</html>
