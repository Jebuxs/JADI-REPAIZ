<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Trabajos - J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --dark: #000; --card: #111; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .header { padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; background: #050505; position: sticky; top: 0; z-index: 100; justify-content: space-between; }
        .btn-back { color: var(--gold); text-decoration: none; font-size: 1.2rem; }
        .search-container { padding: 15px; }
        .search-bar { background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 10px; display: flex; align-items: center; }
        .search-bar input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }
        .orders-container { padding: 0 15px; }
        .order-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .order-header h3 { margin: 0; font-size: 16px; color: var(--gold); cursor: pointer; text-decoration: underline; }
        .status-tag { font-size: 10px; padding: 4px 8px; border-radius: 5px; text-transform: uppercase; font-weight: bold; }
        .tag-recibido { background: #444; color: white; }
        .tag-proceso { background: #0066ff; color: white; }
        .tag-listo { background: #00cc66; color: black; }
        .order-details { font-size: 13px; color: #aaa; margin-bottom: 15px; }
        .order-price { font-weight: bold; color: white; display: flex; justify-content: space-between; border-top: 1px solid #222; padding-top: 10px; font-size: 12px; }
        .order-actions { display: flex; gap: 8px; margin-top: 15px; }
        .btn-status { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 11px; cursor: pointer; }
        #modal-orden { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 300; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        label { font-size: 11px; color: var(--gold); margin-bottom: 5px; display: block; }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 24px; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(255,215,0,0.4); }
    </style>
</head>
<body>

    <div class="header">
        <a href="zapatero.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        <h2 style="margin:0; font-size: 1.1rem;">Panel de Órdenes</h2>
        <i class="fas fa-sync-alt" onclick="location.reload()" style="color: var(--gold); cursor: pointer;"></i>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <i class="fas fa-search" style="color: #555;"></i>
            <input type="text" id="inputBusqueda" onkeyup="filtrarTrabajos()" placeholder="Buscar cliente o calzado...">
        </div>
    </div>

    <div class="orders-container" id="lista-trabajos"></div>

    <button class="fab" onclick="abrirModal()"><i class="fas fa-plus"></i></button>

    <div id="modal-orden">
        <h2 style="color: var(--gold); margin-top: 0;">Nueva Orden de Trabajo</h2>
        
        <label>CLIENTE (CELULAR)</label>
        <input type="tel" id="cli-celular" placeholder="Número Celular" onkeyup="detectarCliente(this.value)">

        <div id="box-invitacion" style="display:none; background:#1a1500; border:1px solid var(--gold); padding:10px; border-radius:10px; margin-bottom:15px; text-align:center;">
            <p style="font-size: 11px; margin:0 0 10px 0;">Cliente no registrado</p>
            <button onclick="enviarInvitacion()" style="background:var(--gold); border:none; padding:5px 10px; border-radius:5px; font-weight:bold; font-size:10px;">INVITAR POR WHATSAPP</button>
        </div>

        <input type="text" id="cli-nombre" placeholder="Nombre completo">

        <label>TIPO DE ARTÍCULO (DEPORTIVO, MOCHILA, ETC)</label>
        <input list="lista-servicios" id="tipo-calzado" placeholder="Escribe o selecciona...">
        <datalist id="lista-servicios"></datalist>

        <textarea id="trabajo-desc" rows="2" placeholder="Detalle de la reparación (Ej: 2 chullas, 1 mochila)"></textarea>

        <div style="display: flex; gap: 10px;">
            <div style="flex:1">
                <label>PRECIO TOTAL $</label>
                <input type="number" id="precio-total" placeholder="0.00" onkeyup="calcularSaldo()">
            </div>
            <div style="flex:1">
                <label>ABONO $</label>
                <input type="number" id="abono-inicial" placeholder="0.00" onkeyup="calcularSaldo()">
            </div>
            <div style="flex:1">
                <label>PENDIENTE $</label>
                <input type="number" id="saldo-pendiente" value="0.00" readonly style="color:var(--gold); font-weight:bold;">
            </div>
        </div>

        <label>FECHA DE ENTREGA</label>
        <input type="date" id="fecha-entrega">
        
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="cerrarModal()" style="flex:1; background:transparent; color:white; border:1px solid #444; padding:15px; border-radius:10px;">CANCELAR</button>
            <button onclick="guardarOrden()" style="flex:1; background:var(--gold); color:black; border:none; padding:15px; border-radius:10px; font-weight:bold;">GUARDAR ORDEN</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const session = JSON.parse(localStorage.getItem('session_jadi'));

        function abrirModal() { document.getElementById('modal-orden').style.display = 'block'; }
        function cerrarModal() { document.getElementById('modal-orden').style.display = 'none'; }

        function calcularSaldo() {
            const total = parseFloat(document.getElementById('precio-total').value) || 0;
            const abono = parseFloat(document.getElementById('abono-inicial').value) || 0;
            document.getElementById('saldo-pendiente').value = (total - abono).toFixed(2);
        }

        // CARGAR CATEGORÍAS COMPARTIDAS
        function cargarSugerencias() {
            db.ref('categorias_servicios').on('value', snap => {
                const list = document.getElementById('lista-servicios');
                list.innerHTML = "";
                snap.forEach(c => { list.innerHTML += `<option value="${c.val()}">`; });
            });
        }

        async function detectarCliente(cel) {
            if(cel.length >= 10) {
                const snap = await db.ref('usuarios').orderByChild('telefono').equalTo(cel).once('value');
                if(snap.exists()) {
                    document.getElementById('box-invitacion').style.display = 'none';
                    snap.forEach(c => { document.getElementById('cli-nombre').value = c.val().nombre; });
                } else { document.getElementById('box-invitacion').style.display = 'block'; }
            }
        }

        async function guardarOrden() {
            const cel = document.getElementById('cli-celular').value;
            const nom = document.getElementById('cli-nombre').value;
            const tipo = document.getElementById('tipo-calzado').value;
            if(!cel || !nom || !tipo) return alert("Faltan datos");

            // 1. Guardar Categoría si es nueva
            const snapCat = await db.ref('categorias_servicios').orderByValue().equalTo(tipo).once('value');
            if(!snapCat.exists()) db.ref('categorias_servicios').push(tipo);

            // 2. Buscar/Crear Cliente
            const snapCli = await db.ref('usuarios').orderByChild('telefono').equalTo(cel).once('value');
            let cliId;
            if(!snapCli.exists()) {
                const snapC = await db.ref('contadores/CLN').once('value');
                let num = (snapC.val() || 0) + 1;
                cliId = 'CLN' + num.toString().padStart(9, '0');
                await db.ref('usuarios/' + cliId).set({ nombre: nom, telefono: cel, rolCodigo: "CLN", uid: cliId, verificado: false });
                await db.ref('contadores/CLN').set(num);
            } else { snapCli.forEach(c => cliId = c.val().uid); }

            // 3. Crear ID de Trabajo Corto
            const snapT = await db.ref('contadores/TRB').once('value');
            let numT = (snapT.val() || 0) + 1;
            const trbID = 'TRB-' + numT.toString().padStart(5, '0');

            // 4. Guardar Orden
            await db.ref('trabajos').push({
                ordenID: trbID,
                zapateroId: session.uid,
                clienteId: cliId,
                cliente: nom,
                calzado: tipo,
                descripcion: document.getElementById('trabajo-desc').value,
                precio: document.getElementById('precio-total').value,
                abono: document.getElementById('abono-inicial').value,
                saldo: document.getElementById('saldo-pendiente').value,
                entrega: document.getElementById('fecha-entrega').value,
                estado: 'Recibido',
                timestamp: Date.now()
            });
            await db.ref('contadores/TRB').set(numT);

            cerrarModal();
        }

        function cargarTrabajos() {
            db.ref('trabajos').orderByChild('zapateroId').equalTo(session.uid).on('value', snap => {
                const container = document.getElementById('lista-trabajos');
                container.innerHTML = "";
                snap.forEach(child => {
                    const o = child.val();
                    container.innerHTML += `
                        <div class="order-card" data-nombre="${o.cliente.toLowerCase()}">
                            <div class="order-header">
                                <h3>${o.cliente} <small style="color:#666; font-size:10px;">#${o.ordenID}</small></h3>
                                <span class="status-tag tag-${o.estado.toLowerCase()}">${o.estado}</span>
                            </div>
                            <div class="order-details"><b>${o.calzado}</b>: ${o.descripcion}</div>
                            <div class="order-price">
                                <span>TOTAL: $${o.precio}</span>
                                <span>ABONO: $${o.abono || 0}</span>
                                <span style="color:var(--gold)">DEBE: $${o.saldo || 0}</span>
                            </div>
                            <div class="order-actions">
                                <button class="btn-status" onclick="updateStatus('${child.key}','En Proceso')">PROCESO</button>
                                <button class="btn-status" onclick="updateStatus('${child.key}','Listo')">LISTO</button>
                                <button class="btn-status" style="border-color:var(--gold); color:var(--gold)" onclick="window.location.href='chat.html'">CHAT</button>
                            </div>
                        </div>`;
                });
            });
        }

        function updateStatus(id, s) { db.ref('trabajos/'+id).update({estado: s}); }
        function filtrarTrabajos() {
            const bus = document.getElementById('inputBusqueda').value.toLowerCase();
            document.querySelectorAll('.order-card').forEach(c => {
                c.style.display = c.getAttribute('data-nombre').includes(bus) ? "block" : "none";
            });
        }

        window.onload = () => { cargarTrabajos(); cargarSugerencias(); };
    </script>
</body>
</html>
