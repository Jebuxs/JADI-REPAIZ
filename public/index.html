<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JADI REPAIZ - Cuidamos tus Pasos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; }
        body { margin: 0; padding: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* NAVBAR */
        nav { position: fixed; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-sizing: border-box; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .logo { font-weight: bold; color: var(--gold); font-size: 1.5rem; letter-spacing: 2px; }
        .btn-entrar { background: var(--gold); color: black; padding: 10px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }

        /* HERO */
        .hero { height: 85vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?auto=format&fit=crop&q=80&w=1500') center/cover; }
        .hero h1 { font-size: 3.5rem; margin: 0; text-transform: uppercase; font-weight: 900; }
        .hero p { color: var(--gold); font-size: 1.1rem; letter-spacing: 5px; text-transform: uppercase; }

        /* MARCAS */
        .brands-section { background: #050505; padding: 30px 0; border-top: 1px solid #222; overflow: hidden; }
        .brands-track { display: flex; width: calc(250px * 10); animation: scroll 25s linear infinite; }
        .brand-item { width: 250px; display: flex; align-items: center; justify-content: center; color: #333; font-size: 1.5rem; font-weight: bold; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-250px * 5)); } }

        /* BANNERS */
        .ads-container { padding: 60px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; max-width: 1200px; margin: auto; }
        .ad-banner { background: #111; height: 250px; border-radius: 20px; border: 1px solid #222; position: relative; overflow: hidden; cursor: pointer; }
        .ad-banner img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; transition: 0.5s; }
        .ad-banner:hover img { opacity: 0.7; transform: scale(1.1); }
        .ad-label { position: absolute; top: 20px; right: 20px; background: var(--gold); color: black; font-size: 0.65rem; padding: 4px 12px; font-weight: bold; border-radius: 50px; }
        .ad-title { position: absolute; bottom: 25px; left: 25px; color: white; font-size: 1.2rem; font-weight: bold; }

        footer { padding: 40px; text-align: center; color: #333; font-size: 0.75rem; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">JADI REPAIZ</div>
        <a href="login.html" class="btn-entrar">ACCESO MASTER</a>
    </nav>

    <section class="hero">
        <p>Expertos en Calzado</p>
        <h1>Dales una segunda vida</h1>
        <a href="login.html" style="margin-top:25px; padding: 15px 35px; border:2px solid var(--gold); color:var(--gold); border-radius:50px; font-weight:bold; text-decoration:none;">
            EMPEZAR AHORA
        </a>
    </section>

    <div class="brands-section">
        <div class="brands-track">
            <div class="brand-item">NIKE</div><div class="brand-item">ADIDAS</div><div class="brand-item">PUMA</div><div class="brand-item">JORDAN</div><div class="brand-item">TIMBERLAND</div>
            <div class="brand-item">NIKE</div><div class="brand-item">ADIDAS</div><div class="brand-item">PUMA</div><div class="brand-item">JORDAN</div><div class="brand-item">TIMBERLAND</div>
        </div>
    </div>

    <div class="ads-container">
        <div class="ad-banner" onclick="location.href='login.html'">
            <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?auto=format&fit=crop&q=60&w=500">
            <span class="ad-label">VIP</span>
            <div class="ad-title">LIMPIEZA PREMIUM</div>
        </div>
        <div class="ad-banner" onclick="location.href='login.html'">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&q=60&w=500">
            <span class="ad-label">PROMO</span>
            <div class="ad-title">RESTAURACIÓN DE SUELAS</div>
        </div>
    </div>

    <footer>
        &copy; 2026 JADI REPAIZ. All rights reserved.
    </footer>

</body>
</html>
