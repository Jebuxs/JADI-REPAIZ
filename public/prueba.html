<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JADI - Laboratorio de Estilos</title>

    <script src="/js/estilo_visual.js"></script>
    <script src="/js/controlador_jadi.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="card-jadi">
        <h2><i class="fas fa-flask"></i> Panel de Prueba</h2>
        <p style="text-align: center; font-size: 13px;">Cambia el estilo visual de JADI REPAIZ</p>
        
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <label>Escoge un traje visual:</label>
        <select id="selector-tema" onchange="probarEstilo(this.value)">
            <option value="elegante">👑 Dorado y Negro (Elegante)</option>
            <option value="azul">⚡ Azul Eléctrico</option>
            <option value="tomate">🍅 Tomate</option>
            <option value="verde">🔋 Verde Fosfo</option>
            <option value="estandar">⚪ Estándar (Blanco)</option>
        </select>

        <div style="margin-top: 30px;">
            <button id="btn-accion-modal">PROBAR CONTROLADOR JADI</button>
        </div>

        <div style="margin-top: 20px; text-align: center;">
            <a href="dashboard.html" style="color: #666; text-decoration: none; font-size: 11px;">
                <i class="fas fa-chevron-left"></i> VOLVER AL DASHBOARD
            </a>
        </div>
    </div>

    <script>
        // Al cargar, aplicamos lo que esté guardado
        window.onload = () => {
            const temaGuardado = localStorage.getItem('jadi_tema_preferido') || 'elegante';
            document.getElementById('selector-tema').value = temaGuardado;
            
            // Verificamos si el archivo estilo_visual.js cargó correctamente
            if (typeof JadiEstilo !== 'undefined') {
                JadiEstilo.aplicar(temaGuardado);
                console.log("✅ Estilo Visual conectado.");
            } else {
                console.error("❌ No se encontró estilo_visual.js");
            }
        };

        // Función corregida para el onchange
        function probarEstilo(color) {
            if (typeof JadiEstilo !== 'undefined') {
                JadiEstilo.aplicar(color);
                localStorage.setItem('jadi_tema_preferido', color);
            } else {
                alert("🚨 Error: No se detecta el archivo 'estilo_visual.js'. Revisa que esté en la carpeta /js/");
            }
        }
    </script>

</body>
</html>
