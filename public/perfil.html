<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
    #mapa { 
        width: 100%; 
        height: 250px; 
        border-radius: 15px; 
        border: 1px solid #333; 
        margin-top: 10px;
        z-index: 1;
    }
    .btn-fijar {
        background: var(--gold);
        color: black;
        border: none;
        padding: 10px;
        width: 100%;
        border-radius: 8px;
        font-weight: bold;
        margin-top: 10px;
        cursor: pointer;
    }
</style>

<div class="input-group">
    <label>UBICACIÓN DEL NEGOCIO (GPS)</label>
    <div id="mapa"></div>
    <button class="btn-fijar" onclick="confirmarUbicacion()">
        <i class="fas fa-thumbtack"></i> FIJAR ESTA UBICACIÓN
    </button>
</div>

<script>
    let map, marker;

    function inicializarMapa(lat, lon) {
        // Si ya existe el mapa, solo movemos la vista
        if (map) {
            map.setView([lat, lon], 16);
            marker.setLatLng([lat, lon]);
            return;
        }

        // Crear mapa centrado en la ubicación
        map = L.map('mapa').setView([lat, lon], 16);

        // Estilo de mapa oscuro para que combine con JADI
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Marcador movible
        marker = L.marker([lat, lon], {draggable: true}).addTo(map);
        
        // Al hacer clic en el mapa, mover el marcador
        map.on('click', function(e) {
            marker.setLatLng(e.latlng);
        });
    }

    function obtenerUbicacionActual() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                inicializarMapa(pos.coords.latitude, pos.coords.longitude);
            });
        }
    }

    function confirmarUbicacion() {
        const coords = marker.getLatLng();
        session.coords = `${coords.lat},${coords.lng}`;
        alert("Ubicación lista para guardar: " + session.coords);
    }

    // Llamar a obtenerUbicacionActual() cuando abras el editor
</script>
