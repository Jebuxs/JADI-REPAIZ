<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Prueba</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { 
            background: #000; 
            color: #fbc02d; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
        }
        h1 { font-size: 3rem; letter-spacing: 5px; }
    </style>
</head>
<body>

    <h1 id="mensaje">CONECTANDO...</h1>

    <script>
        // CONFIGURACIÓN DIRECTA
        const firebaseConfig = {
            apiKey: "AIzaSyAKPxGtonv8Ynwj-PsmwjrkX-JN_KMSSyt",
            authDomain: "jadi-repaiz.firebaseapp.com",
            databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
            projectId: "jadi-repaiz",
            storageBucket: "jadi-repaiz.firebasestorage.app",
            messagingSenderId: "847134630000",
            appId: "1:847134630000:web:0b780eaeda63b991d554b5"
        };

        // INICIALIZAR
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        // PRUEBA DE ENTRADA
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('mensaje').innerText = "HOLA, " + user.email.split('@')[0].toUpperCase();
            } else {
                document.getElementById('mensaje').innerText = "HOLA (SIN SESIÓN)";
            }
        });
    </script>
</body>
</html>
