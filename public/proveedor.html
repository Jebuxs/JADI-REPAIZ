<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Panel Operativo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; --text-dim: #666; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; height: 100vh; }

        /* HEADER SIEMPRE VISIBLE */
        .top-header { height: 100px; border-bottom: 1px solid #222; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; position: relative; z-index: 500; }
        .brand-mini { font-size: 0.6rem; color: #444; letter-spacing: 3px; margin-bottom: 5px; text-transform: uppercase; }
        .local-title { font-size: 1.6rem; color: var(--gold); font-weight: 800; text-transform: uppercase; margin: 0; }

        /* BOTÓN DE PERFIL */
        .profile-corner { position: absolute; right: 20px; top: 25px; width: 50px; height: 50px; border-radius: 50%; border: 2px solid #333; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #111; overflow: hidden; transition: 0.3s; }
        .profile-corner i { font-size: 1.4rem; color: var(--gold); }

        /* VISTA INICIAL (BOTONES CENTRALES) */
        #main-wrapper { 
            height: calc(100vh - 100px); 
            display: flex; /* ASEGURAMOS QUE SE VEA AL INICIO */
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            gap: 20px; 
        }
        .btn-box { width: 280px; padding: 20px; background: #111; border: 1px solid #333; color: white; border-radius: 12px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 15px; }
        .btn-sucursales { border-color: var(--gold); color: var(--gold); }

        /* PANTALLAS OCULTAS INICIALMENTE */
        #pantalla-perfil, #pantalla-matriz { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            background: #000; z-index: 2000; display: none; flex-direction: column; 
        }

        /* NAVEGACIÓN PERFIL */
        .nav-perfil-horizontal { display: flex; gap: 10px; padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; overflow-x: auto; margin-top: 100px; }
        .btn-nav-perfil { padding: 10px 20px; background: #111; border: 1px solid #333; color: var(--text-dim); border-radius: 20px; cursor: pointer; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .btn-nav-perfil.active { border-color: var(--gold); color: var(--gold); }

        /* FORMULARIOS */
        .content-area { flex-grow: 1; padding: 30px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .card-form { background: #0d0d0d; border: 1px solid #222; border-radius: 15px; width: 100%; max-width: 450px; padding: 25px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.7rem; color: #555; margin-bottom: 5px; }
        .input-field { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        .btn-back { position: fixed; bottom: 30px; left: 30px; background: var(--gold); color: black; border: none; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; z-index: 3000; }
    </style>
</head>
<body>

<div class="top-header">
    <div class="brand-mini">J.A.D.I REPAIZ</div>
    <h1 class="local-title">TU LOCAL</h1>
    <div class="profile-corner" onclick="abrirPerfil()">
        <i class="fas fa-user-cog"></i>
    </div>
</div>

<div id="main-wrapper">
    <button class="btn-box btn-sucursales" onclick="abrirMatriz()">
        <i class="fas fa-city"></i> SUCURSALES
    </button>
    <button class="btn-box" style="color:#ff4444; border-color:#441111;" onclick="alert('Cerrando sesión...')">
        <i class="fas fa-sign-out-alt"></i> CERRAR SESIÓN
    </button>
</div>

<div id="pantalla-perfil">
    <div class="nav-perfil-horizontal">
        <button class="btn-nav-perfil active" onclick="seccionPerfil(this, 'seguridad')">Seguridad</button>
        <button class="btn-nav-perfil" onclick="seccionPerfil(this, 'ubicacion')">Ubicación</button>
        <button class="btn-nav-perfil" onclick="seccionPerfil(this, 'personal')">Info Personal</button>
    </div>
    <div class="content-area">
        <div class="card-form">
            <h2 id="titulo-perfil" style="color:var(--gold); margin-top:0;">SEGURIDAD</h2>
            <div id="body-perfil">
                </div>
        </div>
    </div>
    <button class="btn-back" onclick="cerrarTodo()"><i class="fas fa-arrow-left"></i></button>
</div>

<div id="pantalla-matriz">
    <div class="nav-perfil-horizontal">
        <button class="btn-nav-perfil active">INVENTARIO</button>
        <button class="btn-nav-perfil">PERSONAL</button>
        <button class="btn-nav-perfil">VENTA</button>
    </div>
    <div class="content-area">
        <h1 style="color:var(--gold); font-size: 3rem;">HOLA</h1>
    </div>
    <button class="btn-back" onclick="cerrarTodo()"><i class="fas fa-arrow-left"></i></button>
</div>

<script>
    // Al cargar la página, aseguramos que el menú principal esté visible
    window.onload = function() {
        document.getElementById('main-wrapper').style.display = 'flex';
    };

    function abrirPerfil() {
        document.getElementById('pantalla-perfil').style.display = 'flex';
        seccionPerfil(document.querySelector('.btn-nav-perfil'), 'seguridad');
    }

    function abrirMatriz() {
        document.getElementById('pantalla-matriz').style.display = 'flex';
    }

    function cerrarTodo() {
        document.getElementById('pantalla-perfil').style.display = 'none';
        document.getElementById('pantalla-matriz').style.display = 'none';
        document.getElementById('main-wrapper').style.display = 'flex';
    }

    function seccionPerfil(btn, tipo) {
        document.querySelectorAll('.btn-nav-perfil').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const body = document.getElementById('body-perfil');
        const titulo = document.getElementById('titulo-perfil');
        titulo.innerText = tipo.toUpperCase();

        if(tipo === 'seguridad') {
            body.innerHTML = `
                <div class="input-group"><label>Contraseña Actual</label><input type="password" id="p1" class="input-field"></div>
                <div class="input-group"><label>Nueva Contraseña</label><input type="password" id="p2" class="input-field"></div>
                <div class="input-group"><label>Confirmar</label><input type="password" id="p3" class="input-field"></div>
                <button class="btn-action" onclick="alert('Actualizado')">ACTUALIZAR</button>`;
        } else if(tipo === 'ubicacion') {
            body.innerHTML = `<div class="input-group"><label>Dirección</label><input type="text" class="input-field" placeholder="Escribe la dirección..."></div><button class="btn-action">GUARDAR</button>`;
        } else {
            body.innerHTML = `<p style="color:#444">Cargando módulo de ${tipo}...</p>`;
        }
    }
</script>

</body>
</html>
