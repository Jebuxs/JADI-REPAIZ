<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --dark: #000; --card: #111; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .header { padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; background: #050505; }
        .btn-back { color: var(--gold); text-decoration: none; font-size: 1.2rem; margin-right: 15px; }
        .main-container { padding: 20px; max-width: 500px; margin: auto; }
        .search-box { background: #1a1a1a; padding: 12px; border-radius: 12px; display: flex; align-items: center; margin-bottom: 20px; border: 1px solid #333; }
        .search-box input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }
        .cliente-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #111; background: var(--card); margin-bottom: 10px; border-radius: 10px; }
        .cliente-info h4 { margin: 0; font-size: 14px; color: var(--gold); }
        .cliente-info p { margin: 0; font-size: 12px; color: #666; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="zapatero.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        <h2 style="margin:0; font-size: 1.1rem;">Mis Clientes J.A.D.I</h2>
    </div>

    <div class="main-container">
        <div id="reader"></div>

        <div class="search-box">
            <i class="fas fa-search" style="color: #555;"></i>
            <input type="text" id="busquedaCli" onkeyup="filtrarCli()" placeholder="Buscar por nombre o celular...">
        </div>

        <div id="lista-clientes">
            <p style="text-align: center; color: #444;">Cargando historial...</p>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const session = JSON.parse(localStorage.getItem('session_jadi'));

        window.onload = function() {
            cargarClientesRecientes();
            startScanner();
        };

        function cargarClientesRecientes() {
            db.ref(`relaciones_clientes/${session.uid}`).on('value', snap => {
                const lista = document.getElementById('lista-clientes');
                lista.innerHTML = "";
                if(!snap.exists()) { lista.innerHTML = "<p>Aún no tienes clientes registrados.</p>"; return; }
                
                snap.forEach(child => {
                    const c = child.val();
                    lista.innerHTML += `
                        <div class="cliente-item" data-search="${c.nombre.toLowerCase()} ${c.telefono}">
                            <div class="cliente-info">
                                <h4>${c.nombre}</h4>
                                <p><i class="fab fa-whatsapp"></i> ${c.telefono}</p>
                            </div>
                            <i class="fas fa-history" style="color:var(--gold)" onclick="verTrabajosCli('${child.key}')"></i>
                        </div>`;
                });
            });
        }

        function filtrarCli() {
            const val = document.getElementById('busquedaCli').value.toLowerCase();
            document.querySelectorAll('.cliente-item').forEach(i => {
                i.style.display = i.getAttribute('data-search').includes(val) ? "flex" : "none";
            });
        }

        function startScanner() {
            let html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                window.location.href = `trabajos.html?scan=${txt}`;
            });
        }
    </script>
</body>
</html>
