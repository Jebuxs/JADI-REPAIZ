<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I REPAIZ - Ecosistema</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #fbc02d; --dark: #000; --input-bg: #111; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 380px; text-align: center; padding: 20px; position: relative; }
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .brand { font-size: 3.5rem; font-weight: 900; color: var(--gold); letter-spacing: -4px; margin: 0; }
        .sub-brand { color: var(--gold); font-size: 0.8rem; letter-spacing: 5px; margin-top: -10px; text-transform: uppercase; margin-bottom: 30px; }
        .field-group { position: relative; margin-bottom: 12px; }
        .input-field, .select-field { width: 100%; padding: 16px; border: 1px solid #222; border-radius: 12px; background: var(--input-bg); color: white; font-size: 1rem; box-sizing: border-box; outline: none; }
        .btn-gold { width: 100%; padding: 15px; background: var(--gold); color: #000; border: none; border-radius: 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .view { display: none; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .terms { font-size: 0.7rem; color: #666; margin: 15px 0; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="color:var(--gold); margin-top:10px;">Procesando...</p></div>

<div class="container">
    
    <div id="view-login" class="view active">
        <h1 class="brand">J.A.D.I</h1>
        <div class="sub-brand">REPAIZ</div>
        <div class="field-group"><input type="text" id="login-input" class="input-field" placeholder="ID o Celular"></div>
        <div class="field-group">
            <input type="password" id="login-pass" class="input-field" placeholder="Contraseña">
        </div>
        <button class="btn-gold" onclick="login()">Entrar</button>
        <p onclick="mostrarVista('view-register')" style="color:#555; cursor:pointer; margin-top:30px; font-size: 0.9rem;">Crear empresa o cuenta</p>
    </div>

    <div id="view-register" class="view">
        <h2 style="color:var(--gold)">Nuevo Registro</h2>
        <input type="text" id="reg-name" class="input-field" placeholder="Nombre Completo" style="margin-bottom:12px">
        <input type="tel" id="reg-tel" class="input-field" placeholder="Celular (Acceso)" style="margin-bottom:12px">
        <select id="reg-rol" class="select-field" style="margin-bottom:12px" onchange="verificarRolEmpresa('reg-rol','box-empresa')">
            <option value="" disabled selected>¿Qué quieres hacer?</option>
            <option value="PRV">Soy Proveedor (Venta de Materiales)</option>
            <option value="ZPT">Soy Maestro Zapatero (Taller)</option>
            <option value="SHP">Soy Tienda (Venta de calzado)</option>
            <option value="CLN">Soy Cliente (Quiero una reparación)</option>
            <option value="DLV">Soy Delivery (Transporte)</option>
        </select>
        <div id="box-empresa" style="display:none; border:1px solid #333; padding:10px; border-radius:12px; margin-bottom:12px">
            <input type="text" id="reg-empresa-nombre" class="input-field" placeholder="Nombre de tu Local">
        </div>
        <input type="password" id="reg-pass" class="input-field" placeholder="Contraseña" style="margin-bottom:12px">
        <input type="password" id="reg-confirm" class="input-field" placeholder="Confirmar Contraseña">
        <div class="terms"><input type="checkbox" id="check-terms"> Acepto términos J.A.D.I</div>
        
        <button class="btn-gold" onclick="validarYCrearEcosistema()">Registrarme</button>
        
        <button class="btn-google" onclick="registroConGoogle()" style="width: 100%; padding: 12px; background: white; color: #444; border: 1px solid #ddd; border-radius: 25px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <img src="https://www.google.com/images/branding/product/2x/googleg_32dp.png" alt="G" style="width:20px;">
            Registrarme con Google
        </button>
        <p onclick="mostrarVista('view-login')" style="color:#555; cursor:pointer; margin-top:15px;">Volver</p>
    </div>

    <div id="view-google-setup" class="view">
        <h2 style="color:var(--gold)">Ya casi estás dentro</h2>
        <p style="font-size:0.9rem; color:#888;">Selecciona tu rol para terminar:</p>
        <select id="google-rol" class="select-field" style="margin-bottom:12px" onchange="verificarRolEmpresa('google-rol','box-empresa-google')">
            <option value="" disabled selected>Selecciona tu Rol</option>
            <option value="PRV">Soy Proveedor</option>
            <option value="ZPT">Maestro Zapatero</option>
            <option value="SHP">Soy Tienda</option>
            <option value="CLN">Cliente</option>
            <option value="DLV">Delivery</option>
        </select>
        <div id="box-empresa-google" style="display:none; border:1px solid #333; padding:10px; border-radius:12px; margin-bottom:12px">
            <input type="text" id="google-empresa-nombre" class="input-field" placeholder="Nombre de tu Local">
        </div>
        <div class="terms"><input type="checkbox" id="check-terms-google"> Acepto términos y condiciones J.A.D.I</div>
        <button class="btn-gold" onclick="finalizarRegistroGoogle()">Continuar</button>
    </div>

    <div id="view-admin-secret" class="view">
        <h1 class="brand" style="font-size: 2.5rem;">ADMIN</h1>
        <input type="text" id="adm-name" class="input-field" placeholder="Nombre Admin" style="margin-bottom:12px">
        <input type="tel" id="adm-tel" class="input-field" placeholder="Celular Maestro" style="margin-bottom:12px">
        <input type="password" id="adm-pass" class="input-field" placeholder="Contraseña">
        <button class="btn-gold" onclick="crearAdminSecreto()">REGISTRAR ADMIN</button>
        <p onclick="mostrarVista('view-login')" style="color:#555; cursor:pointer; margin-top:20px;">Cerrar</p>
    </div>

</div>

<script>
    // --- CONFIGURACIÓN E INICIALIZACIÓN ---
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    let tempGoogleUser = null;

    const paginasMaster = { 'ZPT': 'zapatero.html', 'PRV': 'proveedor.html', 'CLN': 'cliente.html', 'DLV': 'delivery.html', 'SHP': 'tienda.html', 'ADM': 'admin_panel.html' };

    // --- COMANDO SECRETO ---
    window.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.altKey && e.key.toLowerCase() === 'j') {
            e.preventDefault();
            mostrarVista('view-admin-secret');
        }
    });

    // --- FUNCIONES DE INTERFAZ ---
    function toggleLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }
    function mostrarVista(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function verificarRolEmpresa(selectId, boxId) {
        const rol = document.getElementById(selectId).value;
        document.getElementById(boxId).style.display = (rol === 'PRV' || rol === 'ZPT' || rol === 'SHP') ? 'block' : 'none';
    }

    // --- LÓGICA DE NEGOCIO (CCC) ---
    function obtenerCCC(nombre) {
        const limpio = nombre.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
        const palabras = limpio.split(/\s+/).filter(p => p.length > 0);
        let ccc = "";
        if (palabras.length >= 3) {
            for (let i = 0; i < 3; i++) {
                const cons = palabras[i].replace(/[AEIOU]/g, "").replace(/[^A-Z]/g, "");
                ccc += cons.charAt(0) || "X";
            }
        } else {
            const todasCons = limpio.replace(/[AEIOU]/g, "").replace(/[^A-Z]/g, "");
            ccc = todasCons.substring(0, 3);
            while (ccc.length < 3) { ccc += "X"; }
        }
        return ccc;
    }

    // --- REGISTRO CON GOOGLE ---
    async function registroConGoogle() {
        toggleLoader(true);
        try {
            const provider = new firebase.auth.GoogleAuthProvider();
            const result = await auth.signInWithPopup(provider);
            const user = result.user;
            const t = user.email.replace(/[.#$\[\]]/g, "_");
            const snap = await db.ref('usuarios/' + t).once('value');
            if (snap.exists()) {
                localStorage.setItem('session_jadi', JSON.stringify(snap.val()));
                window.location.href = paginasMaster[snap.val().rolCodigo];
            } else {
                tempGoogleUser = user; 
                mostrarVista('view-google-setup');
            }
        } catch (error) { alert("Error Google: " + error.message); }
        finally { toggleLoader(false); }
    }

    async function finalizarRegistroGoogle() {
        const r = document.getElementById('google-rol').value;
        const check = document.getElementById('check-terms-google').checked;
        const nom = document.getElementById('google-empresa-nombre').value.trim();
        if(!r || !check) return alert("Completa el rol y acepta los términos.");
        toggleLoader(true);
        try {
            const t = tempGoogleUser.email.replace(/[.#$\[\]]/g, "_");
            const snapC = await db.ref('contadores/' + r).once('value');
            let num = (snapC.val() || 0) + 1;
            await db.ref('contadores/' + r).set(num);
            let empID = "SISTEMA_JADI";
            if(['PRV','ZPT','SHP'].includes(r)){
                const snapE = await db.ref('Ecosistema_JADI/contador_empresas').once('value');
                let nE = (snapE.val() || 0) + 1;
                await db.ref('Ecosistema_JADI/contador_empresas').set(nE);
                empID = `JD-${obtenerCCC(nom)}-${nE.toString().padStart(3, '0')}`;
            }
            const obj = { nombre: tempGoogleUser.displayName, telefono: tempGoogleUser.email, rolCodigo: r, uid: r+num.toString().padStart(3,'0'), pass: "G_AUTH", empresaID: empID, empresaNombre: nom || "Personal", fecha_ingreso: new Date().toLocaleDateString() };
            await db.ref('usuarios/' + t).set(obj);
            localStorage.setItem('session_jadi', JSON.stringify(obj));
            window.location.href = paginasMaster[r];
        } catch(e) { alert(e.message); }
        finally { toggleLoader(false); }
    }

    // --- LOGIN MANUAL ---
    async function login() {
        const input = document.getElementById('login-input').value.trim();
        const pass = document.getElementById('login-pass').value;
        toggleLoader(true);
        try {
            const t = input.replace(/\D/g,'');
            const snap = await db.ref('usuarios/' + t).once('value');
            if(snap.exists() && snap.val().pass === pass) {
                localStorage.setItem('session_jadi', JSON.stringify(snap.val()));
                window.location.href = paginasMaster[snap.val().rolCodigo];
            } else { alert("Acceso incorrecto"); }
        } catch(e) { alert("Error de red"); }
        finally { toggleLoader(false); }
    }

    // --- REGISTRO MANUAL ---
    async function validarYCrearEcosistema() {
        const n = document.getElementById('reg-name').value.trim();
        const t = document.getElementById('reg-tel').value.replace(/\D/g,'');
        const r = document.getElementById('reg-rol').value;
        const p = document.getElementById('reg-pass').value;
        const nomE = document.getElementById('reg-empresa-nombre').value.trim();
        if(!n || !t || !r || !p || !document.getElementById('check-terms').checked) return alert("Faltan datos");
        toggleLoader(true);
        try {
            const snapC = await db.ref('contadores/' + r).once('value');
            let num = (snapC.val() || 0) + 1;
            await db.ref('contadores/' + r).set(num);
            const obj = { nombre: n, telefono: t, rolCodigo: r, uid: r+num.toString().padStart(3,'0'), pass: p, empresaNombre: nomE || "Personal", fecha_ingreso: new Date().toLocaleDateString() };
            await db.ref('usuarios/' + t).set(obj);
            localStorage.setItem('session_jadi', JSON.stringify(obj));
            window.location.href = paginasMaster[r];
        } catch(e) { alert(e.message); }
        finally { toggleLoader(false); }
    }

    async function crearAdminSecreto() {
        const n = document.getElementById('adm-name').value;
        const t = document.getElementById('adm-tel').value.replace(/\D/g,'');
        const p = document.getElementById('adm-pass').value;
        await db.ref('usuarios/' + t).set({ nombre: n, telefono: t, rolCodigo: 'ADM', pass: p, uid: "ADM"+t.slice(-3) });
        mostrarVista('view-login');
    }
</script>
</body>
</html>
