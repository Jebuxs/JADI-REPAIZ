<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I REPAIZ - Sistema Activo</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            text-align: center;
        }
        .container {
            border: 5px solid #ecf0f1;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 2px;
        }
        p {
            font-size: 1.2rem;
            color: #bdc3c7;
            margin-top: 10px;
        }
        .status {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #27ae60;
            border-radius: 50px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>HOLA</h1>
        <h2>J.A.D.I REPAIZ</h2>
        <p>Sistema conectado con éxito desde GitHub</p>
        <div class="status">● SISTEMA ONLINE</div>
    </div>

</body>
</html>
