<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Matriz Total</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; height: 100vh; overflow: hidden; }

        /* HEADER SIEMPRE ARRIBA */
        .top-header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; display: flex; justify-content: center; align-items: center; background: var(--dark); border-bottom: 1px solid #222; z-index: 1000; }
        .header-info h1 { margin: 0; font-size: 1.2rem; color: var(--gold); text-align: center; }
        .header-info span { font-size: 0.7rem; color: #555; display: block; text-align: center; }

        .profile-zone { position: fixed; top: 15px; right: 20px; z-index: 1001; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--gold); }

        /* PANEL INICIAL (IZQUIERDA Y CENTRO) */
        #panel-inicio { position: fixed; top: 70px; left: 0; width: 100%; height: calc(100vh - 70px); display: flex; }
        
        .sidebar { width: 220px; background: #0a0a0a; border-right: 1px solid #222; padding: 20px 10px; }
        .main-view { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #222; }

        .nav-btn { width: 100%; padding: 15px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #333; color: #888; border-radius: 8px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .btn-matriz { border-color: var(--gold); color: var(--gold); }
        .btn-danger { color: #ff4444 !important; margin-top: 30px; }

        /* --- LA MATRIZ (PANTALLA LIMPIA) --- */
        #pantalla-matriz { 
            position: fixed; top: 70px; left: 0; width: 100%; height: calc(100vh - 70px); 
            background: var(--dark); z-index: 2000; display: none; /* OCULTO INICIALMENTE */
            padding: 20px; box-sizing: border-box; overflow-y: auto;
        }

        .tabs-superior { display: flex; gap: 5px; margin-bottom: 20px; position: sticky; top: 0; background: var(--dark); padding: 5px 0; }
        .tab-btn { flex: 1; padding: 12px; background: #111; border: 1px solid #333; color: #555; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        .tab-btn.active { border-color: var(--gold); color: var(--gold); background: #1a1a1a; }

        .area-trabajo { background: #0a0a0a; border: 1px solid #222; border-radius: 15px; padding: 20px; min-height: 400px; }

        /* BOTÓN VOLVER */
        .float-back { position: fixed; bottom: 20px; left: 20px; background: var(--gold); color: black; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; z-index: 3000; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="top-header">
    <div class="header-info">
        <h1 id="local-name">NOMBRE DEL LOCAL</h1>
        <span id="local-id">ID: 0000000000</span>
    </div>
</div>

<div class="profile-zone">
    <img src="https://via.placeholder.com/40" class="profile-img" alt="Perfil">
</div>

<div id="panel-inicio">
    <div class="sidebar">
        <button class="nav-btn btn-matriz" onclick="activarMatriz()">
            <i class="fas fa-th-large"></i> ABRIR MATRIZ
        </button>
        <button class="nav-btn btn-danger" onclick="alert('Borrando registro...')">
            <i class="fas fa-trash-alt"></i> ELIMINAR CUENTA
        </button>
    </div>
    <div class="main-view">
        <i class="fas fa-store" style="font-size: 5rem;"></i>
        <h2>MODO ESPERA</h2>
    </div>
</div>

<div id="pantalla-matriz">
    <div class="tabs-superior">
        <button class="tab-btn active" onclick="cambiarTab(this, 'inventario')">INVENTARIO</button>
        <button class="tab-btn" onclick="cambiarTab(this, 'personal')">PERSONAL</button>
        <button class="tab-btn" onclick="cambiarTab(this, 'venta')">VENTA</button>
        <button class="tab-btn" onclick="cambiarTab(this, 'facturas')">FACTURACIONES</button>
    </div>

    <div class="area-trabajo">
        <h2 id="titulo-modulo" style="color:var(--gold); margin-top:0;">Inventario</h2>
        <hr border="0" style="border-top:1px solid #222; margin-bottom:20px;">
        <div id="contenido-modulo">
            </div>
    </div>
</div>

<button id="btn-salir" class="float-back" onclick="desactivarMatriz()">
    <i class="fas fa-arrow-left"></i>
</button>

<script>
    // Configuración Firebase
    const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);

    function activarMatriz() {
        // EL SECRETO: Apagamos el panel de inicio por completo
        document.getElementById('panel-inicio').style.display = 'none';
        
        // Encendemos la matriz y el botón de volver
        document.getElementById('pantalla-matriz').style.display = 'block';
        document.getElementById('btn-salir').style.display = 'block';
        
        cambiarTab(null, 'inventario');
    }

    function desactivarMatriz() {
        // Proceso inverso: apagamos matriz, encendemos inicio
        document.getElementById('pantalla-matriz').style.display = 'none';
        document.getElementById('btn-salir').style.display = 'none';
        
        document.getElementById('panel-inicio').style.display = 'flex';
    }

    function cambiarTab(btn, modulo) {
        if(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        
        const titulo = document.getElementById('titulo-modulo');
        const contenido = document.getElementById('contenido-modulo');
        
        titulo.innerText = modulo.toUpperCase();

        if(modulo === 'inventario') {
            contenido.innerHTML = `
                <div style="text-align:center; padding:50px; border: 1px dashed #333; border-radius:10px;">
                    <button onclick="alert('Abriendo registro de calzado...')" style="background:var(--gold); border:none; padding:15px 30px; border-radius:8px; font-weight:bold; cursor:pointer;">
                        <i class="fas fa-plus"></i> CREAR INVENTARIO
                    </button>
                </div>
            `;
        } else {
            contenido.innerHTML = `<p style="color:#444; text-align:center;">Módulo de ${modulo} próximamente...</p>`;
        }
    }
</script>

</body>
</html>
