<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo Zapatero - J.A.D.I REPAIZ</title>

    <script src="../js/estilo_visual.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* Estilos estructurales específicos que el JS no cubre */
        .header {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 25px; border-bottom: 1px solid #D4AF37; background: #050505;
            position: sticky; top: 0; z-index: 1000;
        }
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .profile-btn img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #D4AF37; }
        
        .dashboard-stats {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px;
        }
        .stat-card { background: #111; border: 1px solid #222; padding: 12px 5px; border-radius: 12px; text-align: center; }
        .stat-card span { font-size: 1.4rem; font-weight: bold; display: block; }
        .stat-card p { font-size: 9px; color: #666; margin: 0; text-transform: uppercase; }

        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { text-decoration: none; color: white; } /* La tarjeta hereda el estilo .card-jadi del JS */
        
        .color-new { color: #ff4d4d; }
        .color-proc { color: #4dadff; }
        .color-ready { color: #4dff88; }
    </style>
</head>
<body>

    <div class="header">
        <div style="line-height: 1;">
            <h1 style="color: #D4AF37; margin: 0; font-size: 22px; letter-spacing: 3px;">J.A.D.I</h1>
            <span style="color: #FFF; font-size: 9px; letter-spacing: 4px; text-transform: uppercase;">REPAIZ</span>
        </div>
        <div class="header-actions">
            <a href="../dashboard.html" style="color: #666; text-decoration: none;" title="Dashboard Master">
                <i class="fas fa-th-large"></i>
            </a>
            <a href="perfil.html" style="text-decoration: none; display: flex; align-items: center; gap: 8px;">
                <span id="header-user-name" style="color: white; font-size: 11px; font-weight: bold;">...</span>
                <img id="user-photo" src="https://via.placeholder.com/32" alt="Perfil">
            </a>
        </div>
    </div>

    <div style="padding: 20px; max-width: 900px; margin: auto;">
        
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px;">
            <div>
                <h2 id="display-nombre" style="text-align: left; margin: 0; border-left: 5px solid #D4AF37; padding-left: 15px;">Bienvenido Maestro</h2>
                <div id="display-local" style="color: #888; font-size: 12px; margin-left: 20px;">...</div>
            </div>
            <div id="display-id" style="background: #1a1a1a; color: #D4AF37; padding: 4px 12px; border-radius: 20px; font-size: 10px; border: 1px solid #333;">ID: ...</div>
        </div>

        <div class="dashboard-stats">
            <div class="stat-card"><i class="fas fa-bell color-new"></i><span id="count-nuevos">0</span><p>Nuevos</p></div>
            <div class="stat-card"><i class="fas fa-hammer color-proc"></i><span id="count-proceso">0</span><p>En Proceso</p></div>
            <div class="stat-card"><i class="fas fa-check-circle color-ready"></i><span id="count-listos">0</span><p>Terminados</p></div>
        </div>

        <div class="grid-container">
            <a href="local.html" class="card-jadi card">
                <i class="fas fa-store" style="font-size: 24px; color: #D4AF37;"></i>
                <h3 style="font-size: 12px; margin-top: 10px;">Mi Local</h3>
                <p style="font-size: 9px; color: #666;">Vitrina y Ubicación</p>
            </a>
            <a href="inventario.html" class="card-jadi card">
                <i class="fas fa-boxes-stacked" style="font-size: 24px; color: #D4AF37;"></i>
                <h3 style="font-size: 12px; margin-top: 10px;">Inventarios</h3>
                <p style="font-size: 9px; color: #666;">Suelas y Materiales</p>
            </a>
            <a href="clientes.html" class="card-jadi card">
                <i class="fas fa-address-book" style="font-size: 24px; color: #D4AF37;"></i>
                <h3 style="font-size: 12px; margin-top: 10px;">Clientes</h3>
                <p style="font-size: 9px; color: #666;">Base de Datos y QR</p>
            </a>
            <a href="trabajos.html" class="card-jadi card">
                <i class="fas fa-tools" style="font-size: 24px; color: #D4AF37;"></i>
                <h3 style="font-size: 12px; margin-top: 10px;">Trabajos</h3>
                <p style="font-size: 9px; color: #666;">Órdenes y Avances</p>
            </a>
        </div>

        <div style="background: #050505; color: #D4AF37; border: 1px solid #332b00; padding: 15px; border-radius: 12px; text-align: center; margin-top: 30px; font-size: 12px;">
            <i class="fas fa-shield-halved"></i> <strong>SISTEMA J.A.D.I ACTIVO</strong>
            <div style="font-size: 9px; color: #666; margin-top: 4px;">Monitor real de <span id="local-footer">...</span></div>
        </div>

        <a href="#" id="logout-trigger" style="display: block; text-align: center; color: #444; text-decoration: none; margin-top: 30px; font-size: 12px;">
            <i class="fas fa-power-off"></i> CERRAR SESIÓN
        </a>
    </div>

    <script>
        // Configuración Firebase
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = function() {
            // Aplicar el estilo elegante desde el JS
            if(typeof JadiEstilo !== 'undefined') JadiEstilo.aplicar('elegante');

            const session = JSON.parse(localStorage.getItem('session_jadi'));
            if (session) {
                document.getElementById('display-nombre').innerText = "Maestro " + (session.nombre || "J.A.D.I");
                document.getElementById('header-user-name').innerText = (session.nombre || "Usuario");
                document.getElementById('display-id').innerText = "ID: " + (session.uid || "ZPT-PRO");
                document.getElementById('display-local').innerText = session.empresaNombre || "Local Independiente";
                document.getElementById('local-footer').innerText = session.empresaNombre || "Sucursal Principal";
                
                if(session.foto) document.getElementById('user-photo').src = session.foto;

                actualizarEstadisticas(session.uid);
            } else {
                window.location.href = "../index.html";
            }
        };

        function actualizarEstadisticas(uid) {
            db.ref('trabajos').orderByChild('maestroId').equalTo(uid).on('value', snap => {
                let n = 0, p = 0, l = 0;
                snap.forEach(c => {
                    const est = c.val().estado;
                    if(est === 'Recibido' || est === 'Nuevo') n++;
                    else if(est === 'En Proceso') p++;
                    else if(est === 'Listo') l++;
                });
                document.getElementById('count-nuevos').innerText = n;
                document.getElementById('count-proceso').innerText = p;
                document.getElementById('count-listos').innerText = l;
            });
        }

        document.getElementById('logout-trigger').onclick = function(e) {
            e.preventDefault();
            if(confirm("¿Cerrar sesión?")) {
                localStorage.removeItem('session_jadi');
                window.location.href = "../index.html";
            }
        };
    </script>
</body>
</html>
