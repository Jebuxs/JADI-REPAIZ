<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Tienda - JADI REPAIZ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; --text: #eee; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; padding-bottom: 100px; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 25px; }

        /* Pilares Comerciales */
        .main-pillars { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 30px; }
        .pillar-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; transition: 0.3s; }
        .pillar-card i { font-size: 1.6rem; margin-bottom: 8px; display: block; color: var(--gold); }
        .pillar-card h3 { margin: 5px 0; font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .pillar-card span { font-size: 1.4rem; font-weight: bold; }

        /* Acciones de Venta */
        .sales-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .action-card { background: linear-gradient(145deg, #111, #050505); padding: 25px; border-radius: 15px; border: 1px solid #333; text-align: center; text-decoration: none; color: white; transition: 0.3s; }
        .action-card:hover { border-color: var(--gold); background: #161616; transform: scale(1.02); }
        .action-card i { font-size: 2rem; color: var(--gold); margin-bottom: 15px; display: block; }
        .action-card b { font-size: 0.9rem; display: block; }

        /* Listado de Inventario Crítico */
        .stock-section { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; }
        .stock-section h2 { color: var(--gold); font-size: 1rem; margin-top: 0; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        .stock-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .stock-item:last-child { border-bottom: none; }
        .badge-low { color: #f44336; font-weight: bold; }

        /* Barra de Navegación */
        .quick-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(10,10,10,0.95); padding: 12px 30px; border-radius: 50px; border: 1px solid var(--gold); display: flex; gap: 30px; backdrop-filter: blur(10px); }
        .nav-item { color: #fff; font-size: 1.3rem; text-decoration: none; opacity: 0.7; }
        .nav-item:hover { opacity: 1; color: var(--gold); }
    </style>
</head>
<body>

<header>
    <div>
        <h2 style="color:var(--gold); margin:0; font-size: 1.1rem;" id="shop-name">TIENDA JADI</h2>
        <small style="color: #555;">Gestión de Ventas y Vitrina</small>
    </div>
    <button onclick="cerrarSesion()" style="background:none; border:1px solid #333; color:#444; padding:5px 10px; border-radius:5px; cursor:pointer;">SALIR</button>
</header>

<div class="main-pillars">
    <div class="pillar-card">
        <i class="fas fa-cash-register"></i>
        <h3>VENTAS MES</h3><span id="s-ventas">$0</span>
    </div>
    <div class="pillar-card">
        <i class="fas fa-boxes"></i>
        <h3>PRODUCTOS</h3><span id="s-stock">0</span>
    </div>
    <div class="pillar-card">
        <i class="fas fa-exclamation-circle"></i>
        <h3>SIN STOCK</h3><span id="s-alert" style="color:#f44336;">0</span>
    </div>
</div>

<div class="sales-grid">
    <a href="nueva-venta.html" class="action-card">
        <i class="fas fa-cart-plus"></i>
        <b>NUEVA VENTA</b>
    </a>
    <a href="catalogo.html" class="action-card">
        <i class="fas fa-edit"></i>
        <b>GESTIONAR STOCK</b>
    </a>
</div>

<div class="stock-section">
    <h2><i class="fas fa-chart-line"></i> ALERTAS DE INVENTARIO</h2>
    <div id="lista-alertas">
        <p style="text-align:center; color:#444; padding:20px; font-size: 0.8rem;">Todo el stock está al día.</p>
    </div>
</div>

<div class="quick-nav">
    <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i></a>
    <a href="ventas-historial.html" class="nav-item"><i class="fas fa-history"></i></a>
    <a href="catalogo.html" class="nav-item"><i class="fas fa-store"></i></a>
    <a href="../admin/dashboard.html" class="nav-item"><i class="fas fa-cog"></i></a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    async function validarAcceso() {
        const session = JSON.parse(localStorage.getItem('session_jadi'));
        
        if(!session) {
            window.location.href = "../login.html";
            return;
        }

        const snap = await db.ref('usuarios/' + session.uid).once('value');
        if(!snap.exists()) {
            cerrarSesion();
            return;
        }

        const u = snap.val();
        // Solo SHP (Shop/Tienda) o ADM (Tú)
        if(u.rolCodigo !== 'SHP' && u.rolCodigo !== 'ADM') {
            window.location.href = "../login.html";
            return;
        }

        document.getElementById('shop-name').innerText = "TIENDA: " + u.nombre.toUpperCase();
        cargarDatosTienda();
    }

    function cargarDatosTienda() {
        console.log("Cargando métricas de tienda...");
    }

    function cerrarSesion() {
        auth.signOut();
        localStorage.removeItem('session_jadi');
        window.location.href = "../login.html";
    }

    validarAcceso();
</script>
</body>
</html>
