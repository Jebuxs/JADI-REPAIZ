<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Cliente - J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 40px; text-align: left; }
        .user-meta h2 { margin: 0; color: var(--gold); font-size: 1.2rem; }
        .user-meta p { margin: 0; font-size: 0.8rem; color: #666; }

        /* Contenedor de Botones Tipo Admin */
        .client-grid { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 400px; margin: 0 auto; }
        
        .menu-card { 
            background: var(--card); 
            border: 1px solid #222; 
            border-radius: 20px; 
            padding: 35px 20px; 
            cursor: pointer; 
            transition: 0.3s; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
        }
        .menu-card:hover { border-color: var(--gold); transform: translateY(-5px); background: #151515; }
        .menu-card i { font-size: 3rem; }
        .menu-card h3 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; color: var(--gold); }
        .menu-card p { margin: 0; font-size: 0.85rem; color: #777; }

        .btn-logout { margin-top: 50px; background: none; border: 1px solid #333; color: #555; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="user-meta">
        <p>Bienvenido a J.A.D.I</p>
        <h2 id="client-name">Cargando...</h2>
    </div>
    <i class="fas fa-user-circle fa-2x" style="color: #333;"></i>
</header>

<div class="client-grid">
    <div class="menu-card" onclick="window.location.href='tiendas.html'">
        <i class="fas fa-store" style="color: #e91e63;"></i>
        <h3>TIENDAS</h3>
        <p>Ver locales y comprar productos</p>
    </div>

    <div class="menu-card" onclick="window.location.href='reparar.html'">
        <i class="fas fa-tools" style="color: #2196f3;"></i>
        <h3>REPARACIONES</h3>
        <p>Solicitar nueva o ver seguimiento</p>
    </div>
</div>

<button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>

<script>
    const session = JSON.parse(localStorage.getItem('session_jadi'));

    function init() {
        if(!session) { window.location.href = "index.html"; return; }
        document.getElementById('client-name').innerText = session.nombre;
    }

    function cerrarSesion() {
        localStorage.removeItem('session_jadi');
        window.location.href = "index.html";
    }

    init();
</script>
</body>
</html>
