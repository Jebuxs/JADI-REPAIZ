<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Trabajos - JADI REPAIZ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --dark: #000; --card: #111; --danger: #ff4444; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .header { padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; background: #050505; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .btn-back { color: var(--gold); text-decoration: none; }
        .search-container { padding: 15px; }
        .search-bar { background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 10px; display: flex; align-items: center; }
        .search-bar input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }
        .orders-container { padding: 0 15px; }
        .order-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        #modal-orden { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 300; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; font-size: 16px; }
        label { font-size: 11px; color: var(--gold); margin-bottom: 5px; display: block; }
        .row-flex { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .btn-mini-plus { background: #222; color: var(--gold); border: 1px solid var(--gold); border-radius: 8px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #btn-invitar { display: none; background: #0066ff; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; margin-bottom: 15px; }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 24px; border: none; z-index: 200; }
        .item-listado { border-bottom: 1px solid #222; padding: 10px; font-size: 14px; display: flex; justify-content: space-between; align-items: flex-start; }
        .item-info { flex: 1; }
        .detalles-texto { font-size: 12px; color: #888; white-space: pre-wrap; margin-top: 4px; }
        .btn-eliminar-item { color: var(--danger); background: transparent; border: none; font-size: 18px; }
        .caja-totales { background: #0a0a0a; padding: 15px; border-radius: 12px; margin-top:15px; border: 1px solid #222; }
        .badge-saldo { background: #222; color: #00ff00; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-left: 5px; border: 1px solid #004400; }
    </style>
</head>
<body>

    <div class="header">
        <a href="zapatero.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        <h2 style="margin:0; font-size: 1.1rem;">Panel JADI REPAIZ</h2>
        <i class="fas fa-sync-alt" onclick="location.reload()" style="color: var(--gold);"></i>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="inputBusqueda" onkeyup="filtrarTrabajos()" placeholder="Buscar cliente o ID...">
        </div>
    </div>

    <div class="orders-container" id="lista-trabajos"></div>

    <button class="fab" onclick="abrirModal()"><i class="fas fa-plus"></i></button>

    <div id="modal-orden">
        <h2 id="titulo-modal" style="color: var(--gold); margin-top: 0;">Nueva Orden</h2>
        
        <label>CELULAR CLIENTE</label>
        <input type="tel" id="cli-celular" placeholder="Ej: 0987654321" onkeyup="verificarCliente(this.value)">
        <button id="btn-invitar" onclick="invitarCliente()">USUARIO NO REGISTRADO - ¿INVITAR?</button>

        <label>NOMBRE CLIENTE</label>
        <input type="text" id="cli-nombre" placeholder="Nombre completo">
        
        <div id="form-item-caja" style="background: #080808; border-radius: 10px; padding: 12px; border: 1px dashed #444;">
            <div class="row-flex">
                <input type="number" id="item-cant" value="1" style="flex:0.4;">
                <input type="text" id="item-tipo" placeholder="Zapato, Mochila..." style="flex:2;">
            </div>
            <div class="row-flex">
                <input type="text" id="item-desc-input" placeholder="Detalle trabajo" style="flex:1;">
                <div class="btn-mini-plus" onclick="acumularEnTexto()"><i class="fas fa-plus"></i></div>
            </div>
            <textarea id="item-detalles-final" placeholder="Resumen detalles..."></textarea>
            <div class="row-flex">
                <input type="number" id="item-precio" placeholder="Precio $">
                <button onclick="bajarItem()" style="background:var(--gold); border:none; border-radius:8px; height:45px; width:60px;"><i class="fas fa-arrow-down"></i></button>
            </div>
        </div>

        <div id="visor-items" style="margin-top:15px;"></div>

        <div class="caja-totales">
            <label>TOTAL COBRADO $</label>
            <input type="number" id="precio-total" value="0" oninput="calcularDiferencias()">
            <label>ABONO $</label>
            <input type="number" id="abono-inicial" value="0" oninput="calcularDiferencias()">
            <div style="color: #00ff00; font-weight: bold; display: flex; justify-content: space-between;">
                <span>SALDO:</span> <span id="txt-saldo-pendiente">$0</span>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button onclick="cerrarModal()" style="flex:1; background:transparent; color:white; border:1px solid #444; padding:15px; border-radius:10px;">CANCELAR</button>
            <button id="btn-guardar-principal" onclick="guardarOrdenFinal()" style="flex:1; background:var(--gold); color:black; border:none; padding:15px; border-radius:10px; font-weight:bold;">GUARDAR ORDEN</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const session = JSON.parse(localStorage.getItem('session_jadi')) || { uid: "ZPT000000001" };

        let itemsParaGuardar = [];
        let totalRealSuma = 0;
        let idFirebaseActual = null;
        let clienteEncontradoID = null;

        // 1. VERIFICAR CLIENTE AUTOMÁTICO
        function verificarCliente(tel) {
            if(tel.length < 9) return;
            db.ref('usuarios').orderByChild('telefono').equalTo(tel).once('value', snap => {
                if(snap.exists()){
                    const uid = Object.keys(snap.val())[0];
                    const data = snap.val()[uid];
                    document.getElementById('cli-nombre').value = data.nombre;
                    clienteEncontradoID = data.uid || uid; // Guardamos su ID CLN
                    document.getElementById('btn-invitar').style.display = "none";
                } else {
                    document.getElementById('btn-invitar').style.display = "block";
                    clienteEncontradoID = null;
                }
            });
        }

        async function guardarOrdenFinal() {
            if(itemsParaGuardar.length === 0) return alert("Agrega artículos");
            const tel = document.getElementById('cli-celular').value;
            const nom = document.getElementById('cli-nombre').value;
            const cobrado = parseFloat(document.getElementById('precio-total').value);
            const abono = parseFloat(document.getElementById('abono-inicial').value);

            // 2. SI NO EXISTE, CREAR CLIENTE AUTOMÁTICAMENTE
            if(!clienteEncontradoID) {
                const snapC = await db.ref('contadores/CLN').once('value');
                let numC = (snapC.val() || 0) + 1;
                clienteEncontradoID = 'CLN' + numC.toString().padStart(9, '0');
                await db.ref('usuarios/' + clienteEncontradoID).set({
                    uid: clienteEncontradoID,
                    nombre: nom,
                    telefono: tel,
                    tipo: 'CLIENTE',
                    totalTrabajos: 0,
                    registroCompleto: false
                });
                await db.ref('contadores/CLN').set(numC);
            }

            // 3. GENERAR ID INTELIGENTE (ZPT1_CLN1234-Z-C-H)
            // Obtener contadores para el ID
            const zapIDShort = session.uid.replace(/[^0-9]/g, ''); // Quita ceros y letras: ZPT0001 -> 1
            const cliIDShort = clienteEncontradoID.replace(/[^0-9]/g, '');

            // Incrementar contadores globales y específicos
            const snapZapGlobal = await db.ref(`contadores_stats/zpts/${session.uid}/total`).once('value');
            const totalZap = (snapZapGlobal.val() || 0) + 1;

            const snapCliGlobal = await db.ref(`contadores_stats/clns/${clienteEncontradoID}/total`).once('value');
            const totalCli = (snapCliGlobal.val() || 0) + 1;

            const snapRelacion = await db.ref(`contadores_stats/relaciones/${session.uid}_${clienteEncontradoID}`).once('value');
            const totalJuntos = (snapRelacion.val() || 0) + 1;

            const idCarpetaInteligente = `ZPT${parseInt(zapIDShort)}_CLN${parseInt(cliIDShort)}-${totalZap}-${totalCli}-${totalJuntos}`;

            const data = {
                ordenID: idCarpetaInteligente,
                zapateroId: session.uid,
                clienteId: clienteEncontradoID,
                cliente: nom,
                telefono: tel,
                items: itemsParaGuardar,
                precioTotal: cobrado,
                abono: abono,
                saldo: (cobrado - abono),
                timestamp: Date.now(),
                estado: 'Recibido'
            };

            // Guardar Orden
            await db.ref('trabajos/' + idCarpetaInteligente).set(data);
            
            // Actualizar contadores en la BD
            await db.ref(`contadores_stats/zpts/${session.uid}/total`).set(totalZap);
            await db.ref(`contadores_stats/clns/${clienteEncontradoID}/total`).set(totalCli);
            await db.ref(`contadores_stats/relaciones/${session.uid}_${clienteEncontradoID}`).set(totalJuntos);

            alert("Orden Creada: " + idCarpetaInteligente);
            cerrarModal();
        }

        // SOPORTE INTERFAZ
        function bajarItem() {
            const it = {
                cant: document.getElementById('item-cant').value,
                tipo: document.getElementById('item-tipo').value,
                detalles: document.getElementById('item-detalles-final').value,
                precio: parseFloat(document.getElementById('item-precio').value) || 0
            };
            if(!it.tipo) return;
            itemsParaGuardar.push(it);
            renderizarLista();
            limpiarCamposItem();
        }

        function renderizarLista() {
            const visor = document.getElementById('visor-items');
            visor.innerHTML = ""; totalRealSuma = 0;
            itemsParaGuardar.forEach((it, index) => {
                totalRealSuma += it.precio;
                visor.innerHTML += `<div class="item-listado">
                    <div class="item-info"><b>${it.cant} ${it.tipo}</b> - $${it.precio}<div class="detalles-texto">${it.detalles}</div></div>
                    <button class="btn-eliminar-item" onclick="itemsParaGuardar.splice(${index},1);renderizarLista();"><i class="fas fa-times"></i></button>
                </div>`;
            });
            document.getElementById('precio-total').value = totalRealSuma;
            calcularDiferencias();
        }

        function calcularDiferencias() {
            const c = parseFloat(document.getElementById('precio-total').value) || 0;
            const a = parseFloat(document.getElementById('abono-inicial').value) || 0;
            document.getElementById('txt-saldo-pendiente').innerText = "$" + (c - a).toFixed(2);
        }

        function acumularEnTexto() {
            const i = document.getElementById('item-desc-input');
            const v = document.getElementById('item-detalles-final');
            if(!i.value) return;
            v.value += (v.value ? "\n" : "") + "- " + i.value;
            i.value = ""; i.focus();
        }

        function abrirModal() { document.getElementById('modal-orden').style.display = 'block'; itemsParaGuardar = []; renderizarLista(); }
        function cerrarModal() { document.getElementById('modal-orden').style.display = 'none'; }
        function limpiarCamposItem() { document.getElementById('item-tipo').value=""; document.getElementById('item-detalles-final').value=""; document.getElementById('item-precio').value=""; }

        function cargarTrabajos() {
            db.ref('trabajos').orderByChild('zapateroId').equalTo(session.uid).on('value', snap => {
                const container = document.getElementById('lista-trabajos');
                container.innerHTML = "";
                snap.forEach(child => {
                    const o = child.val();
                    container.innerHTML += `<div class="order-card">
                        <div style="flex:1;"><h3 style="color:var(--gold); margin:0;">${o.cliente}</h3>
                        <div style="font-size:10px; color:#aaa;">ID: ${o.ordenID}</div>
                        <div style="font-weight:bold;">Total: $${o.precioTotal} <span class="badge-saldo">Saldo: $${o.saldo}</span></div></div>
                    </div>`;
                });
            });
        }
        window.onload = cargarTrabajos;
    </script>
</body>
</html>
