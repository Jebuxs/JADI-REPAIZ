<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Usuario - J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #FFD700; --dark: #000; --card: #0a0a0a; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .info-box { border: 1px solid var(--gold); padding: 30px; border-radius: 15px; background: var(--card); width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.1); text-align: center;}
        h1, h2, h3 { color: var(--gold); }
        .dato-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .valor { font-size: 1rem; color: #fff; }
        #pantalla-edicion { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        input:disabled { background: #050505; color: #666; }
        .btn { padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 0.9rem; font-weight: bold; border: 1px solid var(--gold); transition: 0.3s; margin: 5px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-outline { background: transparent; color: var(--gold); }
        .btn-full { width: 100%; margin: 10px 0; }
        
        /* Contenedor Mapa con Bloqueo */
        #map-container { position: relative; width: 100%; height: 250px; margin: 10px 0; }
        #mapa { height: 100%; width: 100%; border-radius: 10px; border: 1px solid #333; }
        #map-overlay { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 1000; display: none; cursor: not-allowed; }

        .pass-wrapper { position: relative; }
        .ojo-pollo { position: absolute; right: 10px; top: 12px; color: var(--gold); cursor: pointer; }
        .preview-img { width: 60px; height: 60px; border-radius: 50%; border: 1px solid var(--gold); object-fit: cover; display: block; margin: 10px auto; }
    </style>
</head>
<body>

    <div class="container" id="vista-perfil">
        <div class="info-box">
            <h1>Datos de Sesión</h1>
            <img id="view-logo" src="" class="preview-img" style="display:none;">
            <div class="dato-group"><label>Nombre del Usuario</label><div id="info-nombre" class="valor">Cargando...</div></div>
            <div class="dato-group"><label>Correo Electrónico</label><div id="info-correo" class="valor">Cargando...</div></div>
            <div class="dato-group"><label>ID Único (UID)</label><div id="info-uid" class="valor" style="color: var(--gold);">Cargando...</div></div>
            <div style="display: flex; justify-content: center; gap: 10px;">
                <a href="javascript:history.back()" class="btn btn-outline">← VOLVER</a>
                <button onclick="abrirEdicion()" class="btn btn-gold">EDITAR</button>
            </div>
        </div>
    </div>

    <div id="pantalla-edicion">
        <div class="header-edit" style="text-align:center">
            <h2 id="ed-local-header">Nombre del Local</h2>
            <p id="ed-user-header" class="no-editable">Usuario</p>
            <p id="ed-mail-header" class="no-editable">correo@ejemplo.com</p>
            <hr style="border: 1px solid #333;">
            <h3 style="text-align: left;">Datos para editar</h3>
        </div>

        <label>Nombre Completo</label>
        <input type="text" id="edit-nombre">
        <label>Nombre del Local</label>
        <input type="text" id="edit-local">
        <label>Número Telefónico Fijo</label>
        <input type="tel" id="edit-fijo">
        <label>WhatsApp</label>
        <input type="tel" id="edit-ws">
        <label>CI o RUC</label>
        <input type="text" id="edit-ruc">

        <label>Logotipo del Local (Subir Imagen)</label>
        <input type="file" id="edit-logo-file" accept="image/*" onchange="previewImagen(this)">
        <img id="logo-preview" src="" class="preview-img" style="display:none">

        <label>Ubicación del Local</label>
        <div id="map-container">
            <div id="mapa"></div>
            <div id="map-overlay"></div>
        </div>
        <button id="btn-capturar-ubicacion" class="btn btn-gold btn-full" onclick="toggleMapa()">Capturar Ubicación</button>

        <hr style="border: 1px solid #333;">
        <h3>Seguridad</h3>
        <label>Usuario 1 (Acceso)</label>
        <input type="text" id="u1" disabled>
        <label>Usuario 2 (UID)</label>
        <input type="text" id="u2" disabled>

        <div id="box-pass-antigua" style="display:none;">
            <label>Contraseña Antigua</label>
            <div class="pass-wrapper"><input type="password" id="pass-antigua"><i class="fa fa-eye ojo-pollo" onclick="togglePass('pass-antigua')"></i></div>
        </div>
        <label>Contraseña Nueva</label>
        <div class="pass-wrapper"><input type="password" id="pass-nueva"><i class="fa fa-eye ojo-pollo" onclick="togglePass('pass-nueva')"></i></div>
        <label>Confirmación</label>
        <div class="pass-wrapper"><input type="password" id="pass-confirm"><i class="fa fa-eye ojo-pollo" onclick="togglePass('pass-confirm')"></i></div>

        <button id="btn-guardar-pass" class="btn btn-gold btn-full" onclick="toggleEdicionPass()">Guardar Contraseña</button>
        
        <div style="display: flex; gap: 10px; margin-top: 30px;">
            <button onclick="cerrarEdicion()" class="btn btn-outline btn-full">CANCELAR</button>
            <button onclick="guardarTodo()" class="btn btn-gold btn-full">GUARDAR TODO</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let session = JSON.parse(localStorage.getItem('session_jadi'));
        let mapa, marker, logoBase64 = "";
        let mapaBloqueado = false, passBloqueada = false;

        window.onload = () => { if (!session) window.location.href = "index.html"; cargarDatosVista(); };

        function cargarDatosVista() {
            document.getElementById('info-nombre').innerText = session.nombre || "---";
            document.getElementById('info-correo').innerText = session.email || "---";
            document.getElementById('info-uid').innerText = session.uid || "---";
            if(session.logo) { document.getElementById('view-logo').src = session.logo; document.getElementById('view-logo').style.display='block'; }
        }

        function previewImagen(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    logoBase64 = e.target.result;
                    document.getElementById('logo-preview').src = logoBase64;
                    document.getElementById('logo-preview').style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function abrirEdicion() {
            document.getElementById('pantalla-edicion').style.display = 'block';
            document.getElementById('ed-local-header').innerText = session.empresaNombre || "Sin Local";
            document.getElementById('ed-user-header').innerText = session.nombre;
            document.getElementById('ed-mail-header').innerText = session.email;
            document.getElementById('edit-nombre').value = session.nombre || "";
            document.getElementById('edit-local').value = session.empresaNombre || "";
            document.getElementById('edit-fijo').value = session.fijo || "";
            document.getElementById('edit-ws').value = session.telefono || "";
            document.getElementById('edit-ruc').value = session.ruc || "";
            
            // Usuario 1: Teléfono o Texto por defecto
            document.getElementById('u1').value = session.telefono ? session.telefono : "Número Celular";
            document.getElementById('u2').value = session.uid || "";

            if (session.passEditada) document.getElementById('box-pass-antigua').style.display = 'block';
            initMapa();
        }

        function initMapa() {
            if (mapa) mapa.remove();
            let lat = session.lat || -0.1807, lng = session.lng || -78.4678;
            mapa = L.map('mapa').setView([lat, lng], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
            marker = L.marker([lat, lng], { draggable: true }).addTo(mapa);

            // Si es la primera vez (no hay lat), pedir ubicación real
            if(!session.lat) {
                mapa.locate({setView: true, maxZoom: 16});
                mapa.on('locationfound', (e) => marker.setLatLng(e.latlng));
            }

            if (session.lat) { // Si ya existía, bloquear
                mapaBloqueado = false; // Forzamos estado para el primer toggle
                toggleMapa(); 
            }
        }

        function toggleMapa() {
            const btn = document.getElementById('btn-capturar-ubicacion');
            const overlay = document.getElementById('map-overlay');
            if (mapaBloqueado) {
                marker.dragging.enable();
                overlay.style.display = 'none';
                btn.innerText = "Capturar Ubicación";
                mapaBloqueado = false;
            } else {
                marker.dragging.disable();
                overlay.style.display = 'block'; // Bloqueo físico
                btn.innerText = "Editar Ubicación";
                mapaBloqueado = true;
            }
        }

        function togglePass(id) { const input = document.getElementById(id); input.type = input.type === "password" ? "text" : "password"; }

        function toggleEdicionPass() {
            const btn = document.getElementById('btn-guardar-pass');
            const fields = [document.getElementById('pass-nueva'), document.getElementById('pass-confirm'), document.getElementById('pass-antigua')];
            if (passBloqueada) {
                fields.forEach(f => f.disabled = false);
                btn.innerText = "Guardar Contraseña";
                passBloqueada = false;
            } else {
                if (fields[0].value !== fields[1].value) return alert("Las contraseñas no coinciden");
                fields.forEach(f => f.disabled = true);
                btn.innerText = "Editar Contraseña";
                passBloqueada = true;
            }
        }

        async function guardarTodo() {
            if (!mapaBloqueado) return alert("Por favor capture su ubicación");
            const updates = {
                nombre: document.getElementById('edit-nombre').value,
                empresaNombre: document.getElementById('edit-local').value,
                fijo: document.getElementById('edit-fijo').value,
                telefono: document.getElementById('edit-ws').value,
                ruc: document.getElementById('edit-ruc').value,
                lat: marker.getLatLng().lat, lng: marker.getLatLng().lng
            };
            if (logoBase64 !== "") updates.logo = logoBase64;
            if (passBloqueada && document.getElementById('pass-nueva').value !== "") {
                updates.pass = document.getElementById('pass-nueva').value;
                updates.passEditada = true;
            }
            try {
                await db.ref('usuarios/' + session.uid).update(updates);
                Object.assign(session, updates);
                localStorage.setItem('session_jadi', JSON.stringify(session));
                alert("¡Perfil Actualizado!");
                location.reload();
            } catch (e) { alert("Error: " + e.message); }
        }
        function cerrarEdicion() { document.getElementById('pantalla-edicion').style.display = 'none'; }
    </script>
</body>
</html>
