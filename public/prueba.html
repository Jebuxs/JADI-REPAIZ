<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JADI - Selector de Estilos</title>

    <script src="../js/estilo_visual.js"></script>
    <script src="../js/modal_trabajos.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="card-jadi">
        <h2><i class="fas fa-palette"></i> Panel de Prueba</h2>
        <p style="text-align: center; font-size: 13px;">Selecciona un estilo para transformar la interfaz.</p>
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <label for="selector-tema">Seleccionar Tema Visual:</label>
        <select id="selector-tema" onchange="actualizarEstilo(this.value)">
            <option value="elegante">👑 Elegante (Negro y Dorado)</option>
            <option value="azul">⚡ Azul Eléctrico</option>
            <option value="tomate">🍅 Tomate</option>
            <option value="verde">🔋 Verde Fosforescente</option>
            <option value="estandar">⚪ Estándar (Clásico)</option>
        </select>

        <div style="margin-top: 30px;">
            <p style="font-size: 12px; color: #888;">Este botón activará el mensaje de prueba de tu modal_trabajos.js:</p>
            <button id="btn-accion-modal">PROBAR MODAL</button>
        </div>

        <div style="margin-top: 20px; text-align: center;">
            <a href="dashboard.html" style="color: #666; text-decoration: none; font-size: 11px;">
                <i class="fas fa-chevron-left"></i> REGRESAR AL DASHBOARD
            </a>
        </div>
    </div>

    <script>
        // Al cargar la página, aplicamos el último tema guardado
        window.onload = () => {
            const temaActual = localStorage.getItem('jadi_tema_preferido') || 'elegante';
            document.getElementById('selector-tema').value = temaActual;
            
            if (typeof JadiEstilo !== 'undefined') {
                JadiEstilo.aplicar(temaActual);
            }
        };

        // Función que se activa al cambiar el select
        function actualizarEstilo(color) {
            if (typeof JadiEstilo !== 'undefined') {
                JadiEstilo.aplicar(color);
                localStorage.setItem('jadi_tema_preferido', color);
                console.log("Tema cambiado a: " + color);
            } else {
                alert("Error: No se detecta el archivo estilo_visual.js");
            }
        }
    </script>

</body>
</html>
