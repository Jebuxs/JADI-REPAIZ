<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Registro de Ingreso Local</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; }
        body { 
            background: var(--dark); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            text-align: center;
        }

        .container-ingreso {
            max-width: 400px;
            padding: 30px;
            background: var(--card);
            border-radius: 20px;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .icon-header {
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 20px;
        }

        h2 { margin: 0 0 10px 0; font-size: 1.5rem; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 30px; line-height: 1.4; }

        .btn-main {
            background: var(--gold);
            color: black;
            border: none;
            padding: 18px 40px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-main:active { transform: scale(0.95); }

        .back-link {
            margin-top: 25px;
            display: block;
            color: #555;
            text-decoration: none;
            font-size: 0.8rem;
        }

        /* Contenedor Crítico para el modal_trabajos.js */
        #modal-trabajo {
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.92); 
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 10000; 
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div class="container-ingreso">
        <div class="icon-header">
            <i class="fas fa-file-invoice"></i>
        </div>
        <h2>Registro de Ingreso</h2>
        <p>Módulo de administración para el Zapatero. Inicia una orden para clientes que visitan el local físicamente.</p>
        
        <button class="btn-main" onclick="abrirModalOrden('crear')">
            <i class="fas fa-plus-circle"></i> Iniciar Nueva Orden
        </button>
        
        <a href="dashboard.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Volver al Panel Principal
        </a>
    </div>

    <div id="modal-trabajo"></div>

    <script>
        // Configuración de Firebase (asegura que coincida con tu proyecto)
        const firebaseConfig = { 
            databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
            storageBucket: "jadi-repaiz.appspot.com" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        // Verificación de sesión de Zapatero
        const session = JSON.parse(localStorage.getItem('session_jadi'));
        if(!session || session.rol !== 'zapatero') {
            console.warn("Acceso restringido a administradores.");
            // Opcional: window.location.href = "dashboard.html";
        }
    </script>

    <script src="../js/modal_trabajos.js"></script>

</body>
</html>
