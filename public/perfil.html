<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { 
            background-color: #000; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }

        /* Estilo de la flecha atrás */
        .back-nav {
            position: absolute;
            top: 20px;
            left: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #FFD700;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            text-align: center;
            border: 1px solid #333;
            padding: 40px;
            border-radius: 20px;
            background: #0a0a0a;
        }

        h1 { color: #FFD700; margin-bottom: 10px; }
        
        .input-edit {
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            margin-top: 20px;
            box-sizing: border-box;
        }

        .btn-save {
            background: #FFD700;
            color: black;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-save:hover { background: #e6c300; }
    </style>
</head>
<body>

    <a href="javascript:history.back()" class="back-nav">
        <span style="font-size: 24px;">←</span> ATRÁS
    </a>

    <div class="container">
        <h1>Editar Perfil</h1>
        <p style="color: #666;">Actualiza la información de tu cuenta J.A.D.I</p>

        <input type="text" id="nombre-edit" class="input-edit" placeholder="Tu nombre completo">
        <button class="btn-save" onclick="actualizarDatos()">GUARDAR CAMBIOS</button>
    </div>

    <script>
        // Configuración de tu Firebase
        const firebaseConfig = { 
            apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU", 
            databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Recuperar la sesión actual
        let session = JSON.parse(localStorage.getItem('session_jadi'));

        // Cargar el nombre actual si existe
        if(session && session.nombre) {
            document.getElementById('nombre-edit').value = session.nombre;
        }

        async function actualizarDatos() {
            const nuevoNombre = document.getElementById('nombre-edit').value;

            if (!session || !session.uid) {
                alert("Error: Sesión no encontrada.");
                return;
            }

            try {
                // LA CLAVE: .update() sobre el UID existente para NO crear uno nuevo
                await db.ref('usuarios/' + session.uid).update({
                    nombre: nuevoNombre
                });

                // Actualizar la sesión local para que el cambio se vea de inmediato
                session.nombre = nuevoNombre;
                localStorage.setItem('session_jadi', JSON.stringify(session));

                alert("Perfil actualizado. Volviendo...");
                history.back(); // Retorna automáticamente al módulo anterior

            } catch (error) {
                alert("Error al editar: " + error.message);
            }
        }
    </script>
</body>
</html>
