<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I - Panel Maestro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; --red: #ff4444; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 20px; margin-bottom: 30px; }
        .container { max-width: 600px; margin: auto; }
        
        /* Sección de Control */
        .admin-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        h3 { color: var(--gold); margin-top: 0; }
        input, select { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #222; 
            background: #000; color: white; box-sizing: border-box; 
        }
        
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-add { background: var(--gold); color: black; }
        .btn-del { background: var(--red); color: white; padding: 5px 10px; width: auto; font-size: 0.8rem; }

        /* Tabla de Usuarios */
        .user-list { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .user-list th { text-align: left; color: var(--gold); border-bottom: 1px solid #333; padding: 10px; }
        .user-list td { padding: 10px; border-bottom: 1px solid #111; font-size: 0.9rem; }
        
        /* Acceso Secreto */
        #login-admin { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--dark); z-index: 1000; display: flex; justify-content: center; align-items: center; 
        }
    </style>
</head>
<body>

<div id="login-admin">
    <div style="text-align:center; width: 80%; max-width: 300px;">
        <h2 style="color:var(--gold);">ACCESO MAESTRO</h2>
        <input type="password" id="master-key" placeholder="Introduce la Clave Maestra">
        <button class="btn btn-add" onclick="verificarMaestro()">ENTRAR AL SISTEMA</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1>MASTER CONTROL J.A.D.I</h1>
        <p>Gestión Global de Usuarios y Empresas</p>
    </div>

    <div class="admin-box">
        <h3>Crear Cuenta Nueva</h3>
        <input type="text" id="new-nombre" placeholder="Nombre completo">
        <input type="tel" id="new-tel" placeholder="Teléfono (servirá como ID)">
        <input type="text" id="new-pass" placeholder="Contraseña">
        <select id="new-rol">
            <option value="TND">Tienda (Ventas)</option>
            <option value="ZPT">Taller (Reparación)</option>
            <option value="EMP">Empleado</option>
            <option value="ADM">Administrador</option>
        </select>
        <button class="btn btn-add" onclick="crearCuenta()">CREAR USUARIO AHORA</button>
    </div>

    <div class="admin-box">
        <h3>Usuarios en el Sistema</h3>
        <table class="user-list">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Rol</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="lista-usuarios">
                </tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
        projectId: "jadi-repaiz",
        storageBucket: "jadi-repaiz.appspot.com",
        appId: "1:847134630000:web:0b7806aeda52b991d554b5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // CLAVE MAESTRA (Cámbiala aquí si quieres)
    const CLAVE_SECRETA = "JADI2026"; 

    function verificarMaestro() {
        const pass = document.getElementById('master-key').value;
        if(pass === CLAVE_SECRETA) {
            document.getElementById('login-admin').style.display = 'none';
            cargarUsuarios();
        } else {
            alert("Clave Maestra Incorrecta");
        }
    }

    function crearCuenta() {
        const nom = document.getElementById('new-nombre').value;
        const tel = document.getElementById('new-tel').value;
        const pas = document.getElementById('new-pass').value;
        const rol = document.getElementById('new-rol').value;

        if(!nom || !tel || !pas) return alert("Faltan datos");

        db.ref('usuarios/' + tel).set({
            nombre: nom,
            telefono: tel,
            pass: pas,
            rolCodigo: rol,
            empresaID: "JADI-CORP",
            uid: rol + tel.slice(-4)
        }).then(() => {
            alert("Cuenta creada exitosamente");
            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    }

    function cargarUsuarios() {
        db.ref('usuarios').on('value', snap => {
            const tabla = document.getElementById('lista-usuarios');
            tabla.innerHTML = "";
            snap.forEach(user => {
                const u = user.val();
                tabla.innerHTML += `
                    <tr>
                        <td>${u.nombre}<br><small style="color:#666">${u.telefono}</small></td>
                        <td>${u.rolCodigo}</td>
                        <td><button class="btn-del" onclick="eliminarUsuario('${user.key}')">Eliminar</button></td>
                    </tr>
                `;
            });
        });
    }

    function eliminarUsuario(id) {
        if(confirm("¿Estás seguro de eliminar esta cuenta?")) {
            db.ref('usuarios/' + id).remove();
        }
    }
</script>
</body>
</html>
