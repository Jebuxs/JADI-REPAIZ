<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .card { width: 85%; max-width: 350px; padding: 40px 20px; background: #0a0a0a; border-radius: 20px; border: 1px solid #222; }
        h1 { color: #fbc02d; font-size: 2.5rem; letter-spacing: 5px; margin-bottom: 30px; }
        .btn-google { background: #fff; color: #000; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; border: none; cursor: pointer; font-size: 1rem; }
        #registro, #loader { display: none; }
        .btn-rol { background: #111; color: #888; padding: 12px; margin: 5px; border: 1px solid #333; border-radius: 8px; width: 45%; font-weight: bold; }
        .active { border-color: #fbc02d; color: #fbc02d; background: #1a1500; }
        input { width: 100%; padding: 15px; margin: 15px 0; background: #000; color: #fff; border: 1px solid #333; border-radius: 10px; box-sizing: border-box; text-align: center; font-size: 1rem; }
    </style>
</head>
<body>

    <div id="loader" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; z-index: 1000; flex-direction: column;">
        <p style="color:#fbc02d; font-weight:bold; font-size: 1.2rem;">VERIFICANDO ACCESO...</p>
    </div>

    <div class="card" id="login-screen" style="display:none;">
        <h1>J.A.D.I</h1>
        <button class="btn-google" id="btn-entrar">ENTRAR CON GOOGLE</button>
    </div>

    <div class="card" id="registro" style="display:none;">
        <h2 style="color:#fbc02d">REGISTRO NUEVO</h2>
        <div style="display: flex; flex-wrap: wrap; justify-content: center;">
            <button class="btn-rol" onclick="selR('ZAPATERO', this)">ZAPATERO</button>
            <button class="btn-rol" onclick="selR('CLIENTE', this)">CLIENTE</button>
            <button class="btn-rol" onclick="selR('TIENDA', this)">TIENDA</button>
            <button class="btn-rol" onclick="selR('DELIVERY', this)">DELIVERY</button>
        </div>
        <input type="tel" id="tel" placeholder="WhatsApp">
        <button class="btn-google" style="background:#fbc02d" onclick="crear()">FINALIZAR REGISTRO</button>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        authDomain: "jadi-repaiz.firebaseapp.com",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
        projectId: "jadi-repaiz"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let uTemp = null;
    let rTemp = "";

    // --- PASO 1: VERIFICAR SI VENIMOS DE REDIRECCIÓN ---
    auth.getRedirectResult().then(res => {
        if (res.user) {
            // Si el usuario acaba de volver de Google con éxito
            uTemp = res.user;
            procesarUsuario(res.user);
        } else {
            // Si no viene de redirección, checar si ya tiene sesión o mostrar login
            auth.onAuthStateChanged(user => {
                if (user) {
                    uTemp = user;
                    procesarUsuario(user);
                } else {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('login-screen').style.display = 'block';
                }
            });
        }
    }).catch(e => {
        alert("Error al volver de Google: " + e.message);
        document.getElementById('loader').style.display = 'none';
        document.getElementById('login-screen').style.display = 'block';
    });

    function procesarUsuario(user) {
        db.ref('usuarios/' + user.uid).once('value', s => {
            document.getElementById('loader').style.display = 'none';
            if (s.exists()) {
                const d = s.val();
                localStorage.setItem('session_jadi', JSON.stringify(d));
                window.location.href = d.rolCodigo + ".html";
            } else {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('registro').style.display = 'block';
            }
        });
    }

    // --- PASO 2: ACCIÓN DEL BOTÓN ---
    document.getElementById('btn-entrar').onclick = function() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('loader').style.display = 'flex';
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithRedirect(provider);
    };

    function selR(r, b) {
        rTemp = r;
        document.querySelectorAll('.btn-role').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
    }

    async function crear() {
        const t = document.getElementById('tel').value;
        if(!rTemp || t.length < 8) return alert("Selecciona rol y pon tu WhatsApp");

        document.getElementById('loader').style.display = 'flex';
        try {
            const s = await db.ref('contadores/' + rTemp).once('value');
            const n = (s.val() || 0) + 1;
            await db.ref('contadores/' + rTemp).set(n);

            const data = {
                uid: uTemp.uid,
                nombre: uTemp.displayName,
                email: uTemp.email,
                telefono: t,
                rolCodigo: rTemp.toLowerCase(),
                id_jadi: rTemp.slice(0,3).toUpperCase() + n.toString().padStart(4, '0')
            };

            await db.ref('usuarios/' + uTemp.uid).set(data);
            localStorage.setItem('session_jadi', JSON.stringify(data));
            window.location.href = data.rolCodigo + ".html";
        } catch (error) {
            alert("Error al guardar: " + error.message);
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>
</body>
</html>
