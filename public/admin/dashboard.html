<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - JADI Master</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #0d1117; --border: #30363d; }
        body { background: var(--dark); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 380px; gap: 20px; max-width: 1400px; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        h3 { color: var(--gold); margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid #222; padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }

        /* Estilo Estructura Root */
        .file-list { background: #000; border-radius: 6px; border: 1px solid #222; max-height: 400px; overflow-y: auto; }
        .file-row { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 10px 15px; border-bottom: 1px solid #161b22; 
        }
        .file-row:hover { background: #161b22; }
        .file-row a { text-decoration: none; color: #58a6ff; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; flex-grow: 1; }
        .badge-name { font-size: 0.65rem; background: #23863622; color: #3fb950; padding: 2px 8px; border-radius: 10px; border: 1px solid #23863644; text-transform: uppercase; }
        .btn-delete { color: #444; cursor: pointer; margin-left: 15px; transition: 0.2s; }
        .btn-delete:hover { color: #f85149; }

        /* Métricas */
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 10px; }
        .stat-box { background: #161b22; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .stat-box span { display: block; font-size: 1.6rem; font-weight: bold; color: white; }
        .stat-box label { font-size: 0.65rem; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }

        .btn-sync { display: block; text-align: center; background: #21262d; color: var(--gold); text-decoration: none; padding: 10px; border-radius: 6px; font-size: 0.8rem; margin-top: 15px; border: 1px solid var(--border); font-weight: bold; }
        
        /* Listas de datos */
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .data-table th { text-align: left; color: #8b949e; padding: 10px; border-bottom: 1px solid #222; }
        .data-table td { padding: 10px; border-bottom: 1px solid #111; }

        @media (max-width: 950px) { .grid-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="grid-container">

            </div>
        </div>

        <div class="card">

                        <th>Estado</th>
                    </tr>
                </thead>

        </div>

        <div class="card">
            <h3><i class="fas fa-id-badge"></i> Sesión Master</h3>

            <button onclick="cerrarSesion()" style="width:100%; padding:10px; background:#f8514911; color:#f85149; border:1px solid #f8514933; border-radius:6px; cursor:pointer; font-weight:bold;">SALIR DEL SISTEMA</button>
        </div>
    </div>

</div>
