<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - JADI Master</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #0d1117; --border: #30363d; }
        body { background: var(--dark); color: #c9d1d9; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 350px; gap: 20px; max-width: 1400px; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        h3 { color: var(--gold); margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid #222; padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }

        /* Estilo Estructura Root (Tipo GitHub) */
        .file-list { background: #000; border-radius: 6px; border: 1px solid #222; overflow: hidden; }
        .file-row { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 10px 15px; border-bottom: 1px solid #161b22; transition: 0.2s;
        }
        .file-row:hover { background: #161b22; }
        .file-row a { text-decoration: none; color: #58a6ff; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; flex-grow: 1; }
        .file-row i { color: #8b949e; width: 18px; }
        .badge-name { font-size: 0.65rem; background: #23863622; color: #3fb950; padding: 2px 8px; border-radius: 10px; border: 1px solid #23863644; }
        .btn-delete { color: #444; cursor: pointer; margin-left: 15px; font-size: 0.8rem; }
        .btn-delete:hover { color: #f85149; }

        /* Botón para ir a Sincronizar */
        .btn-sync { display: block; text-align: center; background: #21262d; color: var(--gold); text-decoration: none; padding: 8px; border-radius: 6px; font-size: 0.8rem; margin-top: 15px; border: 1px solid var(--border); }
        .btn-sync:hover { background: #30363d; }

        /* Otros estilos del Dashboard */
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .stat-box { background: #161b22; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .stat-box span { display: block; font-size: 1.5rem; font-weight: bold; color: white; }
        .stat-box label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; }

        @media (max-width: 900px) { .grid-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="grid-container">
    
    <div class="main-content">
        <div class="card">
            <h3><i class="fas fa-chart-line"></i> Resumen del Sistema JADI</h3>
            <div class="stat-grid">
                <div class="stat-box"><span id="val-usuarios">0</span><label>Usuarios</label></div>
                <div class="stat-box"><span id="val-pedidos">0</span><label>Pedidos</label></div>
                <div class="stat-box"><span id="val-ingresos">0</span><label>Ingresos</label></div>
            </div>
