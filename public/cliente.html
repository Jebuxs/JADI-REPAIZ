<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreo de Pedido - J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbc02d; --dark: #000; --card: #111; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; text-align: center; }
        .logo { color: var(--gold); font-size: 2.5rem; font-weight: bold; margin-bottom: 5px; }
        
        .search-container { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-top: 30px; }
        .input-track { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--gold); background: #000; color: white; text-align: center; font-size: 1.2rem; margin-bottom: 15px; box-sizing: border-box; }
        
        .btn-track { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Resultado del Rastreo */
        #resultado { display: none; margin-top: 30px; text-align: left; background: var(--card); padding: 20px; border-radius: 15px; border-left: 5px solid var(--gold); }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; margin-bottom: 15px; }
        .recibido { background: #333; color: #fff; }
        .listo { background: #4caf50; color: #fff; }
        
        .img-pedido { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div class="logo">J.A.D.I</div>
    <p style="color:#888">Sistema de Rastreo de Reparaciones</p>

    <div class="search-container">
        <p>Introduce tu número de orden:</p>
        <input type="text" id="order-id" class="input-track" placeholder="Ej: ORD-1234">
        <button class="btn-track" onclick="rastrearPedido()">CONSULTAR ESTADO</button>
    </div>

    <div id="resultado">
        <div id="badge-container"></div>
        <img id="res-foto" class="img-pedido" src="" style="display:none">
        <h3 id="res-cliente" style="margin:0; color:var(--gold)"></h3>
        <p id="res-desc" style="color:#ccc; font-size: 0.9rem;"></p>
        <hr style="border:0.5px solid #222; margin: 15px 0;">
        <div style="display:flex; justify-content: space-between;">
            <span>Total: <b id="res-total"></b></span>
            <span>Saldo: <b id="res-saldo" style="color:var(--gold)"></b></span>
        </div>
    </div>

    <p id="error-msg" style="color:#ff5252; margin-top:20px; display:none;">No se encontró la orden. Verifica el código.</p>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU",
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function rastrearPedido() {
        const id = document.getElementById('order-id').value.trim().toUpperCase();
        const resDiv = document.getElementById('resultado');
        const errorMsg = document.getElementById('error-msg');
        
        if(!id) return;

        // Buscamos en todas las empresas (porque el cliente no sabe su empresaID)
        // Optimizamos: Buscamos en el nodo global de Pedidos
        db.ref('Ecosistema_JADI/Pedidos').once('value', snap => {
            let pedidoEncontrado = null;

            snap.forEach(empresa => {
                if(empresa.hasChild(id)) {
                    pedidoEncontrado = empresa.child(id).val();
                }
            });

            if(pedidoEncontrado) {
                errorMsg.style.display = 'none';
                resDiv.style.display = 'block';
                
                document.getElementById('res-cliente').innerText = "Hola, " + pedidoEncontrado.cliente;
                document.getElementById('res-desc').innerText = pedidoEncontrado.descripcion;
                document.getElementById('res-total').innerText = "$" + pedidoEncontrado.total;
                document.getElementById('res-saldo').innerText = "$" + pedidoEncontrado.saldo;
                
                const badge = document.getElementById('badge-container');
                const isListo = pedidoEncontrado.estado === 'Listo';
                badge.innerHTML = `<span class="status-badge ${isListo ? 'listo' : 'recibido'}">
                    ${isListo ? '<i class="fas fa-check-circle"></i> ¡LISTO PARA RETIRAR!' : '<i class="fas fa-hammer"></i> EN PROCESO'}
                </span>`;

                if(pedidoEncontrado.foto) {
                    const img = document.getElementById('res-foto');
                    img.src = pedidoEncontrado.foto;
                    img.style.display = 'block';
                }
            } else {
                resDiv.style.display = 'none';
                errorMsg.style.display = 'block';
            }
        });
    }
</script>
</body>
</html>
