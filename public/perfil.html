<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - J.A.D.I</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { 
            background-color: #000; color: white; font-family: sans-serif; 
            margin: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; 
        }
        .back-nav {
            position: absolute; top: 20px; left: 20px; cursor: pointer;
            color: #FFD700; text-decoration: none; font-weight: bold;
        }
        .container {
            text-align: center; border: 1px solid #333; padding: 40px;
            border-radius: 20px; background: #0a0a0a; width: 300px;
        }
        h1 { color: #FFD700; font-size: 22px; }
        .input-edit {
            background: #111; border: 1px solid #333; color: white;
            padding: 12px; border-radius: 8px; width: 100%;
            margin-top: 20px; box-sizing: border-box; outline: none;
        }
        .input-edit:focus { border-color: #FFD700; }
        .btn-save {
            background: #FFD700; color: black; border: none;
            padding: 12px 30px; border-radius: 8px; margin-top: 20px;
            font-weight: bold; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>

    <a href="javascript:history.back()" class="back-nav"> ← ATRÁS </a>

    <div class="container">
        <h1>Editar Perfil</h1>
        <p style="color: #666; font-size: 12px;">Usuario: <span id="user-email">...</span></p>

        <input type="text" id="nombre-edit" class="input-edit" placeholder="Nombre completo">
        <button class="btn-save" onclick="actualizarDatos()">GUARDAR CAMBIOS</button>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAKPxG1osuR9hsj-PsmwJrzK-3W_XM1UyU", 
            databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. LEER SESIÓN ACTUAL
        let session = JSON.parse(localStorage.getItem('session_jadi'));

        if(session) {
            document.getElementById('nombre-edit').value = session.nombre || "";
            document.getElementById('user-email').innerText = session.email || "No detectado";
        } else {
            alert("No hay sesión activa. Regresando...");
            window.location.href = "index.html";
        }

        async function actualizarDatos() {
            const nuevoNombre = document.getElementById('nombre-edit').value;

            // VALIDACIÓN CRÍTICA: Si no hay UID, no hacemos nada para evitar duplicados
            if (!session || !session.uid) {
                alert("Error de seguridad: No se detectó tu ID único.");
                return;
            }

            try {
                // RUTA EXACTA: usuarios/ EL_UID_DEL_USUARIO_LOGUEADO
                // Usamos .update para que solo modifique el campo 'nombre' del usuario actual
                await db.ref('usuarios').child(session.uid).update({
                    nombre: nuevoNombre
                });

                // Actualizar la memoria local para que los otros módulos vean el cambio
                session.nombre = nuevoNombre;
                localStorage.setItem('session_jadi', JSON.stringify(session));

                alert("Información actualizada con éxito.");
                history.back(); 

            } catch (error) {
                console.error(error);
                alert("Error al editar: " + error.message);
            }
        }
    </script>
</body>
</html>
