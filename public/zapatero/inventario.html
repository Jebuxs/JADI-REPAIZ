<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario J.A.D.I - Gestión de Bodega</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --dark: #000; --card: #0d1117; --border: #30363d; }
        body { background: var(--dark); color: #e6edf3; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 20px; }

        /* HEADER */
        .header { 
            padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid var(--gold); background: #050505;
        }
        .back-link { color: var(--gold); text-decoration: none; font-size: 14px; }

        .container { max-width: 700px; margin: auto; padding: 20px; }

        /* BARRA DE NAVEGACIÓN DE MÓDULOS */
        .module-nav { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; 
        }
        .nav-btn { 
            background: var(--card); border: 1px solid var(--border); color: white; 
            padding: 15px; border-radius: 12px; text-decoration: none; text-align: center;
            font-size: 12px; font-weight: bold; transition: 0.3s;
        }
        .nav-btn i { display: block; font-size: 20px; color: var(--gold); margin-bottom: 8px; }
        .nav-btn:hover { border-color: var(--gold); background: #161b22; }

        /* BUSCADOR */
        .search-container { position: relative; margin-bottom: 20px; }
        .search-container input { 
            width: 100%; padding: 12px 40px 12px 15px; border-radius: 25px; 
            border: 1px solid var(--border); background: #111; color: white; box-sizing: border-box;
        }
        .search-container i { position: absolute; right: 15px; top: 13px; color: var(--gold); }

        /* LISTADO DE MATERIAL EXISTENTE */
        .inventory-list { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .list-header { background: #161b22; padding: 12px 20px; font-size: 13px; font-weight: bold; color: var(--gold); border-bottom: 1px solid var(--border); }
        
        .item-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; border-bottom: 1px solid #161b22; transition: 0.2s;
        }
        .item-row:last-child { border-bottom: none; }
        .item-row:hover { background: #1c2128; }

        .item-details h4 { margin: 0; font-size: 14px; color: white; }
        .item-details span { font-size: 11px; color: #666; text-transform: uppercase; }

        .stock-badge { 
            background: #000; border: 1px solid var(--gold); color: var(--gold); 
            padding: 5px 12px; border-radius: 20px; font-weight: 900; font-size: 14px;
        }

        /* BOTÓN FLOTANTE AÑADIR */
        .btn-float-add { 
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; 
            background: var(--gold); color: black; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 24px; box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3); text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="zapatero.html" class="back-link"><i class="fas fa-chevron-left"></i> VOLVER</a>
        <div style="color:var(--gold); font-size: 14px; font-weight: 900; letter-spacing: 1px;">J.A.D.I INVENTARIO</div>
    </div>

    <div class="container">
        <div class="module-nav">
            <a href="material.html" class="nav-btn">
                <i class="fas fa-boxes-packing"></i>
                MATERIAL DISPONIBLE
            </a>
            <a href="compras.html" class="nav-btn">
                <i class="fas fa-cart-shopping"></i>
                ADQUIRIR / SOLICITAR
            </a>
        </div>

        <div class="search-container">
            <input type="text" id="busqueda" placeholder="Buscar material en bodega..." onkeyup="filtrarInventario()">
            <i class="fas fa-search"></i>
        </div>

        <div class="inventory-list">
            <div class="list-header">MATERIAL EN LOCAL</div>
            <div id="lista-existente">
                <div class="item-row">
                    <div class="item-details">
                        <h4>Suela de Caucho Talla 42</h4>
                        <span>Categoría: Suelas</span>
                    </div>
                    <div class="stock-badge">10 pz</div>
                </div>
                <div class="item-row">
                    <div class="item-details">
                        <h4>Hilo Nylon Encerado Negro</h4>
                        <span>Categoría: Costura</span>
                    </div>
                    <div class="stock-badge">3 rollos</div>
                </div>
            </div>
        </div>
    </div>

    <a href="añadir.html" class="btn-float-add" title="Añadir Nuevo Material">
        <i class="fas fa-plus"></i>
    </a>

    <script>
        const firebaseConfig = { databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = function() {
            const session = JSON.parse(localStorage.getItem('session_jadi'));
            if (session) {
                cargarInventarioLocal(session.uid);
            } else {
                window.location.href = "../index.html";
            }
        };

        function cargarInventarioLocal(uid) {
            const listaDiv = document.getElementById('lista-existente');
            
            db.ref('inventarios').orderByChild('maestroId').equalTo(uid).on('value', snap => {
                listaDiv.innerHTML = "";
                if (!snap.exists()) {
                    listaDiv.innerHTML = "<p style='padding:20px; text-align:center; font-size:12px; color:#555;'>No hay materiales registrados.</p>";
                    return;
                }
                
                snap.forEach(child => {
                    const item = child.val();
                    listaDiv.innerHTML += `
                        <div class="item-row">
                            <div class="item-details">
                                <h4>${item.nombre}</h4>
                                <span>Categoría: ${item.categoria}</span>
                            </div>
                            <div class="stock-badge">${item.cantidad}</div>
                        </div>
                    `;
                });
            });
        }

        function filtrarInventario() {
            let input = document.getElementById('busqueda').value.toLowerCase();
            let rows = document.getElementsByClassName('item-row');
            
            for (let i = 0; i < rows.length; i++) {
                let name = rows[i].getElementsByTagName('h4')[0].innerText.toLowerCase();
                rows[i].style.display = name.includes(input) ? "flex" : "none";
            }
        }
    </script>
</body>
</html>
