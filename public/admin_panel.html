<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB JADI - VISUALIZACIÓN TOTAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        h2 { color: #fbc02d; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        #estado { text-align: center; font-size: 0.8rem; color: #666; margin-bottom: 20px; }
        
        .card { 
            background: #111; border: 1px solid #333; border-radius: 15px; 
            padding: 18px; margin-bottom: 15px; border-left: 5px solid #fbc02d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .nombre { color: #fbc02d; font-weight: bold; font-size: 1.2rem; display: block; border-bottom: 1px solid #222; padding-bottom: 5px; margin-bottom: 10px; }
        
        .grid-datos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.85rem; }
        .dato-item { color: #888; }
        .dato-item b { color: #ddd; display: block; font-size: 0.75rem; text-transform: uppercase; }
        
        .btn-del { 
            background: #441111; color: #ff6666; border: 1px solid #662222; 
            padding: 10px; border-radius: 8px; width: 100%; margin-top: 15px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-del:active { background: #ff4444; color: white; }
    </style>
</head>
<body>

    <h2>DATABASE J.A.D.I</h2>
    <div id="estado">Sincronizando registros...</div>

    <div id="contenedor-usuarios">
        </div>

<script>
    const firebaseConfig = {
        databaseURL: "https://jadi-repaiz-default-rtdb.firebaseio.com"
    };
    
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    db.ref('usuarios').on('value', (snap) => {
        const contenedor = document.getElementById('contenedor-usuarios');
        const estado = document.getElementById('estado');
        contenedor.innerHTML = "";
        
        if (snap.exists()) {
            estado.innerText = "Sincronizado: " + snap.numChildren() + " usuarios encontrados";
            snap.forEach((child) => {
                const u = child.val();
                const id = child.key;
                
                // MAPEO INTELIGENTE: Busca el dato en cualquier nombre posible
                const nombre = u.nombre || u.userName || "Sin Nombre";
                const telefono = u.telefono || u.phone || id;
                const clave = u.pass || u.password || u.clave || "---";
                const rol = u.rolCodigo || u.rol || u.tipo || "USER";
                const empresa = u.empresaNombre || u.empresa || u.taller || "JADI CENTRAL";
                const fecha = u.fecha_ingreso || u.registro || "Antiguo";
                const uid = u.uid || u.user_id || "N/A";

                contenedor.innerHTML += `
                    <div class="card">
                        <span class="nombre">${nombre.toUpperCase()}</span>
                        <div class="grid-datos">
                            <div class="dato-item"><b>Teléfono/ID</b>${telefono}</div>
                            <div class="dato-item"><b>Contraseña</b>${clave}</div>
                            <div class="dato-item"><b>Rol de Usuario</b>${rol}</div>
                            <div class="dato-item"><b>UID Sistema</b>${uid}</div>
                            <div class="dato-item"><b>Asignado a</b>${empresa}</div>
                            <div class="dato-item"><b>Fecha Registro</b>${fecha}</div>
                        </div>
                        <button class="btn-del" onclick="eliminar('${id}')">ELIMINAR CUENTA</button>
                    </div>
                `;
            });
        } else {
            estado.innerText = "Base de datos vacía";
            contenedor.innerHTML = "<p style='text-align:center; color:#444;'>No hay registros en /usuarios</p>";
        }
    });

    function eliminar(id) {
        if(confirm("¿Estás seguro de borrar permanentemente este usuario?")) {
            db.ref('usuarios/' + id).remove();
        }
    }
</script>
</body>
</html>
